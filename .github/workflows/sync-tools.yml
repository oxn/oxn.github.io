name: Sync cytools-html → oxn.github.io/tools
concurrency:
  group: "sync-tools-job"
  cancel-in-progress: true
on:
  workflow_dispatch:
  push:
    branches: [main]
  repository_dispatch:
    types: [sync_trigger]

jobs:
  copy-files:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 拉取 cytools-html 源码
      - name: Checkout cytools-html
        uses: actions/checkout@v4
        with:
          repository: oxn/cytools-html
          token: ${{ secrets.SYNC_PAT }}
          path: source

      # 拉取当前 oxn.github.io 仓库
      - name: Checkout current repo
        uses: actions/checkout@v4
        with:
          path: target

      # 文件同步 + 防空提交逻辑
      - name: Sync folder
        run: |
          rm -rf target/tools
          mkdir target/tools
          cp -r source/* target/tools/
          cd target
          git config user.name "Sync Bot"
          git config user.email "bot@cycy.fun"
          git add .
          # 仅在文件有改动时才提交推送，杜绝空白commit
          if ! git diff --quiet --cached; then
            git commit -m "auto sync cytools-html to tools folder"
            git push
          fi
