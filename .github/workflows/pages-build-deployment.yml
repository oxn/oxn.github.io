name: pages build and deployment
on:
  push:
    branches: [master]
  workflow_dispatch:

# 并发锁：同时间只允许1次部署，新部署自动取消旧任务，根除冲突
concurrency:
  group: "pages-deploy-master"
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master 分支源码
        uses: actions/checkout@v4
        with:
          ref: master
      - name: 上传全站静态文件
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
