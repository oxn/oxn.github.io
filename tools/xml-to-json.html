<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>XML 转 JSON 工具</title>
<style>
    :root {
      --primary: #10b981;
      --primary-light: #dcfce7;
      --header-bg: #f0fdf4;
      --warn: #f97316;
      --danger: #ef4444;
      --nav-btn-bg: #ffffff;
      --nav-btn-border: #e5e7eb;
      --nav-btn-text: #222222;
      --text-main: #222222;
      --text-secondary: #555555;
      --text-weak: #888888;
      --border-base: #e5e7eb;
      --border-light: #f3f4f6;
      --bg-page: #ffffff;
      --bg-card: #ffffff;
      --bg-btn: #ffffff;
      --bg-footer: #f0fdf4;
      --shadow-sm: 0 1px 3px rgba(0,0,0.06);
      --shadow-lg: 0 6px 16px rgba(0,0.1);
      --radius-xs: 4px;
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 999px;
      --space-xs: 6px;
      --space-sm: 10px;
      --space-md: 14px;
      --space-lg: 16px;
      --space-xl: 28px;
      --transition: all 0.22s ease;
      --key-bg: #e5e7eb;
      --key-text: #222;
      --key-radius: 6px;
      --key-shadow: 0 1px 2px rgba(0,0.15);
      --body-font-size: 16px;
      --body-line-height: 1.6;
      --title-line-height: 1.2;
      --sub-title-line-height: 1.25;
      --content-max-width: 720px;
      --card-gap: 16px;
      --card-min-width: 300px;
      --header-safe-gap: 16px;
      --card-label-offset: 36px;
      --nav-line-height: 38px;
      --theme-btn-width: 36px;
    }
    html[data-theme="dark"] {
      --primary: #34d399;
      --primary-light: rgba(52, 211, 153, 0.18);
      --header-bg: #111827;
      --nav-btn-bg: #1f2937;
      --nav-btn-border: #374151;
      --nav-btn-text: #f3f4f6;
      --warn: #fdba74;
      --danger: #f87171;
      --text-main: #f9fafb;
      --text-secondary: #d1d5db;
      --text-weak: #9ca3af;
      --border-base: #374151;
      --border-light: #1f2937;
      --bg-page: #0f172a;
      --bg-card: #1e293b;
      --bg-btn: #1f2937;
      --bg-footer: #111827;
      --shadow-sm: 0 1px 3px rgba(0,0,0.25);
      --shadow-lg: 0 6px 16px rgba(0,0.45);
      --key-bg: #374151;
      --key-text: #f9fafb;
      --key-shadow: 0 1px 2px rgba(0,0.35);
    }
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: system-ui, -apple-system, sans-serif;
  transition: var(--transition);
}
body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--bg-page);
  color:var(--text-main);
  padding:20px;
  position: relative;
}
.top-header-bar{
  position: fixed;
  top: 14px;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 calc(var(--space-lg));
  z-index: 999;
}
.header-btn-back {
  padding: 7px 10px;
  border: 1px solid var(--nav-btn-border);
  border-radius: var(--radius-lg);
  font-size: 12px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
  background: var(--nav-btn-bg);
  color: var(--nav-btn-text);
  flex-shrink: 0;
  min-width: fit-content;
  height: var(--nav-line-height);
}
.header-btn-back:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
.header-btn-theme {
  width: 40px;
  height: 40px;
  padding: 0;
  border: 1px solid var(--nav-btn-border);
  border-radius: 50%;
  font-size: 16px;
  cursor: pointer;
  display: grid;
  place-items: center;
  background: var(--nav-btn-bg);
  color: var(--nav-btn-text);
  flex-shrink: 0;
}
.header-btn-theme:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
.box{
  width:100%;
  max-width: var(--content-max-width);
  background:var(--bg-card);
  padding:32px;
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
  margin-top: 70px;
}
h2{
  text-align:center;
  margin-bottom:28px;
  font-weight:600;
  font-size:24px;
}
.input-item{
  width:100%;
  margin-bottom:18px;
}
label{
  display:block;
  margin-bottom:8px;
  font-size:15px;
  opacity:0.85;
}
textarea{
  width:100%;
  padding:13px 16px;
  border:1px solid var(--border-base);
  border-radius:var(--radius-md);
  font-size:16px;
  background:transparent;
  color:inherit;
  min-height:160px;
  resize: vertical;
}
.btn-group{
  display:flex;
  gap:10px;
  margin-bottom:16px;
  flex-wrap:wrap;
}
.btn{
  padding:12px 20px;
  border:none;
  border-radius:var(--radius-md);
  cursor:pointer;
  font-size:16px;
  flex:1;
  min-width:100px;
  pointer-events: auto !important;
}
.btn-primary{ background:var(--primary); color:#fff; }
.btn-blue{ background:#409eff; color:#fff; }
.btn-orange{ background:var(--warn); color:#fff; }
.btn-gray{ background:#909399; color:#fff; }
.stat-success{
  margin-bottom:16px;
  font-size:14px;
  color: var(--primary);
  font-weight:500;
}
.stat-error{
  margin-bottom:16px;
  font-size:14px;
  color: var(--danger);
  font-weight:500;
}
.tip{
  text-align:left;
  font-size:14px;
  opacity:0.65;
  line-height:1.6;
  color:var(--text-secondary);
}
.toast-copy {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 20px;
  background: rgba(0,0,0,0.65);
  color: #fff;
  border-radius: var(--radius-md);
  font-size: 14px;
  opacity: 0;
  pointer-events: none;
  z-index: 9999;
  transition: opacity 0.25s ease;
}
.toast-copy.show {
  opacity: 1;
}
@media screen and (max-width:767px) and (orientation:portrait){
  body{
    padding:15px;
  }
  .top-header-bar{
    padding: 0 var(--space-md);
    top:12px;
  }
  .header-btn-back{
    padding:6px 8px;
    font-size:11px;
    height: 34px;
  }
  .header-btn-theme{
    width: 34px;
    height: 34px;
    font-size:14px;
  }
  .box{
    padding:24px 20px;
    margin-top: 60px;
  }
  h2{
    font-size:22px;
    margin-bottom:24px;
  }
  .btn-group{
    flex-direction:column;
  }
  label{
    font-size:14px;
    margin-bottom:6px;
  }
  textarea{
    padding:12px 14px;
    font-size:16px;
    min-height:140px;
  }
  .tip{
    font-size:13px;
  }
}
</style>
</head>
<body>
<div class="toast-copy" id="toastTip"></div>

<div class="top-header-bar">
  <button class="header-btn-back" id="backHome">← 返回首页</button>
  <button class="header-btn-theme" id="themeToggle" aria-label="切换明暗模式">🌙</button>
</div>

<div class="box">
  <h2>XML 转 JSON 工具</h2>

  <div class="input-item">
    <label>输入 XML</label>
    <textarea id="inputText" placeholder="示例：
&lt;goods&gt;
  &lt;item id=&quot;001&quot; name=&quot;手机&quot;&gt;
    &lt;price&gt;2999&lt;/price&gt;
  &lt;/item&gt;
  &lt;item id=&quot;002&quot; name=&quot;电脑&quot;&gt;
    &lt;price&gt;5999&lt;/price&gt;
  &lt;/item&gt;
&lt;/goods&gt;"></textarea>
  </div>

  <div class="btn-group">
    <button class="btn btn-gray" id="demoBtn">填充演示</button>
    <button class="btn btn-orange" id="convertBtn">一键转换</button>
    <button class="btn btn-gray" id="clearBtn">清空</button>
  </div>

  <div id="statusBox"></div>

  <div class="input-item">
    <label>输出 JSON</label>
    <textarea id="outputText" readonly placeholder="转换后的格式化JSON会展示在这里"></textarea>
  </div>

  <div class="btn-group">
    <button class="btn btn-blue" id="copyBtn">复制输出</button>
  </div>

  <div class="tip">
纯浏览器原生DOMParser解析，完全离线不联网；自动过滤空白换行、注释；识别XML属性、嵌套节点、重复数组；XML语法错误精准提示；JSON自动缩进格式化，属性以@key存储，文本节点#text标识。
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function(){
  const htmlRoot = document.documentElement;
  const themeToggle = document.getElementById("themeToggle");
  const toastTip = document.getElementById('toastTip');
  const statusBox = document.getElementById('statusBox');
  const STORAGE_KEY = "site_theme_mode";

  // 弹窗提示
  function showToast(msg) {
    toastTip.textContent = msg;
    toastTip.classList.add('show');
    setTimeout(()=>toastTip.classList.remove('show'), 1800);
  }

  // 明暗主题
  function initTheme() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved === "dark") {
      htmlRoot.setAttribute("data-theme", "dark");
      themeToggle.innerHTML = "☀️";
    } else {
      htmlRoot.removeAttribute("data-theme");
      themeToggle.innerHTML = "🌙";
    }
  }
  initTheme();

  themeToggle.addEventListener('click', function(){
    const dark = htmlRoot.hasAttribute('data-theme');
    if (dark) {
      htmlRoot.removeAttribute("data-theme");
      localStorage.setItem(STORAGE_KEY, "light");
      themeToggle.innerHTML = "🌙";
    } else {
      htmlRoot.setAttribute("data-theme", "dark");
      localStorage.setItem(STORAGE_KEY, "dark");
      themeToggle.innerHTML = "☀️";
    }
  });

  // 返回按钮：判断新窗口无历史
  document.getElementById("backHome").addEventListener('click', function(){
    if (history.length <= 1) {
      showToast("当前是新窗口，无历史页面可返回");
    } else {
      history.back();
    }
  });

  // DOM元素
  const inputText = document.getElementById('inputText');
  const outputText = document.getElementById('outputText');
  const demoBtn = document.getElementById('demoBtn');
  const convertBtn = document.getElementById('convertBtn');
  const clearBtn = document.getElementById('clearBtn');
  const copyBtn = document.getElementById('copyBtn');

  // 演示XML原始文本
  const demoXml = `<goods>
  <item id="001" name="手机">
    <price>2999</price>
  </item>
  <item id="002" name="电脑">
    <price>5999</price>
  </item>
</goods>`;

  // 填充演示按钮
  demoBtn.addEventListener('click', function(){
    inputText.value = demoXml;
    outputText.value = "";
    statusBox.innerHTML = "";
  });

  // 过滤有效子节点：仅保留元素、非空白文本，剔除注释/空白换行
  function getValidChildNodes(parent) {
    const res = [];
    for(let n of parent.childNodes) {
      if(n.nodeType === 8) continue;
      if(n.nodeType === 3 && n.textContent.trim() === '') continue;
      res.push(n);
    }
    return res;
  }

  // 核心XML节点递归转换
  function parseXmlNode(node) {
    const obj = {};
    if(node.attributes) {
      for (let attr of node.attributes) {
        obj['@' + attr.name] = attr.value;
      }
    }

    const children = getValidChildNodes(node);
    const textList = children.filter(n => n.nodeType === 3);
    const elementList = children.filter(n => n.nodeType === 1);
    const textStr = textList.map(t => t.textContent.trim()).join('');

    const childMap = {};
    for(let el of elementList) {
      const tag = el.tagName;
      const childVal = parseXmlNode(el);
      if(childMap[tag] === undefined) {
        childMap[tag] = childVal;
      } else {
        if(!Array.isArray(childMap[tag])) childMap[tag] = [childMap[tag]];
        childMap[tag].push(childVal);
      }
    }

    if(Object.keys(childMap).length > 0) {
      Object.assign(obj, childMap);
      if(textStr) obj['#text'] = textStr;
    } else {
      if(textStr) return textStr;
    }
    return obj;
  }

  // XML转JSON入口
  function xmlToJson(xmlStr) {
    const parser = new DOMParser();
    const xmlDoc = parser.parseFromString(xmlStr, "text/xml");
    const errNode = xmlDoc.querySelector("parsererror");
    if(errNode) {
      throw new Error(errNode.textContent.replace(/\s+/g, ' ').trim());
    }
    const root = xmlDoc.documentElement;
    const result = {};
    result[root.tagName] = parseXmlNode(root);
    return JSON.stringify(result, null, 2);
  }

  // 转换按钮
  convertBtn.addEventListener('click', function(){
    const raw = inputText.value.trim();
    statusBox.innerHTML = "";
    outputText.value = "";
    if (!raw) {
      statusBox.innerHTML = `<div class="stat-error">请输入XML内容</div>`;
      return;
    }
    try {
      const jsonStr = xmlToJson(raw);
      outputText.value = jsonStr;
      statusBox.innerHTML = `<div class="stat-success">✅ XML转换JSON完成</div>`;
    } catch (err) {
      let msg = err.message.slice(0,300);
      statusBox.innerHTML = `<div class="stat-error">❌ XML解析失败：${msg}</div>`;
    }
  });

  // 清空按钮
  clearBtn.addEventListener('click', function(){
    inputText.value = "";
    outputText.value = "";
    statusBox.innerHTML = "";
  });

  // 复制兼容函数
  async function copyContent(text) {
    if (!text.trim()) {
      showToast("无内容可复制");
      return;
    }
    if (navigator.clipboard && window.isSecureContext) {
      try {
        await navigator.clipboard.writeText(text);
        showToast("复制成功");
        return;
      } catch (e) {}
    }
    const temp = document.createElement('textarea');
    temp.value = text;
    temp.style.position = 'fixed';
    temp.style.left = '-9999px';
    document.body.appendChild(temp);
    temp.select();
    document.execCommand('copy');
    document.body.removeChild(temp);
    showToast("复制成功");
  }
  copyBtn.addEventListener('click', ()=>copyContent(outputText.value));
});
</script>
</body>
</html>
