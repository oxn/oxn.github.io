<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JSON字符串转义/反转义工具</title>
<style>
    :root {
      --primary: #10b981;
      --primary-light: #dcfce7;
      --header-bg: #f0fdf4;
      --warn: #f97316;
      --danger: #ef4444;
      --nav-btn-bg: #ffffff;
      --nav-btn-border: #e5e7eb;
      --nav-btn-text: #222222;
      --text-main: #222222;
      --text-secondary: #555555;
      --text-weak: #888888;
      --border-base: #e5e7eb;
      --border-light: #f3f4f6;
      --bg-page: #ffffff;
      --bg-card: #ffffff;
      --bg-btn: #ffffff;
      --bg-footer: #f0fdf4;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-lg: 0 6px 16px rgba(0,0,0.1);
      --radius-xs: 4px;
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 999px;
      --space-xs: 6px;
      --space-sm: 10px;
      --space-md: 14px;
      --space-lg: 16px;
      --space-xl: 28px;
      --transition: all 0.22s ease;
      --key-bg: #e5e7eb;
      --key-text: #222;
      --key-radius: 6px;
      --key-shadow: 0 1px 2px rgba(0,0,0.15);
      --body-font-size: 16px;
      --body-line-height: 1.6;
      --title-line-height: 1.2;
      --sub-title-line-height: 1.25;
      --content-max-width: 720px;
      --card-gap: 16px;
      --card-min-width: 300px;
      --header-safe-gap: 16px;
      --card-label-offset: 36px;
      --nav-line-height: 38px;
      --theme-btn-width: 36px;
    }
    html[data-theme="dark"] {
      --primary: #34d399;
      --primary-light: rgba(52, 211, 153, 0.18);
      --header-bg: #111827;
      --nav-btn-bg: #1f2937;
      --nav-btn-border: #374151;
      --nav-btn-text: #f3f4f6;
      --warn: #fdba74;
      --danger: #f87171;
      --text-main: #f9fafb;
      --text-secondary: #d1d5db;
      --text-weak: #9ca3af;
      --border-base: #374151;
      --border-light: #1f2937;
      --bg-page: #0f172a;
      --bg-card: #1e293b;
      --bg-btn: #1f2937;
      --bg-footer: #111827;
      --shadow-sm: 0 1px 3px rgba(0,0,0.25);
      --shadow-lg: 0 6px 16px rgba(0,0,0.45);
      --key-bg: #374151;
      --key-text: #f9fafb;
      --key-shadow: 0 1px 2px rgba(0,0,0.35);
    }
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: system-ui, -apple-system, sans-serif;
  transition: var(--transition);
}
body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--bg-page);
  color:var(--text-main);
  padding:20px;
  position: relative;
}
.top-header-bar{
  position: fixed;
  top: 14px;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 calc(var(--space-lg));
  z-index: 999;
}
.header-btn-back {
  padding: 7px 10px;
  border: 1px solid var(--nav-btn-border);
  border-radius: var(--radius-lg);
  font-size: 12px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
  background: var(--nav-btn-bg);
  color: var(--nav-btn-text);
  flex-shrink: 0;
  min-width: fit-content;
  height: var(--nav-line-height);
}
.header-btn-back:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
.header-btn-theme {
  width: 40px;
  height: 40px;
  padding: 0;
  border: 1px solid var(--nav-btn-border);
  border-radius: 50%;
  font-size: 16px;
  cursor: pointer;
  display: grid;
  place-items: center;
  background: var(--nav-btn-bg);
  color: var(--nav-btn-text);
  flex-shrink: 0;
}
.header-btn-theme:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
.box{
  width:100%;
  max-width: var(--content-max-width);
  background:var(--bg-card);
  padding:32px;
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
  margin-top: 70px;
}
h2{
  text-align:center;
  margin-bottom:28px;
  font-weight:600;
  font-size:24px;
}
.input-item{
  width:100%;
  margin-bottom:18px;
}
label{
  display:block;
  margin-bottom:8px;
  font-size:15px;
  opacity:0.85;
}
textarea{
  width:100%;
  padding:13px 16px;
  border:1px solid var(--border-base);
  border-radius:var(--radius-md);
  font-size:16px;
  background:transparent;
  color:inherit;
  min-height:160px;
  resize: vertical;
}
.radio-row{
  display:flex;
  gap:24px;
  margin-bottom:16px;
}
.btn-group{
  display:flex;
  gap:10px;
  margin-bottom:16px;
  flex-wrap:wrap;
}
.btn{
  padding:12px 20px;
  border:none;
  border-radius:var(--radius-md);
  cursor:pointer;
  font-size:16px;
  flex:1;
  min-width:100px;
  pointer-events: auto !important;
}
.btn-primary{ background:var(--primary); color:#fff; }
.btn-blue{ background:#409eff; color:#fff; }
.btn-gray{ background:#909399; color:#fff; }
.stat-text{
  margin-bottom:16px;
  font-size:14px;
  color:var(--text-secondary);
}
.tip{
  text-align:left;
  font-size:14px;
  opacity:0.65;
  line-height:1.6;
  color:var(--text-secondary);
}
.toast-copy {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 20px;
  background: rgba(0,0,0,0.65);
  color: #fff;
  border-radius: var(--radius-md);
  font-size: 14px;
  opacity: 0;
  pointer-events: none;
  z-index: 9999;
  transition: opacity 0.25s ease;
}
.toast-copy.show {
  opacity: 1;
}
@media screen and (max-width:767px) and (orientation:portrait){
  body{
    padding:15px;
  }
  .top-header-bar{
    padding: 0 var(--space-md);
    top:12px;
  }
  .header-btn-back{
    padding:6px 8px;
    font-size:11px;
    height: 34px;
  }
  .header-btn-theme{
    width: 34px;
    height: 34px;
    font-size:14px;
  }
  .box{
    padding:24px 20px;
    margin-top: 60px;
  }
  h2{
    font-size:22px;
    margin-bottom:24px;
  }
  .radio-row{
    flex-wrap:wrap;
  }
  .btn-group{
    flex-direction:column;
  }
  label{
    font-size:14px;
    margin-bottom:6px;
  }
  textarea{
    padding:12px 14px;
    font-size:16px;
    min-height:140px;
  }
  .tip{
    font-size:13px;
  }
}
</style>
</head>
<body>
<div class="toast-copy" id="toastTip"></div>

<div class="top-header-bar">
  <button class="header-btn-back" id="backHome">← 返回首页</button>
  <button class="header-btn-theme" id="themeToggle" aria-label="切换明暗模式">🌙</button>
</div>

<div class="box">
  <h2>JSON字符串转义/反转义工具</h2>

  <div class="radio-row">
    <label><input type="radio" name="mode" value="escape" checked> JSON转义（嵌套字符串）</label>
    <label><input type="radio" name="mode" value="unescape"> JSON反转义（还原原始）</label>
  </div>

  <div class="input-item">
    <label>输入内容</label>
    <textarea id="inputText" placeholder='{"name":"张三","desc":"换行\n文本"}'></textarea>
  </div>

  <div class="btn-group">
    <button class="btn btn-gray" id="demoBtn">填充演示</button>
    <button class="btn btn-primary" id="convertBtn">执行转换</button>
    <button class="btn btn-gray" id="clearBtn">清空</button>
  </div>

  <div class="stat-text" id="convertStatus">已完成转换：无</div>

  <div class="input-item">
    <label>输出结果</label>
    <textarea id="outputText" readonly placeholder="转换后的字符串"></textarea>
  </div>

  <div class="btn-group">
    <button class="btn btn-blue" id="copyBtn">复制输出</button>
  </div>

  <div class="tip">
【转义模式】将JSON/普通文本包裹双引号，自动转\" \ \n \r \t \f \b，用于接口传字符串参数；
【反转义模式】去除外层双引号，还原所有转义符，恢复原始JSON；
纯前端本地运算，数据不上传服务器。
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function(){
  const htmlRoot = document.documentElement;
  const themeToggle = document.getElementById("themeToggle");
  const toastTip = document.getElementById('toastTip');
  const STORAGE_KEY = "site_theme_mode";

  function showToast(msg) {
    toastTip.textContent = msg;
    toastTip.classList.add('show');
    setTimeout(function(){
      toastTip.classList.remove('show');
    }, 1800);
  }

  function initTheme() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved === "dark") {
      htmlRoot.setAttribute("data-theme", "dark");
      themeToggle.innerHTML = "☀️";
    } else {
      htmlRoot.removeAttribute("data-theme");
      themeToggle.innerHTML = "🌙";
    }
  }
  initTheme();

  themeToggle.addEventListener('click', function(){
    const dark = htmlRoot.hasAttribute('data-theme');
    if (dark) {
      htmlRoot.removeAttribute("data-theme");
      localStorage.setItem(STORAGE_KEY, "light");
      themeToggle.innerHTML = "🌙";
    } else {
      htmlRoot.setAttribute("data-theme", "dark");
      localStorage.setItem(STORAGE_KEY, "dark");
      themeToggle.innerHTML = "☀️";
    }
  });

  document.getElementById("backHome").addEventListener('click', function(){
    history.back();
  });

  const inputText = document.getElementById('inputText');
  const outputText = document.getElementById('outputText');
  const convertStatus = document.getElementById('convertStatus');
  const demoBtn = document.getElementById('demoBtn');
  const convertBtn = document.getElementById('convertBtn');
  const clearBtn = document.getElementById('clearBtn');
  const copyBtn = document.getElementById('copyBtn');
  const radios = document.querySelectorAll('input[name="mode"]');

  // 演示原始JSON
  const demoRaw = `{"name":"张三","desc":"测试\n换行文本"}`;

  demoBtn.addEventListener('click', function(){
    inputText.value = demoRaw;
    outputText.value = "";
    convertStatus.textContent = "已完成转换：无";
  });

  // JSON转义：包裹双引号，内置JSON.stringify自动处理全部转义符
  function jsonEscape(str){
    return JSON.stringify(str);
  }

  // JSON反转义：去掉外层引号，还原所有转义
  function jsonUnescape(str){
    const s = str.trim();
    if(s.length < 2 || s[0] !== '"' || s[s.length - 1] !== '"'){
      throw "反转义失败：输入必须是以\"开头结尾的标准转义字符串";
    }
    return JSON.parse(s);
  }

  convertBtn.addEventListener('click', function(){
    const raw = inputText.value;
    let mode = "escape";
    for(let r of radios){
      if(r.checked){
        mode = r.value;
        break;
      }
    }
    try{
      let res;
      if(mode === "escape"){
        res = jsonEscape(raw);
        convertStatus.textContent = "JSON转义完成";
      }else{
        res = jsonUnescape(raw);
        convertStatus.textContent = "JSON反转义完成";
      }
      outputText.value = res;
    }catch(e){
      showToast("转换失败：" + e.message);
    }
  });

  clearBtn.addEventListener('click', function(){
    inputText.value = "";
    outputText.value = "";
    convertStatus.textContent = "已完成转换：无";
  });

  async function copyContent(text) {
    if(!text.trim()){
      showToast("无内容可复制");
      return;
    }
    if(navigator.clipboard && window.isSecureContext){
      try{
        await navigator.clipboard.writeText(text);
        showToast("复制成功");
        return;
      }catch(err){}
    }
    const temp = document.createElement('textarea');
    temp.value = text;
    temp.style.position = 'fixed';
    temp.style.left = '-9999px';
    document.body.appendChild(temp);
    temp.select();
    document.execCommand('copy');
    document.body.removeChild(temp);
    showToast("复制成功");
  }

  copyBtn.addEventListener('click', function(){
    copyContent(outputText.value);
  });

});
</script>
</body>
</html>
