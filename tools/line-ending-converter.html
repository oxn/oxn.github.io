<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='90' font-size='90'>#</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>行尾符转换器</title>
<style>
    /* 全局主题变量 与主站完全统一 */
    :root {
      --primary: #10b981;
      --primary-light: #dcfce7;
      --header-bg: #f0fdf4;
      --warn: #f97316;
      --nav-btn-bg: #ffffff;
      --nav-btn-border: #e5e7eb;
      --nav-btn-text: #222222;
      --text-main: #222222;
      --text-secondary: #555555;
      --text-weak: #888888;
      --border-base: #e5e7eb;
      --border-light: #f3f4f6;
      --bg-page: #ffffff;
      --bg-card: #ffffff;
      --bg-btn: #ffffff;
      --bg-footer: #f0fdf4;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-lg: 0 6px 16px rgba(0,0,0.1);
      --radius-xs: 4px;
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 999px;
      --space-xs: 6px;
      --space-sm: 10px;
      --space-md: 14px;
      --space-lg: 16px;
      --space-xl: 28px;
      --transition: all 0.22s ease;
      --key-bg: #e5e7eb;
      --key-text: #222;
      --key-radius: 6px;
      --key-shadow: 0 1px 2px rgba(0,0,0.15);
      --body-font-size: 16px;
      --body-line-height: 1.6;
      --title-line-height: 1.2;
      --sub-title-line-height: 1.25;
      --content-max-width: 640px;
      --card-gap: 16px;
      --card-min-width: 300px;
      --header-safe-gap: 16px;
      --card-label-offset: 36px;
      --nav-line-height: 38px;
      --theme-btn-width: 36px;
    }
    html[data-theme="dark"] {
      --primary: #34d399;
      --primary-light: rgba(52, 211, 153, 0.18);
      --header-bg: #111827;
      --nav-btn-bg: #1f2937;
      --nav-btn-border: #374151;
      --nav-btn-text: #f3f4f6;
      --warn: #fdba74;
      --text-main: #f9fafb;
      --text-secondary: #d1d5db;
      --text-weak: #9ca3af;
      --border-base: #374151;
      --border-light: #1f2937;
      --bg-page: #0f172a;
      --bg-card: #1e293b;
      --bg-btn: #1f2937;
      --bg-footer: #111827;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.25);
      --shadow-lg: 0 6px 16px rgba(0,0,0.45);
      --key-bg: #374151;
      --key-text: #f9fafb;
      --key-shadow: 0 1px 2px rgba(0,0,0.35);
    }
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: system-ui, -apple-system, sans-serif;
  transition: var(--transition);
}
body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--bg-page);
  color:var(--text-main);
  padding:calc(var(--card-label-offset) + 16px) 3vw 3rem;
  position: relative;
}
/* 顶部按钮容器 贴合主站头部布局 */
.top-header-bar{
  position: fixed;
  top: 14px;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 calc(var(--space-lg));
  z-index: 999;
}
/* 返回按钮：沿用主站胶囊文字样式不变 */
.header-btn-back {
  padding: 7px 10px;
  border: 1px solid var(--nav-btn-border);
  border-radius: var(--radius-lg);
  font-size: 12px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
  background: var(--nav-btn-bg);
  color: var(--nav-btn-text);
  flex-shrink: 0;
  min-width: fit-content;
  height: var(--nav-line-height);
}
.header-btn-back:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
/* 明暗切换圆形图标按钮：仅图标、正圆 */
.header-btn-theme {
  width: 40px;
  height: 40px;
  padding: 0;
  border: 1px solid var(--nav-btn-border);
  border-radius: var(--radius-full);
  font-size: 16px;
  cursor: pointer;
  display: grid;
  place-items: center;
  background: var(--nav-btn-bg);
  color: var(--nav-btn-text);
  flex-shrink: 0;
}
.header-btn-theme:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
.box{
  width:100%;
  max-width:var(--content-max-width);
  background:var(--bg-card);
  padding:32px;
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
}
h2{
  text-align:center;
  margin-bottom:28px;
  font-weight:600;
  font-size:24px;
}
.input-item{
  width:100%;
  margin-bottom:18px;
}
label{
  display:block;
  margin-bottom:8px;
  font-size:15px;
  opacity:0.85;
}
textarea,select{
  width:100%;
  padding:13px 16px;
  border:1px solid var(--border-base);
  border-radius:var(--radius-md);
  font-size:16px;
  background:transparent;
  color:inherit;
}
textarea{
  min-height:140px;
  resize: vertical;
}
.ctrl-row{
  display:flex;
  gap:12px;
  margin-bottom:22px;
  align-items:center;
}
.ctrl-col{
  flex:1;
}
.btn-group{
  display:flex;
  gap:10px;
  margin-bottom:16px;
}
.btn{
  padding:12px 20px;
  border:none;
  border-radius:var(--radius-md);
  cursor:pointer;
  font-size:16px;
  flex:1;
}
.btn-primary{ background:var(--primary); color:#fff; }
.btn-gray{ background:#909399; color:#fff; }
.btn-blue{ background:#409eff; color:#fff; }
.stat-tip{
  font-size:14px;
  margin-bottom:16px;
  color:var(--text-secondary);
}
.tip{
  text-align:left;
  font-size:14px;
  opacity:0.65;
  line-height:1.6;
  color:var(--text-secondary);
}
/* 统一悬浮Toast提示框 */
.toast-box{
  position:fixed;
  left:50%;
  bottom:40px;
  transform:translateX(-50%) translateY(20px);
  opacity:0;
  padding:0.7rem 1.4rem;
  border-radius:var(--radius-md);
  background:var(--bg-card);
  box-shadow:var(--shadow-lg);
  z-index:9999;
  pointer-events:none;
  transition:all 0.2s ease;
  color:var(--text-main);
}
.toast-box.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}
.toast-success{
  color:var(--primary);
}
.toast-error{
  color:var(--danger);
}
/* ========== 仅手机竖屏才启用新布局：宽度≤767px + 竖屏 ========== */
@media screen and (max-width:767px) and (orientation:portrait){
  body{
    padding:15px;
  }
  .top-header-bar{
    padding: 0 var(--space-md);
    top:12px;
  }
  .header-btn-back{
    padding:6px 8px;
    font-size:11px;
    height: 34px;
  }
  .header-btn-theme{
    width: 34px;
    height: 34px;
    font-size:14px;
  }
  .box{
    padding:24px 20px;
  }
  h2{
    font-size:22px;
    margin-bottom:24px;
  }
  .ctrl-row{
    flex-direction:column;
    gap:10px;
    align-items:stretch;
  }
  .btn-group{
    flex-direction:column;
  }
  label{
    font-size:14px;
    margin-bottom:6px;
  }
  textarea,select{
    padding:12px 14px;
    font-size:16px;
  }
  .tip{
    font-size:13px;
  }
}
</style>
</head>
<body>
<!-- 全局悬浮提示 -->
<div class="toast-box" id="toastTip"></div>

<!-- 顶部按钮栏 -->
<div class="top-header-bar">
  <button class="header-btn-back" id="backHome">← 返回</button>
  <!-- 圆形纯图标明暗切换按钮 -->
  <button class="header-btn-theme" id="themeToggle" aria-label="切换明暗模式">🌙</button>
</div>

<div class="box">
  <h2>行尾符转换器</h2>

  <div class="input-item">
    <label>输入文本</label>
    <textarea id="inputText" placeholder="粘贴需要转换换行符的文本..."></textarea>
  </div>

  <div class="ctrl-row">
    <div class="ctrl-col">
      <label>目标行尾格式</label>
      <select id="targetLineEnd">
        <option value="lf">LF (Unix / Linux / Mac)</option>
        <option value="crlf">CRLF (Windows)</option>
      </select>
    </div>
  </div>

  <div class="btn-group">
    <button class="btn btn-primary" id="convertBtn">执行转换</button>
    <button class="btn btn-gray" id="clearBtn">清空输入</button>
  </div>

  <div class="stat-tip" id="lineStat">当前行数: 0</div>

  <div class="input-item">
    <label>输出结果</label>
    <textarea id="outputText" readonly placeholder="转换后的内容会显示在这里"></textarea>
  </div>

  <div class="btn-group">
    <button class="btn btn-blue" id="copyOutput">复制输出内容</button>
  </div>

  <div class="tip">
LF：仅换行符 \n，适用于 Linux、macOS、Git、代码文件；
CRLF：回车+换行 \r\n，Windows 记事本默认换行格式；
所有转换仅在本地浏览器完成，文本不会上传服务器。
  </div>
</div>

<script>
const htmlRoot = document.documentElement;
const themeToggle = document.getElementById("themeToggle");
const backHome = document.getElementById("backHome");
const toastTip = document.getElementById("toastTip");
const STORAGE_KEY = "site_theme_mode";

// 统一Toast提示
function showToast(msg, success = true) {
  toastTip.className = "toast-box " + (success ? "toast-success" : "toast-error");
  toastTip.innerText = msg;
  toastTip.classList.add("show");
  setTimeout(() => toastTip.classList.remove("show"), 2000);
}

// 初始化主题
function initTheme() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved === "dark") {
    htmlRoot.setAttribute("data-theme", "dark");
    themeToggle.innerHTML = "☀️";
  } else {
    htmlRoot.removeAttribute("data-theme");
    themeToggle.innerHTML = "🌙";
  }
}
// 切换主题
themeToggle.onclick = () => {
  const isDark = htmlRoot.hasAttribute("data-theme");
  if (isDark) {
    htmlRoot.removeAttribute("data-theme");
    localStorage.setItem(STORAGE_KEY, "light");
    themeToggle.innerHTML = "🌙";
  } else {
    htmlRoot.setAttribute("data-theme", "dark");
    localStorage.setItem(STORAGE_KEY, "dark");
    themeToggle.innerHTML = "☀️";
  }
};
// 修改返回逻辑：history.back() 浏览器后退
backHome.onclick = () => {
  history.back();
};

const inputText = document.getElementById('inputText');
const outputText = document.getElementById('outputText');
const targetLineEnd = document.getElementById('targetLineEnd');
const lineStat = document.getElementById('lineStat');
const convertBtn = document.getElementById('convertBtn');
const clearBtn = document.getElementById('clearBtn');
const copyOutput = document.getElementById('copyOutput');

// 更新行数统计
function updateLineCount() {
  const text = inputText.value;
  // 统一先替换所有换行，再分割计数
  const normalized = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  const lines = normalized.split('\n').length;
  lineStat.textContent = `当前行数: ${lines}`;
}

// 转换逻辑
function convertLineEnd() {
  let raw = inputText.value;
  // 先统一全部转为LF
  let lfText = raw.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
  // 目标格式
  if (targetLineEnd.value === 'crlf') {
    outputText.value = lfText.replace(/\n/g, '\r\n');
  } else {
    outputText.value = lfText;
  }
  showToast("转换完成");
}

// 事件绑定
inputText.addEventListener('input', updateLineCount);
convertBtn.onclick = convertLineEnd;

clearBtn.onclick = () => {
  inputText.value = '';
  outputText.value = '';
  updateLineCount();
  showToast("已清空");
};

// 修复复制：兼容剪贴板 + 无alert，统一toast
copyOutput.onclick = async () => {
  const content = outputText.value;
  if (!content) return showToast("暂无可复制内容", false);
  try {
    await navigator.clipboard.writeText(content);
    showToast("复制成功");
  } catch (err) {
    // 降级兼容
    const temp = document.createElement('textarea');
    temp.value = content;
    temp.style.position = 'fixed';
    temp.style.left = '-9999px';
    document.body.appendChild(temp);
    temp.select();
    document.execCommand('copy');
    document.body.removeChild(temp);
    showToast("复制成功");
  }
};

initTheme();
updateLineCount();
</script>
</body>
</html>
