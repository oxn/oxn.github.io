<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='90' font-size='90'>📅</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>日期差值计算器</title>
<style>
    /* 全局主题变量 与主站完全统一 */
    :root {
      --primary: #10b981;
      --primary-light: #dcfce7;
      --header-bg: #f0fdf4;
      --warn: #f97316;
      --danger: #ef4444;
      --nav-btn-bg: #ffffff;
      --nav-btn-border: #e5e7eb;
      --nav-btn-text: #222222;
      --text-main: #222222;
      --text-secondary: #555555;
      --text-weak: #888888;
      --border-base: #e5e7eb;
      --border-light: #f3f4f6;
      --bg-page: #ffffff;
      --bg-card: #ffffff;
      --bg-btn: #ffffff;
      --bg-footer: #f0fdf4;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-lg: 0 6px 16px rgba(0,0,0,0.1);
      --radius-xs: 4px;
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 999px;
      --space-xs: 6px;
      --space-sm: 10px;
      --space-md: 14px;
      --space-lg: 16px;
      --space-xl: 28px;
      --transition: all 0.22s ease;
      --key-bg: #e5e7eb;
      --key-text: #222;
      --key-radius: 6px;
      --key-shadow: 0 1px 2px rgba(0,0,0,0.15);
      --body-font-size: 16px;
      --body-line-height: 1.6;
      --title-line-height: 1.2;
      --sub-title-line-height: 1.25;
      --content-max-width: 1200px;
      --card-gap: 16px;
      --card-min-width: 300px;
      --header-safe-gap: 16px;
      --card-label-offset: 36px;
      --nav-line-height: 38px;
      --theme-btn-width: 36px;
    }
    html[data-theme="dark"] {
      --primary: #34d399;
      --primary-light: rgba(52, 211, 153, 0.18);
      --header-bg: #111827;
      --nav-btn-bg: #1f2937;
      --nav-btn-border: #374151;
      --nav-btn-text: #f3f4f6;
      --warn: #fdba74;
      --danger: #f87171;
      --text-main: #f9fafb;
      --text-secondary: #d1d5db;
      --text-weak: #9ca3af;
      --border-base: #374151;
      --border-light: #1f2937;
      --bg-page: #0f172a;
      --bg-card: #1e293b;
      --bg-btn: #1f2937;
      --bg-footer: #111827;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.25);
      --shadow-lg: 0 6px 16px rgba(0,0,0,0.45);
      --key-bg: #374151;
      --key-text: #f9fafb;
      --key-shadow: 0 1px 2px rgba(0,0,0,0.35);
    }
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: system-ui, -apple-system, sans-serif;
  transition: var(--transition);
}
body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--bg-page);
  color:var(--text-main);
  padding:calc(var(--card-label-offset) + 16px) 3vw 3rem;
  position: relative;
}
/* 顶部按钮容器 贴合主站头部布局 */
.top-header-bar{
  position: fixed;
  top: 14px;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 calc(var(--space-lg));
  z-index: 999;
}
/* 返回按钮：沿用主站胶囊文字样式不变 */
.header-btn-back {
  padding: 7px 10px;
  border: 1px solid var(--nav-btn-border);
  border-radius: var(--radius-lg);
  font-size: 12px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
  background: var(--nav-btn-bg);
  color: var(--nav-btn-text);
  flex-shrink: 0;
  min-width: fit-content;
  height: var(--nav-line-height);
}
.header-btn-back:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
/* 明暗切换圆形图标按钮：仅图标、正圆 */
.header-btn-theme {
  width: 40px;
  height: 40px;
  padding: 0;
  border: 1px solid var(--nav-btn-border);
  border-radius: 50%;
  font-size:16px;
  cursor: pointer;
  display: grid;
  place-items: center;
  background: var(--nav-btn-bg);
  color: var(--nav-btn-text);
  flex-shrink: 0;
}
.header-btn-theme:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
.box{
  width:100%;
  max-width:540px;
  background:var(--bg-card);
  padding:32px;
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
}
h2{
  text-align:center;
  margin-bottom:28px;
  font-weight:600;
  font-size:24px;
}
.row-two{
  display:flex;
  gap:12px;
  margin-bottom:22px;
  width:100%;
}
.col-half{
  flex:1;
}
.input-item{
  width:100%;
  margin-bottom:16px;
}
label{
  display:block;
  margin-bottom:8px;
  font-size:15px;
  opacity:0.85;
}
input,textarea{
  width:100%;
  padding:13px 16px;
  border:1px solid var(--border-base);
  border-radius:var(--radius-md);
  font-size:16px;
  background:transparent;
  color:inherit;
}
/* 统一下拉、时间选择器基础样式 */
select,
input[type="date"],
input[type="time"],
input[type="datetime-local"] {
  width:100%;
  padding:13px 16px;
  border:1px solid var(--border-base);
  border-radius:var(--radius-md);
  font-size:16px;
  color:inherit;
  background: transparent;
}
/* 暗黑模式表单控件全套修复 */
html[data-theme="dark"] {
  /* 下拉框主体背景 */
  select,
  input[type="date"],
  input[type="time"],
  input[type="datetime-local"] {
    background: #273449;
    color: #f3f4f6;
  }
  /* 下拉弹出面板底色适配浏览器深色 */
  select option {
    background: #1e293b;
    color: #f3f4f6;
  }
  /* 日历弹窗深色适配 */
  ::-webkit-calendar-picker-indicator {
    filter: invert(1);
  }
}
/* 聚焦边框变色 */
input:focus,
textarea:focus,
select:focus {
  outline: none;
  border-color: var(--primary);
}
textarea{
  resize: vertical;
  min-height: 90px;
}
.result-box{
  text-align:center;
  padding:20px;
  border-radius:var(--radius-md);
  background:var(--primary-light);
  margin-bottom:20px;
  margin-top:10px;
}
.result-line{
  margin:8px 0;
  font-size:17px;
}
.result-main{
  font-size:32px;
  font-weight:700;
  color:var(--primary);
  margin-bottom:12px;
}
.tip{
  text-align:left;
  font-size:14px;
  opacity:0.65;
  line-height:1.6;
  color:var(--text-secondary);
}
/* ========== 仅手机竖屏才启用新布局：宽度≤767px + 竖屏 ========== */
@media screen and (max-width:767px) and (orientation:portrait){
  body{
    padding:15px;
  }
  .top-header-bar{
    padding: 0 var(--space-md);
    top:12px;
  }
  .header-btn-back{
    padding:6px 8px;
    font-size:11px;
    height: 34px;
  }
  .header-btn-theme{
    width: 34px;
    height: 34px;
    font-size:14px;
  }
  .box{
    padding:24px 20px;
  }
  h2{
    font-size:22px;
    margin-bottom:24px;
  }
  .row-two{
    flex-direction:column;
    gap:10px;
    margin-bottom:20px;
  }
  label{
    font-size:14px;
    margin-bottom:6px;
  }
  input,select,textarea,
  input[type="datetime-local"]{
    padding:12px 14px;
    font-size:16px;
  }
  .result-main{
    font-size:26px;
  }
  .result-line{
    font-size:15px;
  }
  .tip{
    font-size:13px;
  }
}
</style>
</head>
<body>
<!-- 顶部按钮栏（固定保留返回+明暗切换） -->
<div class="top-header-bar">
  <button class="header-btn-back" id="backHome">← 返回</button>
  <button class="header-btn-theme" id="themeToggle" aria-label="切换明暗模式">🌙</button>
</div>

<div class="box">
  <h2>日期差值计算器</h2>

  <div class="row-two">
    <div class="input-item col-half">
      <label>开始时间</label>
      <input id="startTime" type="datetime-local">
    </div>
    <div class="input-item col-half">
      <label>结束时间</label>
      <input id="endTime" type="datetime-local">
    </div>
  </div>

  <div class="result-box" id="resultBox" style="display:none;">
    <div class="result-main" id="diffDays">--</div>
    <div class="result-line" id="diffDetail"></div>
    <div class="result-line" id="diffTotalHour"></div>
    <div class="result-line" id="diffTotalMin"></div>
    <div class="result-line" id="diffTotalSec"></div>
  </div>

  <div class="tip">
    使用说明：选择开始与结束日期时间，输入后自动计算间隔；支持精确到秒，自动换算间隔天数、时分秒、总小时、总分钟、总秒数，不分先后自动取绝对值。
  </div>
</div>

<script>
const htmlRoot = document.documentElement;
const themeToggle = document.getElementById("themeToggle");
const backHome = document.getElementById("backHome");
const STORAGE_KEY = "site_theme_mode";

// 初始化主题（固定复用）
function initTheme() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved === "dark") {
    htmlRoot.setAttribute("data-theme", "dark");
    themeToggle.innerHTML = "☀️";
  } else {
    htmlRoot.removeAttribute("data-theme");
    themeToggle.innerHTML = "🌙";
  }
}
// 切换主题（固定复用）
themeToggle.onclick = () => {
  const isDark = htmlRoot.hasAttribute("data-theme");
  if (isDark) {
    htmlRoot.removeAttribute("data-theme");
    localStorage.setItem(STORAGE_KEY, "light");
    themeToggle.innerHTML = "🌙";
  } else {
    htmlRoot.setAttribute("data-theme", "dark");
    localStorage.setItem(STORAGE_KEY, "dark");
    themeToggle.innerHTML = "☀️";
  }
};
// 返回首页（固定复用）
backHome.onclick = () => {
  history.back();
};

// 元素
const startTime = document.getElementById("startTime");
const endTime = document.getElementById("endTime");
const resultBox = document.getElementById("resultBox");
const diffDays = document.getElementById("diffDays");
const diffDetail = document.getElementById("diffDetail");
const diffTotalHour = document.getElementById("diffTotalHour");
const diffTotalMin = document.getElementById("diffTotalMin");
const diffTotalSec = document.getElementById("diffTotalSec");

// 自动计算函数
function calcDateDiff() {
  const sVal = startTime.value;
  const eVal = endTime.value;
  if (!sVal || !eVal) {
    resultBox.style.display = "none";
    return;
  }
  const s = new Date(sVal);
  const e = new Date(eVal);
  if (isNaN(s.getTime()) || isNaN(e.getTime())) {
    resultBox.style.display = "none";
    return;
  }
  let ms = Math.abs(e - s);
  const secAll = Math.floor(ms / 1000);
  const minAll = Math.floor(ms / (1000 * 60));
  const hourAll = Math.floor(ms / (1000 * 60 * 60));

  const day = Math.floor(ms / (1000 * 60 * 60 * 24));
  ms = ms % (1000 * 60 * 60 * 24);
  const hour = Math.floor(ms / (1000 * 60 * 60));
  ms = ms % (1000 * 60 * 60);
  const min = Math.floor(ms / (1000 * 60));
  ms = ms % (1000 * 60);
  const sec = Math.floor(ms / 1000);

  diffDays.innerText = `${day} 天`;
  diffDetail.innerText = `剩余：${hour} 小时 ${min} 分钟 ${sec} 秒`;
  diffTotalHour.innerText = `总小时：${hourAll}`;
  diffTotalMin.innerText = `总分钟：${minAll}`;
  diffTotalSec.innerText = `总秒数：${secAll}`;
  resultBox.style.display = "block";
}

// 输入变更自动计算
startTime.addEventListener("input", calcDateDiff);
endTime.addEventListener("input", calcDateDiff);

// ========== 新增滚动记忆、浏览器后退恢复滚动代码 ==========
if (history.scrollRestoration !== undefined) {
  history.scrollRestoration = "manual";
}
function debounce(fn, delay = 100) {
  let timer = null;
  return (...args) => {
    clearTimeout(timer);
    timer = setTimeout(() => fn(...args), delay);
  };
}
const saveScrollPos = debounce(() => {
  const state = history.state ?? {};
  state.scrollY = window.scrollY;
  history.replaceState(state, "");
}, 60);
window.addEventListener("scroll", saveScrollPos);
window.addEventListener("popstate", () => {
  setTimeout(() => {
    const state = history.state;
    if (state && typeof state.scrollY === "number") {
      window.scrollTo({ top: state.scrollY, left: 0, behavior: "instant" });
    }
  }, 40);
});

initTheme();
</script>
</body>
</html>
