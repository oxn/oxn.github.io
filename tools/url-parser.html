<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>URL 解析器</title>
<style>
    :root {
        --primary: #10b981;
        --primary-light: #dcfce7;
        --warn: #f97316;
        --danger: #ef4444;
        --nav-btn-bg: #ffffff;
        --nav-btn-border: #e5e7eb;
        --nav-btn-text: #222222;
        --text-main: #222222;
        --text-secondary: #555555;
        --text-weak: #888888;
        --border-base: #e5e7eb;
        --border-light: #f3f4f6;
        --bg-page: #ffffff;
        --bg-card: #ffffff;
        --bg-btn: #ffffff;
        --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
        --shadow-lg: 0 6px 16px rgba(0,0.1);
        /* 修复：补充px单位 */
        --radius-sm: 6px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --transition: all 0.3s ease;
        --content-max-width: 1200px;
        --nav-line-height: 38px;
        --theme-btn-width: 36px;
    }
    html[data-theme="dark"] {
        --primary: #10b981;
        --primary-light: rgba(16, 185, 129, 0.15);
        --nav-btn-bg: #1f2937;
        --nav-btn-border: #374151;
        --nav-btn-text: #f3f4f6;
        --text-main: #f1f5f9;
        --text-secondary: #cbd5e1;
        --text-weak: #94a3b8;
        --border-base: #334155;
        --border-light: #334155;
        --bg-page: #0f172a;
        --bg-card: #1e293b;
        --bg-btn: #1e293b;
        --shadow-sm: 0 1px 3px rgba(0,0,0.2);
    }
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        transition: var(--transition);
    }
    html {
        font-family: system-ui, "Microsoft YaHei", sans-serif;
        -webkit-font-smoothing: antialiased;
    }
    body {
        min-height: 100vh;
        background: var(--bg-page);
        color: var(--text-main);
        line-height: 1.5;
        overflow-x: hidden;
        padding-top: 70px;
    }
    a {
        text-decoration: none;
        color: inherit;
    }
    button {
        font-family: inherit;
        font-size: inherit;
        border: none;
        background: transparent;
        cursor: pointer;
        /* 增加兜底 */
        border-radius: var(--radius-sm, 6px);
    }
    .container {
        max-width: var(--content-max-width);
        width: calc(100% - 48px);
        margin: 0 auto;
    }
    header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 99;
        background: var(--bg-page);
        border-bottom: 1px solid var(--border-base);
    }
    .header-inner {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 0;
    }
    .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--nav-btn-text);
        font-size: 12px;
        font-weight: 500;
        padding: 7px 10px;
        border: 1px solid var(--nav-btn-border);
        border-radius: var(--radius-lg, 12px);
        background: var(--nav-btn-bg);
        height: var(--nav-line-height);
    }
    .back-btn:hover {
        border-color: var(--primary);
        background: var(--primary-light);
        color: var(--primary);
    }
    .theme-switch-wrap {
        position: absolute;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
    }
    .header-btn-circle {
        width: var(--theme-btn-width);
        height: var(--theme-btn-width);
        border: 1px solid var(--nav-btn-border);
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: var(--nav-btn-bg);
        color: var(--nav-btn-text);
    }
    .header-btn-circle:hover {
        border-color: var(--primary);
        background: var(--primary-light);
        color: var(--primary);
    }
    .header-spacer {
        width: 100%;
        height: 60px;
    }
    main.container {
        margin-top: 12px;
        padding-bottom: 60px;
    }
    .page-head {
        text-align: center;
        margin: 20px 0 30px;
    }
    .page-head h1 {
        font-size: 30px;
        margin-bottom: 12px;
        color: var(--text-main);
    }
    .desc-text {
        color: var(--text-weak);
        font-size: 15px;
    }
    .card-box {
        background: var(--bg-card);
        border: 1px solid var(--border-base);
        border-radius: var(--radius-lg, 12px);
        padding: 24px;
        box-shadow: var(--shadow-sm);
    }
    .input-block {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 16px;
    }
    .input-label {
        font-weight: 500;
        color: var(--text-main);
    }
    textarea, input[type="text"] {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid var(--border-base);
        border-radius: var(--radius-sm, 6px);
        background: var(--bg-btn);
        color: var(--text-main);
        font-family: Consolas, monospace;
        outline: none;
    }
    textarea {
        min-height: 140px;
        resize: vertical;
    }
    textarea:focus, input:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(16,185,129,0.15);
    }
    .btn-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin: 20px 0;
    }
    .op-btn {
        height: 44px;
        padding: 0 18px;
        border: 1px solid var(--border-base);
        border-radius: var(--radius-sm, 6px);
        background: var(--bg-btn);
        color: var(--text-main);
        white-space: nowrap;
    }
    .op-btn.primary {
        border-color: var(--primary);
        background: var(--primary-light);
        color: var(--primary);
    }
    .op-btn.warn {
        color: var(--danger);
        border-color: #fecdd3;
    }
    .op-btn:hover {
        border-color: var(--primary);
        background: var(--primary-light);
        color: var(--primary);
    }
    .err-tip {
        color: var(--danger);
        margin: 8px 0;
        font-size: 14px;
        padding: 6px 10px;
        background: rgba(239,68,68,0.08);
        border-radius: var(--radius-sm, 6px);
        min-height:24px;
    }
    .result-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap:12px;
        margin:20px 0;
    }
    .result-item {
        display:flex;
        flex-direction:column;
        gap:4px;
        padding:12px 14px;
        border:1px solid var(--border-base);
        border-radius:var(--radius-sm, 6px);
        background:var(--bg-btn);
    }
    .result-label {
        font-size:13px;
        color:var(--text-weak);
    }
    .result-val {
        font-family:Consolas;
        color:var(--text-main);
        word-break:break-all;
    }
    .param-title {
        margin:24px 0 10px;
        font-weight:500;
        color:var(--text-main);
    }
    .param-table {
        width:100%;
        border-collapse: collapse;
    }
    .param-table th, .param-table td {
        border:1px solid var(--border-base);
        padding:10px 12px;
        text-align:left;
    }
    .param-table th {
        background:var(--primary-light);
        color:var(--primary);
    }
    .toast-copy {
        position: fixed;
        top: 80px;
        left: 50%;
        transform: translateX(-50%) translateY(-20px);
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px 32px;
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        border-radius: var(--radius-lg, 12px);
        box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
        z-index: 999999;
        opacity: 0;
        pointer-events: none;
        transition: all 0.3s ease;
        min-height: 72px;
    }
    .toast-copy.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }
    .toast-icon {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #22c55e;
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 22px;
    }
    .toast-text {
        font-size: 28px;
        color: #16a34a;
    }
    html[data-theme="dark"] .toast-copy {
        background: rgba(34, 197, 94, 0.12);
        border-color: rgba(34, 197, 94, 0.3);
    }
    html[data-theme="dark"] .toast-text {
        color: #4ade80;
    }
    @media (max-width:640px) {
        .result-grid {grid-template-columns:1fr;}
        .page-head h1 {font-size:28px;}
        .toast-text {font-size:20px;}
    }
</style>
</head>
<body>
<header id="headerDom">
    <div class="container header-inner">
        <a href="index.html" class="back-btn" onclick="history.back()">← 返回首页</a>
        <div class="theme-switch-wrap">
            <button id="themeToggle" class="header-btn-circle" onclick="toggleTheme()">🌙</button>
        </div>
    </div>
</header>
<div class="header-spacer" id="headerSpacer"></div>

<main class="container">
    <div class="page-head">
        <h1>URL 解析器</h1>
        <div class="desc-text">快速拆分协议、域名、端口、路径、查询参数、哈希，自动补全http协议</div>
    </div>
    <div class="card-box">
        <div class="input-block">
            <label class="input-label">输入URL</label>
            <input type="text" id="urlInput" placeholder="示例：https://www.htmls.dev/tools?page=1&sort=desc#top">
        </div>
        <div class="btn-row">
            <button class="op-btn primary" onclick="parseUrl()">解析URL</button>
            <button class="op-btn" onclick="fillDemo()">填充示例</button>
            <button class="op-btn warn" onclick="clearAll()">清空</button>
        </div>
        <div class="err-tip" id="errTip"></div>

        <!-- 基础解析结果 -->
        <div class="result-grid" id="resultGrid">
            <div class="result-item">
                <span class="result-label">协议(scheme)</span>
                <span class="result-val" id="resScheme">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">主机(host)</span>
                <span class="result-val" id="resHost">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">域名(hostname)</span>
                <span class="result-val" id="resHostname">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">端口(port)</span>
                <span class="result-val" id="resPort">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">路径(pathname)</span>
                <span class="result-val" id="resPath">-</span>
            </div>
            <div class="result-item">
                <span class="result-label">哈希(hash)</span>
                <span class="result-val" id="resHash">-</span>
            </div>
        </div>

        <!-- 查询参数表格 -->
        <h3 class="param-title">查询参数列表</h3>
        <table class="param-table" id="paramTable">
            <thead>
                <tr>
                    <th>参数名(key)</th>
                    <th>参数值(value)</th>
                </tr>
            <tbody id="paramTbody">
                <tr><td colspan="2" style="text-align:center;color:var(--text-weak)">暂无参数</td></tr>
            </tbody>
            </thead>
        </table>
    </div>
</main>

<div class="toast-copy" id="copyToast">
    <div class="toast-icon">✓</div>
    <span class="toast-text">复制成功</span>
</div>

<script>
// 复制弹窗
var toastTimer = null;
function showToast() {
    var toast = document.getElementById('copyToast');
    if(toastTimer) clearTimeout(toastTimer);
    toast.classList.add('show');
    toastTimer = setTimeout(function(){
        toast.classList.remove('show');
    },3000);
}
async function copyStr(text){
    try{
        await navigator.clipboard.writeText(text);
        showToast();
    }catch(e){
        var t=document.createElement('textarea');
        t.style.position='fixed';t.style.left='-9999px';
        t.value=text;document.body.appendChild(t);t.select();document.execCommand('copy');
        document.body.removeChild(t);showToast();
    }
}

// 主题切换
var STORAGE_KEY="site_theme_mode";
var mediaDark=window.matchMedia('(prefers-color-scheme: dark)');
function applyTheme(mode){
    var htmlRoot=document.documentElement;
    var themeBtn=document.getElementById("themeToggle");
    if(mode==='dark'){
        htmlRoot.setAttribute('data-theme','dark');
        themeBtn.innerText='☀️';
    }else{
        htmlRoot.removeAttribute('data-theme');
        themeBtn.innerText='🌙';
    }
}
function toggleTheme(){
    var htmlRoot=document.documentElement;
    var now=htmlRoot.hasAttribute('data-theme')?'dark':'light';
    var next=now==='dark'?'light':'dark';
    localStorage.setItem(STORAGE_KEY,next);
    applyTheme(next);
}
window.onload=function(){
    var save=localStorage.getItem(STORAGE_KEY);
    if(save) applyTheme(save);
    else applyTheme(mediaDark.matches?'dark':'light');
    // 头部自适应
    var headerDom=document.getElementById('headerDom');
    var headerSpacer=document.getElementById('headerSpacer');
    function syncHeader(){
        headerSpacer.style.height=headerDom.offsetHeight+'px';
    }
    syncHeader();
    window.addEventListener('resize',syncHeader);
};
mediaDark.addEventListener('change',function(){
    if(!localStorage.getItem(STORAGE_KEY)) applyTheme(mediaDark.matches?'dark':'light');
});

// 清空全部
function clearAll(){
    document.getElementById('urlInput').value='';
    document.getElementById('errTip').textContent='';
    // 重置结果
    document.getElementById('resScheme').textContent='-';
    document.getElementById('resHost').textContent='-';
    document.getElementById('resHostname').textContent='-';
    document.getElementById('resPort').textContent='-';
    document.getElementById('resPath').textContent='-';
    document.getElementById('resHash').textContent='-';
    // 参数表格重置
    var tbody=document.getElementById('paramTbody');
    tbody.innerHTML='<tr><td colspan="2" style="text-align:center;color:var(--text-weak)">暂无参数</td></tr>';
}

// 填充示例
function fillDemo(){
    document.getElementById('urlInput').value='https://www.htmls.dev/tools/url-parser?page=2&size=20&keyword=前端#result';
    document.getElementById('errTip').textContent='';
    parseUrl();
}

// 核心URL解析函数（自动补http，兼容无协议链接）
function parseUrl(){
    var errTip=document.getElementById('errTip');
    var raw=document.getElementById('urlInput').value.trim();
    errTip.textContent='';
    if(!raw){
        errTip.textContent='请输入URL地址';
        return;
    }
    var urlStr=raw;
    // 自动补全http://
    if(!/^https?:\/\//.test(urlStr)){
        urlStr='http://'+urlStr;
    }
    try{
        var urlObj=new URL(urlStr);
        // 基础字段赋值
        document.getElementById('resScheme').textContent=urlObj.protocol.replace(':','');
        document.getElementById('resHost').textContent=urlObj.host;
        document.getElementById('resHostname').textContent=urlObj.hostname;
        document.getElementById('resPort').textContent=urlObj.port||'(默认端口)';
        document.getElementById('resPath').textContent=urlObj.pathname;
        document.getElementById('resHash').textContent=urlObj.hash||'(无)';
        // 处理查询参数表格
        var tbody=document.getElementById('paramTbody');
        tbody.innerHTML='';
        var params=new URLSearchParams(urlObj.search);
        var hasParam=false;
        params.forEach(function(val,key){
            hasParam=true;
            var tr=document.createElement('tr');
            var td1=document.createElement('td');
            var td2=document.createElement('td');
            td1.textContent=key;
            td2.textContent=val;
            tr.appendChild(td1);
            tr.appendChild(td2);
            tbody.appendChild(tr);
        });
        if(!hasParam){
            tbody.innerHTML='<tr><td colspan="2" style="text-align:center;color:var(--text-weak)">暂无参数</td></tr>';
        }
    }catch(e){
        errTip.textContent='URL格式错误，无法解析：'+e.message;
        // 重置面板
        document.getElementById('resScheme').textContent='-';
        document.getElementById('resHost').textContent='-';
        document.getElementById('resHostname').textContent='-';
        document.getElementById('resPort').textContent='-';
        document.getElementById('resPath').textContent='-';
        document.getElementById('resHash').textContent='-';
        var tbody=document.getElementById('paramTbody');
        tbody.innerHTML='<tr><td colspan="2" style="text-align:center;color:var(--text-weak)">暂无参数</td></tr>';
    }
}
</script>
</body>
</html>
