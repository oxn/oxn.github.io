<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>图片裁剪</title>
<style>
    /* 全局主题统一变量 */
    :root {
      --primary: #10b981;
      --primary-light: #dcfce7;
      --header-bg: #f0fdf4;
      --warn: #f97316;
      --danger: #ef4444;
      --nav-btn-bg: #ffffff;
      --nav-btn-border: #e5e7eb;
      --nav-btn-text: #222222;
      --text-main: #222222;
      --text-secondary: #555555;
      --text-weak: #888888;
      --border-base: #e5e7eb;
      --border-light: #f3f4f6;
      --bg-page: #ffffff;
      --bg-card: #ffffff;
      --bg-btn: #ffffff;
      --bg-footer: #f0fdf4;
      --shadow-sm: 0 1px 3px rgba(0,0,0.06);
      --shadow-lg: 0 6px 16px rgba(0,0,0.1);
      --radius-xs: 4px;
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 999px;
      --space-xs: 0.375rem;
      --space-sm: 0.625rem;
      --space-md: 0.875rem;
      --space-lg: 1rem;
      --space-xl: 1.75rem;
      --transition: all 0.22s ease;
      --key-bg: #e5e7eb;
      --key-text: #222;
      --key-radius: 6px;
      --key-shadow: 0 1px 2px rgba(0,0,0.15);
      --body-font-size: 1rem;
      --body-line-height: 1.6;
      --title-line-height: 1.2;
      --sub-title-line-height: 1.25;
      --content-max-width: 540px;
      --card-gap: 1rem;
      --card-min-width: 300px;
      --header-safe-gap: 1rem;
      --card-label-offset: 2.25rem;
      --nav-line-height: 2.375rem;
      --theme-btn-width: 2.25rem;
    }
    html[data-theme="dark"] {
      --primary: #34d399;
      --primary-light: rgba(52, 211, 153, 0.18);
      --header-bg: #111827;
      --nav-btn-bg: #1f2937;
      --nav-btn-border: #374151;
      --nav-btn-text: #f3f4f6;
      --warn: #fdba74;
      --danger: #f87171;
      --text-main: #f9fafb;
      --text-secondary: #d1d5db;
      --text-weak: #9ca3af;
      --border-base: #374151;
      --border-light: #1f2937;
      --bg-page: #0f172a;
      --bg-card: #1e293b;
      --bg-btn: #1f2937;
      --bg-footer: #111827;
      --shadow-sm: 0 1px 3px rgba(0,0,0.25);
      --shadow-lg: 0 6px 16px rgba(0,0,0.45);
      --key-bg: #374151;
      --key-text: #f9fafb;
      --key-shadow: 0 1px 2px rgba(0,0,0.35);
    }
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: system-ui, -apple-system, sans-serif;
  transition: var(--transition);
}
body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--bg-page);
  color:var(--text-main);
  padding: clamp(0.75rem, 3vw, 1.25rem);
  position: relative;
}
/* 顶部导航 */
.top-header-bar{
  position: fixed;
  top: 0.875rem;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 clamp(1rem, 4vw, 1.75rem);
  z-index: 999;
}
.header-btn-back {
  padding: 0.4375rem 0.625rem;
  border: 1px solid var(--nav-btn-border);
  border-radius: var(--radius-lg);
  font-size: 0.75rem;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 0.25rem;
  white-space: nowrap;
  background: var(--nav-btn-bg);
  color: var(--nav-btn-text);
  flex-shrink: 0;
  min-width: fit-content;
  height: var(--nav-line-height);
}
.header-btn-back:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
.header-btn-theme {
  width: var(--theme-btn-width);
  height: var(--theme-btn-width);
  padding: 0;
  border: 1px solid var(--nav-btn-border);
  border-radius: 50%;
  font-size: 1rem;
  cursor: pointer;
  display: grid;
  place-items: center;
  background: var(--nav-btn-bg);
  color: var(--nav-btn-text);
  flex-shrink: 0;
}
.header-btn-theme:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
.box{
  width:100%;
  max-width:var(--content-max-width);
  background:var(--bg-card);
  padding: clamp(1.5rem, 5vw, 2rem);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
  margin-top: var(--card-label-offset);
}
h2{
  text-align:center;
  margin-bottom: var(--space-xs);
  font-weight:600;
  font-size: clamp(1.375rem, 4vw, 1.5rem);
}
.sub-title{
  text-align:center;
  font-size: clamp(0.8125rem, 2vw, 0.875rem);
  color:var(--text-secondary);
  margin-bottom: var(--space-xl);
}
/* 上传区域 */
.upload-area{
  border:2px dashed var(--border-base);
  border-radius:var(--radius-md);
  padding: clamp(1.875rem, 6vw, 2.5rem) clamp(0.75rem, 2vw, 1rem);
  text-align:center;
  cursor:pointer;
  margin-bottom: var(--space-xl);
}
.upload-area.active{
  border-color:var(--primary);
  background:var(--primary-light);
}
.upload-icon{
  font-size: clamp(2rem, 7vw, 2.625rem);
  margin-bottom: var(--space-sm);
  color:var(--text-secondary);
}
input[type="file"]{
  display:none;
}
/* 双列自适应行 */
.row-two{
  display:flex;
  flex-wrap:wrap;
  gap:0.75rem;
  margin-bottom: var(--space-lg);
}
.col-half{
  flex:1;
  min-width:110px;
}
.input-item{
  width:100%;
}
label{
  display:block;
  margin-bottom: var(--space-xs);
  font-size: clamp(0.875rem, 2vw, 0.9375rem);
  opacity:0.85;
}
input[type="number"],select{
  width:100%;
  padding: 0.8125rem;
  border:1px solid var(--border-base);
  border-radius:var(--radius-md);
  font-size: clamp(0.875rem, 2vw, 0.9375rem);
  color:inherit;
  background: transparent;
}
html[data-theme="dark"] {
  input[type="number"],select{
    background: #273449;
  }
  select option {
    background: #1e293b;
  }
}
input:focus,select:focus{
  outline:none;
  border-color:var(--primary);
}
.center-btn{
  width:100%;
  padding:0.75rem;
  border:1px solid var(--border-base);
  border-radius:var(--radius-md);
  background:var(--bg-btn);
  color:var(--text-main);
  margin-bottom:var(--space-lg);
  cursor:pointer;
}
.center-btn:hover{
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
.preview-box{
  text-align:center;
  margin-bottom: var(--space-lg);
  min-height:100px;
}
.preview-box canvas{
  max-width:100%;
  max-height: clamp(16.25rem, 40vh, 260px);
  border-radius:var(--radius-md);
  object-fit: contain;
  background:#fff;
}
html[data-theme="dark"] .preview-box canvas{
  background:#222;
}
.btn{
  width:100%;
  padding: clamp(0.8125rem, 2vw, 0.875rem);
  border:none;
  border-radius:var(--radius-md);
  font-size: clamp(0.9375rem, 2vw, 1rem);
  cursor:pointer;
}
.btn-main{
  background:var(--primary);
  color:#fff;
  margin-bottom: var(--space-sm);
}
.btn-orange{
  background:var(--warn);
  color:#fff;
  margin-bottom: var(--space-xl);
}
.tip{
  text-align:left;
  font-size: clamp(0.75rem, 2vw, 0.875rem);
  opacity:0.65;
  line-height:1.6;
  color:var(--text-secondary);
  margin-top: var(--space-xl);
}
/* 平板横屏 */
@media screen and (min-width: 768px) {
  :root {
    --content-max-width: 620px;
  }
  .box {
    padding: 2.25rem;
  }
  .preview-box canvas {
    max-height: 30vh;
  }
}
/* 手机竖屏 */
@media screen and (max-width:767px) and (orientation:portrait){
  .top-header-bar{
    padding: 0 var(--space-md);
    top:0.75rem;
  }
  .header-btn-back{
    padding:0.375rem 0.5rem;
    font-size:0.6875rem;
    height: 2.125rem;
  }
  .header-btn-theme{
    width: 2.125rem;
    height: 2.125rem;
  }
  .box{
    padding: 1.5rem 1.25rem;
  }
  .row-two{
    flex-direction:column;
  }
}
</style>
</head>
<body>
<div class="top-header-bar">
  <button class="header-btn-back" id="backHome">← 返回首页</button>
  <button class="header-btn-theme" id="themeToggle" aria-label="切换明暗模式">🌙</button>
</div>

<div class="box">
  <h2>图片裁剪</h2>
  <div class="sub-title">按坐标裁剪图片，可快速居中裁剪</div>

  <div class="upload-area" id="uploadBox">
    <div class="upload-icon">🖼️</div>
    <div>选择图片 / 拖拽图片到此处</div>
    <input type="file" id="fileInput" accept="image/jpg,image/jpeg,image/png,image/gif,image/webp">
  </div>

  <div class="row-two">
    <div class="col-half input-item">
      <label>裁剪宽度 (px)</label>
      <input type="number" min="1" id="cropW" placeholder="--">
    </div>
    <div class="col-half input-item">
      <label>裁剪高度 (px)</label>
      <input type="number" min="1" id="cropH" placeholder="--">
    </div>
  </div>

  <div class="row-two">
    <div class="col-half input-item">
      <label>起始 X (px)</label>
      <input type="number" min="0" id="cropX" placeholder="--">
    </div>
    <div class="col-half input-item">
      <label>起始 Y (px)</label>
      <input type="number" min="0" id="cropY" placeholder="--">
    </div>
  </div>

  <button class="center-btn" id="centerBtn">快速居中裁剪</button>

  <div class="input-item">
    <label>输出格式</label>
    <select id="formatSel">
      <option value="image/png">PNG</option>
      <option value="image/jpeg">JPEG</option>
      <option value="image/webp">WebP</option>
    </select>
  </div>

  <div class="preview-box">
    <canvas id="previewCanvas"></canvas>
  </div>

  <button class="btn btn-main" id="cropBtn">生成裁剪图</button>
  <button class="btn btn-orange" id="downloadBtn" style="display:none;">下载图片</button>

  <div class="tip">
    使用说明：本地离线裁剪，不上传图片；手动输入起始坐标与裁剪宽高，一键居中自动计算坐标，支持PNG/JPG/WebP导出。
  </div>
</div>

<script>
const htmlRoot = document.documentElement;
const themeToggle = document.getElementById("themeToggle");
const STORAGE_KEY = "site_theme_mode";

// 主题切换
function initTheme() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved === "dark") {
    htmlRoot.setAttribute("data-theme", "dark");
    themeToggle.innerHTML = "☀️";
  } else {
    htmlRoot.removeAttribute("data-theme");
    themeToggle.innerHTML = "🌙";
  }
}
themeToggle.onclick = () => {
  const dark = htmlRoot.hasAttribute("data-theme");
  if (dark) {
    htmlRoot.removeAttribute("data-theme");
    localStorage.setItem(STORAGE_KEY, "light");
    themeToggle.textContent = "🌙";
  } else {
    htmlRoot.setAttribute("data-theme", "dark");
    localStorage.setItem(STORAGE_KEY, "dark");
    themeToggle.textContent = "☀️";
  }
};
document.getElementById("backHome").onclick = () => window.location.href = "./index.html";

// DOM
const uploadBox = document.getElementById("uploadBox");
const fileInput = document.getElementById("fileInput");
const cropW = document.getElementById("cropW");
const cropH = document.getElementById("cropH");
const cropX = document.getElementById("cropX");
const cropY = document.getElementById("cropY");
const centerBtn = document.getElementById("centerBtn");
const formatSel = document.getElementById("formatSel");
const previewCanvas = document.getElementById("previewCanvas");
const ctx = previewCanvas.getContext("2d");
const cropBtn = document.getElementById("cropBtn");
const downloadBtn = document.getElementById("downloadBtn");

let originImg = null;
let originFile = null;
let finalBlob = null;

// 拖拽上传
uploadBox.addEventListener("dragover", e=>{e.preventDefault(); uploadBox.classList.add("active");});
uploadBox.addEventListener("dragleave", ()=>uploadBox.classList.remove("active"));
uploadBox.addEventListener("drop", e=>{
  e.preventDefault();
  uploadBox.classList.remove("active");
  const f = e.dataTransfer.files[0];
  if(f) loadImg(f);
});
uploadBox.onclick = ()=>file.click();
fileInput.onchange = ()=>{
  if(fileInput.files[0]) loadImg(fileInput.files[0]);
};

// 加载原图
function loadImg(file){
  originFile = file;
  downloadBtn.style.display = "none";
  const reader = new FileReader();
  reader.onload = e=>{
    const img = new Image();
    img.onload = ()=>{
      originImg = img;
      previewCanvas.width = img.width;
      previewCanvas.height = img.height;
      ctx.drawImage(img,0,0);
      // 默认填充原图尺寸
      cropW.value = img.width;
      cropH.value = img.height;
      cropX.value = 0;
      cropY.value = 0;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// 快速居中裁剪
centerBtn.onclick = ()=>{
  if(!originImg) return alert("请先上传图片");
  const w = Number(cropW.value) || originImg.width;
  const h = Number(cropH.value) || originImg.height;
  const x = Math.floor((originImg.width - w) / 2);
  const y = Math.floor((originImg.height - h) / 2);
  cropX.value = x < 0 ? 0 : x;
  cropY.value = y < 0 ? 0 : y;
};

// 执行裁剪生成画布
cropBtn.onclick = async ()=>{
  if(!originImg) return alert("请先上传图片");
  const w = parseInt(cropW.value);
  const h = parseInt(cropH.value);
  const x = parseInt(cropX.value);
  const y = parseInt(cropY.value);
  if(isNaN(w) || isNaN(h) || isNaN(x) || isNaN(y) || w<=0 || h<=0 || x<0 || y<0){
    return alert("请输入合法正整数坐标与尺寸");
  }
  // 边界校验
  if(x + w > originImg.width || y + h > originImg.height){
    return alert("裁剪区域超出原图范围，请修改数值");
  }
  const mime = formatSel.value;
  // 清空画布，绘制裁剪区域
  previewCanvas.width = w;
  previewCanvas.height = h;
  ctx.clearRect(0,0,w,h);
  ctx.drawImage(originImg, x, y, w, h, 0, 0, w, h);
  // 导出blob
  finalBlob = await new Promise(res=>{
    previewCanvas.toBlob(b=>res(b), mime, 0.92);
  });
  downloadBtn.style.display = "block";
};

// 下载图片
downloadBtn.onclick = ()=>{
  if(!finalBlob) return;
  const url = URL.createObjectURL(finalBlob);
  const ext = formatSel.value.split("/")[1];
  const base = originFile.name.replace(/\.\w+$/, "");
  const a = document.createElement("a");
  a.href = url;
  a.download = base + "_裁剪." + ext;
  a.click();
  URL.revokeObjectURL(url);
};

initTheme();
</script>
</body>
</html>
