<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Base36 解码工具</title>
<style>
    :root {
        --primary: #10b981;
        --primary-light: #dcfce7;
        --header-bg: transparent;
        --warn: #f97316;
        --danger: #ef4444;
        --nav-btn-bg: #ffffff;
        --nav-btn-border: #e5e7eb;
        --nav-btn-text: #222222;
        --text-main: #222222;
        --text-secondary: #555555;
        --text-weak: #888888;
        --border-base: #e5e7eb;
        --border-light: #f3f4f6;
        --bg-page: #ffffff;
        --bg-card: #ffffff;
        --bg-btn: #ffffff;
        --bg-footer: #f0fdf4;
        --shadow-sm: 0 1px 3px rgba(0,0,0.06);
        --shadow-lg: 0 6px 16px rgba(0,0,0.1);
        --radius-xs: 4;
        --radius-sm: 6px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --radius-full: 999px;
        --space-xs: 6px;
        --space-sm: 10px;
        --space-md: 14px;
        --space-lg: 16px;
        --space-xl: 28px;
        --transition: all 0.22s ease;
        --key-bg: #e5e7eb;
        --key-text: #222;
        --key-radius: 6px;
        --key-shadow: 0 1px 2px rgba(0,0,0.15);
        --body-font-size: 16px;
        --desktop-font-ratio: 0.85;
        --title-line-height: 1.2;
        --sub-title-line-height: 1.25;
        --content-max-width: 1200px;
        --card-gap: 16px;
        --card-min-width: 300px;
        --header-safe-gap: 16px;
        --nav-line-height: 38px;
        --theme-btn-width: 36px;
    }
    html[data-theme="dark"] {
        --primary: #10b981;
        --primary-light: rgba(16, 185, 129, 0.15);
        --header-bg: transparent;
        --nav-btn-bg: #1f2937;
        --nav-btn-border: #374151;
        --nav-btn-text: #f3f4f6;
        --warn: #f97316;
        --text-main: #f1f5f9;
        --text-secondary: #cbd5e1;
        --text-weak: #94a3b8;
        --border-base: #334155;
        --border-light: #334155;
        --bg-page: #0f172a;
        --bg-card: #1e293b;
        --bg-btn: #1e293b;
        --bg-footer: #111827;
        --shadow-sm: 0 1px 3px rgba(0,0,0.2);
        --shadow-lg: 0 6px 16px rgba(0,0.35);
        --key-bg: #334155;
        --key-text: #f1f5f9;
    }
    html {
        font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", "PingFang SC", sans-serif;
        -webkit-font-smoothing: antialiased;
    }
    body {
        min-height: 100%;
        background: var(--bg-page);
        display: flex;
        flex-direction: column;
        line-height: 1.5;
        font-size: calc(var(--body-font-size));
        overflow-x: hidden;
    }
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        transition: var(--transition);
    }
    a {
        text-decoration: none;
        color: inherit;
    }
    button {
        font-family: inherit;
        font-size: inherit;
        border: none;
        background: transparent;
        cursor: pointer;
    }
    .container {
        max-width: var(--content-max-width);
        width: calc(100% - 48px);
        margin: 0 auto;
    }
    header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 99;
        background: var(--header-bg);
        border-bottom: none;
    }
    .header-inner {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 0;
    }
    .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--nav-btn-text);
        text-decoration: none;
        font-size: 12px;
        font-weight: 500;
        padding: 7px 10px;
        border-radius: var(--radius-lg);
        background: var(--nav-btn-bg);
        border: 1px solid var(--nav-btn-border);
        height: var(--nav-line-height);
        flex-shrink: 0;
    }
    .back-btn:hover {
        border-color: var(--primary);
        background: var(--primary-light);
        color: var(--primary);
    }
    .page-title {
        display: none;
    }
    .theme-switch-wrap {
        position: absolute;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
    }
    .header-btn-circle {
        width: var(--theme-btn-width);
        height: var(--theme-btn-width);
        padding: 0;
        border: 1px solid var(--nav-btn-border);
        border-radius: 50%;
        font-size: calc(16px * var(--desktop-font-ratio));
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--nav-btn-bg);
        color: var(--nav-btn-text);
        flex-shrink: 0;
    }
    .header-btn-circle:hover {
        border-color: var(--primary);
        background: var(--primary-light);
        color: var(--primary);
    }
    .header-spacer {
        width: 100%;
        height: 60px;
        flex-shrink: 0;
    }
    main.container {
        margin-top: 12px;
        flex: 1;
        padding-bottom: 60px;
    }
    .page-head {
        text-align: center;
        margin: 20px 0 30px;
    }
    .page-head h1 {
        font-size: calc(30px * var(--desktop-font-ratio));
        margin-bottom: 12px;
        color: var(--text-main);
    }
    .page-head .blue-tip {
        color: #3b82f6;
        font-size: calc(18px * var(--desktop-font-ratio));
        margin-bottom: 10px;
    }
    .page-head .desc-text {
        color: var(--text-weak);
        font-size: calc(15px * var(--desktop-font-ratio));
    }
    .card-box {
        background: var(--bg-card);
        border: 1px solid var(--border-base);
        border-radius: var(--radius-lg);
        padding: 24px;
        box-shadow: var(--shadow-sm);
        margin-bottom: 24px;
    }
    .input-block {
        margin-bottom: 16px;
    }
    .input-label {
        display: block;
        color: var(--text-main);
        margin-bottom: 8px;
        font-weight: 500;
    }
    input[type="text"] {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid var(--border-base);
        border-radius: var(--radius-sm);
        background: var(--bg-btn);
        color: var(--text-main);
        font-size: 15px;
        outline: none;
        transition: var(--transition);
        font-family: Consolas, monospace;
    }
    input[type="text"]:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(16,185,129,0.15);
    }
    .btn-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 20px;
    }
    .op-btn {
        height: 44px;
        padding: 0 18px;
        border: 1px solid var(--border-base);
        border-radius: var(--radius-sm);
        background: var(--bg-btn);
        color: var(--text-main);
        font-size: 15px;
        white-space: nowrap;
    }
    .op-btn.primary {
        border-color: var(--primary);
        background: var(--primary-light);
        color: var(--primary);
    }
    .op-btn.warn {
        color: #ef4444;
        border-color: #fecdd3;
    }
    .op-btn:hover {
        border-color: var(--primary);
        background: var(--primary-light);
        color: var(--primary);
    }
    .op-btn.warn:hover {
        border-color: #ef4444;
        background: #fef2f2;
        color: #ef4444;
    }
    .result-box {
        padding: 14px 16px;
        border: 1px solid var(--border-base);
        border-radius: var(--radius-sm);
        min-height: 50px;
        color: var(--text-main);
        font-family: Consolas;
        font-size: 16px;
    }
    .err-tip {
        color: #ef4444;
        margin: 8px 0;
        font-size: 14px;
        padding: 6px 10px;
        background: rgba(239,68,68,0.08);
        border-radius: var(--radius-sm);
    }
    .toast-copy {
        position: fixed;
        top: 80px;
        left: 50%;
        transform: translateX(-50%) translateY(-20px);
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px 32px;
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        border-radius: 16px;
        box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
        z-index: 99999;
        opacity: 0;
        pointer-events: none;
        transition: all 0.3s ease;
        min-height: 72px;
    }
    .toast-copy.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }
    .toast-icon {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #22c55e;
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 22px;
        font-weight: bold;
        flex-shrink: 0;
    }
    .toast-text {
        font-size: 28px;
        color: #16a34a;
        font-weight: 500;
        white-space: nowrap;
    }
    html[data-theme="dark"] .toast-copy {
        background: rgba(34, 197, 94, 0.12);
        border-color: rgba(34, 197, 0.3);
    }
    html[data-theme="dark"] .toast-text {
        color: #4ade80;
    }
    @media (max-width: 640px) {
        .page-head h1 {
            font-size: 28px;
        }
        .btn-row {
            flex-wrap: wrap;
        }
        .op-btn {
            font-size: 15px;
        }
        .toast-text {
            font-size: 20px;
        }
    }
    @media screen and (max-width:767px) and (orientation:portrait){
        .header-btn-circle{
            width:34px;
            height:34px;
            font-size: 14px;
        }
    }
</style>
</head>
<body>
<header id="headerDom">
    <div class="container header-inner">
        <a href="index.html" class="back-btn">← 返回首页</a>
        <div class="theme-switch-wrap">
            <button id="themeToggle" class="header-btn-circle">🌙</button>
        </div>
    </div>
</header>
<div class="header-spacer" id="headerSpacer"></div>

<main class="container">
    <div class="page-head">
        <h1>Base36 解码工具</h1>
        <div class="blue-tip">将 Base36 字符串还原为十进制数字</div>
        <div class="desc-text">支持大小写 a-z/A-Z，纯本地离线计算，数据不上传</div>
    </div>

    <div class="card-box">
        <div class="input-block">
            <label class="input-label">Base36 字符串</label>
            <input type="text" id="base36Input" placeholder="等待输入，例如：1z">
        </div>
        <div class="btn-row">
            <button class="op-btn primary" id="decodeBtn">执行解码</button>
            <button class="op-btn primary" id="demoBtn">填充示例</button>
            <button class="op-btn warn" id="clearBtn">清空</button>
        </div>
        <div class="err-tip" id="errTip"></div>
        <div class="input-block">
            <label class="input-label">十进制输出</label>
            <div class="result-box" id="resultBox">等待输入</div>
        </div>
        <div class="btn-row">
            <button class="op-btn primary" id="copyBtn">复制结果</button>
        </div>
    </div>
</main>

<div class="toast-copy" id="copyToast">
    <div class="toast-icon">✓</div>
    <span class="toast-text">复制成功</span>
</div>

<script>
    // 明暗主题
    const htmlRoot = document.documentElement;
    const themeBtn = document.getElementById("themeToggle");
    const mediaDark = window.matchMedia('(prefers-color-scheme: dark)');
    const STORAGE_KEY = "site_theme_mode";
    function applyTheme(mode) {
        if (mode === "dark") {
            htmlRoot.setAttribute("data-theme", "dark");
            themeBtn.innerHTML = "☀️";
        } else {
            htmlRoot.removeAttribute("data-theme");
            themeBtn.innerHTML = "🌙";
        }
    }
    function initTheme() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) applyTheme(saved);
        else applyTheme(mediaDark.matches ? "dark" : "light");
    }
    function toggleTheme() {
        const current = htmlRoot.hasAttribute("data-theme") ? "dark" : "light";
        const next = current === "dark" ? "light" : "dark";
        localStorage.setItem(STORAGE_KEY, next);
        applyTheme(next);
    }
    mediaDark.addEventListener("change", e => {
        if (!localStorage.getItem(STORAGE_KEY)) applyTheme(e.matches ? "dark" : "light");
    });
    initTheme();
    themeBtn.onclick = toggleTheme;

    // 头部自适应高度
    const headerDom = document.getElementById('headerDom');
    const headerSpacer = document.getElementById('headerSpacer');
    function syncHeaderHeight() {
        headerSpacer.style.height = headerDom.offsetHeight + "px";
    }
    window.addEventListener('resize', syncHeaderHeight);
    syncHeaderHeight();

    // 返回按钮带新窗口判断
    document.querySelector('.back-btn').addEventListener('click', function(e){
        e.preventDefault();
        if (history.length <= 1) {
            showToast("当前是新窗口，无历史页面可返回");
        } else {
            history.back();
        }
    });

    // 复制弹窗
    const copyToast = document.getElementById('copyToast');
    function showToast() {
        copyToast.classList.remove('show');
        setTimeout(() => copyToast.classList.add('show'), 10);
        setTimeout(() => copyToast.classList.remove('show'), 1800);
    }
    function copyStr(text) {
        const temp = document.createElement('textarea');
        temp.style.position = 'fixed';
        temp.style.left = '-9999px';
        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand('copy');
        document.body.removeChild(temp);
    }

    // DOM
    const base36Input = document.getElementById('base36Input');
    const decodeBtn = document.getElementById('decodeBtn');
    const demoBtn = document.getElementById('demoBtn');
    const clearBtn = document.getElementById('clearBtn');
    const copyBtn = document.getElementById('copyBtn');
    const resultBox = document.getElementById('resultBox');
    const errTip = document.getElementById('errTip');
    const demoText = "1z";

    // Base36 解码核心
    function base36ToDec(str) {
        const s = str.trim().toLowerCase();
        if (!/^[0-9a-z]+$/.test(s)) throw new Error("仅允许0-9 a-z A-Z");
        return parseInt(s, 36);
    }

    // 解码执行
    function doDecode() {
        errTip.textContent = "";
        resultBox.textContent = "等待输入";
        const raw = base36Input.value.trim();
        if (!raw) {
            errTip.textContent = "请输入Base36字符串";
            return;
        }
        try {
            const num = base36ToDec(raw);
            resultBox.textContent = num.toString();
        } catch (e) {
            errTip.textContent = "解码失败：" + e.message;
        }
    }

    // 填充示例
    demoBtn.onclick = () => {
        base36Input.value = demoText;
        errTip.textContent = "";
        resultBox.textContent = "等待输入";
    };
    // 清空
    clearBtn.onclick = () => {
        base36Input.value = "";
        errTip.textContent = "";
        resultBox.textContent = "等待输入";
    };
    // 解码按钮
    decodeBtn.onclick = doDecode;
    // 复制结果
    copyBtn.onclick = () => {
        const val = resultBox.textContent;
        if (val === "等待输入") return;
        copyStr(val);
        showToast();
    };
</script>
</body>
</html>
