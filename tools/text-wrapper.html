<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='90' font-size='90'>📐</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>文本换行器</title>
<style>
    :root {
      --primary: #10b981;
      --primary-light: #dcfce7;
      --header-bg: #f0fdf4;
      --warn: #f97316;
      --danger: #ef4444;
      --nav-btn-bg: #ffffff;
      --nav-btn-border: #e5e7eb;
      --nav-btn-text: #222222;
      --text-main: #222222;
      --text-secondary: #555555;
      --text-weak: #888888;
      --border-base: #e5e7eb;
      --border-light: #f3f4f6;
      --bg-page: #ffffff;
      --bg-card: #ffffff;
      --bg-btn: #ffffff;
      --bg-footer: #f0fdf4;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-lg: 0 6px 16px rgba(0,0,0.1);
      --radius-xs: 4px;
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 999px;
      --space-xs: 0.375rem;
      --space-sm: 0.625rem;
      --space-md: 0.875rem;
      --space-lg: 1rem;
      --space-xl: 1.75rem;
      --transition: all 0.22s ease;
      --body-font-size: 1rem;
      --body-line-height: 1.6;
      --title-line-height: 1.2;
      --sub-title-line-height: 1.25;
      --content-max-width: 620px;
      --card-label-offset: 2.25rem;
      --nav-line-height: 2.375rem;
      --theme-btn-width: 2.25rem;
    }
    html[data-theme="dark"] {
      --primary: #34d399;
      --primary-light: rgba(52, 211, 153, 0.18);
      --header-bg: #111827;
      --nav-btn-bg: #1f2937;
      --nav-btn-border: #374151;
      --nav-btn-text: #f3f4f6;
      --warn: #fdba74;
      --danger: #f87171;
      --text-main: #f9fafb;
      --text-secondary: #d1d5db;
      --text-weak: #9ca3af;
      --border-base: #374151;
      --border-light: #1f2937;
      --bg-page: #0f172a;
      --bg-card: #1e293b;
      --bg-btn: #1f2937;
      --bg-footer: #111827;
      --shadow-sm: 0 1px 3px rgba(0,0,0.25);
      --shadow-lg: 0 6px 16px rgba(0,0,0.45);
    }
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: system-ui, -apple-system, sans-serif;
  transition: var(--transition);
}
body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--bg-page);
  color:var(--text-main);
  padding: clamp(0.75rem, 3vw, 1.25rem);
  position: relative;
}
.top-header-bar{
  position: fixed;
  top: 0.875rem;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 clamp(1rem, 4vw, 1.75rem);
  z-index: 999;
}
.header-btn-back {
  padding: 0.4375rem 0.625rem;
  border: 1px solid var(--nav-btn-border);
  border-radius: var(--radius-lg);
  font-size: 0.75rem;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 0.25rem;
  white-space: nowrap;
  background: var(--nav-btn-bg);
  color: var(--nav-btn-text);
  flex-shrink: 0;
  height: var(--nav-line-height);
}
.header-btn-back:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
.header-btn-theme {
  width: var(--theme-btn-width);
  height: var(--theme-btn-width);
  padding: 0;
  border: 1px solid var(--nav-btn-border);
  border-radius: 50%;
  font-size: 1rem;
  cursor: pointer;
  display: grid;
  place-items: center;
  background: var(--nav-btn-bg);
  color: var(--nav-btn-text);
  flex-shrink: 0;
}
.header-btn-theme:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
.box{
  width:100%;
  max-width:var(--content-max-width);
  background:var(--bg-card);
  padding: clamp(1.5rem, 5vw, 2rem);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
  margin-top: var(--card-label-offset);
}
h2{
  text-align:center;
  margin-bottom: var(--space-xs);
  font-weight:600;
  font-size: clamp(1.375rem, 4vw, 1.5rem);
}
.sub-title{
  text-align:center;
  font-size: clamp(0.8125rem, 2vw, 0.875rem);
  color:var(--text-secondary);
  margin-bottom: var(--space-xl);
}
.input-label{
  display:block;
  margin-bottom: var(--space-xs);
  font-size: clamp(0.875rem, 2vw, 0.9375rem);
}
textarea{
  width:100%;
  min-height: 140px;
  padding:0.8rem;
  border:1px solid var(--border-base);
  border-radius:var(--radius-md);
  background:transparent;
  color:var(--text-main);
  font-size:0.9rem;
  resize: vertical;
  margin-bottom: var(--space-lg);
}
html[data-theme="dark"] textarea{
  background:#1f2937;
}
.num-input{
  width:100%;
  padding:0.7rem;
  border:1px solid var(--border-base);
  border-radius:var(--radius-md);
  background:transparent;
  color:var(--text-main);
  margin-bottom: var(--space-lg);
}
html[data-theme="dark"] .num-input{
  background:#1f2937;
}
.btn-row{
  display:flex;
  flex-wrap:wrap;
  gap:0.6rem;
  margin-bottom: var(--space-lg);
}
.btn-row button{
  flex:1;
  min-width: 110px;
  padding:0.85rem;
  border-radius:var(--radius-md);
  font-size:1rem;
  cursor:pointer;
}
.btn-main{
  border:none;
  background:var(--primary);
  color:#fff;
}
.btn-outline{
  border:1px solid var(--border-base);
  background:transparent;
  color:var(--text-main);
}
.result-area{
  width:100%;
  min-height: 140px;
  padding:0.8rem;
  border:1px solid var(--border-base);
  border-radius:var(--radius-md);
  background:transparent;
  color:var(--text-main);
  white-space:pre-wrap;
  resize: vertical;
  margin-bottom: var(--space-xl);
}
html[data-theme="dark"] .result-area{
  background:#1f2937;
}
.tip-desc{
  margin-top: var(--space-xl);
  font-size: clamp(0.75rem, 2vw, 0.875rem);
  color:var(--text-secondary);
  line-height:1.6;
  opacity:0.7;
}
/* 无遮罩悬浮Toast，可穿透点击，不阻塞操作 */
.toast-box{
  position:fixed;
  left:50%;
  bottom:40px;
  transform: translateX(-50%) translateY(20px);
  opacity:0;
  padding:0.7rem 1.4rem;
  border-radius:var(--radius-md);
  box-shadow:var(--shadow-lg);
  font-size:0.95rem;
  z-index:9999;
  pointer-events:none;
  transition: all 0.2s ease;
}
.toast-box.show{
  opacity:1;
  transform: translateX(-50%) translateY(0);
}
html[data-theme="dark"] .toast-box{
  background:#1e293b;
}
html:not([data-theme="dark"]) .toast-box{
  background:#ffffff;
}
.toast-success{
  color:var(--primary);
}
.toast-error{
  color:var(--danger);
}
@media screen and (min-width: 768px) {
  :root {
    --content-max-width: 680px;
  }
  .box {
    padding: 2.25rem;
  }
}
@media screen and (max-width:767px) and (orientation:portrait){
  .top-header-bar{
    padding: 0 var(--space-md);
    top:0.75rem;
  }
  .header-btn-back{
    padding:0.375rem 0.5rem;
    font-size:0.6875rem;
    height: 2.125rem;
  }
  .header-btn-theme{
    width: 2.125rem;
    height: 2.125rem;
  }
  .box{
    padding: 1.5rem 1.25rem;
  }
}
</style>
</head>
<body>
<div class="top-header-bar">
  <button class="header-btn-back" id="backHome">← 返回首页</button>
  <button class="header-btn-theme" id="themeToggle" aria-label="切换明暗模式">🌙</button>
</div>

<div class="box">
  <h2>📐 文本换行器</h2>
  <div class="sub-title">按指定宽度自动换行</div>

  <label class="input-label">输入文本</label>
  <textarea id="inputTxt" placeholder="粘贴需要自动换行的长文本"></textarea>

  <label class="input-label">每行字符宽度</label>
  <input class="num-input" id="widthNum" type="number" value="30" min="8" max="200">

  <div class="btn-row">
    <button class="btn-main" id="wrapBtn">执行自动换行</button>
    <button class="btn-outline" id="demoBtn">加载演示文本</button>
    <button class="btn-outline" id="clearBtn">清空内容</button>
    <button class="btn-outline" id="copyResBtn">📜 复制结果</button>
  </div>

  <label class="input-label">换行结果</label>
  <textarea class="result-area" id="outputRes" readonly placeholder="按宽度截断换行后的文本"></textarea>

  <div class="tip-desc">
    使用说明：设置单行最大字符宽度，工具自动在空格处拆分长文本并换行；无空格长字符会强制截断，纯本地离线处理不上传文本。
  </div>
</div>

<div class="toast-box" id="toastText"></div>

<script>
// 预取全部DOM，避免延迟获取失效
const $ = s => document.querySelector(s);
const htmlRoot = document.documentElement;
const themeToggle = $("#themeToggle");
const inputTxt = $("#inputTxt");
const widthNum = $("#widthNum");
const wrapBtn = $("#wrapBtn");
const demoBtn = $("#demoBtn");
const clearBtn = $("#clearBtn");
const copyResBtn = $("#copyResBtn");
const outputRes = $("#outputRes");
const toastText = $("#toastText");
const STORAGE_KEY = "site_theme_mode";

// 悬浮提示函数（无遮罩，不拦截点击）
function showToast(msg, isSuccess = true) {
  toastText.className = "toast-box " + (isSuccess ? "toast-success" : "toast-error");
  toastText.innerText = msg;
  toastText.classList.add("show");
  setTimeout(() => toastText.classList.remove("show"), 2000);
}

// 演示文本
const demoText = "文本换行工具可以自定义每行字符宽度，自动对超长单行文本进行分行处理，支持中英文混合内容，无空格连续字符也会强制截断换行，方便排版预览。";

// 核心换行计算
function textWrap(text, width) {
  const lines = [];
  let currentLine = "";
  const words = text.split(/(\s+)/);
  for (let word of words) {
    if ((currentLine + word).length <= width) {
      currentLine += word;
    } else {
      if (currentLine.trim() !== "") lines.push(currentLine.trimEnd());
      if (word.length > width) {
        let chunk = word;
        while (chunk.length > width) {
          lines.push(chunk.slice(0, width));
          chunk = chunk.slice(width);
        }
        currentLine = chunk;
      } else {
        currentLine = word;
      }
    }
  }
  if (currentLine.trim() !== "") lines.push(currentLine.trimEnd());
  return lines.join("\n");
}

// 执行转换
function runWrap() {
  const raw = inputTxt.value;
  const w = Number(widthNum.value) || 30;
  outputRes.value = textWrap(raw, w);
}

// 绑定全部点击事件
demoBtn.onclick = () => {
  inputTxt.value = demoText;
  runWrap();
  showToast("已加载演示文本");
};
clearBtn.onclick = () => {
  inputTxt.value = "";
  outputRes.value = "";
  showToast("已清空所有内容");
};
wrapBtn.onclick = runWrap;
copyResBtn.onclick = async () => {
  const copyText = outputRes.value;
  if (!copyText) {
    showToast("暂无可复制内容", false);
    return;
  }
  try {
    await navigator.clipboard.writeText(copyText);
    showToast("✅ 复制成功，可直接粘贴", true);
  } catch (err) {
    const temp = document.createElement("textarea");
    temp.value = copyText;
    temp.style.position = "fixed";
    temp.style.left = "-9999px";
    document.body.appendChild(temp);
    temp.select();
    const ok = document.execCommand("copy");
    document.body.removeChild(temp);
    ok ? showToast("✅ 复制成功") : showToast("❌ 复制失败，请手动选中", false);
  }
};

// 实时输入监听
inputTxt.addEventListener("input", runWrap);
widthNum.addEventListener("input", runWrap);

// 主题切换
function initTheme() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved === "dark") {
    htmlRoot.setAttribute("data-theme", "dark");
    themeToggle.textContent = "☀️";
  } else {
    htmlRoot.removeAttribute("data-theme");
    themeToggle.textContent = "🌙";
  }
}
themeToggle.onclick = () => {
  const dark = htmlRoot.hasAttribute("data-theme");
  if (dark) {
    htmlRoot.removeAttribute("data-theme");
    localStorage.setItem(STORAGE_KEY, "light");
    themeToggle.textContent = "🌙";
  } else {
    htmlRoot.setAttribute("data-theme", "dark");
    localStorage.setItem(STORAGE_KEY, "dark");
    themeToggle.textContent = "☀️";
  }
};
$("#backHome").onclick = () => window.location.href = "./index.html";

// 页面初始化执行一次
initTheme();
runWrap();
</script>
</body>
</html>
