<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>URL 参数生成器</title>
<style>
    :root {
        --primary: #10b981;
        --primary-light: #dcfce7;
        --warn: #f97316;
        --danger: #ef4444;
        --nav-btn-bg: #ffffff;
        --nav-btn-border: #e5e7eb;
        --nav-btn-text: #222222;
        --text-main: #222222;
        --text-secondary: #555555;
        --text-weak: #888888;
        --border-base: #e5e7eb;
        --border-light: #f3f4f6;
        --bg-page: #ffffff;
        --bg-card: #ffffff;
        --bg-btn: #ffffff;
        --shadow-sm: 0 1px 3px rgba(0,0,0.06);
        --shadow-lg: 0 6px 16px rgba(0,0.1);
        --radius-sm: 6px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --radius-full: 999px;
        --space-xs: 6px;
        --space-sm: 10px;
        --space-md: 14px;
        --space-lg: 16px;
        --transition: all 0.3s ease;
        --body-font-size: 16px;
        --desktop-font-ratio: 0.85;
        --content-max-width: 1200px;
        --nav-line-height: 38px;
        --theme-btn-width: 36px;
    }
    html[data-theme="dark"] {
        --primary: #10b981;
        --primary-light: rgba(16, 185, 129, 0.15);
        --nav-btn-bg: #1f2937;
        --nav-btn-border: #374151;
        --nav-btn-text: #f3f4f6;
        --warn: #f97316;
        --text-main: #f1f5f9;
        --text-secondary: #cbd5e1;
        --text-weak: #94a3b8;
        --border-base: #334155;
        --border-light: #334155;
        --bg-page: #0f172a;
        --bg-card: #1e293b;
        --bg-btn: #1e293b;
        --shadow-sm: 0 1px 3px rgba(0,0,0.2);
        --shadow-lg: 0 6px 16px rgba(0,0.35);
    }
    html {
        font-family: system-ui, "Microsoft YaHei", sans-serif;
        -webkit-font-smoothing: antialiased;
    }
    body {
        min-height: 100vh;
        background: var(--bg-page);
        display: flex;
        flex-direction: column;
        line-height: 1.5;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
    }
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        transition: var(--transition);
    }
    a {
        text-decoration: none;
        color: inherit;
    }
    button {
        font-family: inherit;
        font-size: inherit;
        border: none;
        background: transparent;
        cursor: pointer;
        border-radius: var(--radius-sm);
    }
    .container {
        max-width: var(--content-max-width);
        width: calc(100% - 48px);
        margin: 0 auto;
    }
    header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 99;
    }
    .header-inner {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 0;
    }
    .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--nav-btn-text);
        font-size: 12px;
        font-weight: 500;
        padding: 7px 10px;
        border: 1px solid var(--nav-btn-border);
        border-radius: var(--radius-lg);
        background: var(--nav-btn-bg);
        height: var(--nav-line-height);
    }
    .back-btn:hover {
        border-color: var(--primary);
        background: var(--primary-light);
        color: var(--primary);
    }
    .theme-switch-wrap {
        position: absolute;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
    }
    .header-btn-circle {
        width: var(--theme-btn-width);
        height: var(--theme-btn-width);
        border: 1px solid var(--nav-btn-border);
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: var(--nav-btn-bg);
        color: var(--nav-btn-text);
    }
    .header-btn-circle:hover {
        border-color: var(--primary);
        background: var(--primary-light);
        color: var(--primary);
    }
    .header-spacer {
        width: 100%;
        height: 60px;
    }
    main.container {
        margin-top: 12px;
        padding-bottom: 60px;
    }
    .page-head {
        text-align: center;
        margin: 20px 0 30px;
    }
    .page-head h1 {
        font-size: calc(30px * var(--desktop-font-ratio));
        margin-bottom: 12px;
        color: var(--text-main);
    }
    .desc-text {
        color: var(--text-weak);
        font-size: calc(15px * var(--desktop-font-ratio));
    }
    .card-box {
        background: var(--bg-card);
        border: 1px solid var(--border-base);
        border-radius: var(--radius-lg);
        padding: 24px;
        box-shadow: var(--shadow-sm);
    }
    .input-block {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 16px;
    }
    .input-label {
        display: block;
        color: var(--text-main);
        font-weight: 500;
    }
    input[type="text"], textarea {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid var(--border-base);
        border-radius: var(--radius-sm);
        background: var(--bg-btn);
        color: var(--text-main);
        font-family: Consolas, monospace;
        outline: none;
    }
    textarea {
        min-height: 140px;
        max-height: 260px;
        overflow-y: auto;
        resize: vertical;
    }
    input:focus, textarea:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(16,185,129,0.15);
    }
    .btn-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin: 20px 0;
    }
    .op-btn {
        height: 44px;
        padding: 0 18px;
        border: 1px solid var(--border-base);
        border-radius: var(--radius-sm);
        background: var(--bg-btn);
        color: var(--text-main);
        white-space: nowrap;
    }
    .op-btn.primary {
        border-color: var(--primary);
        background: var(--primary-light);
        color: var(--primary);
    }
    .op-btn.warn {
        color: #ef4444;
        border-color: #fecdd3;
    }
    .op-btn:hover {
        border-color: var(--primary);
        background: var(--primary-light);
        color: var(--primary);
    }
    .err-tip {
        color: #ef4444;
        margin: 8px 0;
        font-size: 14px;
        padding: 6px 10px;
        background: rgba(239,68,68,0.08);
        border-radius: var(--radius-sm);
    }
    .toast-copy {
        position: fixed;
        top: 80px;
        left: 50%;
        transform: translateX(-50%) translateY(-20px);
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px 32px;
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        border-radius: 16px;
        box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
        z-index: 999999;
        opacity: 0;
        pointer-events: none;
        transition: all 0.3s ease;
        min-height: 72px;
    }
    .toast-copy.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }
    .toast-icon {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #22c55e;
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 22px;
        font-weight: bold;
    }
    .toast-text {
        font-size: 28px;
        color: #16a34a;
        font-weight: 500;
    }
    html[data-theme="dark"] .toast-copy {
        background: rgba(34, 197, 94, 0.12);
        border-color: rgba(34, 197, 94, 0.3);
    }
    html[data-theme="dark"] .toast-text {
        color: #4ade80;
    }
    @media (max-width:640px) {
        .page-head h1 {font-size:28px;}
        .toast-text {font-size: 20px;}
    }
    @media screen and (max-width:767px) and (orientation:portrait){
        .header-btn-circle{width:34px;height:34px;font-size:14px;}
    }
</style>
</head>
<body>
<header id="headerDom">
    <div class="container header-inner">
        <a href="index.html" class="back-btn">← 返回首页</a>
        <div class="theme-switch-wrap">
            <button id="themeToggle" class="header-btn-circle">🌙</button>
        </div>
    </div>
</header>
<div class="header-spacer" id="headerSpacer"></div>

<main class="container">
    <div class="page-head">
        <h1>URL 参数生成器</h1>
        <div class="desc-text">批量生成URL查询参数，输出完整编码链接，支持解析已有链接</div>
    </div>
    <div class="card-box">
        <!-- 基础URL -->
        <div class="input-block">
            <label class="input-label">基础 URL</label>
            <input type="text" id="baseUrl" placeholder="https://example.com/list">
        </div>
        <!-- 参数列表 -->
        <div class="input-block">
            <label class="input-label">参数列表（每行格式 key=value）</label>
            <textarea id="paramText" placeholder="page=页码
size=每页条数
name=中文名称"></textarea>
        </div>
        <div class="btn-row">
            <button class="op-btn" id="fillDemoBtn">填充示例</button>
            <button class="op-btn primary" id="buildBtn">生成URL</button>
            <button class="op-btn" id="parseBtn">解析已有URL</button>
            <button class="op-btn primary" id="copyFullBtn">复制完整URL</button>
            <button class="op-btn primary" id="copyQueryBtn">仅复制查询串</button>
            <button class="op-btn warn" id="clearBtn">清空全部</button>
        </div>
        <div class="err-tip" id="errTip"></div>
        <!-- 查询串输出 -->
        <div class="input-block">
            <label class="input-label">URL 查询字符串</label>
            <textarea id="queryOut" readonly></textarea>
        </div>
        <!-- 完整URL输出 -->
        <div class="input-block">
            <label class="input-label">拼接后完整 URL</label>
            <textarea id="fullOut" readonly></textarea>
        </div>
    </div>
</main>

<div class="toast-copy" id="copyToast">
    <div class="toast-icon">✓</div>
    <span class="toast-text">复制成功</span>
</div>

<script>
// 复制弹窗防抖
const copyToast = document.getElementById('copyToast');
let toastTimer = null;
function showToast() {
    if(toastTimer) clearTimeout(toastTimer);
    copyToast.classList.add('show');
    toastTimer = setTimeout(()=>copyToast.classList.remove('show'), 3000);
}
async function copyStr(text){
    try {
        await navigator.clipboard.writeText(text);
        showToast();
    } catch (e) {
        const temp = document.createElement('textarea');
        temp.style.position='fixed';
        temp.style.left='-9999px';
        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand('copy');
        document.body.removeChild(temp);
        showToast();
    }
}

// 明暗主题切换
const htmlRoot=document.documentElement;
const themeBtn=document.getElementById("themeToggle");
const mediaDark=window.matchMedia('(prefers-color-scheme: dark)');
const STORAGE_KEY="site_theme_mode";
function applyTheme(mode){
    if(mode==='dark'){htmlRoot.setAttribute('data-theme','dark');themeBtn.innerText='☀️';}
    else {htmlRoot.removeAttribute('data-theme');themeBtn.innerText='🌙';}
}
function initTheme(){
    const save=localStorage.getItem(STORAGE_KEY);
    if(save) applyTheme(save);
    else applyTheme(mediaDark.matches?'dark':'light');
}
function toggleTheme(){
    const now=htmlRoot.hasAttribute('data-theme')?'dark':'light';
    const next=now==='dark'?'light':'dark';
    localStorage.setItem(STORAGE_KEY,next);
    applyTheme(next);
}
mediaDark.addEventListener('change',()=>{if(!localStorage.getItem(STORAGE_KEY)) applyTheme(mediaDark.matches?'dark':'light');});
initTheme();
themeBtn.onclick=toggleTheme;

// 头部自适应高度
const headerDom=document.getElementById('headerDom');
const headerSpacer=document.getElementById('headerSpacer');
function syncHeader(){headerSpacer.style.height=headerDom.offsetHeight+'px';}
window.addEventListener('resize',syncHeader);
syncHeader();

// 返回首页按钮
document.querySelector('.back-btn').onclick=e=>{
    e.preventDefault();
    if(history.length>1) history.back();
};

// DOM元素绑定（全部修正无错误）
const baseUrl = document.getElementById('baseUrl');
const paramText = document.getElementById('paramText');
const queryOut = document.getElementById('queryOut');
const fullOut = document.getElementById('fullOut');
const fillDemoBtn = document.getElementById('fillDemoBtn');
const buildBtn = document.getElementById('buildBtn');
const parseBtn = document.getElementById('parseBtn');
const copyFullBtn = document.getElementById('copyFullBtn');
const copyQueryBtn = document.getElementById('copyQueryBtn');
const clearBtn = document.getElementById('clearBtn');
const errTip = document.getElementById('errTip');

// 1. 填充示例数据
function fillDemo(){
    errTip.textContent = '';
    baseUrl.value = 'https://api.example.com/article/list';
    paramText.value = `page=2
size=15
sort=create_time
order=desc
keyword=前端开发教程
type=dev`;
    buildUrl();
}

// 2. 生成拼接URL核心函数
function buildUrl(){
    errTip.textContent = '';
    const base = baseUrl.value.trim();
    const rawLines = paramText.value.trim().split('\n');
    const validLines = rawLines.filter(line => line.trim() !== '');
    const searchParams = new URLSearchParams();

    try {
        validLines.forEach(line => {
            const lineTrim = line.trim();
            // 只分割第一个=，值内允许包含等号
            const equalIndex = lineTrim.indexOf('=');
            if(equalIndex === -1) return;
            const key = lineTrim.slice(0, equalIndex).trim();
            const value = lineTrim.slice(equalIndex + 1).trim();
            if(key) searchParams.append(key, value);
        });

        const queryStr = searchParams.toString();
        queryOut.value = queryStr;

        if(!base){
            fullOut.value = '';
            return;
        }
        // 自动区分?和&拼接
        let finalUrl;
        if(base.includes('?')){
            finalUrl = base + '&' + queryStr;
        }else{
            finalUrl = base + '?' + queryStr;
        }
        fullOut.value = finalUrl;
    } catch (err) {
        errTip.textContent = '参数解析失败：' + err.message;
        queryOut.value = '';
        fullOut.value = '';
    }
}

// 3. 解析已有URL拆分基础地址+参数
function parseUrl(){
    errTip.textContent = '';
    const sourceUrl = fullOut.value.trim() || baseUrl.value.trim();
    if(!sourceUrl){
        errTip.textContent = '请先填入完整URL再解析';
        return;
    }
    try {
        const urlObj = new URL(sourceUrl);
        // 基础地址 = 域名+路径
        baseUrl.value = urlObj.origin + urlObj.pathname;
        // 提取所有键值对
        const paramLines = [];
        urlObj.searchParams.forEach((val, key) => {
            paramLines.push(`${key}=${val}`);
        });
        paramText.value = paramLines.join('\n');
        buildUrl();
    } catch (err) {
        errTip.textContent = 'URL格式不正确，无法解析';
    }
}

// 4. 清空全部输入输出
function clearAll(){
    errTip.textContent = '';
    baseUrl.value = '';
    paramText.value = '';
    queryOut.value = '';
    fullOut.value = '';
}

// 按钮事件绑定
fillDemoBtn.onclick = fillDemo;
buildBtn.onclick = buildUrl;
parseBtn.onclick = parseUrl;
clearBtn.onclick = clearAll;

// 复制完整URL
copyFullBtn.onclick = async ()=>{
    if(!fullOut.value.trim()){
        errTip.textContent = '请先生成完整URL';
        return;
    }
    await copyStr(fullOut.value);
};
// 仅复制查询串
copyQueryBtn.onclick = async ()=>{
    if(!queryOut.value.trim()){
        errTip.textContent = '当前无查询参数';
        return;
    }
    await copyStr(queryOut.value);
};
</script>
</body>
</html>
