<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>JSON XML YAML 互转工具</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-light: #dbeafe;
            --success: #22c55e;
            --success-light: #dcfce7;
            --warn: #f97316;
            --danger: #ef4444;
            --header-bg: transparent;
            --nav-btn-bg: #ffffff;
            --nav-btn-border: #e5e7eb;
            --nav-btn-text: #222222;
            --text-main: #222222;
            --text-secondary: #555555;
            --text-weak: #888888;
            --border-base: #e5e7eb;
            --border-light: #f3f4f6;
            --bg-page: #ffffff;
            --bg-card: #ffffff;
            --bg-btn: #ffffff;
            --shadow-sm: 0 1px 3px rgba(0,0,0.06);
            --shadow-lg: 0 6px 16px rgba(0,0.1);
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --space-sm: 10px;
            --space-md: 14px;
            --space-lg: 16px;
            --transition: all 0.22s ease;
            --body-font-size: 16px;
            --desktop-font-ratio: 0.85;
            --content-max-width: 1200px;
            --header-safe-gap: 16px;
            --nav-line-height: 38px;
            --theme-btn-width: 36px;
        }
        html[data-theme="dark"] {
            --primary: #3b82f6;
            --primary-light: rgba(59, 130, 246, 0.15);
            --success: #22c55e;
            --success-light: rgba(34, 197, 94, 0.15);
            --warn: #f97316;
            --danger: #f87171;
            --header-bg: transparent;
            --nav-btn-bg: #1f2937;
            --nav-btn-border: #374151;
            --nav-btn-text: #f3f4f6;
            --text-main: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-weak: #94a3b8;
            --border-base: #334155;
            --border-light: #334155;
            --bg-page: #0f172a;
            --bg-card: #1e293b;
            --bg-btn: #1e293b;
            --shadow-sm: 0 1px 3px rgba(0,0,0.2);
            --shadow-lg: 0 6px 16px rgba(0,0.35);
        }
        html {
            font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", "PingFang SC", sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        body {
            min-height: 100%;
            background: var(--bg-page);
            display: flex;
            flex-direction: column;
            line-height: 1.5;
            font-size: calc(var(--body-font-size));
            overflow-x: hidden;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: var(--transition);
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        button {
            font-family: inherit;
            font-size: inherit;
            border: none;
            cursor: pointer;
        }
        .container {
            max-width: var(--content-max-width);
            width: calc(100% - 48px);
            margin: 0 auto;
        }
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 99;
            background: var(--header-bg);
        }
        .header-inner {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 0;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--nav-btn-text);
            font-size: 12px;
            font-weight: 500;
            padding: 7px 10px;
            border-radius: var(--radius-lg);
            background: var(--nav-btn-bg);
            border: 1px solid var(--nav-btn-border);
            height: var(--nav-line-height);
            flex-shrink: 0;
            cursor: pointer;
        }
        .back-btn:hover {
            border-color: var(--primary);
            background: var(--primary-light);
            color: var(--primary);
        }
        .theme-switch-wrap {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
        }
        .header-btn-circle {
            width: var(--theme-btn-width);
            height: var(--theme-btn-width);
            padding: 0;
            border: 1px solid var(--nav-btn-border);
            border-radius: 50%;
            font-size: calc(16px * var(--desktop-font-ratio));
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--nav-btn-bg);
            color: var(--nav-btn-text);
        }
        .header-btn-circle:hover {
            border-color: var(--primary);
            background: var(--primary-light);
            color: var(--primary);
        }
        .header-spacer {
            width: 100%;
            height: 60px;
            flex-shrink: 0;
        }
        main.container {
            margin-top: 12px;
            flex: 1;
            padding-bottom: 60px;
        }
        .page-head {
            text-align: center;
            margin: 20px 0 30px;
        }
        .page-head h1 {
            font-size: calc(36px * var(--desktop-font-ratio));
            margin-bottom: 12px;
            color: var(--text-main);
        }
        .page-head .blue-tip {
            color: #3b82f6;
            font-size: calc(18px * var(--desktop-font-ratio));
            margin-bottom: 10px;
        }
        .page-head .desc-text {
            color: var(--text-weak);
            font-size: calc(15px * var(--desktop-font-ratio));
        }
        .card-box {
            background: var(--bg-card);
            border: 1px solid var(--border-base);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 24px;
        }
        .top-bar {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .radio-group {
            display: flex;
            gap: 18px;
        }
        .radio-item {
            display: flex;
            gap: 6px;
            align-items: center;
            color: var(--text-main);
        }
        .btn-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .op-btn {
            height: 44px;
            padding: 0 18px;
            border: 1px solid var(--border-base);
            border-radius: var(--radius-sm);
            background: var(--bg-btn);
            color: var(--text-main);
            font-size: 15px;
            white-space: nowrap;
        }
        .op-btn.primary {
            border-color: var(--primary);
            background: var(--primary-light);
            color: var(--primary);
        }
        .op-btn.warn {
            color: var(--danger);
            border-color: #fee2e2;
        }
        .op-btn.green {
            background: var(--success);
            color: white;
            border: none;
        }
        .op-btn.green:hover {
            background: #16a34a;
        }
        .op-btn:hover {
            border-color: var(--primary);
            background: var(--primary-light);
            color: var(--primary);
        }
        .two-col-wrap {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }
        .input-label {
            display: block;
            color: var(--text-main);
            margin-bottom: 8px;
            font-weight: 500;
        }
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-base);
            border-radius: var(--radius-sm);
            background: var(--bg-btn);
            color: var(--text-main);
            font-size: 14px;
            font-family: Consolas, monospace;
            resize: vertical;
            outline: none;
            min-height: 220px;
        }
        textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(59,130,246,0.15);
        }
        .err-tip {
            color: var(--danger);
            margin: 8px 0;
            font-size: 14px;
        }
        .info-card-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
            margin-top: 40px;
        }
        .info-card {
            background: var(--bg-card);
            border: 1px solid var(--border-base);
            border-radius: var(--radius-lg);
            padding: 18px 20px;
            box-shadow: var(--shadow-sm);
        }
        .info-card h3 {
            font-size: calc(20px * var(--desktop-font-ratio));
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 12px;
            line-height: 1.3;
        }
        .info-card p {
            font-size: calc(15px * var(--desktop-font-ratio));
            line-height: 1.8;
            color: var(--text-secondary);
        }
        /* 统一复制弹窗（全站标准） */
        .toast-copy {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 32px;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 16px;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.15);
            z-index: 999999;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            min-height: 72px;
        }
        .toast-copy.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }
        .toast-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #22c55e;
            color: #fff;
            display: grid;
            place-items: center;
            font-size: 22px;
            font-weight: bold;
            flex-shrink: 0;
        }
        .toast-text {
            font-size: 16px;
            color: #16a34a;
            font-weight: 500;
            white-space: nowrap;
        }
        html[data-theme="dark"] .toast-copy {
            background: rgba(34,197,94,0.12);
            border-color: rgba(34,197,94,0.3);
        }
        html[data-theme="dark"] .toast-text {
            color: #4ade80;
        }
        @media (max-width:640px) {
            .two-col-wrap {
                grid-template-columns: 1fr;
            }
            .top-bar {
                flex-direction: column;
                align-items: flex-start;
            }
            .info-card-section {
                grid-template-columns: 1fr;
            }
            .toast-text {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
<header id="headerDom">
    <div class="container header-inner">
        <!-- 修改：移除a跳转链接，改为div按钮，文字统一← 返回 -->
        <div class="back-btn" id="backHome">← 返回</div>
        <div class="theme-switch-wrap">
            <button id="themeToggle" class="header-btn-circle">🌙</button>
        </div>
    </div>
</header>
<div class="header-spacer" id="headerSpacer"></div>

<main class="container">
    <div class="page-head">
        <h1>JSON XML YAML 互转工具</h1>
        <div class="blue-tip">三种主流数据格式双向一键转换，本地解析不上传</div>
        <div class="desc-text">接口调试、配置文件、容器yml、XML报文快速互转</div>
    </div>

    <div class="card-box">
        <!-- 顶部源格式选择 -->
        <div class="top-bar">
            <label>源格式：</label>
            <div class="radio-group">
                <label class="radio-item"><input type="radio" name="sourceType" value="json" checked> JSON</label>
                <label class="radio-item"><input type="radio" name="sourceType" value="xml"> XML</label>
                <label class="radio-item"><input type="radio" name="sourceType" value="yaml"> YAML</label>
            </div>
            <label>目标格式：</label>
            <div class="radio-group">
                <label class="radio-item"><input type="radio" name="targetType" value="json"> JSON</label>
                <label class="radio-item"><input type="radio" name="targetType" value="xml"> XML</label>
                <label class="radio-item"><input type="radio" name="targetType" value="yaml" checked> YAML</label>
            </div>
        </div>
        <div class="btn-row">
            <button class="op-btn primary" id="convertBtn">开始转换</button>
            <button class="op-btn green" id="copyResult">复制结果</button>
            <button class="op-btn warn" id="clearAll">清空全部</button>
            <button class="op-btn" id="exampleBtn">加载示例</button>
        </div>
        <div class="err-tip" id="errorTip"></div>
        <!-- 左右输入输出 -->
        <div class="two-col-wrap">
            <div class="input-block">
                <label class="input-label">原始内容</label>
                <textarea id="sourceText" placeholder="粘贴JSON/XML/YAML原始文本"></textarea>
            </div>
            <div class="input-block">
                <label class="input-label">转换结果</label>
                <textarea id="targetText" readonly></textarea>
            </div>
        </div>
    </div>

    <div class="info-card-section">
        <div class="info-card">
            <h3>工具用途</h3>
            <p>前后端接口JSON、Spring/容器YAML配置、XML报文三者自由互转，开发配置调试专用。</p>
        </div>
        <div class="info-card">
            <h3>支持格式</h3>
            <p>JSON ↔ XML、JSON ↔ YAML、XML ↔ YAML 全双向转换，自动格式化输出规范缩进。</p>
        </div>
        <div class="info-card">
            <h3>安全说明</h3>
            <p>所有解析转换逻辑在浏览器本地执行，文本不会上传服务器，敏感配置可放心处理。</p>
        </div>
    </main>

<!-- 复制成功弹窗 -->
<div class="toast-copy" id="copyToast">
    <div class="toast-icon">✓</div>
    <span class="toast-text">复制成功</span>
</div>

<script>
    // ====================== 全局统一明暗主题逻辑（复用cytools通用代码） ======================
    const htmlRoot = document.documentElement;
    const themeBtn = document.getElementById("themeToggle");
    const mediaDark = window.matchMedia('(prefers-color-scheme: dark)');
    const STORAGE_KEY = "site_theme_mode";
    function applyTheme(mode) {
        if (mode === "dark") {
            htmlRoot.setAttribute("data-theme", "dark");
            themeBtn.innerHTML = "☀️";
        } else {
            htmlRoot.removeAttribute("data-theme");
            themeBtn.innerHTML = "🌙";
        }
    }
    function initTheme() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) applyTheme(saved);
        else applyTheme(mediaDark.matches ? "dark" : "light");
    }
    function toggleTheme() {
        const current = htmlRoot.hasAttribute("data-theme") ? "dark" : "light";
        const next = current === "dark" ? "light" : "dark";
        localStorage.setItem(STORAGE_KEY, next);
        applyTheme(next);
    }
    mediaDark.addEventListener("change", e => {
        if (!localStorage.getItem(STORAGE_KEY)) applyTheme(e.matches ? "dark" : "light");
    });
    initTheme();
    themeBtn.onclick = toggleTheme;

    // 头部高度自适应
    const headerDom = document.getElementById('headerDom');
    const headerSpacer = document.getElementById('headerSpacer');
    function syncHeaderHeight() {
        headerSpacer.style.height = headerDom.offsetHeight + "px";
    }
    window.addEventListener('resize', syncHeaderHeight);
    syncHeaderHeight();

    // ====================== 统一复制弹窗+全兼容复制函数（全站标准） ======================
    const copyToast = document.getElementById('copyToast');
    let toastTimer = null;
    // 双层requestAnimationFrame稳定弹窗动画
    function showCopyToast() {
        clearTimeout(toastTimer);
        copyToast.classList.remove('show');
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                copyToast.classList.add('show');
            });
        });
        toastTimer = setTimeout(() => copyToast.classList.remove('show'), 1800);
    }
    // 异步Promise封装复制函数，优先Clipboard，本地file兜底
    function copyTextToClipboard(text) {
        return new Promise((resolve) => {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => resolve(true)).catch(() => fallbackCopy(text, resolve));
            } else {
                fallbackCopy(text, resolve);
            }
        });
    }
    function fallbackCopy(text, resolve) {
        const tempTextarea = document.createElement('textarea');
        tempTextarea.style.position = 'fixed';
        tempTextarea.style.left = '-9999px';
        tempTextarea.value = text;
        document.body.appendChild(tempTextarea);
        tempTextarea.select();
        document.execCommand('copy');
        document.body.removeChild(tempTextarea);
        resolve(true);
    }

    // ====================== DOM 元素绑定 ======================
    const sourceText = document.getElementById('sourceText');
    const targetText = document.getElementById('targetText');
    const convertBtn = document.getElementById('convertBtn');
    const copyResult = document.getElementById('copyResult');
    const clearAll = document.getElementById('clearAll');
    const exampleBtn = document.getElementById('exampleBtn');
    const errorTip = document.getElementById('errorTip');
    const sourceRadios = document.querySelectorAll('input[name="sourceType"]');
    const targetRadios = document.querySelectorAll('input[name="targetType"]');
    const backHome = document.getElementById('backHome');

    // 返回按钮浏览器原生后退逻辑
    backHome.onclick = () => {
        history.back();
    };

    // 简易YAML解析/序列化（轻量实现，无需外部库）
    const YAML = {
        parse: function(str) {
            try {
                return JSON.parse(this.yamlToJson(str));
            } catch(e) { throw e; }
        },
        stringify: function(obj) {
            return this.jsonToYaml(obj, 0);
        },
        yamlToJson: function(yaml) {
            let lines = yaml.trim().split('\n').filter(l=>l.trim()!=='');
            let root = {};
            let stack = [{indent:-1, node:root}];
            for(let line of lines) {
                let indent = line.search(/\S/);
                let content = line.trim();
                let match = content.match(/^([^:]+):\s*(.+)?$/);
                if(!match) continue;
                let key = match[1].trim();
                let val = match[2]?.trim();
                let child = {};
                while(stack.length && stack[stack.length-1].indent >= indent) stack.pop();
                let parent = stack[stack.length-1].node;
                if(val === undefined) {
                    parent[key] = child;
                    stack.push({indent, node:child});
                } else {
                    if(val === 'true') parent[key] = true;
                    else if(val === 'false') parent[key] = false;
                    else if(!isNaN(val)) parent[key] = Number(val);
                    else parent[key] = val.replace(/^["']|["']$/g, '');
                }
            }
            return JSON.stringify(root);
        },
        jsonToYaml: function(obj, indent) {
            let res = '';
            let pad = '  '.repeat(indent);
            if(typeof obj !== 'object' || obj === null) {
                if(typeof obj === 'string') return `"${obj}"`;
                return String(obj);
            }
            if(Array.isArray(obj)) {
                for(let item of obj) {
                    res += pad + '- ' + this.jsonToYaml(item, indent+1) + '\n';
                }
                return res;
            }
            for(let k in obj) {
                let v = obj[k];
                if(typeof v === 'object' && v !== null) {
                    res += pad + k + ':\n' + this.jsonToYaml(v, indent+1);
                } else {
                    res += pad + k + ': ' + this.jsonToYaml(v, indent) + '\n';
                }
            }
            return res;
        }
    };

    // 简易XML <-> JSON 转换
    function xml2json(xmlStr) {
        const parser = new DOMParser();
        const xmlDoc = parser.parseFromString(xmlStr, "text/xml");
        const errNode = xmlDoc.querySelector("parsererror");
        if(errNode) throw new Error("XML格式错误");
        function nodeToObj(node) {
            let obj = {};
            if(node.nodeType === 3) return node.textContent.trim();
            for(let attr of node.attributes) obj[attr.name] = attr.value;
            for(let child of node.childNodes) {
                if(child.nodeType === 3 && child.textContent.trim() === '') continue;
                let childObj = nodeToObj(child);
                if(obj[child.tagName]) {
                    if(!Array.isArray(obj[child.tagName])) obj[child.tagName] = [obj[child.tagName]];
                    obj[child.tagName].push(childObj);
                } else {
                    obj[child.tagName] = childObj;
                }
            }
            return obj;
        }
        const root = xmlDoc.documentElement;
        return {[root.tagName]: nodeToObj(root)};
    }
    function json2xml(obj) {
        function objToXml(name, data, indent=0) {
            let pad = '  '.repeat(indent);
            if(typeof data !== 'object' || data === null) {
                return `${pad}<${name}>${data}</${name}>\n`;
            }
            if(Array.isArray(data)) {
                let s = '';
                for(let item of data) s += objToXml(name, item, indent);
                return s;
            }
            let s = `${pad}<${name}>\n`;
            for(let k in data) s += objToXml(k, data[k], indent+1);
            s += `${pad}</${name}>\n`;
            return s;
        }
        let rootKey = Object.keys(obj)[0];
        return '<?xml version="1.0" encoding="UTF-8"?>\n' + objToXml(rootKey, obj[rootKey]);
    }

    // 获取选中的源/目标类型
    function getSelectedRadio(name) {
        return document.querySelector(`input[name="${name}"]:checked`).value;
    }

    // 转换主逻辑
    convertBtn.onclick = () => {
        errorTip.textContent = '';
        const srcType = getSelectedRadio('sourceType');
        const tarType = getSelectedRadio('targetType');
        const raw = sourceText.value.trim();
        if(!raw) {
            errorTip.textContent = "请输入源文本内容";
            targetText.value = '';
            return;
        }
        let data;
        try {
            // 源解析为JS对象
            if(srcType === 'json') data = JSON.parse(raw);
            else if(srcType === 'xml') data = xml2json(raw);
            else if(srcType === 'yaml') data = YAML.parse(raw);
            // 对象转目标格式
            let out;
            if(tarType === 'json') out = JSON.stringify(data, null, 2);
            else if(tarType === 'xml') out = json2xml(data);
            else if(tarType === 'yaml') out = YAML.stringify(data);
            targetText.value = out;
        } catch(e) {
            errorTip.textContent = "解析失败：" + e.message;
            targetText.value = '';
        }
    }

    // 示例数据
    exampleBtn.onclick = () => {
        const demoJson = `{
  "name": "toolsJoinYou",
  "version": "1.0.0",
  "list": ["json", "xml", "yaml"],
  "enable": true
}`;
        sourceText.value = demoJson;
        document.querySelector('input[name="sourceType"][value="json"]').checked = true;
        document.querySelector('input[name="targetType"][value="yaml"]').checked = true;
        convertBtn.click();
    }

    // 清空
    clearAll.onclick = () => {
        sourceText.value = '';
        targetText.value = '';
        errorTip.textContent = '';
    }

    // 复制结果（异步调用统一复制函数+弹窗）
    copyResult.onclick = async () => {
        const val = targetText.value.trim();
        if(!val) return;
        await copyTextToClipboard(val);
        showCopyToast();
    }

    // 输入框回车转换
    sourceText.onkeydown = e => {
        if(e.key === 'Enter' && e.ctrlKey) convertBtn.click();
    }
</script>
</body>
</html>
