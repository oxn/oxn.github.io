<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>图片 Base64 互转</title>
<style>
    /* 全局主题变量 与主站完全统一 */
    :root {
      --primary: #10b981;
      --primary-light: #dcfce7;
      --header-bg: #f0fdf4;
      --warn: #f97316;
      --danger: #ef4444;
      --nav-btn-bg: #ffffff;
      --nav-btn-border: #e5e7eb;
      --nav-btn-text: #222222;
      --text-main: #222222;
      --text-secondary: #555555;
      --text-weak: #888888;
      --border-base: #e5e7eb;
      --border-light: #f3f4f6;
      --bg-page: #ffffff;
      --bg-card: #ffffff;
      --bg-btn: #ffffff;
      --bg-footer: #f0fdf4;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-lg: 0 6px 16px rgba(0,0,0.1);
      --radius-xs: 4px;
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 999px;
      --space-xs: 6px;
      --space-sm: 10px;
      --space-md: 14px;
      --space-lg: 16px;
      --space-xl: 28px;
      --transition: all 0.22s ease;
      --key-bg: #e57eb;
      --key-text: #222;
      --key-radius: 6px;
      --key-shadow: 0 1px 2px rgba(0,0,0,0.15);
      --body-font-size: 16px;
      --body-line-height: 1.6;
      --title-line-height: 1.2;
      --sub-title-line-height: 1.25;
      --content-max-width: 1200px;
      --card-gap: 16px;
      --card-min-width: 300px;
      --header-safe-gap: 16px;
      --card-label-offset: 36px;
      --nav-line-height: 38px;
      --theme-btn-width: 36px;
    }
    html[data-theme="dark"] {
      --primary: #34d399;
      --primary-light: rgba(52, 211, 153, 0.18);
      --header-bg: #111827;
      --nav-btn-bg: #1f2937;
      --nav-btn-border: #374151;
      --nav-btn-text: #f3f4f6;
      --warn: #fdba74;
      --danger: #f87171;
      --text-main: #f9fafb;
      --text-secondary: #d1d5db;
      --text-weak: #9ca3af;
      --border-base: #374151;
      --border-light: #1f2937;
      --bg-page: #0f172a;
      --bg-card: #1e293b;
      --bg-btn: #1f2937;
      --bg-footer: #111827;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.25);
      --shadow-lg: 0 6px 16px rgba(0,0,0,0.45);
      --key-bg: #374151;
      --key-text: #f9fafb;
      --key-shadow: 0 1px 2px rgba(0,0,0,0.35);
    }
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: system-ui, -apple-system, sans-serif;
  transition: var(--transition);
}
body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--bg-page);
  color:var(--text-main);
  padding:20px;
  position: relative;
}
/* 顶部导航 */
.top-header-bar{
  position: fixed;
  top: 14px;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 calc(var(--space-lg));
  z-index: 999;
}
.header-btn-back {
  padding: 7px 10px;
  border: 1px solid var(--nav-btn-border);
  border-radius: var(--radius-lg);
  font-size: 12px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
  background: var(--nav-btn-bg);
  color: var(--nav-btn-text);
  flex-shrink: 0;
  min-width: fit-content;
  height: var(--nav-line-height);
}
.header-btn-back:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
.header-btn-theme {
  width: 40px;
  height: 40px;
  padding: 0;
  border: 1px solid var(--nav-btn-border);
  border-radius: 50%;
  font-size: 16px;
  cursor: pointer;
  display: grid;
  place-items: center;
  background: var(--nav-btn-bg);
  color: var(--nav-btn-text);
  flex-shrink: 0;
}
.header-btn-theme:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
.box{
  width:100%;
  max-width:540px;
  background:var(--bg-card);
  padding:32px;
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
  margin-top: 70px;
}
h2{
  text-align:center;
  margin-bottom:8px;
  font-weight:600;
  font-size:24px;
}
.sub-title{
  text-align:center;
  font-size:14px;
  color:var(--text-secondary);
  margin-bottom:28px;
}
.section-title{
  font-size:17px;
  font-weight:600;
  margin:24px 0 12px;
}
/* 上传拖拽区域 */
.upload-area{
  border:2px dashed var(--border-base);
  border-radius:var(--radius-md);
  padding:40px 16px;
  text-align:center;
  cursor:pointer;
}
.upload-area.active{
  border-color:var(--primary);
  background:var(--primary-light);
}
.upload-icon{
  font-size:42px;
  margin-bottom:10px;
  color:var(--text-secondary);
}
input[type="file"]{
  display:none;
}
.meta-info{
  margin:14px 0;
  padding:14px;
  border-radius:var(--radius-md);
  background:var(--primary-light);
}
.meta-line{
  font-size:15px;
  margin:6px 0;
}
textarea{
  width:100%;
  min-height:140px;
  padding:13px 16px;
  border:1px solid var(--border-base);
  border-radius:var(--radius-md);
  font-size:14px;
  resize:vertical;
  background:transparent;
  color:inherit;
}
/* 暗黑表单统一修复 */
select,
input[type="number"],
textarea {
  width:100%;
  padding:13px 16px;
  border:1px solid var(--border-base);
  border-radius:var(--radius-md);
  font-size:16px;
  color:inherit;
  background: transparent;
}
html[data-theme="dark"] {
  select,
  input[type="number"],
  textarea {
    background: #273449;
    color: #f3f4f6;
  }
  select option {
    background: #1e293b;
    color: #f3f4f6;
  }
}
input:focus,textarea:focus,select:focus{
  outline:none;
  border-color:var(--primary);
}
.btn-row{
  display:flex;
  gap:10px;
  margin:14px 0 20px;
}
.btn{
  flex:1;
  padding:14px;
  border:none;
  border-radius:var(--radius-md);
  font-size:16px;
  cursor:pointer;
}
.btn-primary{
  background:var(--primary);
  color:#fff;
}
.btn-secondary{
  background:var(--nav-btn-bg);
  color:var(--text-main);
  border:1px solid var(--border-base);
}
.btn-danger{
  background:var(--danger);
  color:#fff;
}
.btn-secondary:hover{
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
.preview-box{
  text-align:center;
  margin:12px 0;
}
.preview-box img{
  max-width:100%;
  max-height:220px;
  border-radius:var(--radius-md);
}
.tip{
  text-align:left;
  font-size:14px;
  opacity:0.65;
  line-height:1.6;
  color:var(--text-secondary);
  margin-top:24px;
}
/* 手机竖屏适配 */
@media screen and (max-width:767px) and (orientation:portrait){
  body{
    padding:15px;
  }
  .top-header-bar{
    padding: 0 var(--space-md);
    top:12px;
  }
  .header-btn-back{
    padding:6px 8px;
    font-size:11px;
    height: 34px;
  }
  .header-btn-theme{
    width: 34px;
    height: 34px;
    font-size:14px;
  }
  .box{
    padding:24px 20px;
    margin-top: 60px;
  }
  h2{
    font-size:22px;
  }
  .btn-row{
    flex-direction:column;
    gap:8px;
  }
  .upload-area{
    padding:30px 12px;
  }
  .tip{
    font-size:13px;
  }
}
</style>
</head>
<body>
<div class="top-header-bar">
  <button class="header-btn-back" id="backHome">← 返回首页</button>
  <button class="header-btn-theme" id="themeToggle" aria-label="切换明暗模式">🌙</button>
</div>

<div class="box">
  <h2>图片 Base64 互转</h2>
  <div class="sub-title">图片与 Base64 编码字符串之间的双向转换</div>

  <!-- 图片转Base64 区域 -->
  <div class="section-title">📷 图片转Base64</div>
  <div class="upload-area" id="uploadBox">
    <div class="upload-icon">🖼️</div>
    <div>点击上传或拖拽图片到此处<br>支持 JPG、PNG、GIF、WebP 格式</div>
    <input type="file" id="fileInput" accept="image/jpg,image/jpeg,image/png,image/gif,image/webp">
  </div>

  <div class="meta-info" id="metaWrap" style="display:none;">
    <div class="meta-line">文件名：<span id="metaName">--</span></div>
    <div class="meta-line">尺寸：<span id="metaSize">--</span></div>
    <div class="meta-line">原始文件大小：<span id="fileByte">--</span></div>
    <div class="meta-line">Base64纯文本大小：<span id="b64Byte">--</span></div>
  </div>

  <div class="preview-box" id="previewWrap" style="display:none;">
    <img id="previewImg" alt="预览图片">
  </div>

  <label>Data URI (包含前缀)</label>
  <textarea id="dataUriOut" readonly placeholder="图片对应的完整Base64链接..."></textarea>
  <div class="btn-row">
    <button class="btn btn-primary" id="copyDataUri">复制Data URI</button>
    <button class="btn btn-secondary" id="copyPure">仅复制Base64字符串</button>
  </div>

  <!-- Base64转图片 区域 -->
  <div class="section-title">Base64 转图片</div>
  <label>Base64 输入</label>
  <textarea id="b64Input" placeholder="粘贴Data URI或纯Base64字符串..."></textarea>
  <div class="btn-row">
    <button class="btn btn-primary" id="genImg">生成预览图</button>
    <button class="btn btn-secondary" id="downloadImg">下载图片</button>
  </div>
  <div class="preview-box" id="b64PreviewWrap" style="display:none;">
    <img id="b64Preview" alt="Base64预览">
    <div class="meta-line" style="margin-top:8px;">图片格式：<span id="imgType">--</span></div>
    <div class="meta-line">尺寸：<span id="imgWH">--</span></div>
    <div class="meta-line">图片二进制大小：<span id="imgBlobSize">--</span></div>
  </div>

  <button class="btn btn-danger" id="clearAll" style="width:100%;margin-top:8px;">清空全部</button>

  <div class="tip">
    使用说明：本地离线转换，图片不会上传服务器；支持拖拽/点击上传图片生成Base64，也可粘贴Base64字符串还原预览并下载；Data URI可直接用于网页img标签。
  </div>
</div>

<script>
const htmlRoot = document.documentElement;
const themeToggle = document.getElementById("themeToggle");
const STORAGE_KEY = "site_theme_mode";

// 主题初始化
function initTheme() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved === "dark") {
    htmlRoot.setAttribute("data-theme", "dark");
    themeToggle.innerHTML = "☀️";
  } else {
    htmlRoot.removeAttribute("data-theme");
    themeToggle.innerHTML = "🌙";
  }
}
themeToggle.onclick = () => {
  const dark = htmlRoot.hasAttribute("data-theme");
  if (dark) {
    htmlRoot.removeAttribute("data-theme");
    localStorage.setItem(STORAGE_KEY, "light");
    themeToggle.textContent = "🌙";
  } else {
    htmlRoot.setAttribute("data-theme", "dark");
    localStorage.setItem(STORAGE_KEY, "dark");
    themeToggle.textContent = "☀️";
  }
};
// 返回首页
document.getElementById("backHome").onclick = () => window.location.href = "./index.html";

// DOM元素
const uploadBox = document.getElementById("uploadBox");
const fileInput = document.getElementById("fileInput");
const metaWrap = document.getElementById("metaWrap");
const metaName = document.getElementById("metaName");
const metaSize = document.getElementById("metaSize");
const fileByte = document.getElementById("fileByte");
const b64Byte = document.getElementById("b64Byte");
const previewWrap = document.getElementById("previewWrap");
const previewImg = document.getElementById("previewImg");
const dataUriOut = document.getElementById("dataUriOut");
const copyDataUri = document.getElementById("copyDataUri");
const copyPure = document.getElementById("copyPure");
const b64Input = document.getElementById("b64Input");
const genImg = document.getElementById("genImg");
const downloadImg = document.getElementById("downloadImg");
const b64PreviewWrap = document.getElementById("b64PreviewWrap");
const b64Preview = document.getElementById("b64Preview");
const imgType = document.getElementById("imgType");
const imgWH = document.getElementById("imgWH");
const imgBlobSize = document.getElementById("imgBlobSize");
const clearAll = document.getElementById("clearAll");

let currentDataUri = "";
let pureB64Str = "";
let currentBlob = null;
let blobMime = "";

// 字节格式化
function formatByte(b) {
  if (b < 1024) return b + " B";
  if (b < 1024 * 1024) return (b / 1024).toFixed(2) + " KB";
  return (b / 1024 / 1024).toFixed(2) + " MB";
}

// 获取UTF-8字符串字节长度
function getUtf8ByteLength(str) {
  return new Blob([str]).size;
}

// 通用复制
async function copyText(txt) {
  try {
    await navigator.clipboard.writeText(txt);
    alert("复制成功");
  } catch {
    const t = document.createElement("textarea");
    t.value = txt;
    document.body.appendChild(t);
    t.select();
    document.execCommand("copy");
    document.body.removeChild(t);
    alert("已复制");
  }
}
copyDataUri.onclick = () => copyText(dataUriOut.value);
copyPure.onclick = () => copyText(pureB64Str);

// 拖拽高亮
uploadBox.addEventListener("dragover", e => {
  e.preventDefault();
  uploadBox.classList.add("active");
});
uploadBox.addEventListener("dragleave", () => uploadBox.classList.remove("active"));
uploadBox.addEventListener("drop", e => {
  e.preventDefault();
  uploadBox.classList.remove("active");
  const f = e.dataTransfer.files[0];
  if (f) handleFile(f);
});
uploadBox.onclick = () => fileInput.click();
fileInput.onchange = () => {
  if (fileInput.files[0]) handleFile(fileInput.files[0]);
};

// 图片文件转base64
function handleFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    currentDataUri = dataUrl;
    const arr = dataUrl.split(",");
    pureB64Str = arr[1];
    // 预览图
    previewImg.src = dataUrl;
    previewWrap.style.display = "block";
    dataUriOut.value = dataUrl;
    // 尺寸
    const img = new Image();
    img.onload = () => {
      metaSize.innerText = img.width + " × " + img.height;
    };
    img.src = dataUrl;
    // 元数据
    metaName.innerText = file.name;
    fileByte.innerText = formatByte(file.size);
    // 【修复】纯Base64字符串文本UTF-8字节大小（不含data URI前缀）
    const textByteSize = getUtf8ByteLength(pureB64Str);
    b64Byte.innerText = formatByte(textByteSize);
    metaWrap.style.display = "block";
  };
  reader.readAsDataURL(file);
}

// Base64转图片预览
genImg.onclick = () => {
  let src = b64Input.value.trim();
  if (!src) return alert("请输入Base64字符串");
  // 拆分前缀
  let mime = "image/png";
  if (src.includes(";base64,")) {
    const parts = src.split(",");
    mime = parts[0].match(/data:(.*?);/)[1];
  } else {
    src = `data:${mime};base64,${src}`;
  }
  // 转blob用于计算大小
  function b64ToBlob(b64, mimeType) {
    const chars = atob(b64);
    const u8 = new Uint8Array([...chars].map(c => c.charCodeAt(0)));
    return new Blob([u8], { type: mimeType });
  }
  const raw = src.split(",")[1];
  const blob = b64ToBlob(raw, mime);
  currentBlob = blob;
  blobMime = mime;
  // 渲染预览
  b64Preview.src = src;
  b64Preview.onload = () => {
    imgType.innerText = mime;
    imgWH.innerText = b64Preview.width + " × " + b64Preview.height;
    imgBlobSize.innerText = formatByte(blob.size);
  };
  b64PreviewWrap.style.display = "block";
};

// 下载Base64图片
downloadImg.onclick = () => {
  if (!currentBlob) return alert("先生成预览图");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(currentBlob);
  const ext = blobMime.split("/")[1];
  a.download = "image." + ext;
  a.click();
  URL.revokeObjectURL(a.href);
};

// 全部清空
clearAll.onclick = () => {
  fileInput.value = "";
  metaWrap.style.display = "none";
  previewWrap.style.display = "none";
  b64PreviewWrap.style.display = "none";
  dataUriOut.value = "";
  b64Input.value = "";
  currentDataUri = "";
  pureB64Str = "";
  currentBlob = null;
};

initTheme();
</script>
</body>
</html>
