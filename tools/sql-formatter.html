<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>SQL 格式化工具</title>
<style>
    :root {
        --primary: #10b981;
        --primary-light: #dcfce7;
        --warn: #f97316;
        --danger: #ef4444;
        --nav-btn-bg: #ffffff;
        --nav-btn-border: #e5e7eb;
        --nav-btn-text: #222222;
        --text-main: #222222;
        --text-secondary: #555555;
        --text-weak: #888888;
        --border-base: #e5e7eb;
        --border-light: #f3f4f6;
        --bg-page: #ffffff;
        --bg-card: #ffffff;
        --bg-btn: #ffffff;
        --shadow-sm: 0 1px 3px rgba(0,0,0.06);
        --shadow-lg: 0 6px 16px rgba(0,0.1);
        --radius-sm: 6px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --radius-full: 999px;
        --space-xs: 6px;
        --space-sm: 10px;
        --space-md: 14px;
        --space-lg: 16px;
        --transition: all 0.3s ease;
        --body-font-size: 16px;
        --desktop-font-ratio: 0.85;
        --content-max-width: 1200px;
        --nav-line-height: 38px;
        --theme-btn-width: 36px;
    }
    html[data-theme="dark"] {
        --primary: #10b981;
        --primary-light: rgba(16, 185, 129, 0.15);
        --nav-btn-bg: #1f2937;
        --nav-btn-border: #374151;
        --nav-btn-text: #f3f4f6;
        --warn: #f97316;
        --text-main: #f1f5f9;
        --text-secondary: #cbd5e1;
        --text-weak: #94a3b8;
        --border-base: #334155;
        --border-light: #334155;
        --bg-page: #0f172a;
        --bg-card: #1e293b;
        --bg-btn: #1e293b;
        --shadow-sm: 0 1px 3px rgba(0,0,0.2);
        --shadow-lg: 0 6px 16px rgba(0,0.35);
    }
    html {
        font-family: system-ui, "Microsoft YaHei", sans-serif;
        -webkit-font-smoothing: antialiased;
    }
    body {
        min-height: 100vh;
        background: var(--bg-page);
        display: flex;
        flex-direction: column;
        line-height: 1.5;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
    }
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        transition: var(--transition);
    }
    a {
        text-decoration: none;
        color: inherit;
    }
    button {
        font-family: inherit;
        font-size: inherit;
        border: none;
        background: transparent;
        cursor: pointer;
        border-radius: var(--radius-sm);
    }
    .container {
        max-width: var(--content-max-width);
        width: calc(100% - 48px);
        margin: 0 auto;
    }
    header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 99;
    }
    .header-inner {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 0;
    }
    .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--nav-btn-text);
        font-size: 12px;
        font-weight: 500;
        padding: 7px 10px;
        border: 1px solid var(--nav-btn-border);
        border-radius: var(--radius-lg);
        background: var(--nav-btn-bg);
        height: var(--nav-line-height);
    }
    .back-btn:hover {
        border-color: var(--primary);
        background: var(--primary-light);
        color: var(--primary);
    }
    .theme-switch-wrap {
        position: absolute;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
    }
    .header-btn-circle {
        width: var(--theme-btn-width);
        height: var(--theme-btn-width);
        border: 1px solid var(--nav-btn-border);
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: var(--nav-btn-bg);
        color: var(--nav-btn-text);
    }
    .header-btn-circle:hover {
        border-color: var(--primary);
        background: var(--primary-light);
        color: var(--primary);
    }
    .header-spacer {
        width: 100%;
        height: 60px;
    }
    main.container {
        margin-top: 12px;
        padding-bottom: 60px;
    }
    .page-head {
        text-align: center;
        margin: 20px 0 30px;
    }
    .page-head h1 {
        font-size: calc(30px * var(--desktop-font-ratio));
        margin-bottom: 12px;
        color: var(--text-main);
    }
    .desc-text {
        color: var(--text-weak);
        font-size: calc(15px * var(--desktop-font-ratio));
    }
    .card-box {
        background: var(--bg-card);
        border: 1px solid var(--border-base);
        border-radius: var(--radius-lg);
        padding: 24px;
        box-shadow: var(--shadow-sm);
    }
    .input-block {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 16px;
    }
    .input-label {
        display: block;
        color: var(--text-main);
        font-weight: 500;
    }
    textarea, select {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid var(--border-base);
        border-radius: var(--radius-sm);
        background: var(--bg-btn);
        color: var(--text-main);
        font-family: Consolas, monospace;
        outline: none;
    }
    textarea {
        min-height: 160px;
        max-height: 320px;
        overflow-y: auto;
        resize: vertical;
    }
    textarea:focus, select:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(16,185,129,0.15);
    }
    .btn-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin: 20px 0;
    }
    .op-btn {
        height: 44px;
        padding: 0 18px;
        border: 1px solid var(--border-base);
        border-radius: var(--radius-sm);
        background: var(--bg-btn);
        color: var(--text-main);
        white-space: nowrap;
    }
    .op-btn.primary {
        border-color: var(--primary);
        background: var(--primary-light);
        color: var(--primary);
    }
    .op-btn.warn {
        color: #ef4444;
        border-color: #fecdd3;
    }
    .op-btn:hover {
        border-color: var(--primary);
        background: var(--primary-light);
        color: var(--primary);
    }
    .err-tip {
        color: #ef4444;
        margin: 8px 0;
        font-size: 14px;
        padding: 6px 10px;
        background: rgba(239,68,68,0.08);
        border-radius: var(--radius-sm);
    }
    .toast-copy {
        position: fixed;
        top: 80px;
        left: 50%;
        transform: translateX(-50%) translateY(-20px);
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px 32px;
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        border-radius: 16px;
        box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
        z-index: 999999;
        opacity: 0;
        pointer-events: none;
        transition: all 0.3s ease;
        min-height: 72px;
    }
    .toast-copy.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }
    .toast-icon {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #22c55e;
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 22px;
        font-weight: bold;
    }
    .toast-text {
        font-size: 28px;
        color: #16a34a;
        font-weight: 500;
    }
    html[data-theme="dark"] .toast-copy {
        background: rgba(34, 197, 94, 0.12);
        border-color: rgba(34, 197, 94, 0.3);
    }
    html[data-theme="dark"] .toast-text {
        color: #4ade80;
    }
    @media (max-width:640px) {
        .page-head h1 {font-size:28px;}
        .toast-text {font-size: 20px;}
    }
    @media screen and (max-width:767px) and (orientation:portrait){
        .header-btn-circle{width:34px;height:34px;font-size:14px;}
    }
</style>
</head>
<body>
<header id="headerDom">
    <div class="container header-inner">
        <a href="index.html" class="back-btn">← 返回首页</a>
        <div class="theme-switch-wrap">
            <button id="themeToggle" class="header-btn-circle">🌙</button>
        </div>
    </div>
</header>
<div class="header-spacer" id="headerSpacer"></div>

<main class="container">
    <div class="page-head">
        <h1>SQL 格式化工具</h1>
        <div class="desc-text">一键美化压缩SQL，自动分层换行，支持2/4空格缩进</div>
    </div>
    <div class="card-box">
        <!-- 缩进选择 -->
        <div class="input-block">
            <label class="input-label">缩进空格</label>
            <select id="indentSelect">
                <option value="2">2 空格</option>
                <option value="4" selected>4 空格</option>
            </select>
        </div>
        <!-- 输入SQL -->
        <div class="input-block">
            <label class="input-label">原始 SQL</label>
            <textarea id="sqlInput" placeholder="粘贴压缩单行SQL，例如：select id,name from user where id=1"></textarea>
        </div>
        <div class="btn-row">
            <button class="op-btn primary" id="formatBtn">格式化</button>
            <button class="op-btn" id="demoBtn">填充示例</button>
            <button class="op-btn primary" id="copyBtn">复制结果</button>
            <button class="op-btn warn" id="clearBtn">清空全部</button>
        </div>
        <div class="err-tip" id="errTip"></div>
        <!-- 输出格式化结果 -->
        <div class="input-block">
            <label class="input-label">格式化后 SQL</label>
            <textarea id="sqlOut" readonly></textarea>
        </div>
    </div>
</main>

<div class="toast-copy" id="copyToast">
    <div class="toast-icon">✓</div>
    <span class="toast-text">复制成功</span>
</div>

<script>
// 复制弹窗统一逻辑
const copyToast = document.getElementById('copyToast');
let toastTimer = null;
function showToast() {
    if(toastTimer) clearTimeout(toastTimer);
    copyToast.classList.add('show');
    toastTimer = setTimeout(()=>copyToast.classList.remove('show'), 3000);
}
async function copyStr(text){
    try {
        await navigator.clipboard.writeText(text);
        showToast();
    } catch (err) {
        const temp = document.createElement('textarea');
        temp.style.position='fixed';
        temp.style.left='-9999px';
        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand('copy');
        document.body.removeChild(temp);
        showToast();
    }
}

// 明暗主题（修复初始化bug）
const htmlRoot=document.documentElement;
const themeBtn=document.getElementById("themeToggle");
const mediaDark=window.matchMedia('(prefers-color-scheme: dark)');
const STORAGE_KEY="site_theme_mode";
function applyTheme(mode){
    if(mode === 'dark'){
        htmlRoot.setAttribute('data-theme','dark');
        themeBtn.innerText='☀️';
    }else{
        htmlRoot.removeAttribute('data-theme');
        themeBtn.innerText='🌙';
    }
}
function initTheme(){
    const save=localStorage.getItem(STORAGE_KEY);
    if(save){
        applyTheme(save);
    }else{
        applyTheme(mediaDark.matches ? 'dark' : 'light');
    }
}
function toggleTheme(){
    const now = htmlRoot.hasAttribute('data-theme') ? 'dark' : 'light';
    const next = now === 'dark' ? 'light' : 'dark';
    localStorage.setItem(STORAGE_KEY, next);
    applyTheme(next);
}
mediaDark.addEventListener('change',()=>{
    if(!localStorage.getItem(STORAGE_KEY)){
        applyTheme(mediaDark.matches ? 'dark' : 'light');
    }
});
initTheme();
themeBtn.onclick = toggleTheme;

// 头部自适应高度
const headerDom=document.getElementById('headerDom');
const headerSpacer=document.getElementById('headerSpacer');
function syncHeader(){
    headerSpacer.style.height = headerDom.offsetHeight + 'px';
}
window.addEventListener('resize', syncHeader);
syncHeader();

// 返回首页按钮
document.querySelector('.back-btn').onclick = e=>{
    e.preventDefault();
    if(history.length > 1) history.back();
};

// DOM元素绑定
const indentSelect = document.getElementById('indentSelect');
const sqlInput = document.getElementById('sqlInput');
const sqlOut = document.getElementById('sqlOut');
const formatBtn = document.getElementById('formatBtn');
const demoBtn = document.getElementById('demoBtn');
const copyBtn = document.getElementById('copyBtn');
const clearBtn = document.getElementById('clearBtn');
const errTip = document.getElementById('errTip');

// 重写稳定可用SQL格式化函数（修复之前换行失效、层级错乱问题）
function formatSql(rawSql, indentSize){
    errTip.textContent = '';
    // 去除换行、多余空格
    let sql = rawSql.replace(/[\r\n]/g, ' ').replace(/\s+/g, ' ').trim();
    const indent = ' '.repeat(indentSize);
    // 关键字列表，按优先级排序
    const breakKeywords = [
        'SELECT', 'FROM', 'LEFT JOIN', 'RIGHT JOIN', 'INNER JOIN', 'WHERE',
        'AND', 'OR', 'GROUP BY', 'HAVING', 'ORDER BY', 'LIMIT',
        'INSERT INTO', 'VALUES', 'UPDATE', 'SET', 'DELETE FROM'
    ];
    // 关键字前后强制换行
    breakKeywords.forEach(word => {
        const reg = new RegExp(`([\\s(])${word}([\\s)])`, 'gi');
        sql = sql.replace(reg, `$1\n${word}$2`);
    });
    // 分割成行，过滤空行
    let lines = sql.split('\n').map(s=>s.trim()).filter(s=>s.length > 0);
    let outputLines = [];
    let indentLevel = 0;
    for(let line of lines){
        // 关键字控制缩进层级
        if(/^(FROM|WHERE|GROUP BY|ORDER BY|LIMIT)/i.test(line)) indentLevel = 1;
        if(/^(SELECT|INSERT INTO|UPDATE|DELETE FROM)/i.test(line)) indentLevel = 0;
        // 括号增减层级
        let openCount = (line.match(/\(/g) || []).length;
        let closeCount = (line.match(/\)/g) || []).length;
        const currentIndent = indent.repeat(indentLevel);
        outputLines.push(currentIndent + line);
        indentLevel += openCount - closeCount;
        if(indentLevel < 0) indentLevel = 0;
    }
    return outputLines.join('\n');
}

// 格式化按钮点击事件
formatBtn.onclick = function(){
    const inputText = sqlInput.value.trim();
    if(!inputText){
        errTip.textContent = '请输入SQL语句再格式化';
        sqlOut.value = '';
        return;
    }
    const size = parseInt(indentSelect.value);
    const result = formatSql(inputText, size);
    sqlOut.value = result;
};

// 复制结果按钮
copyBtn.onclick = async function(){
    const outText = sqlOut.value.trim();
    if(!outText){
        errTip.textContent = '暂无格式化结果，先生成SQL';
        return;
    }
    await copyStr(outText);
};

// 填充示例SQL
const demoText = "select id,username,mobile,create_time from t_user where status=1 and create_time >= '2026-01-01' order by id desc limit 20";
demoBtn.onclick = function(){
    sqlInput.value = demoText;
    errTip.textContent = '';
    formatBtn.click();
};

// 清空全部按钮
clearBtn.onclick = function(){
    sqlInput.value = '';
    sqlOut.value = '';
    errTip.textContent = '';
};
</script>
</body>
</html>
