<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全密码生成器</title>
    <style>
        /* ===================== 【1.全局色彩主题变量区】与首页完全统一配色变量，明暗切换共用一套规则 ===================== */
        :root {
            --bg: #f5f7fa;
            --card: #ffffff;
            --text: #1a1a1a;
            --desc: #666666;
            --border: #e2e8f0;
            --input-bg: #f8fafc;
            --gen: #2563eb;
            --copy: #10b981;
            --strength-weak: #ef4444;
            --strength-medium: #f59e0b;
            --strength-strong: #10b981;
        }

        /* 暗黑模式：和首页一致使用html[data-theme="dark"]，共用本地存储key，跨页面同步 */
        html[data-theme="dark"] {
            --bg: #0f1218;
            --card: #1e293b;
            --text: #f1f5f9;
            --desc: #94a3b8;
            --border: #334155;
            --input-bg: #0f172a;
            --gen: #3b82f6;
            --copy: #34d399;
            --strength-weak: #f87171;
            --strength-medium: #fbbf24;
            --strength-strong: #34d399;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            transition: background 0.3s, color 0.3s, border-color 0.3s;
        }

        /* 核心：页面全屏flex，卡片上下左右居中 */
        html, body {
            height: 100%;
        }
        body {
            background: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;    /* 水平居中 */
            align-items: center;        /* 垂直居中 */
            padding: 20px;
        }

        /* ===================== 【2.悬浮固定按钮区域】返回首页 + 主题切换，样式、尺寸、交互1:1对齐首页 ===================== */
        /* 左上角返回按钮 悬浮固定，和首页header-btn样式统一 */
        .back-btn {
            position: fixed;
            top: 16px;
            left: 16px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text);
            font-size: 12px;
            font-weight: 500;
            padding: 7px 10px;
            border-radius: 12px;
            background: var(--card);
            border: 1px solid var(--border);
            height: 38px;
            transition: background 0.22s, border-color 0.22s;
            z-index: 99;
            cursor: pointer;
        }
        .back-btn:hover {
            border-color: var(--gen);
            background: rgba(37, 99, 235, 0.1);
            color: var(--gen);
        }

        /* 右上角圆形明暗切换 悬浮固定，和首页header-btn-circle完全一致 */
        .theme-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: background 0.22s, border-color 0.22s;
            z-index: 99;
        }
        .theme-toggle:hover {
            border-color: var(--gen);
            background: rgba(37, 99, 235, 0.1);
            color: var(--gen);
        }

        /* 居中卡片容器 */
        .card {
            width: 100%;
            max-width: 600px;
            background: var(--card);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }

        h1 {
            font-size: 24px;
            color: var(--text);
            margin-bottom: 8px;
        }

        .desc {
            color: var(--desc);
            margin-bottom: 24px;
        }

        .pwd-box {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
        }

        #password {
            flex: 1;
            padding: 14px 16px;
            font-size: 18px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--input-bg);
            font-family: monospace;
            color: var(--text);
        }

        button {
            padding: 0 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            height: 48px;
        }

        .gen-btn {
            background: var(--gen);
            color: white;
        }

        .copy-btn {
            background: var(--copy);
            color: white;
        }

        .row {
            margin: 18px 0;
        }

        label.title {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text);
        }

        .length-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #lengthSlider {
            flex: 1;
            accent-color: var(--gen);
        }

        #lengthNum {
            width: 50px;
            text-align: center;
            padding: 6px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--input-bg);
            color: var(--text);
        }

        .check-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .check-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .check-item label {
            color: var(--text);
        }

        .strength {
            margin: 20px 0;
        }

        .strength-bar {
            height: 6px;
            width: 100%;
            background: var(--border);
            border-radius: 3px;
            overflow: hidden;
            margin: 8px 0;
        }

        .strength-inner {
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        .history {
            margin-top: 30px;
        }

        .history-item {
            padding: 8px 12px;
            background: var(--input-bg);
            border-radius: 6px;
            margin: 6px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: monospace;
            color: var(--text);
            gap: 10px;
        }
        .history-pwd {
            flex: 1;
            word-break: break-all;
        }
        .history-time {
            flex-shrink: 0;
            color: var(--desc);
            font-size: 13px;
        }
        .history-copy-btn {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            display: grid;
            place-items: center;
            background: var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 16px;
            cursor: pointer;
        }
        .history-copy-btn:hover {
            background: var(--primary-light);
            color: var(--primary);
        }

        /* 统一复制弹窗样式（全站通用） */
        .toast-copy {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 32px;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 16px;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.15);
            z-index: 999999;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            min-height: 72px;
        }
        .toast-copy.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        .toast-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #22c55e;
            color: #fff;
            display: grid;
            place-items: center;
            font-size: 22px;
            font-weight: bold;
            flex-shrink: 0;
        }
        .toast-text {
            font-size: 16px;
            color: #16a34a;
            font-weight: 500;
        }
        html[data-theme="dark"] .toast-copy {
            background: rgba(34,197,94,0.12);
            border-color: rgba(34,197,94,0.3);
        }
        html[data-theme="dark"] .toast-text {
            color: #4ade80;
        }

        /* 移动端适配 */
        @media (max-width: 480px) {
            .card {
                padding: 24px 20px;
            }
            .pwd-box {
                flex-direction: column;
            }
            button {
                width: 100%;
            }
            .check-group {
                grid-template-columns: 1fr;
            }
            .back-btn, .theme-toggle {
                top: 12px;
            }
            .theme-toggle {
                width: 34px;
                height: 34px;
                font-size: 14px;
            }
            .toast-text {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- 左上角返回按钮（移除a跳转，原生history.back） -->
    <div class="back-btn" id="backHome">← 返回</div>
    <!-- 右上角明暗切换圆形按钮 -->
    <button class="theme-toggle" id="themeToggle" title="切换明暗模式">🌙</button>

    <!-- 居中密码工具卡片 -->
    <div class="card">
        <h1>🔐 安全密码生成器</h1>
        <p class="desc">创建强大且安全的密码，保护您的数字生活</p>

        <div class="pwd-box">
            <input type="text" id="password" readonly>
            <button class="gen-btn" id="generate">生成</button>
            <button class="copy-btn" id="copy">复制</button>
        </div>

        <div class="row">
            <label class="title">密码长度</label>
            <div class="length-wrap">
                <input type="range" id="lengthSlider" min="4" max="32" value="16">
                <input type="number" id="lengthNum" min="4" max="32" value="16">
            </div>
        </div>

        <div class="row">
            <label class="title">包含字符类型</label>
            <div class="check-group">
                <div class="check-item">
                    <input type="checkbox" id="upper" checked>
                    <label>大写字母 A-Z</label>
                </div>
                <div class="check-item">
                    <input type="checkbox" id="lower" checked>
                    <label>小写字母 a-z</label>
                </div>
                <div class="check-item">
                    <input type="checkbox" id="number" checked>
                    <label>数字 0-9</label>
                </div>
                <div class="check-item">
                    <input type="checkbox" id="symbol" checked>
                    <label>特殊符号</label>
                </div>
            </div>
        </div>

        <div class="strength">
            <label class="title">密码强度：<span id="strengthText">--</span></label>
            <div class="strength-bar">
                <div class="strength-inner" id="strengthBar"></div>
            </div>
        </div>

        <div class="history">
            <label class="title">最近生成的密码</label>
            <div id="historyList"></div>
        </div>
    </div>

    <!-- 复制弹窗DOM -->
    <div class="toast-copy" id="copyToast">
        <div class="toast-icon">✓</div>
        <span class="toast-text">复制成功</span>
    </div>

<script>
    /*
    ===================== JS主题模块：与首页完全统一存储key、切换逻辑，跨页面明暗同步 =====================
    存储键统一：site_theme_mode（首页同用）
    标识统一：html[data-theme="dark"]
    */
    const pwdInput = document.getElementById('password');
    const genBtn = document.getElementById('generate');
    const copyBtn = document.getElementById('copy');
    const slider = document.getElementById('lengthSlider');
    const numInput = document.getElementById('lengthNum');
    const upper = document.getElementById('upper');
    const lower = document.getElementById('lower');
    const number = document.getElementById('number');
    const symbol = document.getElementById('symbol');
    const strengthText = document.getElementById('strengthText');
    const strengthBar = document.getElementById('strengthBar');
    const historyList = document.getElementById('historyList');
    const themeToggle = document.getElementById('themeToggle');
    const backHome = document.getElementById('backHome');
    const copyToast = document.getElementById('copyToast');

    // 和首页共用本地存储key，实现跨页面明暗同步
    const STORAGE_KEY = "site_theme_mode";

    const chars = {
        upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
        lower: 'abcdefghijklmnopqrstuvwxyz',
        number: '0123456789',
        symbol: '!@#$%^&*()_+-=[]{}|;:,.<>?~'
    };

    let history = [];
    let toastTimer = null;

    // 稳定弹窗渲染函数
    function showCopyToast() {
        clearTimeout(toastTimer);
        copyToast.classList.remove('show');
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                copyToast.classList.add('show');
            });
        });
        toastTimer = setTimeout(() => copyToast.classList.remove('show'), 1800);
    }

    // 全兼容复制函数（安全域+本地file兜底）
    function copyTextToClipboard(text) {
        return new Promise((resolve) => {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => resolve(true)).catch(() => fallbackCopy(text, resolve));
            } else {
                fallbackCopy(text, resolve);
            }
        });
    }
    function fallbackCopy(text, resolve) {
        const tempInput = document.createElement('input');
        tempInput.value = text;
        document.body.appendChild(tempInput);
        tempInput.select();
        tempInput.setSelectionRange(0, tempInput.value.length);
        document.execCommand('copy');
        document.body.removeChild(tempInput);
        resolve(true);
    }

    // 返回按钮原生后退逻辑
    backHome.onclick = () => {
        history.back();
    };

    // 统一主题切换函数，和首页逻辑完全一致
    function applyTheme(mode) {
        if (mode === "dark") {
            document.documentElement.setAttribute("data-theme", "dark");
            themeToggle.textContent = "☀️";
        } else {
            document.documentElement.removeAttribute("data-theme");
            themeToggle.textContent = "🌙";
        }
    }
    // 初始化读取全局存储主题
    const savedTheme = localStorage.getItem(STORAGE_KEY) || 'light';
    applyTheme(savedTheme);
    // 切换按钮点击事件
    themeToggle.addEventListener('click', () => {
        const current = document.documentElement.hasAttribute("data-theme") ? "dark" : "light";
        const next = current === "dark" ? "light" : "dark";
        localStorage.setItem(STORAGE_KEY, next);
        applyTheme(next);
    });

    // 长度滑块双向同步
    slider.addEventListener('input', () => numInput.value = slider.value);
    numInput.addEventListener('input', () => {
        let val = Number(numInput.value);
        val = Math.max(4, Math.min(32, val));
        numInput.value = val;
        slider.value = val;
    });

    function randomChar(str) {
        return str[Math.floor(Math.random() * str.length)];
    }

    // 生成密码
    function createPassword() {
        let pool = '';
        const len = Number(slider.value);
        if(upper.checked) pool += chars.upper;
        if(lower.checked) pool += chars.lower;
        if(number.checked) pool += chars.number;
        if(symbol.checked) pool += chars.symbol;
        if (!pool) return alert("至少勾选一种字符类型");

        let temp = [];
        if(upper.checked) temp.push(randomChar(chars.upper));
        if(lower.checked) temp.push(randomChar(chars.lower));
        if(number.checked) temp.push(randomChar(chars.number));
        if(symbol.checked) temp.push(randomChar(chars.symbol));

        while(temp.length < len) temp.push(randomChar(pool));
        temp.sort(() => Math.random() - 0.5);
        const pwd = temp.join('');
        pwdInput.value = pwd;
        calcStrength(pwd);
        addHistory(pwd);
    }

    // 密码强度计算
    function calcStrength(pwd) {
        let score = 0;
        if (/[A-Z]/.test(pwd)) score += 20;
        if (/[a-z]/.test(pwd)) score += 20;
        if (/[0-9]/.test(pwd)) score += 20;
        if (/[!@#$%^&*()_+\-=\[\]{}|;:,.<>?~]/.test(pwd)) score += 20;
        if (pwd.length >= 12) score += 20;

        let text, color;
        if (score < 40) { text = "弱"; color = "var(--strength-weak)"; }
        else if (score < 70) { text = "中等"; color = "var(--strength-medium)"; }
        else { text = "非常强"; color = "var(--strength-strong)"; }

        strengthText.innerText = text;
        strengthBar.style.width = score + "%";
        strengthBar.style.background = color;
    }

    // 历史记录渲染（新增每行📋复制按钮）
    function addHistory(pwd) {
        const now = new Date();
        const time = `${now.getHours()}:${String(now.getMinutes()).padStart(2, '0')}`;
        history.unshift({ pwd, time });
        if (history.length > 6) history.pop();
        renderHistory();
    }
    function renderHistory() {
        historyList.innerHTML = '';
        history.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `
                <span class="history-pwd">${item.pwd}</span>
                <span class="history-time">${item.time}</span>
                <span class="history-copy-btn" data-index="${idx}">📋</span>
            `;
            historyList.appendChild(div);
        });
        // 绑定每条历史复制按钮
        document.querySelectorAll(".history-copy-btn").forEach(btn => {
            btn.onclick = async function() {
                const idx = Number(this.dataset.index);
                const text = history[idx].pwd;
                await copyTextToClipboard(text);
                showCopyToast();
            }
        });
    }

    // 复制按钮替换弹窗提示，移除alert
    copyBtn.addEventListener('click', async () => {
        const text = pwdInput.value.trim();
        if (!text) return alert("暂无密码可复制");
        await copyTextToClipboard(text);
        showCopyToast();
    });

    genBtn.addEventListener('click', createPassword);
    createPassword();
</script>
</body>
</html>
