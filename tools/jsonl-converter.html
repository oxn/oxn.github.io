<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>JSONL 转换器</title>
<style>
    :root {
        --primary: #10b981;
        --primary-light: #dcfce7;
        --header-bg: transparent;
        --warn: #f97316;
        --danger: #ef4444;
        --nav-btn-bg: #ffffff;
        --nav-btn-border: #e5e7eb;
        --nav-btn-text: #222222;
        --text-main: #222222;
        --text-secondary: #555555;
        --text-weak: #888888;
        --border-base: #e5e7eb;
        --border-light: #f3f4f6;
        --bg-page: #ffffff;
        --bg-card: #ffffff;
        --bg-btn: #ffffff;
        --shadow-sm: 0 1px 3px rgba(0,0,0.06);
        --shadow-lg: 0 6px 16px rgba(0,0.1);
        --radius-sm: 6px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --radius-full: 999px;
        --space-xs: 6px;
        --space-sm: 10px;
        --space-md: 14px;
        --space-lg: 16px;
        --transition: all 0.22s ease;
        --body-font-size: 16px;
        --desktop-font-ratio: 0.85;
        --content-max-width: 1200px;
        --nav-line-height: 38px;
        --theme-btn-width: 36px;
    }
    html[data-theme="dark"] {
        --primary: #10b981;
        --primary-light: rgba(16, 185, 129, 0.15);
        --nav-btn-bg: #1f2937;
        --nav-btn-border: #374151;
        --nav-btn-text: #f3f4f6;
        --warn: #f97316;
        --text-main: #f1f5f9;
        --text-secondary: #cbd5e1;
        --text-weak: #94a3b8;
        --border-base: #334155;
        --bg-page: #0f172a;
        --bg-card: #1e293b;
        --bg-btn: #1e293b;
        --shadow-sm: 0 1px 3px rgba(0,0,0.2);
        --shadow-lg: 0 6px 16px rgba(0,0.35);
    }
    html {
        font-family: system-ui, "Microsoft YaHei", sans-serif;
        -webkit-font-smoothing: antialiased;
    }
    body {
        min-height: 100vh;
        background: var(--bg-page);
        display: flex;
        flex-direction: column;
        line-height: 1.5;
        font-size: var(--body-font-size);
        margin: 0;
        padding: 0;
        overflow-x: hidden;
    }
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        transition: var(--transition);
    }
    a {
        text-decoration: none;
        color: inherit;
    }
    button {
        font-family: inherit;
        font-size: inherit;
        border: none;
        background: transparent;
        cursor: pointer;
    }
    .container {
        max-width: var(--content-max-width);
        width: calc(100% - 48px);
        margin: 0 auto;
    }
    header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 99;
    }
    .header-inner {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 0;
    }
    .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--nav-btn-text);
        font-size: 12px;
        font-weight: 500;
        padding: 7px 10px;
        border-radius: var(--radius-lg);
        background: var(--nav-btn-bg);
        border: 1px solid var(--nav-btn-border);
        height: var(--nav-line-height);
    }
    .back-btn:hover {
        border-color: var(--primary);
        background: var(--primary-light);
        color: var(--primary);
    }
    .theme-switch-wrap {
        position: absolute;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
    }
    .header-btn-circle {
        width: var(--theme-btn-width);
        height: var(--theme-btn-width);
        border: 1px solid var(--nav-btn-border);
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: var(--nav-btn-bg);
        color: var(--nav-btn-text);
    }
    .header-btn-circle:hover {
        border-color: var(--primary);
        background: var(--primary-light);
        color: var(--primary);
    }
    .header-spacer {
        width: 100%;
        height: 60px;
    }
    main.container {
        margin-top: 12px;
        padding-bottom: 60px;
    }
    .page-head {
        text-align: center;
        margin: 20px 0 30px;
    }
    .page-head h1 {
        font-size: calc(30px * var(--desktop-font-ratio));
        margin-bottom: 12px;
        color: var(--text-main);
    }
    .blue-tip {
        color: #3b82f6;
        font-size: calc(18px * var(--desktop-font-ratio));
        margin-bottom: 10px;
    }
    .desc-text {
        color: var(--text-weak);
        font-size: calc(15px * var(--desktop-font-ratio));
    }
    .card-box {
        background: var(--bg-card);
        border: 1px solid var(--border-base);
        border-radius: var(--radius-lg);
        padding: 24px;
        box-shadow: var(--shadow-sm);
    }
    .mode-row {
        display: flex;
        gap: 20px;
        align-items: center;
        margin-bottom: 20px;
        flex-wrap: wrap;
    }
    .mode-item {
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .input-block {
        margin-bottom: 16px;
    }
    .input-label {
        display: block;
        color: var(--text-main);
        margin-bottom: 8px;
        font-weight: 500;
    }
    textarea {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid var(--border-base);
        border-radius: var(--radius-sm);
        background: var(--bg-btn);
        color: var(--text-main);
        font-family: Consolas, monospace;
        outline: none;
        resize: vertical;
        min-height: 140px;
    }
    textarea:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(16,185,129,0.15);
    }
    .btn-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 20px;
    }
    .op-btn {
        height: 44px;
        padding: 0 18px;
        border: 1px solid var(--border-base);
        border-radius: var(--radius-sm);
        background: var(--bg-btn);
        color: var(--text-main);
        white-space: nowrap;
    }
    .op-btn.primary {
        border-color: var(--primary);
        background: var(--primary-light);
        color: var(--primary);
    }
    .op-btn.warn {
        color: #ef4444;
        border-color: #fecdd3;
    }
    .op-btn:hover {
        border-color: var(--primary);
        background: var(--primary-light);
        color: var(--primary);
    }
    .err-tip {
        color: #ef4444;
        margin: 8px 0;
        font-size: 14px;
        padding: 6px 10px;
        background: rgba(239,68,68,0.08);
        border-radius: var(--radius-sm);
    }
    /* 复制弹窗 */
    .toast-copy {
        position: fixed;
        top: 80px;
        left: 50%;
        transform: translateX(-50%) translateY(-20px);
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px 32px;
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        border-radius: 16px;
        box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
        z-index: 99999;
        opacity: 0;
        pointer-events: none;
        transition: all 0.3s ease;
        min-height: 72px;
    }
    .toast-copy.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }
    .toast-icon {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #22c55e;
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 22px;
        font-weight: bold;
    }
    .toast-text {
        font-size: 28px;
        color: #16a34a;
        font-weight: 500;
    }
    html[data-theme="dark"] .toast-copy {
        background: rgba(34, 197, 94, 0.12);
        border-color: rgba(34, 197, 94, 0.3);
    }
    html[data-theme="dark"] .toast-text {
        color: #4ade80;
    }
    @media (max-width: 640px) {
        .page-head h1 {font-size: 28px;}
        .toast-text {font-size: 20px;}
    }
    @media screen and (max-width:767px) and (orientation:portrait){
        .header-btn-circle{width:34px;height:34px;font-size:14px;}
    }
</style>
</head>
<body>
<header id="headerDom">
    <div class="container header-inner">
        <a href="index.html" class="back-btn">← 返回首页</a>
        <div class="theme-switch-wrap">
            <button id="themeToggle" class="header-btn-circle">🌙</button>
        </div>
    </div>
</header>
<div class="header-spacer" id="headerSpacer"></div>

<main class="container">
    <div class="page-head">
        <h1>JSONL 转换器</h1>
        <div class="blue-tip">JSON数组 ↔ JSONL 双向转换</div>
        <div class="desc-text">NDJSON日志格式互转，本地离线运算，逐行校验JSON语法</div>
    </div>

    <div class="card-box">
        <div class="mode-row">
            <label class="mode-item">
                <input type="radio" name="mode" value="json2jsonl" checked> JSON数组 → JSONL
            </label>
            <label class="mode-item">
                <input type="radio" name="mode" value="jsonl2json"> JSONL → JSON数组
            </label>
        </div>

        <div class="input-block">
            <label class="input-label">输入内容</label>
            <textarea id="inputText" rows="8" placeholder="JSON数组示例：
[
  {"id":1,"name":"张三"},
  {"id":2,"name":"李四"}
]
JSONL示例：
{"id":1,"name":"张三"}
{"id":2,"name":"李四"}"></textarea>
        </div>

        <div class="btn-row">
            <button class="op-btn primary" id="convertBtn">执行转换</button>
            <button class="op-btn primary" id="demoBtn">填充示例</button>
            <button class="op-btn warn" id="clearBtn">清空全部</button>
        </div>

        <div class="err-tip" id="errTip"></div>

        <div class="input-block">
            <label class="input-label">输出结果</label>
            <textarea id="outputText" readonly rows="8" placeholder="转换后的内容将展示在这里"></textarea>
        </div>

        <div class="btn-row">
            <button class="op-btn primary" id="copyBtn">复制输出结果</button>
        </div>
    </div>
</main>

<div class="toast-copy" id="copyToast">
    <div class="toast-icon">✓</div>
    <span class="toast-text">复制成功</span>
</div>

<script>
// 复制弹窗全局函数
const copyToast = document.getElementById('copyToast');
function showToast() {
    copyToast.classList.remove('show');
    setTimeout(() => copyToast.classList.add('show'), 10);
    setTimeout(() => copyToast.classList.remove('show'), 1800);
}
function copyStr(text) {
    const temp = document.createElement('textarea');
    temp.style.position = 'fixed';
    temp.style.left = '-99999px';
    temp.value = text;
    document.body.appendChild(temp);
    temp.select();
    document.execCommand('copy');
    document.body.removeChild(temp);
}

// 明暗主题切换
const htmlRoot = document.documentElement;
const themeBtn = document.getElementById("themeToggle");
const mediaDark = window.matchMedia('(prefers-color-scheme: dark)');
const STORAGE_KEY = "site_theme_mode";
function applyTheme(mode) {
    if(mode === 'dark'){
        htmlRoot.setAttribute('data-theme','dark');
        themeBtn.innerText = '☀️';
    }else{
        htmlRoot.removeAttribute('data-theme');
        themeBtn.innerText = '🌙';
    }
}
function initTheme() {
    const save = localStorage.getItem(STORAGE_KEY);
    if(save) applyTheme(save);
    else applyTheme(mediaDark.matches ? 'dark' : 'light');
}
function toggleTheme() {
    const now = htmlRoot.hasAttribute('data-theme') ? 'dark' : 'light';
    const next = now === 'dark' ? 'light' : 'dark';
    localStorage.setItem(STORAGE_KEY, next);
    applyTheme(next);
}
mediaDark.addEventListener('change', e=>{
    if(!localStorage.getItem(STORAGE_KEY)) applyTheme(e.matches ? 'dark' : 'light');
});
initTheme();
themeBtn.onclick = toggleTheme;

// 头部自适应高度
const headerDom = document.getElementById('headerDom');
const headerSpacer = document.getElementById('headerSpacer');
function syncHeaderHeight() {
    headerSpacer.style.height = headerDom.offsetHeight + 'px';
}
window.addEventListener('resize', syncHeaderHeight);
syncHeaderHeight();

// 返回按钮（新窗口历史判定）
document.querySelector('.back-btn').onclick = function(e){
    e.preventDefault();
    if(history.length <= 1){
        showToast("当前是新窗口，无历史页面可返回");
    }else{
        history.back();
    }
};

// 全部DOM元素正确绑定
const inputText = document.getElementById('inputText');
const outputText = document.getElementById('outputText');
const convertBtn = document.getElementById('convertBtn');
const demoBtn = document.getElementById('demoBtn');
const clearBtn = document.getElementById('clearBtn');
const copyBtn = document.getElementById('copyBtn');
const errTip = document.getElementById('errTip');
const modeRadios = document.querySelectorAll('input[name="mode"]');

// 两套示例文本
const demoJsonArr = `[
  {"id": 1, "name": "张三", "age": 26},
  {"id": 2, "name": "李四", "age": 22},
  {"id": 3, "name": "王五", "age": 30}
]`;
const demoJsonL = `{"id": 1, "name": "张三", "age": 26}
{"id": 2, "name": "李四", "age": 22}
{"id": 3, "name": "王五", "age": 30}`;

// 获取当前转换模式
function getCurrentMode() {
    for(let radio of modeRadios) {
        if(radio.checked) return radio.value;
    }
    return "json2jsonl";
}

// 填充示例按钮（修复之前绑定错误）
demoBtn.onclick = function() {
    errTip.textContent = "";
    outputText.value = "";
    const mode = getCurrentMode();
    if(mode === "json2jsonl") {
        inputText.value = demoJsonArr;
    } else {
        inputText.value = demoJsonL;
    }
};

// 清空全部按钮
clearBtn.onclick = function() {
    inputText.value = "";
    outputText.value = "";
    errTip.textContent = "";
};

// 转换逻辑：JSON数组 转 JSONL
function jsonArrayToJsonl(jsonStr) {
    const arr = JSON.parse(jsonStr);
    if(!Array.isArray(arr)) throw new Error("输入内容必须是标准JSON数组 []");
    return arr.map(item => JSON.stringify(item)).join("\n");
}

// 转换逻辑：JSONL 转 格式化JSON数组
function jsonlToJsonArray(jsonlRaw) {
    const lines = jsonlRaw.split("\n").map(s => s.trim()).filter(s);
    const resultArr = [];
    for(let i = 0; i < lines.length; i++) {
        try {
            const obj = JSON.parse(lines[i]);
            resultArr.push(obj);
        } catch (err) {
            throw new Error(`第${i+1}行JSON格式错误：${err.message}`);
        }
    }
    return JSON.stringify(resultArr, null, 2);
}

// 执行转换按钮
convertBtn.onclick = function() {
    errTip.textContent = "";
    outputText.value = "";
    const rawInput = inputText.value.trim();
    if(!rawInput) {
        errTip.textContent = "请输入需要转换的内容";
        return;
    }
    try {
        const mode = getCurrentMode();
        let output;
        if(mode === "json2jsonl") {
            output = jsonArrayToJsonl(rawInput);
        } else {
            output = jsonlToJsonArray(rawInput);
        }
        outputText.value = output;
    } catch (err) {
        errTip.textContent = "转换失败：" + err.message;
    }
};

// 复制结果按钮（修复复制失效）
copyBtn.onclick = function() {
    const content = outputText.value.trim();
    if(!content) return;
    copyStr(content);
    showToast();
};
</script>
</body>
</html>
