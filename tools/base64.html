<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Base64 编码解码工具</title>
    <style>
        :root {
            --primary: #10b981;
            --primary-light: #dcfce7;
            --header-bg: transparent;
            --warn: #f97316;
            --nav-btn-bg: #ffffff;
            --nav-btn-border: #e5e7eb;
            --nav-btn-text: #222222;
            --text-main: #222222;
            --text-secondary: #555555;
            --text-weak: #888888;
            --border-base: #e5e7eb;
            --border-light: #f3f4f6;
            --bg-page: #ffffff;
            --bg-card: #ffffff;
            --bg-btn: #ffffff;
            --bg-footer: #f0fdf4;
            --shadow-sm: 0 1px 3px rgba(0,0,0.06);
            --shadow-lg: 0 6px 16px rgba(0,0,0.1);
            --radius-xs: 4px;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-full: 999px;
            --space-xs: 6px;
            --space-sm: 10px;
            --space-md: 14px;
            --space-lg: 16px;
            --space-xl: 28px;
            --transition: all 0.22s ease;
            --key-bg: #e5e7eb;
            --key-text: #222;
            --key-radius: 6px;
            --key-shadow: 0 1px 2px rgba(0,0.15);
            --body-font-size: 16px;
            --desktop-font-ratio: 0.85;
            --title-line-height: 1.2;
            --sub-title-line-height: 1.25;
            --content-max-width: 1200px;
            --card-gap: 16px;
            --card-min-width: 300px;
            --header-safe-gap: 16px;
            --nav-line-height: 38px;
            --theme-btn-width: 36px;
        }
        html[data-theme="dark"] {
            --primary: #10b981;
            --primary-light: rgba(16, 185, 129, 0.15);
            --header-bg: transparent;
            --nav-btn-bg: #1f2937;
            --nav-btn-border: #374151;
            --nav-btn-text: #f3f4f6;
            --warn: #f97316;
            --text-main: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-weak: #94a3b8;
            --border-base: #334155;
            --border-light: #334155;
            --bg-page: #0f172a;
            --bg-card: #1e293b;
            --bg-btn: #1e293b;
            --bg-footer: #111827;
            --shadow-sm: 0 1px 3px rgba(0,0,0.2);
            --shadow-lg: 0 6px 16px rgba(0,0.35);
            --key-bg: #334155;
            --key-text: #f1f5f9;
        }
        html {
            font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", "PingFang SC", sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        body {
            min-height: 100%;
            background: var(--bg-page);
            display: flex;
            flex-direction: column;
            line-height: 1.5;
            font-size: calc(var(--body-font-size) * var(--desktop-font-ratio));
            overflow-x: hidden;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: var(--transition);
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        button {
            font-family: inherit;
            font-size: inherit;
            border: none;
            background: transparent;
            cursor: pointer;
        }
        .container {
            max-width: var(--content-max-width);
            width: calc(100% - 48px);
            margin: 0 auto;
        }
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 99;
            background: var(--header-bg);
            border-bottom: none;
        }
        .header-inner {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 0;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--nav-btn-text);
            font-size: 12px;
            font-weight: 500;
            padding: 7px 10px;
            border-radius: var(--radius-lg);
            background: var(--nav-btn-bg);
            border: 1px solid var(--nav-btn-border);
            height: var(--nav-line-height);
            flex-shrink: 0;
            cursor: pointer;
        }
        .back-btn:hover {
            border-color: var(--primary);
            background: var(--primary-light);
            color: var(--primary);
        }
        .page-title {
            display: none;
        }
        .theme-switch-wrap {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
        }
        .header-btn-circle {
            width: var(--theme-btn-width);
            height: var(--theme-btn-width);
            padding: 0;
            border: 1px solid var(--nav-btn-border);
            border-radius: 50%;
            font-size: calc(16px * var(--desktop-font-ratio));
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--nav-btn-bg);
            color: var(--nav-btn-text);
            flex-shrink: 0;
        }
        .header-btn-circle:hover {
            border-color: var(--primary);
            background: var(--primary-light);
            color: var(--primary);
        }
        .header-spacer {
            width: 100%;
            height: 60px;
            flex-shrink: 0;
        }
        main.container {
            margin-top: 12px;
            flex: 1;
            padding-bottom: 60px;
        }
        .page-head {
            text-align: center;
            margin: 20px 0 30px;
        }
        .page-head h1 {
            font-size: calc(36px * var(--desktop-font-ratio));
            margin-bottom: 12px;
            color: var(--text-main);
        }
        .page-head .blue-tip {
            color: #3b82f6;
            font-size: calc(18px * var(--desktop-font-ratio));
            margin-bottom: 10px;
        }
        .page-head .desc-text {
            color: var(--text-weak);
            font-size: calc(15px * var(--desktop-font-ratio));
        }
        .card-box {
            background: var(--bg-card);
            border: 1px solid var(--border-base);
            border-radius: var(--radius-lg);
            padding: 32px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 24px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .card-title {
            font-size: calc(22px * var(--desktop-font-ratio));
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 16px;
        }
        textarea, input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-base);
            border-radius: var(--radius-sm);
            background: var(--bg-btn);
            color: var(--text-main);
            font-size: calc(16px * var(--desktop-font-ratio));
            resize: vertical;
            outline: none;
            transition: var(--transition);
        }
        textarea:focus, input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(16,185,129,0.15);
        }
        .input-block {
            margin-bottom: 24px;
        }
        .input-label {
            display: block;
            color: var(--text-main);
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 16px;
        }
        .btn-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }
        .op-btn {
            height: 48px;
            padding: 0 24px;
            border: 1px solid var(--border-base);
            border-radius: var(--radius-sm);
            background: var(--bg-btn);
            color: var(--text-main);
            font-size: calc(16px * var(--desktop-font-ratio));
            white-space: nowrap;
        }
        .op-btn.primary {
            border-color: var(--primary);
            background: var(--primary-light);
            color: var(--primary);
        }
        .op-btn.warn {
            color: #ef4444;
            border-color: #fecdd3;
        }
        .op-btn:hover {
            border-color: var(--primary);
            background: var(--primary-light);
            color: var(--primary);
        }
        .op-btn.warn:hover {
            border-color: #ef4444;
            background: #fef2f2;
            color: #ef4444;
        }
        .info-card-section {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
            margin-top: 40px;
        }
        .info-card {
            background: var(--bg-card);
            border: 1px solid var(--border-base);
            border-radius: var(--radius-lg);
            padding: 18px 20px;
            box-shadow: var(--shadow-sm);
        }
        .info-card h3 {
            font-size: calc(20px * var(--desktop-font-ratio));
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 12px;
            line-height: 1.3;
        }
        .info-card p {
            font-size: calc(15px * var(--desktop-font-ratio));
            line-height: 1.7;
            color: var(--text-secondary);
        }
        /* 统一复制弹窗（全站通用规范） */
        .toast-copy {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 32px;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 16px;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
            z-index: 999999;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            min-height: 72px;
        }
        .toast-copy.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }
        .toast-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #22c55e;
            color: #fff;
            display: grid;
            place-items: center;
            font-size: 22px;
            font-weight: bold;
            flex-shrink: 0;
        }
        .toast-text {
            font-size: 16px;
            color: #16a34a;
            font-weight: 500;
            white-space: nowrap;
        }
        html[data-theme="dark"] .toast-copy {
            background: rgba(34, 197, 94, 0.12);
            border-color: rgba(34, 197, 94, 0.3);
        }
        html[data-theme="dark"] .toast-text {
            color: #4ade80;
        }
        @media (max-width: 640px) {
            body {
                font-size: var(--body-font-size);
            }
            .back-btn {
                font-size: 12px;
            }
            .header-btn-circle {
                font-size: 16px;
            }
            .page-head h1 {
                font-size: 28px;
            }
            .page-head .blue-tip {
                font-size: 18px;
            }
            .page-head .desc-text {
                font-size: 15px;
            }
            .info-card h3 {
                font-size: 18px;
            }
            .info-card p {
                font-size: 15px;
            }
            .op-btn {
                font-size: 16px;
                height: 46px;
            }
            .toast-icon {
                font-size: 16px;
            }
            .toast-text {
                font-size: 16px;
            }
            .btn-row {
                flex-wrap: wrap;
            }
            .info-card-section {
                grid-template-columns: 1fr;
            }
            .card-box {
                padding: 24px 20px;
            }
        }
        @media screen and (max-width:767px) and (orientation:portrait){
            .header-btn-circle{
                width:34px;
                height:34px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
<header id="headerDom">
    <div class="container header-inner">
        <!-- 修改：移除a链接，改为div按钮，文字统一← 返回 -->
        <div class="back-btn" id="backHome">← 返回</div>
        <div class="theme-switch-wrap">
            <button id="themeToggle" class="header-btn-circle">🌙</button>
        </div>
    </div>
</header>
<div class="header-spacer" id="headerSpacer"></div>

<main class="container">
    <div class="page-head">
        <h1>Base64 编码解码工具</h1>
        <div class="blue-tip">支持文本一键Base64加密、解密，自动处理中文</div>
        <div class="desc-text">兼容URL安全Base64，复制结果、一键清空</div>
    </div>

    <div class="card-box">
        <div class="btn-row">
            <button class="op-btn primary" id="encodeBtn">编码(文本→Base64)</button>
            <button class="op-btn primary" id="decodeBtn">解码(Base64→文本)</button>
            <button class="op-btn warn" id="clearAll">清空全部</button>
        </div>
        <div class="input-block">
            <label class="input-label">原始文本 / Base64字符串</label>
            <textarea id="inputText" rows="6" placeholder="编码请输入普通文字；解码请粘贴Base64字符串，支持中文"></textarea>
        </div>
        <div class="input-block">
            <label class="input-label">输出结果</label>
            <textarea id="outputText" rows="6" readonly placeholder="转换结果将显示在这里"></textarea>
        </div>
        <div class="btn-row">
            <button class="op-btn primary" id="copyOutput">复制输出结果</button>
        </div>
    </div>

    <div class="info-card-section">
        <div class="info-card">
            <h3>什么是Base64</h3>
            <p>Base64是一种二进制转文本编码方式，常用于图片、二进制数据嵌入文本、接口传参、Cookie存储，不属于加密，仅编码转换。</p>
        </div>
        <div class="info-card">
            <h3>工具特性</h3>
            <p>自动兼容UTF-8中文，修复填充等号，支持标准Base64与URL安全格式互转，实时处理超长文本。</p>
        </div>
        <div class="info-card">
            <h3>使用提示</h3>
            <p>Base64可轻易反向解码，隐私密码不要仅用Base64保护，建议搭配MD5/SHA哈希使用。</p>
        </div>
    </main>

<div class="toast-copy" id="copyToast">
    <div class="toast-icon">✓</div>
    <span class="toast-text">复制成功</span>
</div>

<script>
    // 主题切换统一逻辑
    const htmlRoot = document.documentElement;
    const themeBtn = document.getElementById("themeToggle");
    const mediaDark = window.matchMedia('(prefers-color-scheme: dark)');
    const STORAGE_KEY = "site_theme_mode";
    function applyTheme(mode) {
        if (mode === "dark") {
            htmlRoot.setAttribute("data-theme", "dark");
            themeBtn.innerHTML = "☀️";
        } else {
            htmlRoot.removeAttribute("data-theme");
            themeBtn.innerHTML = "🌙";
        }
    }
    function initTheme() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) applyTheme(saved);
        else applyTheme(mediaDark.matches ? "dark" : "light");
    }
    function toggleTheme() {
        const current = htmlRoot.hasAttribute("data-theme") ? "dark" : "light";
        const next = current === "dark" ? "light" : "dark";
        localStorage.setItem(STORAGE_KEY, next);
        applyTheme(next);
    }
    mediaDark.addEventListener("change", e => {
        if (!localStorage.getItem(STORAGE_KEY)) applyTheme(e.matches ? "dark" : "light");
    });
    initTheme();
    themeBtn.onclick = toggleTheme;

    // 头部自适应
    const headerDom = document.getElementById('headerDom');
    const headerSpacer = document.getElementById('headerSpacer');
    function syncHeaderHeight() {
        headerSpacer.style.height = headerDom.offsetHeight + "px";
    }
    window.addEventListener('resize', syncHeaderHeight);
    syncHeaderHeight();

    // 弹窗
    const copyToast = document.getElementById('copyToast');
    let toastTimer = null;
    // 统一稳定弹窗动画（requestAnimationFrame双层渲染，和全站工具一致）
    function showToast() {
        clearTimeout(toastTimer);
        copyToast.classList.remove('show');
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                copyToast.classList.add('show');
            });
        });
        toastTimer = setTimeout(() => copyToast.classList.remove('show'), 1800);
    }
    // 全兼容复制函数（安全域clipboard优先，兜底textarea）
    function copyStr(str) {
        return new Promise((resolve) => {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(str).then(() => resolve(true)).catch(() => fallbackCopy(str, resolve));
            } else {
                fallbackCopy(str, resolve);
            }
        });
    }
    function fallbackCopy(text, resolve) {
        const temp = document.createElement('textarea');
        temp.style.position = 'fixed';
        temp.style.left = '-9999px';
        temp.style.top = '-9999px';
        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand('copy');
        document.body.removeChild(temp);
        resolve(true);
    }

    // Base64 编码解码核心（兼容中文UTF8）
    function utf8ToBase64(str) {
        return btoa(unescape(encodeURIComponent(str)));
    }
    function base64ToUtf8(b64) {
        try {
            b64 = b64.replace(/-/g, '+').replace(/_/g, '/');
            const pad = 4 - (b64.length % 4);
            if (pad !== 4) b64 += '='.repeat(pad);
            return decodeURIComponent(escape(atob(b64)));
        } catch (e) {
            return "解码失败：无效Base64字符串";
        }
    }

    // DOM元素
    const inputText = document.getElementById('inputText');
    const outputText = document.getElementById('outputText');
    const encodeBtn = document.getElementById('encodeBtn');
    const decodeBtn = document.getElementById('decodeBtn');
    const clearAll = document.getElementById('clearAll');
    const copyOutput = document.getElementById('copyOutput');
    const backHome = document.getElementById('backHome');

    // 返回按钮原生浏览器后退逻辑
    backHome.onclick = () => {
        history.back();
    };

    // 编码
    encodeBtn.onclick = () => {
        const val = inputText.value.trim();
        if (!val) return;
        outputText.value = utf8ToBase64(val);
    }
    // 解码
    decodeBtn.onclick = () => {
        const val = inputText.value.trim();
        if (!val) return;
        outputText.value = base64ToUtf8(val);
    }
    // 清空（修复原代码input拼写错误bug）
    clearAll.onclick = () => {
        inputText.value = "";
        outputText.value = "";
    }
    // 复制结果（异步调用统一复制函数+弹窗）
    copyOutput.onclick = async () => {
        const val = outputText.value.trim();
        if (!val) return;
        await copyStr(val);
        showToast();
    }
</script>
</body>
</html>
