<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cytools-html</title>
  <style>
    /* ====================== 1. 全局CSS变量配置区（统一控制全站尺寸/颜色/动画，修改此处全局同步生效） ====================== */
    :root {
      /* 主题色彩 */
      --primary: #3b82f6;
      /* 主蓝色，激活标签、选中高亮 */
      --primary-light: rgba(59, 130, 246, 0.08);
      /* 主色浅透明背景 */
      --nav-blur: 24px;
      --warn: #f59e0b;
      /* 警告/收藏星星黄色 */

      /* 悬浮浮动动画参数 */
      --glass-blur: 14px;
      /* 玻璃毛玻璃模糊度 */
      --float-up: -4px;
      /* hover上浮距离 */
      --float-down: 0px;
      /* 点击按压下沉距离 */
      --float-shadow-up: 0 14px 40px rgba(0, 0, 0, 0.12);
      /* 上浮阴影 */
      --float-shadow-down: 0 2px 6px rgba(0, 0, 0, 0.05);
      /* 按压阴影 */

      /* 按钮圆角、阴影 */
      --btn-radius: 10px;
      /* 所有分类标签、通用按钮圆角 */
      --btn-active-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
      /* 按钮点击阴影 */

      /* 顶部导航小按钮尺寸 */
      --nav-btn-height: 28px;
      --nav-btn-font-size: 12px;

      /* 文字层级颜色 */
      --text-main: #1f2937;
      /* 主要正文文字 */
      --text-secondary: #606266;
      /* 次要描述文字 */
      --text-weak: #909399;
      /* 弱化辅助文字（占位、计数） */
      --border-light-fill: rgba(242, 243, 245, 0.85);
      --bg-page: transparent;
      --shadow-float: var(--float-shadow-up);
      --tag-shadow: none;
      --tag-hover-shadow: var(--float-shadow-up);
      --tag-active-border: #3b82f6;
      --tag-active-text: #1f2937;

      /* 统一圆角规格体系 */
      --radius-xs: 4px;
      /* 极小圆角（卡片内小标签、快捷键按键） */
      --radius-sm: 6px;
      /* 小号圆角（logo图标、小字标签） */
      --radius-lg: 14px;
      /* 大号圆角（头部、搜索框、工具卡片、页脚） */
      --radius-full: 999px;
      /* 完全圆形（主题切换按钮、收藏悬浮按钮） */

      /* 间距统一规范 */
      --space-xs: 6px;
      --space-sm: 6px;
      --space-md: 14px;
      --space-lg: 18px;
      --space-xl: 12px;

      /* 全局过渡动画统一时长 */
      --transition: all 0.22s ease;
      --key-radius: 4px;
      /* 搜索框Ctrl/K快捷键小按键圆角 */

      /* 文字排版基础 */
      --body-font-size: 16px;
      --body-line-height: 1.7;
      --title-line-height: 1.3;
      --sub-title-line-height: 1.1;

      /* 页面布局限制 */
      --content-max-width: 1100px;
      /* 页面内容最大宽度 */
      --card-gap: 12px;
      /* 工具卡片之间间距 */
      --card-min-width: 300px;
      /* 卡片最小宽度，自适应网格 */
      --theme-btn-width: 32px;
      /* 右上角明暗切换圆形按钮宽度 */
    }

    /* ====================== 暗色模式变量覆盖区（dark类挂载后自动替换色彩） ====================== */
    .dark {
      --primary: #60a5fa;
      --primary-light: rgba(96, 165, 250, 0.12);
      --btn-active-shadow: 0 2px 12px rgba(0, 0, 0, 0.16);

      --text-main: #e5e7eb;
      --text-secondary: #a0aec0;
      --text-weak: #718096;
      --border-light-fill: rgba(44, 55, 80, 0.85);
      --bg-page: transparent;
      --shadow-float: var(--float-shadow-up);
      --tag-shadow: none;
      --tag-hover-shadow: var(--float-shadow-up);
      --tag-active-border: #60a5fa;
      --tag-active-text: #ffffff;
    }

    /* ====================== 全局基础重置样式（清除浏览器默认边距、盒模型统一） ====================== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: var(--transition);
    }

    html {
      font-size: var(--body-font-size);
    }

    html,
    body {
      min-height: 100vh;
      background: var(--bg-page);
      color: var(--text-main);
    }

    body {
      min-height: 100vh;
      width: 100%;
      margin: 0;
      padding: 0;
      background-image: var(--bg-gradient-base);
      /* 页面渐变背景，JS动态赋值 */
      background-attachment: fixed;
      background-size: 100vw 100vh;
      background-position: center;
      background-repeat: no-repeat;
      transition: background-image 0.4s ease;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    button {
      font-family: inherit;
      font-size: inherit;
      border: none;
      background: transparent;
      cursor: pointer;
    }

    /* 内容居中容器，全站统一宽度限制 */
    .container {
      max-width: var(--content-max-width);
      width: calc(100% - 40px);
      margin: 0 auto;
    }

    /* ====================== 顶部固定Header头部栏（玻璃悬浮导航栏） ====================== */
    header {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      width: min(100% - 32px, var(--content-max-width));
      z-index: 99;
      /* 最高层级，浮在页面上方 */
      background: rgba(255, 255, 255, 0.11);
      backdrop-filter: blur(var(--glass-blur)) saturate(140%);
      -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(140%);
      /* 分层玻璃边框：上亮下暗模拟玻璃厚度 */
      border-top: 1px solid rgba(255, 255, 255, 0.22);
      border-left: 1px solid rgba(255, 255, 255, 0.14);
      border-right: 1px solid rgba(0, 0, 0, 0.04);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
      border-radius: var(--radius-lg);
    }

    .dark header {
      background: rgba(22, 28, 42, 0.16);
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      border-left: 1px solid rgba(255, 255, 255, 0.06);
      border-right: 1px solid rgba(0, 0, 0, 0.15);
      border-bottom: 1px solid rgba(0, 0, 0, 0.18);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    /* Header内部弹性布局容器 */
    .header-inner {
      position: relative;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px 16px;
      padding: 14px 16px;
      padding-right: calc(var(--theme-btn-width) + 24px);
      /* 预留右侧主题切换按钮位置 */
      width: 100%;
    }

    /* Logo整体容器（图标+文字） */
    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    /* Logo图标容器 */
    .logo-icon {
      width: 42px;
      height: 42px;
      border-radius: var(--radius-sm);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      flex-shrink: 0;
      color: var(--text-main);
    }

    /* Logo文字区：主标题+副标题 */
    .logo-text h1 {
      font-size: clamp(20px, 2.5vw, 28px);
      /* 自适应响应式字号 */
      font-weight: 600;
      line-height: var(--title-line-height);
      white-space: nowrap;
      color: var(--text-main);
    }

    .logo-text p {
      font-size: clamp(11px, 1.2vw, 14px);
      margin-top: 3px;
      line-height: 1.1;
      color: var(--text-weak);
      white-space: nowrap;
    }

    /* 头部右侧按钮组容器 */
    .nav-link-group {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 4px;
      min-width: 220px;
    }

    /* 头部普通小按钮（玻璃样式） */
    .header-btn {
      padding: 4px 8px;
      border-radius: 6px;
      font-size: var(--nav-btn-font-size);
      font-weight: 550;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 3px;
      white-space: nowrap;
      background: rgba(255, 255, 255, 0.11);
      backdrop-filter: blur(var(--glass-blur)) saturate(140%);
      -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(140%);
      border-top: 1px solid rgba(255, 255, 255, 0.22);
      border-left: 1px solid rgba(255, 255, 255, 0.14);
      border-right: 1px solid rgba(0, 0, 0, 0.04);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
      flex-shrink: 0;
      min-width: fit-content;
      height: var(--nav-btn-height);
      transform-origin: center;
    }

    .dark .header-btn {
      background: rgba(22, 28, 42, 0.16);
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      border-left: 1px solid rgba(255, 255, 255, 0.06);
      border-right: 1px solid rgba(0, 0, 0, 0.15);
      border-bottom: 1px solid rgba(0, 0, 0, 0.18);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      color: var(--text-main);
    }

    .header-btn:hover {
      transform: translateY(var(--float-up));
      border-top-color: rgba(255, 255, 255, 0.32);
      box-shadow: var(--float-shadow-up);
    }

    .dark .header-btn:hover {
      border-top-color: rgba(255, 255, 255, 0.16);
    }

    .header-btn:active {
      transform: translateY(var(--float-down));
      box-shadow: var(--btn-active-shadow);
    }

    /* 右上角主题切换按钮容器 */
    .theme-switch-wrap {
      position: absolute;
      top: 50%;
      right: 16px;
      transform: translateY(-50%);
    }

    /* 圆形明暗切换按钮 */
    .header-btn-circle {
      width: var(--theme-btn-width);
      height: var(--theme-btn-width);
      padding: 0;
      border-radius: 50%;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.11);
      backdrop-filter: blur(var(--glass-blur)) saturate(140%);
      -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(140%);
      border-top: 1px solid rgba(255, 255, 255, 0.22);
      border-left: 1px solid rgba(255, 255, 255, 0.14);
      border-right: 1px solid rgba(0, 0, 0, 0.04);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
      flex-shrink: 0;
      transform-origin: center;
      color: var(--text-main);
    }

    .dark .header-btn-circle {
      background: rgba(22, 28, 42, 0.16);
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      border-left: 1px solid rgba(255, 255, 255, 0.06);
      border-right: 1px solid rgba(0, 0, 0, 0.15);
      border-bottom: 1px solid rgba(0, 0, 0, 0.18);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .header-btn-circle:hover {
      transform: translateY(var(--float-up));
      border-top-color: rgba(255, 255, 255, 0.32);
      box-shadow: var(--float-shadow-up);
    }

    .dark .header-btn-circle:hover {
      border-top-color: rgba(255, 255, 255, 0.16);
    }

    .header-btn-circle:active {
      transform: translateY(var(--float-down));
      box-shadow: var(--btn-active-shadow);
    }

    /* 移动端竖屏头部适配 */
    @media screen and (max-width: 767px) and (orientation: portrait) {
      header {
        width: calc(100% - 24px);
        top: 12px;
      }

      .header-btn-circle {
        width: 32px;
        height: 32px;
        font-size: 13px;
      }
    }

    /* ====================== 主内容区域main容器 ====================== */
    main.container {
      flex: 1;
      padding-top: 2px;
    }

    /* ====================== 搜索栏整体容器（搜索框+排序按钮） ====================== */
    .search-wrap {
      padding: 0px 0 8px 0;
      display: flex;
      gap: var(--space-sm);
      align-items: center;
    }

    /* 搜索输入框外层玻璃容器 */
    .search-box {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 0 16px;
      height: 40px;
      /* 搜索栏整体高度，可调 */
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.11);
      backdrop-filter: blur(var(--glass-blur)) saturate(140%);
      -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(140%);
      border-top: 1px solid rgba(255, 255, 255, 0.22);
      border-left: 1px solid rgba(255, 255, 255, 0.14);
      border-right: 1px solid rgba(0, 0, 0, 0.04);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
      gap: 10px;
      min-width: 0;
      position: relative;
      transition: border 0.22s ease, box-shadow 0.22s ease, transform 0.22s ease;
    }

    .dark .search-box {
      background: rgba(22, 28, 42, 0.16);
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      border-left: 1px solid rgba(255, 255, 255, 0.06);
      border-right: 1px solid rgba(0, 0, 0, 0.15);
      border-bottom: 1px solid rgba(0, 0, 0, 0.18);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    /* 搜索框聚焦高亮边框 */
    .search-box:focus-within {
      border-left-color: rgba(59, 130, 246, 0.22);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.28), var(--float-shadow-up) !important;
    }

    .search-box:hover {
      border-top-color: rgba(255, 255, 255, 0.32);
      transform: translateY(var(--float-up));
      box-shadow: var(--float-shadow-up);
    }

    .dark .search-box:hover {
      border-top-color: rgba(255, 255, 255, 0.16);
    }

    .search-box:active {
      transform: translateY(var(--float-down));
      box-shadow: var(--btn-active-shadow);
    }

    /* 搜索框左侧放大镜图标 */
    .search-icon {
      font-size: 17px;
      color: var(--text-weak);
      flex-shrink: 0;
    }

    /* 搜索输入框原生input */
    #searchInput {
      flex: 1;
      height: 100%;
      border: none;
      outline: none;
      font-size: 14px;
      /* 输入文字大小 */
      line-height: 1;
      background: transparent !important;
      color: var(--text-main);
      min-width: 0;
      padding-right: 55px;
      /* 预留右侧快捷键区域宽度 */
      box-shadow: none !important;
    }

    #searchInput::placeholder {
      color: var(--text-weak);
    }

    /* 关闭浏览器自动填充底色 */
    #searchInput:-webkit-autofill,
    #searchInput:-webkit-autofill:hover,
    #searchInput:-webkit-autofill:focus {
      box-shadow: 0 0 0 1000px transparent inset !important;
      -webkit-text-fill-color: var(--text-main) !important;
      transition: background-color 9999s ease 0s;
    }

    /* 文字选中样式 */
    #searchInput::selection,
    #searchInput::-webkit-selection {
      background: transparent !important;
      color: var(--primary) !important;
    }

    /* 搜索框右侧快捷键提示容器（Ctrl + K） */
    .search-key-hint {
      position: absolute;
      right: 10px;
      display: flex;
      gap: 6px;
      user-select: none;
      pointer-events: none;
      z-index: 2;
    }

    /* 快捷键小按键样式 */
    .key-tag {
      font-size: 12px;
      line-height: 1;
      padding: 0 5px;
      height: 14px;
      /* 按键高度 */
      display: inline-flex;
      align-items: center;
      color: var(--text-main);
      background: rgba(255, 255, 255, 0.11);
      border-radius: var(--key-radius);
      font-weight: 500;
      white-space: nowrap;
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border-top: 1px solid rgba(255, 255, 255, 0.22);
      border-left: 1px solid rgba(255, 255, 255, 0.14);
      border-right: 1px solid rgba(0, 0, 0, 0.04);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }

    .dark .key-tag {
      background: rgba(22, 28, 42, 0.16);
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      border-left: 1px solid rgba(255, 255, 255, 0.06);
      border-right: 1px solid rgba(0, 0, 0, 0.15);
      border-bottom: 1px solid rgba(0, 0, 0, 0.18);
    }

    /* 搜索栏右侧排序按钮 */
    .sort-btn {
      height: 40px;
      padding: 0 16px;
      border-radius: var(--btn-radius);
      background: rgba(255, 255, 255, 0.11);
      backdrop-filter: blur(var(--glass-blur)) saturate(140%);
      -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(140%);
      border-top: 1px solid rgba(255, 255, 255, 0.22);
      border-left: 1px solid rgba(255, 255, 255, 0.14);
      border-right: 1px solid rgba(0, 0, 0, 0.04);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
      font-size: 14px;
      font-weight: 600;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      white-space: nowrap;
      color: var(--text-main);
      flex-shrink: 0;
      transform-origin: center;
    }

    .dark .sort-btn {
      background: rgba(22, 28, 42, 0.16);
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      border-left: 1px solid rgba(255, 255, 255, 0.06);
      border-right: 1px solid rgba(0, 0, 0, 0.15);
      border-bottom: 1px solid rgba(0, 0, 0, 0.18);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .sort-btn:hover {
      border-top-color: rgba(255, 255, 255, 0.32);
      transform: translateY(var(--float-up));
      box-shadow: var(--float-shadow-up);
    }

    .dark .sort-btn:hover {
      border-top-color: rgba(255, 255, 255, 0.16);
    }

    .sort-btn:active {
      transform: translateY(var(--float-down));
      box-shadow: var(--btn-active-shadow);
    }

    /* ====================== 分类标签栏模块（全部/收藏/开发工具 按钮区域） ====================== */
    .category-wrap {
      padding-bottom: 14px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    /* 可见标签单行容器（第一行展示的标签+更多按钮） */
    .category-visible-row {
      display: flex;
      align-items: center;
      gap: 8px;
      overflow: visible;
      position: relative;
    }

    /* 可见标签流式容器 */
    .tag-flow-box {
      display: flex;
      gap: 8px;
      flex: 1;
      min-width: 0;
      padding-block: 4px;
      /* 上下内边距，hover上浮预留空间 */
      overflow: visible;
    }

    /* 分类标签通用样式（显示标签 + 展开隐藏面板内标签共用） */
    .category-tag,
    .more-toggle-btn {
      flex-shrink: 0;
      padding: 6px 8px;
      /* 按钮内边距，控制宽高 */
      border-radius: var(--btn-radius);
      /* 圆角统一由--btn-radius控制 */
      font-size: 14px;
      /* 按钮文字大小 */
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      /* 图标与文字间距 */
      white-space: nowrap;
      background: rgba(255, 255, 255, 0.11);
      backdrop-filter: blur(var(--glass-blur)) saturate(140%);
      -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(140%);
      border-top: 1px solid rgba(255, 255, 255, 0.22);
      border-left: 1px solid rgba(255, 255, 255, 0.14);
      border-right: 1px solid rgba(0, 0, 0, 0.04);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
      color: var(--text-main);
      transform-origin: center;
    }

    .dark .category-tag,
    .dark .more-toggle-btn {
      background: rgba(22, 28, 42, 0.16);
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      border-left: 1px solid rgba(255, 255, 255, 0.06);
      border-right: 1px solid rgba(0, 0, 0, 0.15);
      border-bottom: 1px solid rgba(0, 0, 0, 0.18);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    /* 标签选中激活状态 */
    .category-tag.active {
      border-top: 1px solid rgba(255, 255, 255, 0.06) !important;
      border-left-color: rgba(59, 130, 246, 0.22);
      color: var(--tag-active-text);
      background: var(--primary-light);
      font-weight: 700;
    }

    .dark .category-tag.active {
      border-top: 1px solid rgba(255, 255, 255, 0.03) !important;
    }

    /* 标签hover悬浮上浮 */
    .category-tag:hover,
    .more-toggle-btn:hover {
      border-top-color: rgba(255, 255, 255, 0.32);
      transform: translateY(var(--float-up));
      box-shadow: var(--float-shadow-up);
    }

    .dark .category-tag:hover,
    .dark .more-toggle-btn:hover {
      border-top-color: rgba(255, 255, 255, 0.16);
    }

    /* 标签点击按压下沉 */
    .category-tag:active,
    .more-toggle-btn:active {
      transform: translateY(var(--float-down));
      box-shadow: var(--btn-active-shadow);
    }

    /* 更多/收起切换按钮 固定宽度 */
    .more-toggle-btn {
      width: 84px;
      justify-content: center;
      visibility: visible !important;
      opacity: 1 !important;
    }

    /* 折叠隐藏标签面板（点击更多展开） */
    .overflow-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      row-gap: 6px;
      /* 多行标签上下间距，与上方tag-flow-box区分，视觉会偏小根源 */
      margin-top: 0;
      height: 0;
      overflow: hidden;
      opacity: 0;
      visibility: hidden;
      transition: height 0.18s ease, opacity 0.18s ease, visibility 0.18s ease, margin-top 0.18s ease;
      pointer-events: none;
    }

    /* 展开激活状态 */
    .overflow-panel.open {
      height: auto;
      margin-top: 8px;
      /* 展开后与上方标签间距 */
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      overflow: visible;
    }

    /* 无工具空提示文字 */
    .empty-tip {
      text-align: center;
      padding: 80px 0;
      font-size: var(--body-font-size);
      color: var(--text-weak);
    }

    /* ====================== 工具卡片网格布局 ====================== */
    .tool-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(var(--card-min-width), 1fr));
      gap: var(--card-gap);
    }

    /* 大屏3列布局 */
    @media (min-width: 1200px) {
      .tool-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    /* 中屏2列布局 */
    @media (max-width: 860px) {
      .tool-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    /* 手机单栏布局，搜索栏自动换行 */
    @media (max-width: 640px) {
      .tool-grid {
        grid-template-columns: 1fr;
      }

      .search-wrap {
        flex-wrap: wrap;
      }

      .search-box,
      .sort-btn {
        width: 100%;
      }
    }

    /* 单个工具卡片玻璃容器 */

      display: flex;
      flex-direction: column;
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      background: rgba(255, 255, 255, 0.11);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));

      border-left: 1px solid rgba(255, 255, 255, 0.14);
      border-right: 1px solid rgba(0, 0, 0, 0.04);
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.08),
        inset 0 1px 0 rgba(255, 255, 255, 0.18);
      position: relative;
      min-width: 0;
      cursor: pointer;
      transform-origin: center;
      transition: all 0.22s ease;
    }

    .dark .tool-card {
      background: rgba(22, 28, 42, 0.16);
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      border-left: 1px solid rgba(255, 255, 255, 0.06);
      border-right: 1px solid rgba(0, 0, 0, 0.15);
      border-bottom: 1px solid rgba(0, 0, 0, 0.18);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
    }

    .tool-card:hover {
      transform: translateY(-4px);
      border-top-color: rgba(255, 255, 255, 0.32);
      box-shadow:
        0 14px 40px rgba(0, 0, 0, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.24);
    }

    .dark .tool-card:hover {
      border-top-color: rgba(255, 255, 255, 0.16);
      box-shadow:
        0 14px 40px rgba(0, 0, 0, 0.36),
        inset 0 1px 0 rgba(255, 255, 255, 0.12);

      transform: translateY(0);
      box-shadow: var(--btn-active-shadow);
    }

      background: transparent;
      color: var(--text-main);
    }

    .tool-card::after {
      content: "⮕";
      position: absolute;
      right: var(--space-lg);
      bottom: var(--space-lg);
      font-size: 18px;
      color: var(--text-weak);
      opacity: 0;
      transition: opacity 0.18s ease;
      pointer-events: none;
      font-weight: normal;
    }

    .tool-card:hover::after {
      opacity: 1;
    }

      position: absolute;
      top: -12px;
      right: -12px;

    }

      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 8px;
      min-width: 0;
      padding-left: 0;

      height: 44px;

      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      background: transparent;
      color: var(--text-main);
      flex-shrink: 0;
      position: relative;
      border: 1px solid rgba(180, 190, 200, 0.65);

      gap: 1px;
      min-width: 0;

      line-height: var(--sub-title-line-height);

      text-overflow: ellipsis;
      display: -webkit-box;
      display: box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-meta {

      flex-direction: column;
      align-items: flex-start;
      gap: 2px;
      font-size: 13px;
      line-height: 1.3;
      color: var(--text-weak);

      text-overflow: ellipsis;

      display: box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      box-orient: vertical;
      overflow: hidden;
      text-overflow: ellipsis;

      transform-origin: center center;

      transition: transform 0.18s ease, opacity 0.18s ease;
      z-index: 3;
      opacity: 0;
      visibility: hidden;

    .dark .fav-star-fixed {

    .tool-card:hover .fav-star-fixed {

    }

    .fav-star-fixed:hover {
      transform: translateY(var(--float-up));
    }

    .fav-star-fixed:active {
      transform: translateY(var(--float-down));
    }

    .fav-star-fixed svg {
      width: 16px;
      height: 16px;
    }

    /* ====================== 页面底部Footer区域 ====================== */
    footer {
      width: min(100% - 32px, var(--content-max-width));
      margin: var(--space-xl) auto 18px;

      border-radius: var(--radius-lg);
      font-size: 13px;
      line-height: 1.1;

      backdrop-filter: blur(var(--glass-blur)) saturate(140%);

      border-top: 1px solid rgba(255, 255, 255, 0.22);

      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.08),

    }

    .dark footer {
      background: rgba(22, 28, 42, 0.16);
      border-top: 1px solid rgba(255, 255, 255, 0.12);
      border-left: 1px solid rgba(255, 255, 255, 0.06);

    footer .container {

    }

    /* ====================== 全局文字选中样式（统一透明底色+蓝色文字） ====================== */
    ::selection {
      background: transparent;
      color: var(--primary);
    }

    ::-moz-selection {
      background: transparent;
      color: var(--primary);
    }
  </style>
</head>

    // 随机径向椭圆光斑，黄色区域随机屏幕任意位置
    function randomBgGradient() {
      const themeMode = localStorage.getItem(STORAGE_KEY);
      const isDark = themeMode === "dark";

      // 光斑圆心坐标 5%~95% 全屏随机
      const x = (5 + Math.random() * 90).toFixed(2);
      const y = (5 + Math.random() * 90).toFixed(2);
      // 椭圆宽高随机，形成大小不一的椭圆扩散光斑
      const sizeX = (200 + Math.random() * 80).toFixed(2);
      const sizeY = (100 + Math.random() * 30).toFixed(2);

      let randomGrad;
      if (isDark) {
        // 深色径向渐变
        randomGrad = `radial-gradient(ellipse ${sizeX}% ${sizeY}% at ${x}% ${y}%, #111827 0%, #0f1318 45%, #0a0e12 100%)`;
      } else {
        // 浅色黄色椭圆向外扩散光斑
        randomGrad = `radial-gradient(ellipse ${sizeX}% ${sizeY}% at ${x}% ${y}%, #e9e9cc 0%, #b8e4ee 45%, #e6f2fb 100%)`;
      }
      document.documentElement.style.setProperty("--bg-gradient-base", randomGrad);
    }

    function setMainTopOffset() {
      const headerH = headerDom.getBoundingClientRect().height + 24;
      mainDom.style.marginTop = headerH + "px";
    }

    function applyTheme(mode) {
      if (mode === "dark") {
        bodyDom.classList.add("dark");
        themeBtn.innerHTML = "☀️";
      } else {
        bodyDom.classList.remove("dark");
        themeBtn.innerHTML = "🌙";
      }
      randomBgGradient();
    }

    function initTheme() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        applyTheme(saved);
      } else {
        applyTheme(mediaDark.matches ? "dark" : "light");
      }
    }

    function toggleTheme() {
      const isDark = bodyDom.classList.contains("dark");
      const next = isDark ? "light" : "dark";
      localStorage.setItem(STORAGE_KEY, next);
      applyTheme(next);
    }

    mediaDark.addEventListener("change", e => {
      if (!localStorage.getItem(STORAGE_KEY)) {
        applyTheme(e.matches ? "dark" : "light");

    });

    const visibleTagBox = document.getElementById("visibleTagBox");
    const overflowPanel = document.getElementById("overflowPanel");
    const moreToggle = document.getElementById("moreToggle");
    const cardContainer = document.getElementById("cardContainer");
    const searchInput = document.getElementById("searchInput");
    const sortBtn = document.getElementById('sortBtn');

    let currentCat = "all";
    let panelOpen = false;
    let sortMode = "date-desc";
    let favList = JSON.parse(localStorage.getItem("toolFav")) || [];

    function saveFavAndRefreshCount() {
      localStorage.setItem("toolFav", JSON.stringify(favList));
      refreshAllCategoryUI();
      filterTools();
    }

    function toggleFav(toolId) {
      const idx = favList.indexOf(toolId);
      if (idx > -1) favList.splice(idx, 1);
      else favList.push(toolId);
      saveFavAndRefreshCount();
    }

    function getAutoCategoryList() {
      const map = new Map();
      toolList.forEach(i => {
        if (!map.has(i.cat)) {
          map.set(i.cat, { cat: i.cat, name: i.catName, icon: i.catIcon });
        }
      });
      return Array.from(map.values());
    }

    function buildFullCategoryConfig() {
      const base = [
        { cat: "all", icon: "🏠", name: "全部" },
        { cat: "star", icon: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="#fbbf24"/></svg>`, name: "收藏" }
      ];
      return [...base, ...getAutoCategoryList()];
    }

    function getCatCount(key) {
      if (key === "all") return toolList.length;
      if (key === "star") return favList.length;
      return toolList.filter(i => i.cat === key).length;
    }

    function refreshAllCategoryUI() {
      const cats = buildFullCategoryConfig();
      visibleTagBox.innerHTML = "";
      overflowPanel.innerHTML = "";
      let visibleCategories = [];
      let overflowCategories = [];

      const tempWrap = document.createElement("div");
      tempWrap.style.cssText = "position:absolute;visibility:hidden;display:flex;gap:8px;white-space:nowrap;";
      document.body.appendChild(tempWrap);
      const boxWidth = visibleTagBox.clientWidth || 600;

      let totalW = 0;
      const tagArr = [];
      cats.forEach(cat => {
        const div = document.createElement("div");
        div.className = "category-tag";
        div.innerHTML = `${cat.icon} ${cat.name}(0)`;
        tempWrap.appendChild(div);
        const w = div.offsetWidth + 8;
        tagArr.push({ cat, width: w });
        tempWrap.removeChild(div);
      });
      document.body.removeChild(tempWrap);

      for (let i = 0; i < tagArr.length; i++) {
        const item = tagArr[i];
        if (totalW + item.width <= boxWidth) {
          visibleCategories.push(item.cat);
          totalW += item.width;
        } else {
          overflowCategories.push(item.cat);
        }
      }

      visibleCategories.forEach(cat => {
        const cnt = getCatCount(cat.cat);
        const div = document.createElement("div");
        div.className = `category-tag ${currentCat === cat.cat ? "active" : ""}`;
        div.innerHTML = `${cat.icon} ${cat.name}(${cnt})`;
        div.dataset.cat = cat.cat;
        div.onclick = () => setActiveCat(cat.cat);
        visibleTagBox.appendChild(div);
      });

      overflowCategories.forEach(cat => {
        const cnt = getCatCount(cat.cat);
        const div = document.createElement("div");
        div.className = `category-tag ${currentCat === cat.cat ? "active" : ""}`;
        div.innerHTML = `${cat.icon} ${cat.name}(${cnt})`;
        div.dataset.cat = cat.cat;
        div.onclick = () => setActiveCat(cat.cat);
        overflowPanel.appendChild(div);
      });

      moreToggle.style.display = overflowCategories.length > 0 ? "flex" : "none";
    }

    function setActiveCat(cat) {
      currentCat = cat;
      refreshAllCategoryUI();
      filterTools();
    }

    moreToggle.onclick = () => {
      panelOpen = !panelOpen;
      overflowPanel.classList.toggle("open", panelOpen);
      moreToggle.innerHTML = panelOpen ? "▲ 收起" : "▼ 更多";
    };

    function filterTools() {
      let arr = [...toolList];
      const kw = searchInput.value.toLowerCase().trim();
      if (currentCat === "star") arr = arr.filter(i => favList.includes(i.id));
      else if (currentCat !== "all") arr = arr.filter(i => i.cat === currentCat);
      if (kw) arr = arr.filter(i =>
        i.title.toLowerCase().includes(kw) ||
        i.desc.toLowerCase().includes(kw) ||
        i.cat.toLowerCase().includes(kw) ||
        i.tags.join("").toLowerCase().includes(kw)
      );
      arr.sort((a, b) => {
        const ta = a.top ? 1 : 0;
        const tb = b.top ? 1 : 0;
        if (tb - ta !== 0) return tb - ta;
        const da = new Date(a.date).getTime();
        const db = new Date(b.date).getTime();
        return sortMode === "date-desc" ? db - da : da - db;
      });
      renderTools(arr);
    }

    function renderTools(list) {
      cardContainer.innerHTML = "";
      if (!list.length) {
        cardContainer.innerHTML = `<div class="empty-tip">未找到匹配工具，尝试更换关键词或分类</div>`;
        return;
      }
      const starFill = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="#fbbf24"/></svg>`;
      const starEmpty = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" stroke="#9ca3af" stroke-width="1.5"/></svg>`;
      list.forEach(item => {
        const fav = favList.includes(item.id);
        const star = fav ? starFill : starEmpty;
        let topTag = "";
        if (item.top) topTag = `<span class="card-label label-top">置顶</span>`;
        else if (item.featured) topTag = `<span class="card-label label-featured">外链</span>`;
        const tagHtml = item.tags.map(t => `<span class="card-tag">${t}</span>`).join("");
        // 判断是否需要新开标签页
        const targetAttr = item.target === "_blank" ? 'target="_blank" rel="noopener noreferrer"' : '';

        const html = `
    <a href="${item.url}" ${targetAttr} class="tool-card" data-id="${item.id}">
      <button class="fav-star-fixed ${fav ? "fav" : ""}" onclick="toggleFav('${item.id}');event.preventDefault();">${star}</button>
      <div class="card-header">
        <div class="card-icon">${item.icon}${topTag}</div>
        <div class="card-title-wrap">
  <h3 class="card-title">${item.title}</h3>
  <div class="card-meta">
    <div>分类：${item.catName}</div>
    <div>更新日期：${item.date}</div>
  </div>
</div>
      </div>
      <p class="card-desc">${item.desc}</p>
      <div class="card-bottom">
        <div class="card-tags">${tagHtml}</div>
      </div>
    </a>`;
        // 修复：补全变量 cardContainer
        cardContainer.insertAdjacentHTML("beforeend", html);
      });
    }

    function debounce(fn, delay = 100) {
      let timer = null;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), delay);
      };
    }

    const handleResize = debounce(() => {
      panelOpen = false;
      overflowPanel.classList.remove("open");
      moreToggle.innerHTML = "▼ 更多";
      setMainTopOffset();
      refreshAllCategoryUI();
    });

    window.addEventListener("resize", handleResize);

    window.addEventListener("DOMContentLoaded", () => {
      initTheme();
      setMainTopOffset();
      refreshAllCategoryUI();
      filterTools();
    });

    searchInput.addEventListener("input", filterTools);

    sortBtn.onclick = () => {
      sortMode = sortMode === "date-desc" ? "date-asc" : "date-desc";
      sortBtn.innerText = sortMode === "date-desc" ? "时间排序 ⬇️" : "时间排序 ⬆️";
      filterTools();
    };

    document.addEventListener("keydown", e => {
      if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "k") {
        e.preventDefault();
        searchInput.focus();
      }
    });

    themeBtn.onclick = toggleTheme;
  </script>
