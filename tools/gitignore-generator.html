<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Gitignore 生成器</title>
<style>
    :root {
        --primary: #10b981;
        --primary-light: #dcfce7;
        --warn: #f97316;
        --danger: #ef4444;
        --nav-btn-bg: #ffffff;
        --nav-btn-border: #e5e7eb;
        --nav-btn-text: #222222;
        --text-main: #222222;
        --text-secondary: #555555;
        --text-weak: #888888;
        --border-base: #e5e7eb;
        --border-light: #f3f4f6;
        --bg-page: #ffffff;
        --bg-card: #ffffff;
        --bg-btn: #ffffff;
        --shadow-sm: 0 1px 3px rgba(0,0,0.06);
        --shadow-lg: 0 6px 16px rgba(0,0.1);
        --radius-sm: 6px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --radius-full: 999px;
        --space-xs: 6px;
        --space-sm: 10px;
        --space-md: 14px;
        --space-lg: 16px;
        --transition: all 0.22s ease;
        --body-font-size: 16px;
        --desktop-font-ratio: 0.85;
        --content-max-width: 1200px;
        --nav-line-height: 38px;
        --theme-btn-width: 36px;
    }
    html[data-theme="dark"] {
        --primary: #10b981;
        --primary-light: rgba(16, 185, 129, 0.15);
        --nav-btn-bg: #1f2937;
        --nav-btn-border: #374151;
        --nav-btn-text: #f3f4f6;
        --warn: #f97316;
        --text-main: #f1f5f9;
        --text-secondary: #cbd5e1;
        --text-weak: #94a3b8;
        --border-base: #334155;
        --border-light: #334155;
        --bg-page: #0f172a;
        --bg-card: #1e293b;
        --bg-btn: #1e293b;
        --shadow-sm: 0 1px 3px rgba(0,0,0.2);
        --shadow-lg: 0 6px 16px rgba(0,0.35);
    }
    html {
        font-family: system-ui, "Microsoft YaHei", sans-serif;
        -webkit-font-smoothing: antialiased;
    }
    body {
        min-height: 100vh;
        background: var(--bg-page);
        display: flex;
        flex-direction: column;
        line-height: 1.5;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
    }
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        transition: var(--transition);
    }
    a {
        text-decoration: none;
        color: inherit;
    }
    button {
        font-family: inherit;
        font-size: inherit;
        border: none;
        background: transparent;
        cursor: pointer;
    }
    .container {
        max-width: var(--content-max-width);
        width: calc(100% - 48px);
        margin: 0 auto;
    }
    header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 99;
    }
    .header-inner {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 0;
    }
    .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--nav-btn-text);
        font-size: 12px;
        font-weight: 500;
        padding: 7px 10px;
        border: 1px solid var(--nav-btn-border);
        border-radius: var(--radius-lg);
        background: var(--nav-btn-bg);
        height: var(--nav-line-height);
    }
    .back-btn:hover {
        border-color: var(--primary);
        background: var(--primary-light);
        color: var(--primary);
    }
    .theme-switch-wrap {
        position: absolute;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
    }
    .header-btn-circle {
        width: var(--theme-btn-width);
        height: var(--theme-btn-width);
        border: 1px solid var(--nav-btn-border);
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: var(--nav-btn-bg);
        color: var(--nav-btn-text);
    }
    .header-btn-circle:hover {
        border-color: var(--primary);
        background: var(--primary-light);
        color: var(--primary);
    }
    .header-spacer {
        width: 100%;
        height: 60px;
    }
    main.container {
        margin-top: 12px;
        padding-bottom: 60px;
    }
    .page-head {
        text-align: center;
        margin: 20px 0 30px;
    }
    .page-head h1 {
        font-size: calc(30px * var(--desktop-font-ratio));
        margin-bottom: 12px;
        color: var(--text-main);
    }
    .desc-text {
        color: var(--text-weak);
        font-size: calc(15px * var(--desktop-font-ratio));
    }
    .card-box {
        background: var(--bg-card);
        border: 1px solid var(--border-base);
        border-radius: var(--radius-lg);
        padding: 24px;
        box-shadow: var(--shadow-sm);
    }
    .template-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 20px;
    }
    .template-checkbox {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border: 1px solid var(--border-base);
        border-radius: var(--radius-sm);
    }
    .input-block {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 16px;
    }
    .input-label {
        display: block;
        color: var(--text-main);
        font-weight: 500;
    }
    textarea {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid var(--border-base);
        border-radius: var(--radius-sm);
        background: var(--bg-btn);
        color: var(--text-main);
        font-family: Consolas, monospace;
        outline: none;
        min-height: 220px;
        max-height: 360px;
        overflow-y: auto;
        resize: vertical;
    }
    textarea:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 2px rgba(16,185,129,0.15);
    }
    .btn-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin: 20px 0;
    }
    .op-btn {
        height: 44px;
        padding: 0 18px;
        border: 1px solid var(--border-base);
        border-radius: var(--radius-sm);
        background: var(--bg-btn);
        color: var(--text-main);
        white-space: nowrap;
    }
    .op-btn.primary {
        border-color: var(--primary);
        background: var(--primary-light);
        color: var(--primary);
    }
    .op-btn.warn {
        color: #ef4444;
        border-color: #fecdd3;
    }
    .op-btn:hover {
        border-color: var(--primary);
        background: var(--primary-light);
        color: var(--primary);
    }
    .err-tip {
        color: #ef4444;
        margin: 8px 0;
        font-size: 14px;
        padding: 6px 10px;
        background: rgba(239,68,68,0.08);
        border-radius: var(--radius-sm);
    }
    .toast-copy {
        position: fixed;
        top: 80px;
        left: 50%;
        transform: translateX(-50%) translateY(-20px);
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px 32px;
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        border-radius: 16px;
        box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
        z-index: 99999;
        opacity: 0;
        pointer-events: none;
        transition: all 0.3s ease;
        min-height: 72px;
    }
    .toast-copy.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }
    .toast-icon {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #22c55e;
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 22px;
        font-weight: bold;
    }
    .toast-text {
        font-size: 28px;
        color: #16a34a;
        font-weight: 500;
    }
    html[data-theme="dark"] .toast-copy {
        background: rgba(34, 197, 94, 0.12);
        border-color: rgba(34, 197, 94, 0.3);
    }
    html[data-theme="dark"] .toast-text {
        color: #4ade80;
    }
    @media (max-width: 640px) {
        .page-head h1 {font-size:28px;}
        .toast-text {font-size: 20px;}
    }
    @media screen and (max-width:767px) and (orientation:portrait){
        .header-btn-circle{width:34px;height:34px;font-size:14px;}
    }
</style>
</head>
<body>
<header id="headerDom">
    <div class="container header-inner">
        <a href="index.html" class="back-btn">← 返回首页</a>
        <div class="theme-switch-wrap">
            <button id="themeToggle" class="header-btn-circle">🌙</button>
        </div>
    </div>
</header>
<div class="header-spacer" id="headerSpacer"></div>

<main class="container">
    <div class="page-head">
        <h1>Gitignore 生成器</h1>
        <div class="desc-text">生成常用项目的 .gitignore 忽略文件</div>
    </div>
    <div class="card-box">
        <div class="input-label">选择模板</div>
        <div class="template-row">
            <label class="template-checkbox">
                <input type="checkbox" value="node"> Node.js
            </label>
            <label class="template-checkbox">
                <input type="checkbox" value="python"> Python
            </label>
            <label class="template-checkbox">
                <input type="checkbox" value="java"> Java
            </label>
            <label class="template-checkbox">
                <input type="checkbox" value="macos"> macOS
            </label>
            <label class="template-checkbox">
                <input type="checkbox" value="windows"> Windows
            </label>
        </div>
        <div class="btn-row">
            <button class="op-btn primary" id="genBtn">生成.gitignore</button>
            <button class="op-btn primary" id="copyBtn">复制输出</button>
            <button class="op-btn warn" id="clearBtn">清空输出</button>
        </div>
        <div class="err-tip" id="errTip"></div>
        <div class="input-block">
            <label class="input-label">.gitignore 输出</label>
            <textarea id="outBox" readonly></textarea>
        </div>
    </div>
</main>

<div class="toast-copy" id="copyToast">
    <div class="toast-icon">✓</div>
    <span class="toast-text">复制成功</span>
</div>

<script>
// 复制提示
const copyToast = document.getElementById('copyToast');
function showToast() {
    copyToast.classList.remove('show');
    setTimeout(()=>copyToast.classList.add('show'),10);
    setTimeout(()=>copyToast.classList.remove('show'),1800);
}
function copyStr(s){
    const t=document.createElement('textarea');
    t.style.position='fixed';
    t.style.left='-99999px';
    t.value=s;
    document.body.appendChild(t);
    t.select();
    document.execCommand('copy');
    document.body.removeChild(t);
}
// 明暗切换
const htmlRoot=document.documentElement;
const themeBtn=document.getElementById("themeToggle");
const mediaDark=window.matchMedia('(prefers-color-scheme: dark)');
const STORAGE_KEY="site_theme_mode";
function applyTheme(mode){
    if(mode==='dark'){htmlRoot.setAttribute('data-theme','dark');themeBtn.innerText='☀️';}
    else {htmlRoot.removeAttribute('data-theme');themeBtn.innerText='🌙';}
}
function initTheme(){
    const save=localStorage.getItem(STORAGE_KEY);
    if(save) applyTheme(save);
    else applyTheme(mediaDark.matches?'dark':'light');
}
function toggleTheme(){
    const now=htmlRoot.hasAttribute('data-theme')?'dark':'light';
    const next=now==='dark'?'light':'dark';
    localStorage.setItem(STORAGE_KEY,next);
    applyTheme(next);
}
mediaDark.addEventListener('change',()=>{if(!localStorage.getItem(STORAGE_KEY)) applyTheme(mediaDark.matches?'dark':'light');});
initTheme();
themeBtn.onclick=toggleTheme;
// 头部自适应
const headerDom=document.getElementById('headerDom');
const headerSpacer=document.getElementById('headerSpacer');
function syncHeader(){headerSpacer.style.height=headerDom.offsetHeight+'px';}
window.addEventListener('resize',syncHeader);
syncHeader();
// 返回按钮
document.querySelector('.back-btn').onclick=e=>{
    e.preventDefault();
    if(history.length<=1) showToast();
    else history.back();
};
// 模板内容库
const templateMap = {
    node: `# Node
node_modules/
npm-debug.log
yarn-error.log
dist/
build/
.env
.env.local`,
    python: `# Python
__pycache__/
*.pyc
*.pyd
venv/
env/
*.log
.pytest_cache/`,
    java: `# Java
target/
*.class
*.jar
.idea/
*.iml
out/
build/`,
    macos: `# macOS
.DS_Store
.AppleDouble
.LSOverride
._*
Thumbs.db`,
    windows: `# Windows
Thumbs.db
desktop.ini
*.lnk`
};
// DOM
const checkboxes = document.querySelectorAll('.template-checkbox input[type="checkbox"]');
const genBtn=document.getElementById('genBtn');
const copyBtn=document.getElementById('copyBtn');
const clearBtn=document.getElementById('clearBtn');
const errTip=document.getElementById('errTip');
const outBox=document.getElementById('outBox');
// 生成
function generate(){
    errTip.textContent="";
    outBox.value="";
    const selected = [];
    checkboxes.forEach(cb=>{
        if(cb.checked) selected.push(cb.value);
    });
    if(selected.length===0){
        errTip.textContent="请至少选择一个模板";
        return;
    }
    let content = "";
    selected.forEach(key=>{
        content += templateMap[key] + "\n\n";
    });
    outBox.value = content.trim();
}
genBtn.onclick=generate;
copyBtn.onclick=()=>{
    if(!out.value){errTip.textContent="请先生成内容";return;}
    copyStr(outBox.value);
    showToast();
};
clearBtn.onclick=()=>{
    outBox.value="";
    errTip.textContent="";
};
</script>
</body>
</html>
