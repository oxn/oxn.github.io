<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='90' font-size='90'>B64</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Base64编码解码工具</title>
<style>
    :root {
      --primary: #10b981;
      --primary-light: #dcfce7;
      --header-bg: #f0fdf4;
      --warn: #f97316;
      --danger: #ef4444;
      --nav-btn-bg: #ffffff;
      --nav-btn-border: #e5e7eb;
      --nav-btn-text: #222222;
      --text-main: #222222;
      --text-secondary: #555555;
      --text-weak: #888888;
      --border-base: #e5e7eb;
      --border-light: #f3f4f6;
      --bg-page: #ffffff;
      --bg-card: #ffffff;
      --bg-btn: #ffffff;
      --bg-footer: #f0fdf4;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-lg: 0 6px 16px rgba(0,0,0.1);
      --radius-xs: 4px;
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 999px;
      --space-xs: 6px;
      --space-sm: 10px;
      --space-md: 14px;
      --space-lg: 16px;
      --space-xl: 28px;
      --transition: all 0.22s ease;
      --key-bg: #e5e7eb;
      --key-text: #222;
      --key-radius: 6px;
      --key-shadow: 0 1px 2px rgba(0,0,0,0.15);
      --body-font-size: 16px;
      --body-line-height: 1.6;
      --title-line-height: 1.2;
      --sub-title-line-height: 1.25;
      --content-max-width: 720px;
      --card-gap: 16px;
      --card-min-width: 300px;
      --header-safe-gap: 16px;
      --card-label-offset: 36px;
      --nav-line-height: 38px;
      --theme-btn-width: 36px;
    }
    html[data-theme="dark"] {
      --primary: #34d399;
      --primary-light: rgba(52, 211, 153, 0.18);
      --header-bg: #111827;
      --nav-btn-bg: #1f2937;
      --nav-btn-border: #374151;
      --nav-btn-text: #f3f4f6;
      --warn: #fdba74;
      --danger: #f87171;
      --text-main: #f9fafb;
      --text-secondary: #d1d5db;
      --text-weak: #9ca3af;
      --border-base: #374151;
      --border-light: #1f2937;
      --bg-page: #0f172a;
      --bg-card: #1e293b;
      --bg-btn: #1f2937;
      --bg-footer: #111827;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.25);
      --shadow-lg: 0 6px 16px rgba(0,0,0.45);
      --key-bg: #374151;
      --key-text: #f9fafb;
      --key-shadow: 0 1px 2px rgba(0,0,0,0.35);
    }
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: system-ui, -apple-system, sans-serif;
  transition: var(--transition);
}
body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--bg-page);
  color:var(--text-main);
  padding:calc(var(--card-label-offset) + 16px) 3vw 3rem;
  position: relative;
}
.top-header-bar{
  position: fixed;
  top: 14px;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 calc(var(--space-lg));
  z-index: 999;
}
.header-btn-back {
  padding: 7px 10px;
  border: 1px solid var(--nav-btn-border);
  border-radius: var(--radius-lg);
  font-size: 12px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
  background: var(--nav-btn-bg);
  color: var(--nav-btn-text);
  flex-shrink: 0;
  min-width: fit-content;
  height: var(--nav-line-height);
}
.header-btn-back:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
.header-btn-theme {
  width: 40px;
  height: 40px;
  padding: 0;
  border: 1px solid var(--nav-btn-border);
  border-radius: 50%;
  font-size: 16px;
  cursor: pointer;
  display: grid;
  place-items: center;
  background: var(--nav-btn-bg);
  color: var(--nav-btn-text);
  flex-shrink: 0;
}
.header-btn-theme:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
.box{
  width:100%;
  max-width: var(--content-max-width);
  background:var(--bg-card);
  padding:32px;
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
}
h2{
  text-align:center;
  margin-bottom:28px;
  font-weight:600;
  font-size:24px;
}
.file-drop{
  border:2px dashed var(--border-base);
  border-radius:var(--radius-md);
  padding:24px;
  text-align:center;
  margin-bottom:18px;
  cursor:pointer;
}
.file-drop.active{
  border-color:var(--primary);
  background:var(--primary-light);
}
.input-item{
  width:100%;
  margin-bottom:18px;
}
label{
  display:block;
  margin-bottom:8px;
  font-size:15px;
  opacity:0.85;
}
textarea{
  width:100%;
  padding:13px 16px;
  border:1px solid var(--border-base);
  border-radius:var(--radius-md);
  font-size:16px;
  background:transparent;
  color:inherit;
  min-height:160px;
  resize: vertical;
}
.btn-group{
  display:flex;
  gap:10px;
  margin-bottom:var(--space-lg);
  flex-wrap: wrap;
}
.btn{
  padding:12px 20px;
  border:none;
  border-radius:var(--radius-md);
  cursor:pointer;
  font-size:16px;
  flex:1;
  min-width: 110px;
  pointer-events: auto !important;
}
.btn-primary{ background:var(--primary); color:#fff; }
.btn-blue{ background:#409eff; color:#fff; }
.btn-gray{ background:#909399; color:#fff; }
.stat-text{
  margin-bottom:16px;
  font-size:14px;
  color:var(--text-secondary);
}
.tip{
  text-align:left;
  font-size:14px;
  opacity:0.65;
  line-height:1.6;
  color:var(--text-secondary);
}
.toast-copy {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  padding: 10px 20px;
  background: var(--bg-card);
  color: var(--text-main);
  border-radius: var(--radius-md);
  font-size: 14px;
  box-shadow: var(--shadow-lg);
  opacity: 0;
  pointer-events: none;
  z-index: 9999;
  transition: all 0.25s ease;
}
.toast-copy.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.toast-success {
  color: var(--primary);
}
.toast-error {
  color: var(--danger);
}
@media screen and (max-width:767px) and (orientation:portrait){
  body{
    padding:15px;
  }
  .top-header-bar{
    padding: 0 var(--space-md);
    top:12px;
  }
  .header-btn-back{
    padding:6px 8px;
    font-size:11px;
    height: 34px;
  }
  .header-btn-theme{
    width: 34px;
    height: 34px;
    font-size:14px;
  }
  .box{
    padding:24px 20px;
  }
  h2{
    font-size:22px;
    margin-bottom:24px;
  }
  .btn-group{
    flex-direction:column;
  }
  label{
    font-size:14px;
    margin-bottom:6px;
  }
  textarea{
    padding:12px 14px;
    font-size:16px;
    min-height:140px;
  }
  .tip{
    font-size:13px;
  }
}
</style>
</head>
<body>
<div class="toast-copy" id="toastTip"></div>

<div class="top-header-bar">
  <button class="header-btn-back" id="backHome">← 返回</button>
  <button class="header-btn-theme" id="themeToggle" aria-label="切换明暗模式">🌙</button>
</div>

<div class="box">
  <h2>Base64编码解码工具</h2>

  <div class="file-drop" id="dropArea">
    📁 拖拽文件到此处或点击选择文件
    <input type="file" id="fileInput" hidden>
  </div>

  <div class="input-item">
    <label>输入文本</label>
    <textarea id="inputText" placeholder="输入普通文本或Base64字符串"></textarea>
  </div>

  <div class="btn-group">
    <label style="display:flex;align-items:center;gap:6px;flex:0.3;min-width:140px;">
      <input type="checkbox" id="urlSafe"> URL安全模式
    </label>
    <button class="btn btn-gray" id="demoBtn">填充演示</button>
    <button class="btn btn-primary" id="encodeBtn">文本转Base64</button>
    <button class="btn btn-blue" id="decodeBtn">Base64解文本</button>
    <button class="btn btn-gray" id="clearBtn">清空</button>
  </div>

  <div class="stat-text" id="convertStatus">已完成转换：无</div>

  <div class="input-item">
    <label>Base64输出</label>
    <textarea id="outputText" readonly placeholder="转换结果"></textarea>
  </div>

  <div class="btn-group">
    <button class="btn btn-blue" id="copyBtn">复制输出</button>
  </div>

  <div class="tip">
支持文件拖拽、文本双向转换；勾选URL安全会替换+/为-_并去除填充=；
兼容中文、Emoji、图片/文档二进制文件，全部运算本地浏览器，不上传数据。
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function(){
  const htmlRoot = document.documentElement;
  const themeToggle = document.getElementById("themeToggle");
  const backHome = document.getElementById("backHome");
  const toastTip = document.getElementById('toastTip');
  const STORAGE_KEY = "site_theme_mode";

  function showToast(msg, success = true) {
    toastTip.className = "toast-copy " + (success ? "toast-success" : "toast-error");
    toastTip.textContent = msg;
    toastTip.classList.add('show');
    setTimeout(function(){
      toastTip.classList.remove('show');
    }, 1800);
  }

  function initTheme() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved === "dark") {
      htmlRoot.setAttribute("data-theme", "dark");
      themeToggle.innerHTML = "☀️";
    } else {
      htmlRoot.removeAttribute("data-theme");
      themeToggle.innerHTML = "🌙";
    }
  }
  initTheme();

  themeToggle.addEventListener('click', function(){
    const dark = htmlRoot.hasAttribute('data-theme');
    if(dark){
      htmlRoot.removeAttribute('data-theme');
      localStorage.setItem(STORAGE_KEY, 'light');
      themeToggle.innerHTML = '🌙';
    }else{
      htmlRoot.setAttribute('data-theme','dark');
      localStorage.setItem(STORAGE_KEY, 'dark');
      themeToggle.innerHTML = '☀️';
    }
  });

  backHome.addEventListener('click', function(){
    history.back();
  });

  const dropArea = document.getElementById('dropArea');
  const fileInput = document.getElementById('fileInput');
  const urlSafe = document.getElementById('urlSafe');
  const inputText = document.getElementById('inputText');
  const outputText = document.getElementById('outputText');
  const convertStatus = document.getElementById('convertStatus');
  const demoBtn = document.getElementById('demoBtn');
  const encodeBtn = document.getElementById('encodeBtn');
  const decodeBtn = document.getElementById('decodeBtn');
  const clearBtn = document.getElementById('clearBtn');
  const copyBtn = document.getElementById('copyBtn');

  const demoText = "测试文本 Hello World 123 😀中文";

  dropArea.addEventListener('click', function(){
    fileInput.click();
  });
  dropArea.addEventListener('dragover', function(e){
    e.preventDefault();
    dropArea.classList.add('active');
  });
  dropArea.addEventListener('dragleave', function(){
    dropArea.classList.remove('active');
  });
  dropArea.addEventListener('drop', function(e){
    e.preventDefault();
    dropArea.classList.remove('active');
    const file = e.dataTransfer.files[0];
    if(file) readFile(file);
  });
  fileInput.addEventListener('change', function(){
    const file = fileInput.files[0];
    if(file) readFile(file);
  });

  function readFile(file){
    const reader = new FileReader();
    reader.onload = function(e){
      let b64 = e.target.result.split(',')[1];
      if(urlSafe.checked){
        b64 = b64.replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
      }
      outputText.value = b64;
      convertStatus.textContent = "已完成转换：文件转Base64";
      inputText.value = "";
      showToast("文件读取完成");
    };
    reader.readAsDataURL(file);
  }

  function textToB64(str, useUrlSafe){
    let raw = btoa(unescape(encodeURIComponent(str)));
    if(useUrlSafe){
      raw = raw.replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
    }
    return raw;
  }

  function b64ToText(str, useUrlSafe){
    let s = str.trim();
    if(useUrlSafe){
      s = s.replace(/-/g,'+').replace(/_/g,'/');
      const pad = (4 - s.length %4) %4;
      s += '='.repeat(pad);
    }
    return decodeURIComponent(escape(atob(s)));
  }

  demoBtn.addEventListener('click', function(){
    inputText.value = demoText;
    outputText.value = "";
    convertStatus.textContent = "已完成转换：无";
  });

  encodeBtn.addEventListener('click', function(){
    const val = inputText.value.trim();
    if(!val){
      showToast("请输入文本或上传文件", false);
      return;
    }
    outputText.value = textToB64(val, urlSafe.checked);
    convertStatus.textContent = "已完成转换：文本转Base64";
    showToast("转换完成");
  });

  decodeBtn.addEventListener('click', function(){
    const val = inputText.value.trim();
    if(!val){
      showToast("请输入Base64字符串", false);
      return;
    }
    try{
      outputText.value = b64ToText(val, urlSafe.checked);
      convertStatus.textContent = "已完成转换：Base64解码文本";
      showToast("转换完成");
    }catch(err){
      showToast("Base64格式错误", false);
    }
  });

  clearBtn.addEventListener('click', function(){
    inputText.value = "";
    outputText.value = "";
    convertStatus.textContent = "已完成转换：无";
    fileInput.value = "";
    showToast("已清空");
  });

  async function copyContent(text) {
    if(!text.trim()){
      showToast("无内容可复制", false);
      return;
    }
    if(navigator.clipboard && window.isSecureContext){
      try{
        await navigator.clipboard.writeText(text);
        showToast("复制成功");
        return;
      }catch(e){}
    }
    const temp = document.createElement('textarea');
    temp.value = text;
    temp.style.position = 'fixed';
    temp.style.left = '-9999px';
    document.body.appendChild(temp);
    temp.select();
    document.execCommand('copy');
    document.body.removeChild(temp);
    showToast("复制成功");
  }

  copyBtn.addEventListener('click', function(){
    copyContent(outputText.value);
  });

});
</script>
</body>
</html>
