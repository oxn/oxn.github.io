<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TOTP / 2FA 验证码生成器</title>
<style>
    /* 全局主题变量 与主站完全统一 */
    :root {
      --primary: #10b981;
      --primary-light: #dcfce7;
      --header-bg: #f0fdf4;
      --warn: #f97316;
      --nav-btn-bg: #ffffff;
      --nav-btn-border: #e5e7eb;
      --nav-btn-text: #222222;
      --text-main: #222222;
      --text-secondary: #555555;
      --text-weak: #888888;
      --border-base: #e5e7eb;
      --border-light: #f3f4f6;
      --bg-page: #ffffff;
      --bg-card: #ffffff;
      --bg-btn: #ffffff;
      --bg-footer: #f0fdf4;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-lg: 0 6px 16px rgba(0,0,0.1);
      --radius-xs: 4px;
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 999px;
      --space-xs: 6px;
      --space-sm: 10px;
      --space-md: 14px;
      --space-lg: 16px;
      --space-xl: 28px;
      --transition: all 0.22s ease;
      --key-bg: #e5e7eb;
      --key-text: #222;
      --key-radius: 6px;
      --key-shadow: 0 1px 2px rgba(0,0,0,0.15);
      --body-font-size: 16px;
      --body-line-height: 1.6;
      --title-line-height: 1.2;
      --sub-title-line-height: 1.25;
      --content-max-width: 1200px;
      --card-gap: 16px;
      --card-min-width: 300px;
      --header-safe-gap: 16px;
      --card-label-offset: 36px;
      --nav-line-height: 38px;
      --theme-btn-width: 36px;
    }
    html[data-theme="dark"] {
      --primary: #34d399;
      --primary-light: rgba(52, 211, 153, 0.18);
      --header-bg: #111827;
      --nav-btn-bg: #1f2937;
      --nav-btn-border: #374151;
      --nav-btn-text: #f3f4f6;
      --warn: #fdba74;
      --text-main: #f9fafb;
      --text-secondary: #d1d5db;
      --text-weak: #9ca3af;
      --border-base: #374151;
      --border-light: #1f2937;
      --bg-page: #0f172a;
      --bg-card: #1e293b;
      --bg-btn: #1f2937;
      --bg-footer: #111827;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.25);
      --shadow-lg: 0 6px 16px rgba(0,0,0,0.45);
      --key-bg: #374151;
      --key-text: #f9fafb;
      --key-shadow: 0 1px 2px rgba(0,0,0,0.35);
    }
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: system-ui, -apple-system, sans-serif;
  transition: var(--transition);
}
body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--bg-page);
  color:var(--text-main);
  padding:20px;
  position: relative;
}
/* 顶部按钮容器 贴合主站头部布局 */
.top-header-bar{
  position: fixed;
  top: 14px;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 calc(var(--space-lg));
  z-index: 999;
}
/* 返回按钮：沿用主站胶囊文字样式不变 */
.header-btn-back {
  padding: 7px 10px;
  border: 1px solid var(--nav-btn-border);
  border-radius: var(--radius-lg);
  font-size: 12px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
  background: var(--nav-btn-bg);
  color: var(--nav-btn-text);
  flex-shrink: 0;
  min-width: fit-content;
  height: var(--nav-line-height);
}
.header-btn-back:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
/* 明暗切换圆形图标按钮：仅图标、正圆 */
.header-btn-theme {
  width: 40px;
  height: 40px;
  padding: 0;
  border: 1px solid var(--nav-btn-border);
  border-radius: 50%;
  font-size: 16px;
  cursor: pointer;
  display: grid;
  place-items: center;
  background: var(--nav-btn-bg);
  color: var(--nav-btn-text);
  flex-shrink: 0;
}
.header-btn-theme:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
.box{
  width:100%;
  max-width:540px;
  background:var(--bg-card);
  padding:32px;
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
  margin-top: 70px;
}
h2{
  text-align:center;
  margin-bottom:28px;
  font-weight:600;
  font-size:24px;
}

/* ========== 默认布局：电脑、平板、手机横屏（原版一行4栏） ========== */
.row-four{
  display:flex;
  gap:12px;
  margin-bottom:22px;
  width:100%;
}
.col-algo{flex:2.2;}
.col-digits{flex:1;}
.col-period{flex:1;}
.col-offset{flex:1;}

.input-item{
  width:100%;
}
label{
  display:block;
  margin-bottom:8px;
  font-size:15px;
  opacity:0.85;
}
input,select{
  width:100%;
  padding:13px 16px;
  border:1px solid var(--border-base);
  border-radius:var(--radius-md);
  font-size:16px;
  background:transparent;
  color:inherit;
}
.secret-row{
  display:flex;
  gap:12px;
  margin-bottom:30px;
  align-items:flex-end;
}
.secret-input{
  flex:1;
}
.code-row{
  display:flex;
  gap:16px;
  align-items:center;
  margin-bottom:12px;
}
.code-current{
  flex:1;
  font-size:52px;
  font-weight:700;
  text-align:center;
}
.btn{
  padding:12px 20px;
  border:none;
  border-radius:var(--radius-md);
  cursor:pointer;
  font-size:16px;
}
.btn-blue{ background:#409eff; color:#fff; }
.btn-gray{ background:#909399; color:#fff; }
.btn-red{ background:#f56c6c; color:#fff; }
.progress-bar{
  height:7px;
  width:100%;
  background:var(--border-light);
  border-radius:var(--radius-xs);
  overflow:hidden;
  margin-bottom:10px;
}
.progress-inner{
  height:100%;
  width:100%;
  background:var(--primary);
  transition:width 1s linear;
}
.next-txt{
  text-align:center;
  font-size:22px;
  font-weight:bold;
  opacity:0.75;
  margin-bottom:30px;
}
.tip{
  text-align:left;
  font-size:14px;
  opacity:0.65;
  line-height:1.6;
  color:var(--text-secondary);
}

/* 复制弹窗 超大z-index杜绝遮挡 */
.toast-copy {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 32px;
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 16px;
    box-shadow: 0 4px 12px rgba(16, 185, 0.15);
    z-index: 999999;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s ease;
    min-height: 72px;
}
.toast-copy.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
    pointer-events: auto;
}
.toast-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #22c55e;
    color: #fff;
    display: grid;
    place-items: center;
    font-size: 22px;
    font-weight: bold;
    flex-shrink: 0;
}
.toast-text {
    font-size: 16px;
    color: #16a34a;
    font-weight: 500;
    white-space: nowrap;
}
html[data-theme="dark"] .toast-copy {
    background: rgba(34, 197, 94, 0.12);
    border-color: rgba(34, 197, 94, 0.3);
}
html[data-theme="dark"] .toast-text {
    color: #4ade80;
}

/* ========== 仅手机竖屏才启用新布局：宽度≤767px + 竖屏 ========== */
@media screen and (max-width:767px) and (orientation:portrait){
  body{
    padding:15px;
  }
  .top-header-bar{
    padding: 0 var(--space-md);
    top:12px;
  }
  .header-btn-back{
    padding:6px 8px;
    font-size:11px;
    height: 34px;
  }
  .header-btn-theme{
    width: 34px;
    height: 34px;
    font-size:14px;
  }
  .box{
    padding:24px 20px;
    margin-top: 60px;
  }
  h2{
    font-size:22px;
    margin-bottom:24px;
  }
  /* 四参数改为2×2网格 */
  .row-four{
    display:grid;
    grid-template-columns: repeat(2, 1fr);
    gap:10px;
    margin-bottom:20px;
  }
  .col-algo,.col-digits,.col-period,.col-offset{
    flex:none;
  }
  label{
    font-size:14px;
    margin-bottom:6px;
  }
  input,select{
    padding:12px 14px;
    font-size:16px;
  }
  /* 密钥行改为上下堆叠 */
  .secret-row{
    flex-direction:column;
    align-items:stretch;
    gap:10px;
    margin-bottom:26px;
  }
  /* 验证码+按钮上下排列 */
  .code-row{
    flex-direction:column;
    gap:12px;
  }
  .code-current{
    font-size:clamp(36px,12vw,52px);
    letter-spacing:4px;
  }
  .btn{
    width:100%;
  }
  .next-txt{
    font-size:clamp(18px,5vw,22px);
    margin-bottom:24px;
  }
  .tip{
    font-size:13px;
  }
  .toast-text {
      font-size: 16px;
  }
}
</style>
</head>
<body>
<!-- 顶部按钮栏 -->
<div class="top-header-bar">
  <button class="header-btn-back" id="backHome">← 返回</button>
  <button class="header-btn-theme" id="themeToggle" aria-label="切换明暗模式">🌙</button>
</div>

<div class="box">
  <h2>TOTP / 2FA 验证码生成器</h2>

  <div class="row-four">
    <div class="input-item col-algo">
      <label>哈希算法</label>
      <select id="hashAlgo">
        <option value="SHA-1">SHA-1 (谷歌默认)</option>
        <option value="SHA-256">SHA-256</option>
        <option value="SHA-512">SHA-512</option>
      </select>
    </div>
    <div class="input-item col-digits">
      <label>验证码位数</label>
      <select id="digits">
        <option value="6">6位</option>
        <option value="8">8位</option>
      </select>
    </div>
    <div class="input-item col-period">
      <label>周期(秒)</label>
      <select id="period">
        <option value="30">30</option>
        <option value="60">60</option>
      </select>
    </div>
    <div class="input-item col-offset">
      <label>时钟偏移</label>
      <input id="timeOffset" type="number" value="0">
    </div>
  </div>

  <div class="secret-row">
    <div class="input-item secret-input">
      <label>Base32 密钥 Secret</label>
      <input id="secret" placeholder="粘贴密钥，自动过滤空格">
    </div>
    <button class="btn btn-gray" id="genRandom">随机生成</button>
  </div>

  <div class="code-row">
    <div class="code-current" id="currentCode">------</div>
    <button class="btn btn-blue" id="copyCode">复制</button>
  </div>

  <div class="progress-bar">
    <div class="progress-inner" id="progressBar"></div>
  </div>
  <div class="next-txt" id="nextCode">下一码：------</div>

  <div class="tip">纯html全部运算在本地浏览器，密钥不会上传服务器；<br>兼容Google Authenticator、Authy、Microsoft Authenticator、Aegis、2FAS、1Password、Bitwarden等所有TOTP类两步验证软件均可通用。 </div>
</div>

<!-- 复制弹窗DOM 完整存在 -->
<div class="toast-copy" id="copyToast">
    <div class="toast-icon">✓</div>
    <span class="toast-text">复制成功</span>
</div>

<script>
const BASE32_ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
const htmlRoot = document.documentElement;
const themeToggle = document.getElementById("themeToggle");
const STORAGE_KEY = "site_theme_mode";

// 弹窗全局变量
const copyToast = document.getElementById('copyToast');
let toastTimer = null;

// 稳定弹窗显示函数 requestAnimationFrame 解决动画失效
function showToast() {
    clearTimeout(toastTimer);
    copyToast.classList.remove('show');
    requestAnimationFrame(() => {
        requestAnimationFrame(() => {
            copyToast.classList.add('show');
        });
    });
    toastTimer = setTimeout(() => {
        copyToast.classList.remove('show');
    }, 1800);
}

// 兼容全浏览器复制函数（解决file本地/HTTP复制失效）
function copyText(text) {
    return new Promise((resolve) => {
        // 优先现代Clipboard API
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(text).then(() => resolve(true)).catch(() => fallbackCopy(text, resolve));
        } else {
            fallbackCopy(text, resolve);
        }
    });
}
// 传统textarea兜底复制
function fallbackCopy(text, resolve) {
    const temp = document.createElement('textarea');
    temp.style.position = 'fixed';
    temp.style.left = '-99999px';
    temp.style.top = '-99999px';
    temp.value = text;
    document.body.appendChild(temp);
    temp.select();
    document.execCommand('copy');
    document.body.removeChild(temp);
    resolve(true);
}

// 主题初始化
function initTheme() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved === "dark") {
    htmlRoot.setAttribute("data-theme", "dark");
    themeToggle.innerHTML = "☀️";
  } else {
    htmlRoot.removeAttribute("data-theme");
    themeToggle.innerHTML = "🌙";
  }
}
themeToggle.onclick = () => {
  const isDark = htmlRoot.hasAttribute("data-theme");
  if (isDark) {
    htmlRoot.removeAttribute("data-theme");
    localStorage.setItem(STORAGE_KEY, "light");
    themeToggle.innerHTML = "🌙";
  } else {
    htmlRoot.setAttribute("data-theme", "dark");
    localStorage.setItem(STORAGE_KEY, "dark");
    themeToggle.innerHTML = "☀️";
  }
};

// 返回按钮：原生浏览器后退
document.getElementById("backHome").onclick = () => {
  history.back();
};

function cleanSecret(s) {
  return s.toUpperCase().replace(/[\s\-=]/g, '');
}
function base32Decode(raw) {
  const s = cleanSecret(raw);
  let bits = '';
  for (const c of s) {
    const idx = BASE32_ALPHABET.indexOf(c);
    if(idx === -1) throw new Error("非法字符");
    bits += idx.toString(2).padStart(5, '0');
  }
  const byteStr = bits.match(/.{8}/g) || [];
  return Uint8Array.from(byteStr.map(b => parseInt(b, 2)));
}
function randomBase32(len = 16) {
  let res = '';
  const arr = new Uint32Array(len);
  crypto.getRandomValues(arr);
  for (let i = 0; i < len; i++) {
    res += BASE32_ALPHABET[arr[i] % 32];
  }
  return res;
}

async function calcTOTP(secret, algo, digits, periodSec, offsetMs = 0, customTs = null) {
  const keyBytes = base32Decode(secret);
  const ts = customTs ?? (Date.now() + offsetMs);
  const step = Math.floor(ts / (periodSec * 1000));
  const counterBuf = new ArrayBuffer(8);
  const dv = new DataView(counterBuf);
  dv.setBigUint64(0, BigInt(step), false);
  const counter = new Uint8Array(counterBuf);
  const cryptoKey = await crypto.subtle.importKey(
    'raw', keyBytes, { name: 'HMAC', hash: algo }, false, ['sign']
  );
  const hmacRaw = await crypto.subtle.sign('HMAC', cryptoKey, counter);
  const hmac = new Uint8Array(hmacRaw);
  const offset = hmac[hmac.length - 1] & 0x0F;
  const binCode = ((hmac[offset] & 0x7F) << 24)
    | (hmac[offset + 1] << 16)
    | (hmac[offset + 2] << 8)
    | hmac[offset + 3];
  const mod = 10 ** digits;
  return (binCode % mod).toString().padStart(digits, '0');
}

let refreshTimer;
function getConfig() {
  return {
    secret: document.getElementById('secret').value,
    algo: document.getElementById('hashAlgo').value,
    digits: parseInt(document.getElementById('digits').value),
    period: parseInt(document.getElementById('period').value),
    offset: parseInt(document.getElementById('timeOffset').value) * 1000
  };
}

async function refreshView() {
  const cfg = getConfig();
  const now = Date.now() + cfg.offset;
  const stepMs = cfg.period * 1000;
  const remain = stepMs - (now % stepMs);
  const pct = (remain / stepMs) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
  const codeBox = document.getElementById('currentCode');
  const nextBox = document.getElementById('nextCode');
  if (!cfg.secret.trim()) {
    codeBox.innerText = '------';
    nextBox.innerText = '下一码：------';
    return;
  }
  try {
    const curr = await calcTOTP(cfg.secret, cfg.algo, cfg.digits, cfg.period, cfg.offset);
    const nextTs = now + remain + 100;
    const next = await calcTOTP(cfg.secret, cfg.algo, cfg.digits, cfg.period, cfg.offset, nextTs);
    codeBox.innerText = curr;
    nextBox.innerText = `下一码：${next}`;
  } catch (e) {
    codeBox.innerText = '密钥错误';
    nextBox.innerText = '下一码：------';
  }
}

document.getElementById('genRandom').onclick = () => {
  document.getElementById('secret').value = randomBase32(16);
  refreshView();
};

// 复制按钮 增加日志+兼容复制+弹窗
document.getElementById('copyCode').onclick = async () => {
  console.log("复制按钮点击触发");
  const code = document.getElementById('currentCode').innerText;
  if (/^\d{6,8}$/.test(code)) {
    await copyText(code);
    showToast();
    console.log("复制成功，弹窗已触发");
  } else {
    console.log("验证码无效，不执行复制");
  }
};

['secret','hashAlgo','digits','period','timeOffset'].forEach(id => {
  document.getElementById(id).oninput = refreshView;
});

initTheme();
refreshView();
refreshTimer = setInterval(refreshView, 1000);
</script>
</body>
</html>
