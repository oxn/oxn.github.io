<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>每日一言</title>
<style>
    /* 全局主题统一变量（原版绿色不变） */
    :root {
      --primary: #10b981;
      --primary-light: #dcfce7;
      --header-bg: #f0fdf4;
      --warn: #f97316;
      --danger: #ef4444;
      --nav-btn-bg: #ffffff;
      --nav-btn-border: #e5e7eb;
      --nav-btn-text: #222222;
      --text-main: #222222;
      --text-secondary: #555555;
      --text-weak: #888888;
      --border-base: #e5e7eb;
      --border-light: #f3f4f6;
      --bg-page: #ffffff;
      --bg-card: #ffffff;
      --bg-btn: #ffffff;
      --bg-footer: #f0fdf4;
      --shadow-sm: 0 1px 3px rgba(0,0,0.06);
      --shadow-lg: 0 6px 16px rgba(0,0,0.1);
      --radius-xs: 4px;
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 999px;
      --space-xs: 0.375rem;
      --space-sm: 0.625rem;
      --space-md: 0.875rem;
      --space-lg: 1rem;
      --space-xl: 1.75rem;
      --transition: all 0.22s ease;
      --key-bg: #e5e7eb;
      --key-text: #222;
      --key-radius: 6px;
      --key-shadow: 0 1px 2px rgba(0,0,0.15);
      --body-font-size: 1rem;
      --body-line-height: 1.6;
      --title-line-height: 1.2;
      --sub-title-line-height: 1.25;
      --content-max-width: 540px;
      --card-gap: 1rem;
      --card-min-width: 300px;
      --header-safe-gap: 1rem;
      --card-label-offset: 2.25rem;
      --nav-line-height: 2.375rem;
      --theme-btn-width: 2.25rem;
    }
    html[data-theme="dark"] {
      --primary: #34d399;
      --primary-light: rgba(52, 211, 153, 0.18);
      --header-bg: #111827;
      --nav-btn-bg: #1f2937;
      --nav-btn-border: #374151;
      --nav-btn-text: #f3f4f6;
      --warn: #fdba74;
      --danger: #f87171;
      --text-main: #f9fafb;
      --text-secondary: #d1d5db;
      --text-weak: #9ca3af;
      --border-base: #374151;
      --border-light: #1f2937;
      --bg-page: #0f172a;
      --bg-card: #1e293b;
      --bg-btn: #1f2937;
      --bg-footer: #111827;
      --shadow-sm: 0 1px 3px rgba(0,0,0.25);
      --shadow-lg: 0 6px 16px rgba(0,0,0.45);
      --key-bg: #374151;
      --key-text: #f9fafb;
      --key-shadow: 0 1px 2px rgba(0,0,0.35);
    }
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: system-ui, -apple-system, sans-serif;
  transition: var(--transition);
}
body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--bg-page);
  color:var(--text-main);
  padding: clamp(0.75rem, 3vw, 1.25rem);
  position: relative;
}
/* 顶部导航 */
.top-header-bar{
  position: fixed;
  top: 0.875rem;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 clamp(1rem, 4vw, 1.75rem);
  z-index: 999;
}
.header-btn-back {
  padding: 0.4375rem 0.625rem;
  border: 1px solid var(--nav-btn-border);
  border-radius: var(--radius-lg);
  font-size: 0.75rem;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 0.25rem;
  white-space: nowrap;
  background: var(--nav-btn-bg);
  color: var(--nav-btn-text);
  flex-shrink: 0;
  min-width: fit-content;
  height: var(--nav-line-height);
}
.header-btn-back:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
.header-btn-theme {
  width: var(--theme-btn-width);
  height: var(--theme-btn-width);
  padding: 0;
  border: 1px solid var(--nav-btn-border);
  border-radius: 50%;
  font-size: 1rem;
  cursor: pointer;
  display: grid;
  place-items: center;
  background: var(--nav-btn-bg);
  color: var(--nav-btn-text);
  flex-shrink: 0;
}
.header-btn-theme:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
.box{
  width:100%;
  max-width:var(--content-max-width);
  background:var(--bg-card);
  padding: clamp(1.5rem, 5vw, 2rem);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
  margin-top: var(--card-label-offset);
}
h2{
  text-align:center;
  margin-bottom: var(--space-xs);
  font-weight:600;
  font-size: clamp(1.375rem, 4vw, 1.5rem);
}
.sub-title{
  text-align:center;
  font-size: clamp(0.8125rem, 2vw, 0.875rem);
  color:var(--text-secondary);
  margin-bottom: var(--space-xl);
}
/* 分类标签 */
.tag-wrap{
  display:flex;
  flex-wrap:wrap;
  gap:0.75rem;
  margin-bottom:var(--space-xl);
}
.tag-item{
  padding:0.5rem 1.2rem;
  border-radius:var(--radius-full);
  border:1px solid var(--border-base);
  font-size: clamp(0.875rem,2vw,0.9375rem);
  cursor:pointer;
  background:transparent;
  color:var(--text-main);
}
.tag-item.active{
  background:var(--primary);
  color:#fff;
  border-color:var(--primary);
}
/* 名言展示 */
.quote-card{
  padding: clamp(1.75rem,6vw,2.25rem);
  border-radius:var(--radius-md);
  background:var(--primary-light);
  text-align:center;
  margin-bottom:var(--space-xl);
}
.quote-text{
  font-size: clamp(1.125rem,4vw,1.375rem);
  margin-bottom:var(--space-md);
  line-height:1.8;
}
.quote-author{
  font-size: clamp(0.875rem,2vw,1rem);
  color:var(--text-secondary);
  margin-bottom:var(--space-md);
}
.quote-tag{
  display:inline-block;
  padding:0.3rem 0.8rem;
  border-radius:999px;
  background:rgba(0,0,0,0.08);
  font-size:0.8rem;
}
html[data-theme="dark"] .quote-tag{
  background:rgba(255,255,255,0.12);
}
.date-text{
  text-align:center;
  margin:var(--space-xl) 0;
  color:var(--text-secondary);
  font-size: clamp(0.875rem,2vw,0.9375rem);
}
.btn-row{
  display:flex;
  gap:0.75rem;
  margin-bottom:var(--space-xl);
}
.btn{
  flex:1;
  padding: clamp(0.8125rem, 2vw, 0.875rem);
  border:none;
  border-radius:var(--radius-md);
  font-size: clamp(0.9375rem, 2vw, 1rem);
  cursor:pointer;
}
.btn-main{
  background:var(--primary);
  color:#fff;
}
.btn-outline{
  background:transparent;
  border:1px solid var(--border-base);
  color:var(--text-main);
}
.tip-copy{
  text-align:center;
  color:var(--primary);
  height:1.5rem;
  margin-bottom:var(--space-xl);
  font-size:0.875rem;
}
.tip{
  text-align:left;
  font-size: clamp(0.75rem, 2vw, 0.875rem);
  opacity:0.65;
  line-height:1.6;
  color:var(--text-secondary);
  margin-top: var(--space-xl);
}
/* 复制弹窗浮层 */
.toast-mask{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.2);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.2s;
}
.toast-mask.show{
  opacity:1;
  pointer-events:auto;
}
.toast-box{
  padding:0.8rem 1.6rem;
  background:#fff;
  border-radius:var(--radius-md);
  box-shadow:var(--shadow-lg);
  font-size:0.95rem;
}
html[data-theme="dark"] .toast-box{
  background:#1e293b;
}
.toast-success{
  color:var(--primary);
}
.toast-error{
  color:var(--danger);
}
/* 平板横屏 */
@media screen and (min-width: 768px) {
  :root {
    --content-max-width: 620px;
  }
  .box {
    padding: 2.25rem;
  }
}
/* 手机竖屏 */
@media screen and (max-width:767px) and (orientation:portrait){
  .top-header-bar{
    padding: 0 var(--space-md);
    top:0.75rem;
  }
  .header-btn-back{
    padding:0.375rem 0.5rem;
    font-size:0.6875rem;
    height: 2.125rem;
  }
  .header-btn-theme{
    width: 2.125rem;
    height: 2.125rem;
  }
  .box{
    padding: 1.5rem 1.25rem;
  }
  .btn-row{
    flex-direction:column;
  }
}
</style>
</head>
<body>
<div class="top-header-bar">
  <button class="header-btn-back" id="backHome">← 返回首页</button>
  <button class="header-btn-theme" id="themeToggle" aria-label="切换明暗模式">🌙</button>
</div>

<div class="box">
  <h2>📜 每日一言</h2>
  <div class="sub-title">每日一句名言，点亮人生智慧</div>

  <div class="tag-wrap" id="tagWrap">
    <button class="tag-item active" data-type="all">全部</button>
    <button class="tag-item" data-type="life">人生</button>
    <button class="tag-item" data-type="success">成功</button>
    <button class="tag-item" data-type="wisdom">智慧</button>
    <button class="tag-item" data-type="love">爱情</button>
    <button class="tag-item" data-type="inspire">励志</button>
  </div>

  <div class="quote-card">
    <div class="quote-text" id="quoteTxt">“曾经沧海难为水，除却巫山不是云。”</div>
    <div class="quote-author">—— <span id="authorTxt">元稹</span></div>
    <div class="quote-tag" id="quoteCat">爱情感悟</div>
  </div>

  <div class="tip-copy" id="copyTip"></div>

  <div class="btn-row">
    <button class="btn btn-main" id="refreshBtn">✨ 获取新名言</button>
    <button class="btn btn-outline" id="copyBtn">📜 复制</button>
  </div>

  <div class="date-text" id="dateBox"></div>

  <div class="tip">
    使用说明：选择不同分类可查看对应名言，点击「获取新名言」切换下一句，点击「复制」可复制完整名言文本，刷新页面也可随机切换句子。
  </div>
</div>

<!-- 复制弹窗容器 -->
<div class="toast-mask" id="toastMask">
  <div class="toast-box" id="toastText"></div>
</div>

<script>
const htmlRoot = document.documentElement;
const themeToggle = document.getElementById("themeToggle");
const STORAGE_KEY = "site_theme_mode";

const tagWrap = document.getElementById("tagWrap");
const tagItems = document.querySelectorAll(".tag-item");
const quoteTxt = document.getElementById("quoteTxt");
const authorTxt = document.getElementById("authorTxt");
const quoteCat = document.getElementById("quoteCat");
const refreshBtn = document.getElementById("refreshBtn");
const copyBtn = document.getElementById("copyBtn");
const copyTip = document.getElementById("copyTip");
const dateBox = document.getElementById("dateBox");
// 弹窗DOM
const toastMask = document.getElementById("toastMask");
const toastText = document.getElementById("toastText");

const quoteData = [
  { text:"人生如逆旅，我亦是行人。", author:"苏轼", cat:"人生感悟", type:"life" },
  { text:"行到水穷处，坐看云起时。", author:"王维", cat:"人生感悟", type:"life" },
  { text:"世事一场大梦，人生几度秋凉。", author:"苏轼", cat:"人生感悟", type:"life" },
  { text:"千淘万漉虽辛苦，吹尽狂沙始到金。", author:"刘禹锡", cat:"成功进取", type:"success" },
  { text:"宝剑锋从磨砺出，梅花香自苦寒来。", author:"《警世贤文》", cat:"成功进取", type:"success" },
  { text:"锲而不舍，金石可镂。", author:"荀子", cat:"成功进取", type:"success" },
  { text:"纸上得来终觉浅，绝知此事要躬行。", author:"陆游", cat:"智慧哲理", type:"wisdom" },
  { text:"海纳百川，有容乃大。", author:"林则徐", cat:"智慧哲理", type:"wisdom" },
  { text:"当局者迷，旁观者清。", author:"《旧唐书》", cat:"智慧哲理", type:"wisdom" },
  { text:"曾经沧海难为水，除却巫山不是云。", author:"元稹", cat:"爱情感悟", type:"love" },
  { text:"两情若是久长时，又岂在朝朝暮暮。", author:"秦观", cat:"爱情感悟", type:"love" },
  { text:"身无彩凤双飞翼，心有灵犀一点通。", author:"李商隐", cat:"爱情感悟", type:"love" },
  { text:"长风破浪会有时，直挂云帆济沧海。", author:"李白", cat:"励志向上", type:"inspire" },
  { text:"少壮不努力，老大徒伤悲。", author:"《长歌行》", cat:"励志向上", type:"inspire" },
  { text:"路漫漫其修远兮，吾将上下而求索。", author:"屈原", cat:"励志向上", type:"inspire" }
];

let currentType = "all";

// 弹窗提示函数
function showToast(msg, isSuccess = true) {
  toastText.className = "toast-box " + (isSuccess ? "toast-success" : "toast-error");
  toastText.innerText = msg;
  toastMask.classList.add("show");
  setTimeout(() => {
    toastMask.classList.remove("show");
  }, 2000);
}

tagItems.forEach(item=>{
  item.onclick = ()=>{
    tagItems.forEach(t=>t.classList.remove("active"));
    item.classList.add("active");
    currentType = item.dataset.type;
    renderRandomQuote();
  };
});

function renderRandomQuote(){
  copyTip.innerText = "";
  let list = currentType === "all" ? quoteData : quoteData.filter(item=>item.type === currentType);
  const randomIdx = Math.floor(Math.random() * list.length);
  const item = list[randomIdx];
  quoteTxt.innerText = `“${item.text}”`;
  authorTxt.innerText = item.author;
  quoteCat.innerText = item.cat;
}

function setDate(){
  const now = new Date();
  const weekArr = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"];
  const week = weekArr[now.getDay()];
  dateBox.innerText = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${week}`;
}

refreshBtn.onclick = renderRandomQuote;

// 修复后的复制逻辑（兼容所有浏览器+兜底选中）
copyBtn.onclick = async ()=>{
  copyTip.innerText = "";
  // 纯净复制文本，去除多余符号干扰
  const pureText = quoteTxt.innerText.replace(/[“”]/g, "");
  const fullText = `${pureText} —— ${authorTxt.innerText}【${quoteCat.innerText}】`;

  try {
    // 优先使用Clipboard API
    await navigator.clipboard.writeText(fullText);
    showToast("✅ 复制成功，可直接粘贴", true);
  } catch (err) {
    console.log("剪贴板API失败，启用兜底复制", err);
    // 兜底方案：动态创建文本框选中复制
    const tempInput = document.createElement("textarea");
    tempInput.value = fullText;
    tempInput.style.position = "fixed";
    tempInput.style.left = "-9999px";
    document.body.appendChild(tempInput);
    tempInput.select();
    const copyResult = document.execCommand("copy");
    document.body.removeChild(tempInput);

    if (copyResult) {
      showToast("✅ 复制成功", true);
    } else {
      showToast("❌ 复制失败，请手动复制文字", false);
    }
  }
};

function initTheme() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved === "dark") {
    htmlRoot.setAttribute("data-theme", "dark");
    themeToggle.innerHTML = "☀️";
  } else {
    htmlRoot.removeAttribute("data-theme");
    themeToggle.innerHTML = "🌙";
  }
}
themeToggle.onclick = () => {
  const dark = htmlRoot.hasAttribute("data-theme");
  if (dark) {
    htmlRoot.removeAttribute("data-theme");
    localStorage.setItem(STORAGE_KEY, "light");
    themeToggle.textContent = "🌙";
  } else {
    htmlRoot.setAttribute("data-theme", "dark");
    localStorage.setItem(STORAGE_KEY, "dark");
    themeToggle.textContent = "☀️";
  }
};
document.getElementById("backHome").onclick = () => window.location.href = "./index.html";

setDate();
renderRandomQuote();
initTheme();
</script>
</body>
</html>
