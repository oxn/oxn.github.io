<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='90' font-size='90'>📜</text></svg>">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>文本缩进工具</title>
<style>
    :root {
      --primary: #10b981;
      --primary-light: #dcfce7;
      --header-bg: #f0fdf4;
      --warn: #f97316;
      --danger: #ef4444;
      --nav-btn-bg: #ffffff;
      --nav-btn-border: #e5e7eb;
      --nav-btn-text: #222222;
      --text-main: #222222;
      --text-secondary: #555555;
      --text-weak: #888888;
      --border-base: #e5e7eb;
      --border-light: #f3f4f6;
      --bg-page: #ffffff;
      --bg-card: #ffffff;
      --bg-btn: #ffffff;
      --bg-footer: #f0fdf4;
      --shadow-sm: 0 1px 3px rgba(0,0,0.06);
      --shadow-lg: 0 6px 16px rgba(0,0,0.1);
      --radius-xs: 4px;
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 999px;
      --space-xs: 0.375rem;
      --space-sm: 0.625rem;
      --space-md: 0.875rem;
      --space-lg: 1rem;
      --space-xl: 1.75rem;
      --transition: all 0.22s ease;
      --key-bg: #e5e7eb;
      --key-text: #222;
      --key-radius: 6px;
      --key-shadow: 0 1px 2px rgba(0,0,0.15);
      --body-font-size: 1rem;
      --body-line-height: 1.6;
      --title-line-height: 1.2;
      --sub-title-line-height: 1.25;
      --content-max-width: 620px;
      --card-gap: 1rem;
      --card-min-width: 300px;
      --header-safe-gap: 1rem;
      --card-label-offset: 2.25rem;
      --nav-line-height: 2.375rem;
      --theme-btn-width: 2.25rem;
    }
    html[data-theme="dark"] {
      --primary: #34d399;
      --primary-light: rgba(52, 211, 153, 0.18);
      --header-bg: #111827;
      --nav-btn-bg: #1f2937;
      --nav-btn-border: #374151;
      --nav-btn-text: #f3f4f6;
      --warn: #fdba74;
      --danger: #f87171;
      --text-main: #f9fafb;
      --text-secondary: #d1d5db;
      --text-weak: #9ca3af;
      --border-base: #374151;
      --border-light: #1f2937;
      --bg-page: #0f172a;
      --bg-card: #1e293b;
      --bg-btn: #1f2937;
      --bg-footer: #111827;
      --shadow-sm: 0 1px 3px rgba(0,0,0.25);
      --shadow-lg: 0 6px 16px rgba(0,0,0.45);
      --key-bg: #374151;
      --key-text: #f9fafb;
      --key-shadow: 0 1px 2px rgba(0,0,0.35);
    }
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: system-ui, -apple-system, sans-serif;
      transition: var(--transition);
    }
    body{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:var(--bg-page);
      color:var(--text-main);
      padding: clamp(0.75rem, 3vw, 1.25rem);
      position: relative;
    }
    .top-header-bar{
      position: fixed;
      top: 0.875rem;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 clamp(1rem, 4vw, 1.75rem);
      z-index: 999;
    }
    .header-btn-back {
      padding: 0.4375rem 0.625rem;
      border: 1px solid var(--nav-btn-border);
      border-radius: var(--radius-lg);
      font-size: 0.75rem;
      line-height: 1;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.25rem;
      white-space: nowrap;
      background: var(--nav-btn-bg);
      color: var(--nav-btn-text);
      flex-shrink: 0;
      min-width: fit-content;
      height: var(--nav-line-height);
    }
    .header-btn-back:hover {
      border-color: var(--primary);
      background: var(--primary-light);
      color: var(--primary);
    }
    .header-btn-theme {
      width: var(--theme-btn-width);
      height: var(--theme-btn-width);
      padding: 0;
      border: 1px solid var(--nav-btn-border);
      border-radius: 50%;
      font-size: 1rem;
      cursor: pointer;
      display: grid;
      place-items: center;
      background: var(--nav-btn-bg);
      color: var(--nav-btn-text);
      flex-shrink: 0;
    }
    .header-btn-theme:hover {
      border-color: var(--primary);
      background: var(--primary-light);
      color: var(--primary);
    }
    .box{
      width:100%;
      max-width:var(--content-max-width);
      background:var(--bg-card);
      padding: clamp(1.5rem, 5vw, 2rem);
      border-radius:var(--radius-lg);
      box-shadow:var(--shadow-lg);
      margin-top: var(--card-label-offset);
    }
    h2{
      text-align:center;
      margin-bottom: var(--space-xs);
      font-weight:600;
      font-size: clamp(1.375rem, 4vw, 1.5rem);
    }
    .sub-title{
      text-align:center;
      font-size: clamp(0.8125rem, 2vw, 0.875rem);
      color:var(--text-secondary);
      margin-bottom: var(--space-xl);
    }
    label{
      display:block;
      margin-bottom: var(--space-xs);
      font-size: clamp(0.875rem, 2vw, 0.9375rem);
      opacity:0.85;
    }
    textarea{
      width:100%;
      min-height: clamp(6rem, 20vh, 8rem);
      padding:0.8rem;
      border:1px solid var(--border-base);
      border-radius:var(--radius-md);
      font-size:0.9rem;
      background:transparent;
      color:var(--text-main);
      resize:vertical;
      margin-bottom:var(--space-lg);
    }
    html[data-theme="dark"] textarea{
      background:#1f2937;
    }
    .mode-row{
      display:flex;
      flex-wrap:wrap;
      gap:0.6rem;
      margin-bottom:var(--space-lg);
    }
    .mode-btn{
      flex:1;
      min-width:6rem;
      padding:0.6rem;
      border:1px solid var(--border-base);
      border-radius:var(--radius-md);
      background:transparent;
      color:var(--text-main);
      cursor:pointer;
      font-size:0.9rem;
    }
    .mode-btn.active{
      background:var(--primary-light);
      border-color:var(--primary);
      color:var(--primary);
    }
    .num-input{
      width:100%;
      padding:0.7rem;
      border:1px solid var(--border-base);
      border-radius:var(--radius-md);
      margin-bottom:var(--space-xl);
      background:transparent;
      color:var(--text-main);
    }
    html[data-theme="dark"] .num-input{
      background:#1f2937;
    }
    .btn-main{
      width:100%;
      padding: clamp(0.8125rem, 2vw, 0.875rem);
      border:none;
      border-radius:var(--radius-md);
      font-size: clamp(0.9375rem, 2vw, 1rem);
      cursor:pointer;
      background:var(--primary);
      color:#fff;
      margin-bottom:var(--space-lg);
    }
    .result-area{
      width:100%;
      min-height: clamp(6rem, 20vh, 8rem);
      padding:0.8rem;
      border:1px solid var(--border-base);
      border-radius:var(--radius-md);
      background:transparent;
      color:var(--text-main);
      white-space:pre-wrap;
      margin-bottom:var(--space-xl);
      resize:vertical;
    }
    html[data-theme="dark"] .result-area{
      background:#1f2937;
    }
    .tip{
      text-align:left;
      font-size: clamp(0.75rem, 2vw, 0.875rem);
      opacity:0.65;
      line-height:1.6;
      color:var(--text-secondary);
      margin-top: var(--space-xl);
    }
    @media screen and (min-width: 768px) {
      :root {
        --content-max-width: 680px;
      }
      .box {
        padding: 2.25rem;
      }
    }
    @media screen and (max-width:767px) and (orientation:portrait){
      .top-header-bar{
        padding: 0 var(--space-md);
        top:0.75rem;
      }
      .header-btn-back{
        padding:0.375rem 0.5rem;
        font-size:0.6875rem;
        height: 2.125rem;
      }
      .header-btn-theme{
        width: 2.125rem;
        height: 2.125rem;
      }
      .box{
        padding: 1.5rem 1.25rem;
      }
    }
</style>
</head>
<body>
<div class="top-header-bar">
  <button class="header-btn-back" id="backHome">← 返回首页</button>
  <button class="header-btn-theme" id="themeToggle" aria-label="切换明暗模式">🌙</button>
</div>

<div class="box">
  <h2>📜 文本缩进工具</h2>
  <div class="sub-title">批量增加或移除文本缩进</div>

  <label>输入文本</label>
  <textarea id="inputText" placeholder="粘贴多行文本内容"></textarea>

  <label>模式</label>
  <div class="mode-row">
    <button class="mode-btn active" data-op="add">增加缩进</button>
    <button class="mode-btn" data-op="remove">移除缩进</button>
  </div>

  <label>空格数量</label>
  <input class="num-input" id="spaceNum" type="number" value="4" min="1" max="16">

  <button class="btn-main" id="runBtn">执行转换</button>

  <label>输出结果</label>
  <textarea class="result-area" id="resultOut" readonly></textarea>

  <div class="tip">
    使用说明：选择增加/移除缩进模式，设置单段缩进空格数，一键批量处理全部文本行，本地离线不传输内容。
  </div>
</div>

<script>
const htmlRoot = document.documentElement;
const themeToggle = document.getElementById("themeToggle");
const STORAGE_KEY = "site_theme_mode";

const inputText = document.getElementById("inputText");
const modeBtns = document.querySelectorAll(".mode-btn");
const spaceNum = document.getElementById("spaceNum");
const runBtn = document.getElementById("runBtn");
const resultOut = document.getElementById("resultOut");

let operate = "add";

modeBtns.forEach(btn=>{
  btn.onclick = ()=>{
    modeBtns.forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    operate = btn.dataset.op;
    calcResult();
  }
});

function calcResult(){
  const raw = inputText.value;
  const count = parseInt(spaceNum.value) || 4;
  const indentStr = " ".repeat(count);
  const lines = raw.split("\n");
  const output = lines.map(line=>{
    if(operate === "add"){
      return indentStr + line;
    }else{
      let trimIdx = 0;
      while(trimIdx < line.length && trimIdx < count && line[trimIdx] === " "){
        trimIdx++;
      }
      return line.slice(trimIdx);
    }
  }).join("\n");
  resultOut.value = output;
}

inputText.oninput = calcResult;
spaceNum.oninput = calcResult;
runBtn.onclick = calcResult;

function initTheme() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved === "dark") {
    htmlRoot.setAttribute("data-theme", "dark");
    themeToggle.innerHTML = "☀️";
  } else {
    htmlRoot.removeAttribute("data-theme");
    themeToggle.innerHTML = "🌙";
  }
}
themeToggle.onclick = () => {
  const dark = htmlRoot.hasAttribute("data-theme");
  if (dark) {
    htmlRoot.removeAttribute("data-theme");
    localStorage.setItem(STORAGE_KEY, "light");
    themeToggle.textContent = "🌙";
  } else {
    htmlRoot.setAttribute("data-theme", "dark");
    localStorage.setItem(STORAGE_KEY, "dark");
    themeToggle.textContent = "☀️";
  }
};
document.getElementById("backHome").onclick = () => window.location.href = "./index.html";

initTheme();
calcResult();
</script>
</body>
</html>
