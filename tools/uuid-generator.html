<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>UUID 生成器</title>
<style>
/* 全站统一通用主题变量（和所有工具共用） */
:root {
    --primary: #3b82f6;
    --primary-light: #dbeafe;
    --success: #22c55e;
    --success-light: #dcfce7;
    --warn: #f97316;
    --danger: #ef4444;
    --header-bg: transparent;
    --nav-btn-bg: #ffffff;
    --nav-btn-border: #e5e7eb;
    --nav-btn-text: #222222;
    --text-main: #222222;
    --text-secondary: #555555;
    --text-weak: #888888;
    --border-base: #e5e7eb;
    --border-light: #f3f4f6;
    --bg-page: #ffffff;
    --bg-card: #ffffff;
    --bg-btn: #ffffff;
    --shadow-sm: 0 1px 3px rgba(0,0,0.06);
    --shadow-lg: 0 6px 16px rgba(0,0.1);
    --radius-sm: 6px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --space-sm: 10px;
    --space-md: 14px;
    --space-lg: 16px;
    --transition: all 0.22s ease;
    --body-font-size: 16px;
    --desktop-font-ratio: 0.85;
    --content-max-width: 1200px;
    --header-safe-gap: 16px;
    --nav-line-height: 38px;
    --theme-btn-width: 36px;
}
html[data-theme="dark"] {
    --primary: #3b82f6;
    --primary-light: rgba(59, 130, 246, 0.15);
    --success: #22c55e;
    --success-light: rgba(34, 197, 94, 0.15);
    --warn: #f97316;
    --danger: #f87171;
    --header-bg: transparent;
    --nav-btn-bg: #1f2937;
    --nav-btn-border: #374151;
    --nav-btn-text: #f3f4f6;
    --text-main: #f1f5f9;
    --text-secondary: #cbd5e1;
    --text-weak: #94a3b8;
    --border-base: #334155;
    --border-light: #334155;
    --bg-page: #0f172a;
    --bg-card: #1e293b;
    --bg-btn: #111827;
    --shadow-sm: 0 1px 3px rgba(0,0,0.2);
    --shadow-lg: 0 6px 16px rgba(0,0,0.35);
}
html {
    font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", "PingFang SC", sans-serif;
    -webkit-font-smoothing: antialiased;
}
body {
    min-height: 100%;
    background: var(--bg-page);
    display: flex;
    flex-direction: column;
    line-height: 1.5;
    font-size: calc(var(--body-font-size));
    overflow-x: hidden;
}
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    transition: var(--transition);
}
a {
    text-decoration: none;
    color: inherit;
}
button {
    font-family: inherit;
    font-size: inherit;
    border: none;
    cursor: pointer;
}
input, textarea, select {
    font-family: inherit;
    font-size: inherit;
}
.container {
    max-width: var(--content-max-width);
    width: calc(100% - 48px);
    margin: 0 auto;
}
/* 头部导航（统一cytools标准header） */
header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 99;
    background: var(--header-bg);
}
.header-inner {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 0;
}
.back-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--nav-btn-text);
    font-size: 14px;
    font-weight: 500;
    padding: 7px 10px;
    border-radius: var(--radius-lg);
    background: var(--nav-btn-bg);
    border: 1px solid var(--nav-btn-border);
    height: var(--nav-line-height);
    flex-shrink: 0;
    cursor: pointer;
}
.back-btn:hover {
    border-color: var(--primary);
    background: var(--primary-light);
    color: var(--primary);
}
.theme-switch-wrap {
    position: absolute;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
}
.header-btn-circle {
    width: var(--theme-btn-width);
    height: var(--theme-btn-width);
    padding: 0;
    border: 1px solid var(--nav-btn-border);
    border-radius: 50%;
    font-size: calc(16px * var(--desktop-font-ratio));
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--nav-btn-bg);
    color: var(--nav-btn-text);
}
.header-btn-circle:hover {
    border-color: var(--primary);
    background: var(--primary-light);
    color: var(--primary);
}
.header-spacer {
    width: 100%;
    height: 60px;
    flex-shrink: 0;
}
main.container {
    margin-top: 12px;
    flex: 1;
    padding-bottom: 60px;
}
.page-head {
    text-align: center;
    margin: 20px 0 30px;
}
.page-head h1 {
    font-size: calc(36px * var(--desktop-font-ratio));
    margin-bottom: 12px;
    color: var(--text-main);
}
.page-head .desc-text {
    color: var(--text-weak);
    font-size: calc(18px * var(--desktop-font-ratio));
}
.card-box {
    background: var(--bg-card);
    border: 1px solid var(--border-base);
    border-radius: var(--radius-lg);
    padding: 24px;
    box-shadow: var(--shadow-sm);
    margin-bottom: 24px;
}
/* 配置三栏 */
.setting-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: 24px;
}
.set-item {
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.set-label {
    font-size: 16px;
    color: var(--text-main);
    font-weight: 500;
}
select, input[type="number"] {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border-base);
    border-radius: var(--radius-sm);
    background: var(--bg-btn);
    color: var(--text-main);
    font-size: 15px;
    outline: none;
}
select:focus, input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 2px rgba(59,130,246,0.15);
}
/* 操作按钮 */
.btn-row {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
}
.op-btn {
    height: 46px;
    padding: 0 28px;
    border-radius: var(--radius-sm);
    font-size: 16px;
}
.btn-gen {
    background: var(--primary);
    color: #fff;
}
.btn-copy-all {
    background: var(--primary);
    color: #fff;
    margin-left: auto;
}
.btn-clear {
    background: var(--bg-btn);
    border: 1px solid var(--border-base);
    color: var(--text-main);
}
/* 生成结果区域 */
.result-wrap {
    margin-bottom: 20px;
}
.result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
}
.result-title {
    font-size: 22px;
    font-weight: 500;
    color: var(--text-main);
}
.result-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
}
.uuid-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    background: var(--bg-btn);
    border: 1px solid var(--border-base);
    border-radius: var(--radius-md);
}
.uuid-text {
    font-family: Consolas, monospace;
    font-size: 16px;
    color: var(--text-main);
    word-break: break-all;
}
.copy-line-btn {
    width: 40px;
    height: 40px;
    border-radius: var(--radius-sm);
    background: var(--border-light);
    color: var(--text-secondary);
    display: grid;
    place-items: center;
    flex-shrink: 0;
    margin-left: 12px;
}
.copy-line-btn:hover {
    background: var(--primary-light);
    color: var(--primary);
}
/* 统计四栏 */
.stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
}
.stat-card {
    padding: 16px;
    border: 1px solid var(--border-base);
    border-radius: var(--radius-sm);
    background: var(--bg-btn);
    text-align: center;
}
.stat-label {
    font-size: 14px;
    color: var(--text-weak);
    margin-bottom: 6px;
}
.stat-value {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-main);
}
/* 底部说明卡片 */
.info-card-section {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px;
    margin-top: 40px;
}
.info-card {
    background: var(--bg-card);
    border: 1px solid var(--border-base);
    border-radius: var(--radius-lg);
    padding: 18px 20px;
    box-shadow: var(--shadow-sm);
}
.info-card h3 {
    font-size: 20px;
    font-weight: bold;
    color: var(--text-main);
    margin-bottom: 12px;
}
.info-card p {
    font-size: 15px;
    line-height: 1.7;
    color: var(--text-secondary);
}
/* 复制弹窗 统一规范：16px文字、超高层级、稳定动画 */
.toast-copy {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 32px;
    background: #f0fdf4;
    border: 1px solid #bbf7d0;
    border-radius: 16px;
    box-shadow: 0 4px 12px rgba(34, 197, 94, 0.15);
    z-index: 999999;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s ease;
    min-height: 72px;
}
.toast-copy.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
}
.toast-icon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #22c55e;
    color: #fff;
    display: grid;
    place-items: center;
    font-size: 22px;
    font-weight: bold;
    flex-shrink: 0;
}
.toast-text {
    font-size: 16px;
    color: #16a34a;
    font-weight: 500;
}
html[data-theme="dark"] .toast-copy {
    background: rgba(34,197,94,0.12);
    border-color: rgba(34,197,94,0.3);
}
html[data-theme="dark"] .toast-text {
    color: #4ade80;
}
/* 响应式 */
@media (max-width:768px) {
    .setting-grid {
        grid-template-columns: 1fr;
    }
    .stat-grid {
        grid-template-columns: repeat(2,1fr);
    }
    .info-card-section {
        grid-template-columns: 1fr;
    }
    .btn-row {
        flex-wrap: wrap;
    }
    .btn-copy-all {
        margin-left: 0;
    }
    .toast-text {
        font-size: 16px;
    }
}
</style>
</head>
<body>
<header id="headerDom">
    <div class="container header-inner">
        <!-- 修改：移除a跳转链接，文字改为← 返回，原生history.back -->
        <span class="back-btn" id="backHome">← 返回</span>
        <div class="theme-switch-wrap">
            <button id="themeToggle" class="header-btn-circle">🌙</button>
        </div>
    </div>
</header>
<div class="header-spacer" id="headerSpacer"></div>

<main class="container">
    <div class="page-head">
        <h1>UUID 生成器</h1>
        <div class="desc-text">快速生成各种版本的 UUID</div>
    </div>

    <div class="card-box">
        <!-- 配置三栏 -->
        <div class="setting-grid">
            <div class="set-item">
                <label class="set-label">UUID 版本</label>
                <select id="uuidVersion">
                    <option value="v1">UUID v1 (时间)</option>
                    <option value="v3">UUID v3 (MD5)</option>
                    <option value="v4" selected>UUID v4 (随机)</option>
                    <option value="v5">UUID v5 (SHA1)</option>
                    <option value="v7">UUID v7 (时间随机)</option>
                </select>
            </div>
            <div class="set-item">
                <label class="set-label">生成数量</label>
                <input type="number" id="genCount" value="1" min="1" max="1000">
            </div>
            <div class="set-item">
                <label class="set-label">格式</label>
                <select id="fmtType">
                    <option value="standard" selected>标准格式 (xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx)</option>
                    <option value="noDash">无横线 xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx</option>
                    <option value="upper">大写带横线</option>
                    <option value="upperNoDash">大写无横线</option>
                </select>
            </div>
        </div>

        <!-- 操作按钮 -->
        <div class="btn-row">
            <button class="op-btn btn-gen" id="btnGen">生成 UUID</button>
            <button class="op-btn btn-clear" id="btnClear">清空全部</button>
            <button class="op-btn btn-copy-all" id="btnCopyAll">复制全部</button>
        </div>

        <!-- 生成结果卡片列表 -->
        <div class="result-wrap">
            <div class="result-header">
                <div class="result-title">生成结果</div>
            </div>
            <div class="result-list" id="resultList"></div>
        </div>

        <!-- 统计信息四栏 -->
        <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-label">当前条目数</div>
                <div class="stat-value" id="statResult">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">累计生成总数</div>
                <div class="stat-value" id="statTotal">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">本次生成</div>
                <div class="stat-value" id="statNow">-</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">最新 UUID (前8位)</div>
                <div class="stat-value" id="statLatest">-</div>
            </div>
        </div>
    </div>

    <div class="info-card-section">
        <div class="info-card">
            <h3>工具用途</h3>
            <p>批量生成v1/v3/v4/v5/v7各类标准UUID，支持多种输出格式，适用于订单ID、数据库主键、唯一标识。</p>
        </div>
        <div class="info-card">
            <h3>版本区别</h3>
            <p>v4纯随机最常用；v1/v7带时间有序；v3/v5基于命名空间哈希生成固定ID。</p>
        </div>
        <div class="info-card">
            <h3>安全说明</h3>
            <p>全部UUID在浏览器本地生成，数据不上传服务器，敏感业务标识安全可靠。</p>
        </div>
    </main>

<div class="toast-copy" id="copyToast">
    <div class="toast-icon">✓</div>
    <span class="toast-text">复制成功</span>
</div>

<script>
// ====================== 1. 暗黑模式完整无错逻辑 ======================
const htmlRoot = document.documentElement;
const themeBtn = document.getElementById("themeToggle");
const mediaDark = window.matchMedia('(prefers-color-scheme: dark)');
const STORAGE_KEY = "site_theme_mode";

function applyTheme(mode) {
    if (mode === "dark") {
        htmlRoot.setAttribute("data-theme", "dark");
        themeBtn.textContent = "☀️";
    } else {
        htmlRoot.removeAttribute("data-theme");
        themeBtn.textContent = "🌙";
    }
}

function initTheme() {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
        applyTheme(saved);
    } else {
        applyTheme(mediaDark.matches ? "dark" : "light");
    }
}

function toggleTheme() {
    const current = htmlRoot.hasAttribute("data-theme") ? "dark" : "light";
    const next = current === "dark" ? "light" : "dark";
    localStorage.setItem(STORAGE_KEY, next);
    applyTheme(next);
}

mediaDark.addEventListener("change", function(e) {
    if (!localStorage.getItem(STORAGE_KEY)) {
        applyTheme(e.matches ? "dark" : "light");
    }
});
initTheme();
themeBtn.addEventListener("click", toggleTheme);

// 头部高度自适应
const headerDom = document.getElementById('headerDom');
const headerSpacer = document.getElementById('headerSpacer');
function syncHeaderHeight() {
    headerSpacer.style.height = headerDom.offsetHeight + "px";
}
window.addEventListener('resize', syncHeaderHeight);
syncHeaderHeight();

// ====================== 2. 统一复制弹窗+全兼容复制函数 ======================
const copyToast = document.getElementById('copyToast');
let toastTimer = null;
// 稳定弹窗动画渲染
function showCopyToast() {
    clearTimeout(toastTimer);
    copyToast.classList.remove('show');
    requestAnimationFrame(() => {
        requestAnimationFrame(() => {
            copyToast.classList.add('show');
        });
    });
    toastTimer = setTimeout(() => copyToast.classList.remove('show'), 1800);
}
// 全兼容复制（安全域+本地file兜底）
function copyTextToClipboard(text) {
    return new Promise((resolve) => {
        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(text).then(() => resolve(true)).catch(() => fallbackCopy(text, resolve));
        } else {
            fallbackCopy(text, resolve);
        }
    });
}
function fallbackCopy(text, resolve) {
    const tempTextarea = document.createElement('textarea');
    tempTextarea.style.position = 'fixed';
    tempTextarea.style.left = '-99999px';
    tempTextarea.value = text;
    document.body.appendChild(tempTextarea);
    tempTextarea.select();
    document.execCommand('copy');
    document.body.removeChild(tempTextarea);
    resolve(true);
}

// ====================== 3. 返回按钮原生后退逻辑 ======================
document.getElementById("backHome").onclick = () => {
    history.back();
};

// ====================== 4. DOM 元素绑定 ======================
const uuidVersion = document.getElementById('uuidVersion');
const genCount = document.getElementById('genCount');
const fmtType = document.getElementById('fmtType');
const btnGen = document.getElementById('btnGen');
const btnClear = document.getElementById('btnClear');
const btnCopyAll = document.getElementById('btnCopyAll');
const resultList = document.getElementById('resultList');
// 统计面板DOM
const statResult = document.getElementById('statResult');
const statTotal = document.getElementById('statTotal');
const statNow = document.getElementById('statNow');
const statLatest = document.getElementById('statLatest');

// 全局变量
let totalGen = 0;
let uuidAllList = [];

// ====================== 5. UUID v4 标准生成算法 ======================
function generateV4UUID() {
    const array = new Uint32Array(4);
    window.crypto.getRandomValues(array);
    const uuid = [
        array[0].toString(16).padStart(8, '0'),
        (array[1] & 0xffff | 0x4000).toString(16).padStart(4, '0'),
        (array[2] & 0x3fff | 0x8000).toString(16).padStart(4, '0'),
        array[3].toString(16).padStart(8, '0')
    ].join('-');
    return uuid;
}

// 格式化UUID
function formatUuid(rawStr, formatType) {
    let str = rawStr.toLowerCase();
    switch (formatType) {
        case "noDash":
            return str.replace(/-/g, "");
        case "upper":
            return str.toUpperCase();
        case "upperNoDash":
            return str.replace(/-/g, "").toUpperCase();
        default:
            return str;
    }
}

// 渲染全部条目DOM
function renderAllItems() {
    resultList.innerHTML = "";
    uuidAllList.forEach((text, idx) => {
        const item = document.createElement("div");
        item.className = "uuid-item";
        item.innerHTML = `
            <span class="uuid-text">${text}</span>
            <button class="copy-line-btn" data-index="${idx}">📋</button>
        `;
        resultList.appendChild(item);
    });
    // 绑定单行复制按钮事件
    document.querySelectorAll(".copy-line-btn").forEach(btn => {
        btn.onclick = async function() {
            const idx = Number(this.dataset.index);
            await copyTextToClipboard(uuidAllList[idx]);
            showCopyToast();
        };
    });
    // 更新统计
    statResult.textContent = uuidAllList.length;
    if(uuidAllList.length > 0) {
        statLatest.textContent = uuidAllList[uuidAllList.length - 1].slice(0, 8);
    } else {
        statLatest.textContent = "-";
    }
}

// ====================== 6. 按钮事件 ======================
// 生成按钮：追加新条目，不覆盖旧数据
btnGen.addEventListener("click", async function() {
    const num = parseInt(genCount.value);
    const fmt = fmtType.value;
    const tempList = [];
    for (let i = 0; i < num; i++) {
        const raw = generateV4UUID();
        tempList.push(formatUuid(raw, fmt));
    }
    // 追加到全局数组
    uuidAllList = uuidAllList.concat(tempList);
    totalGen += num;
    // 刷新列表渲染
    renderAllItems();
    // 更新本次生成统计
    statNow.textContent = num;
    statTotal.textContent = totalGen;
});

// 复制全部按钮
btnCopyAll.addEventListener("click", async function() {
    if (uuidAllList.length > 0) {
        await copyTextToClipboard(uuidAllList.join("\n"));
        showCopyToast();
    }
});

// 清空全部按钮
btnClear.addEventListener("click", function() {
    uuidAllList = [];
    renderAllItems();
    statNow.textContent = "-";
    statTotal.textContent = totalGen;
});
</script>
</body>
</html>
