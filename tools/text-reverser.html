<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>文本反转工具</title>
<style>
    /* 全局主题变量 与主站完全统一 */
    :root {
      --primary: #10b981;
      --primary-light: #dcfce7;
      --header-bg: #f0fdf4;
      --warn: #f97316;
      --nav-btn-bg: #ffffff;
      --nav-btn-border: #e5e7eb;
      --nav-btn-text: #222222;
      --text-main: #222222;
      --text-secondary: #555555;
      --text-weak: #888888;
      --border-base: #e5e7eb;
      --border-light: #f3f4f6;
      --bg-page: #ffffff;
      --bg-card: #ffffff;
      --bg-btn: #ffffff;
      --bg-footer: #f0fdf4;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-lg: 0 6px 16px rgba(0,0,0.1);
      --radius-xs: 4px;
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 999px;
      --space-xs: 6px;
      --space-sm: 10px;
      --space-md: 14px;
      --space-lg: 16px;
      --space-xl: 28px;
      --transition: all 0.22s ease;
      --key-bg: #e5e7eb;
      --key-text: #222;
      --key-radius: 6px;
      --key-shadow: 0 1px 2px rgba(0,0,0,0.15);
      --body-font-size: 16px;
      --body-line-height: 1.6;
      --title-line-height: 1.2;
      --sub-title-line-height: 1.25;
      --content-max-width: 1200px;
      --card-gap: 16px;
      --card-min-width: 300px;
      --header-safe-gap: 16px;
      --card-label-offset: 36px;
      --nav-line-height: 38px;
      --theme-btn-width: 36px;
    }
    html[data-theme="dark"] {
      --primary: #34d399;
      --primary-light: rgba(52, 211, 153, 0.18);
      --header-bg: #111827;
      --nav-btn-bg: #1f2937;
      --nav-btn-border: #374151;
      --nav-btn-text: #f3f4f6;
      --warn: #fdba74;
      --text-main: #f9fafb;
      --text-secondary: #d1d5db;
      --text-weak: #9ca3af;
      --border-base: #374151;
      --border-light: #1f2937;
      --bg-page: #0f172a;
      --bg-card: #1e293b;
      --bg-btn: #1f2937;
      --bg-footer: #111827;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.25);
      --shadow-lg: 0 6px 16px rgba(0,0,0,0.45);
      --key-bg: #374151;
      --key-text: #f9fafb;
      --key-shadow: 0 1px 2px rgba(0,0,0,0.35);
    }
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: system-ui, -apple-system, sans-serif;
  transition: var(--transition);
}
body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--bg-page);
  color:var(--text-main);
  padding:20px;
  position: relative;
}
/* 顶部按钮容器 贴合主站头部布局 */
.top-header-bar{
  position: fixed;
  top: 14px;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 calc(var(--space-lg));
  z-index: 999;
}
/* 返回按钮：沿用主站胶囊文字样式不变 */
.header-btn-back {
  padding: 7px 10px;
  border: 1px solid var(--nav-btn-border);
  border-radius: var(--radius-lg);
  font-size: 12px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
  background: var(--nav-btn-bg);
  color: var(--nav-btn-text);
  flex-shrink: 0;
  min-width: fit-content;
  height: var(--nav-line-height);
}
.header-btn-back:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
/* 明暗切换圆形图标按钮：仅图标、正圆 */
.header-btn-theme {
  width: 40px;
  height: 40px;
  padding: 0;
  border: 1px solid var(--nav-btn-border);
  border-radius: 50%;
  font-size: 16px;
  cursor: pointer;
  display: grid;
  place-items: center;
  background: var(--nav-btn-bg);
  color: var(--nav-btn-text);
  flex-shrink: 0;
}
.header-btn-theme:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
.box{
  width:100%;
  max-width:640px;
  background:var(--bg-card);
  padding:32px;
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
  margin-top: 70px;
}
h2{
  text-align:center;
  margin-bottom:28px;
  font-weight:600;
  font-size:24px;
}
.input-item{
  width:100%;
  margin-bottom:18px;
}
label{
  display:block;
  margin-bottom:8px;
  font-size:15px;
  opacity:0.85;
}
textarea,select{
  width:100%;
  padding:13px 16px;
  border:1px solid var(--border-base);
  border-radius:var(--radius-md);
  font-size:16px;
  background:transparent;
  color:inherit;
}
textarea{
  min-height:130px;
  resize: vertical;
}
.btn-group{
  display:flex;
  gap:10px;
  margin-bottom:20px;
}
.btn{
  padding:12px 20px;
  border:none;
  border-radius:var(--radius-md);
  cursor:pointer;
  font-size:16px;
  flex:1;
  pointer-events: auto !important;
}
.btn-primary{ background:var(--primary); color:#fff; }
.btn-gray{ background:#909399; color:#fff; }
.btn-blue{ background:#409eff; color:#fff; }
.tip{
  text-align:left;
  font-size:14px;
  opacity:0.65;
  line-height:1.6;
  color:var(--text-secondary);
}
/* 复制悬浮提示 */
.toast-copy {
  position: fixed;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  padding: 10px 20px;
  background: rgba(0,0,0,0.65);
  color: #fff;
  border-radius: var(--radius-md);
  font-size: 14px;
  opacity: 0;
  pointer-events: none;
  z-index: 9999;
  transition: opacity 0.25s ease;
}
.toast-copy.show {
  opacity: 1;
}
/* ========== 仅手机竖屏才启用新布局：宽度≤767px + 竖屏 ========== */
@media screen and (max-width:767px) and (orientation:portrait){
  body{
    padding:15px;
  }
  .top-header-bar{
    padding: 0 var(--space-md);
    top:12px;
  }
  .header-btn-back{
    padding:6px 8px;
    font-size:11px;
    height: 34px;
  }
  .header-btn-theme{
    width: 34px;
    height: 34px;
    font-size:14px;
  }
  .box{
    padding:24px 20px;
    margin-top: 60px;
  }
  h2{
    font-size:22px;
    margin-bottom:24px;
  }
  .btn-group{
    flex-direction:column;
  }
  label{
    font-size:14px;
    margin-bottom:6px;
  }
  textarea,select{
    padding:12px 14px;
    font-size:16px;
  }
  .tip{
    font-size:13px;
  }
}
</style>
</head>
<body>
<!-- 复制悬浮提示 -->
<div class="toast-copy" id="toastTip"></div>

<!-- 顶部按钮栏 -->
<div class="top-header-bar">
  <button class="header-btn-back" id="backHome">← 返回首页</button>
  <button class="header-btn-theme" id="themeToggle" aria-label="切换明暗模式">🌙</button>
</div>

<div class="box">
  <h2>文本反转工具</h2>

  <div class="input-item">
    <label>输入文本</label>
    <textarea id="inputText" placeholder="粘贴需要反转的文本内容"></textarea>
  </div>

  <div class="input-item">
    <label>反转模式</label>
    <select id="reverseMode">
      <option value="all">整段字符反转</option>
      <option value="lineOrder">按行顺序反转</option>
      <option value="eachLine">每行内部字符反转</option>
    </select>
  </div>

  <div class="btn-group">
    <button class="btn btn-primary" id="runBtn">执行反转</button>
    <button class="btn btn-gray" id="clearBtn">清空输入</button>
  </div>

  <div class="input-item">
    <label>输出结果</label>
    <textarea id="outputText" readonly placeholder="反转后的文本"></textarea>
  </div>

  <div class="btn-group">
    <button class="btn btn-blue" id="copyBtn">复制输出结果</button>
  </div>

  <div class="tip">
整段字符反转：全部文字从后往前颠倒；
按行顺序反转：颠倒所有行的上下顺序，每行文字不变；
每行内部反转：保留行顺序，单独反转每行内字符；
所有运算本地完成，文本不会上传服务器。
  </div>
</div>

<script>
// DOM加载完成后再绑定所有事件，彻底解决按键失效
document.addEventListener('DOMContentLoaded', function(){
const htmlRoot = document.documentElement;
const themeToggle = document.getElementById("themeToggle");
const STORAGE_KEY = "site_theme_mode";
const toastTip = document.getElementById('toastTip');

// 悬浮提示
function showToast(msg) {
  toastTip.textContent = msg;
  toastTip.classList.add('show');
  setTimeout(() => toastTip.classList.remove('show'), 1800);
}

// 初始化主题
function initTheme() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved === "dark") {
    htmlRoot.setAttribute("data-theme", "dark");
    themeToggle.innerHTML = "☀️";
  } else {
    htmlRoot.removeAttribute("data-theme");
    themeToggle.innerHTML = "🌙";
  }
}
initTheme();

// 切换明暗
themeToggle.addEventListener('click', function(){
  const isDark = htmlRoot.hasAttribute("data-theme");
  if (isDark) {
    htmlRoot.removeAttribute("data-theme");
    localStorage.setItem(STORAGE_KEY, "light");
    themeToggle.innerHTML = "🌙";
  } else {
    htmlRoot.setAttribute("data-theme", "dark");
    localStorage.setItem(STORAGE_KEY, "dark");
    themeToggle.innerHTML = "☀️";
  }
});

// 返回首页
document.getElementById("backHome").addEventListener('click', function(){
  window.location.href = "./index.html";
});

const inputText = document.getElementById("inputText");
const outputText = document.getElementById("outputText");
const reverseMode = document.getElementById("reverseMode");
const runBtn = document.getElementById("runBtn");
const clearBtn = document.getElementById("clearBtn");
const copyBtn = document.getElementById("copyBtn");

// 反转逻辑
function doReverse() {
  const text = inputText.value.trim();
  if (!text) {
    showToast("请输入待反转文本");
    return;
  }
  const mode = reverseMode.value;
  let result = "";
  switch(mode) {
    case "all":
      result = text.split("").reverse().join("");
      break;
    case "lineOrder":
      const lines = text.split(/\r?\n/);
      result = lines.reverse().join("\n");
      break;
    case "eachLine":
      result = text.split(/\r?\n/).map(line => line.split("").reverse().join("")).join("\n");
      break;
  }
  outputText.value = result;
}

// 复制兼容函数
async function copyText(text) {
  if (!text.trim()) {
    showToast("无结果可复制");
    return false;
  }
  if (navigator.clipboard && window.isSecureContext) {
    try {
      await navigator.clipboard.writeText(text);
      showToast("复制成功");
      return true;
    } catch (err) {}
  }
  // 兜底复制
  const temp = document.createElement("textarea");
  temp.value = text;
  temp.style.position = "fixed";
  temp.style.left = "-9999px";
  document.body.appendChild(temp);
  temp.select();
  document.execCommand("copy");
  document.body.removeChild(temp);
  showToast("复制成功");
  return true;
}

// 执行反转按钮
runBtn.addEventListener('click', doReverse);

// 清空按钮
clearBtn.addEventListener('click', function(){
  inputText.value = "";
  outputText.value = "";
});

// 复制按钮
copyBtn.addEventListener('click', function(){
  copyText(outputText.value);
});

});
</script>
</body>
</html>
