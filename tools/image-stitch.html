<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>图片拼接</title>
<style>
    /* 全局主题统一变量 */
    :root {
      --primary: #10b981;
      --primary-light: #dcfce7;
      --header-bg: #f0fdf4;
      --warn: #f97316;
      --danger: #ef4444;
      --nav-btn-bg: #ffffff;
      --nav-btn-border: #e5e7eb;
      --nav-btn-text: #222222;
      --text-main: #222222;
      --text-secondary: #555555;
      --text-weak: #888888;
      --border-base: #e5e7eb;
      --border-light: #f3f4f6;
      --bg-page: #ffffff;
      --bg-card: #ffffff;
      --bg-btn: #ffffff;
      --bg-footer: #f0fdf4;
      --shadow-sm: 0 1px 3px rgba(0,0,0.06);
      --shadow-lg: 0 6px 16px rgba(0,0,0.1);
      --radius-xs: 4px;
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 999px;
      --space-xs: 0.375rem;
      --space-sm: 0.625rem;
      --space-md: 0.875rem;
      --space-lg: 1rem;
      --space-xl: 1.75rem;
      --transition: all 0.22s ease;
      --key-bg: #e5e7eb;
      --key-text: #222;
      --key-radius: 6px;
      --key-shadow: 0 1px 2px rgba(0,0,0.15);
      --body-font-size: 1rem;
      --body-line-height: 1.6;
      --title-line-height: 1.2;
      --sub-title-line-height: 1.25;
      --content-max-width: 540px;
      --card-gap: 1rem;
      --card-min-width: 300px;
      --header-safe-gap: 1rem;
      --card-label-offset: 2.25rem;
      --nav-line-height: 2.375rem;
      --theme-btn-width: 2.25rem;
    }
    html[data-theme="dark"] {
      --primary: #34d399;
      --primary-light: rgba(52, 211, 153, 0.18);
      --header-bg: #111827;
      --nav-btn-bg: #1f2937;
      --nav-btn-border: #374151;
      --nav-btn-text: #f3f4f6;
      --warn: #fdba74;
      --danger: #f87171;
      --text-main: #f9fafb;
      --text-secondary: #d1d5db;
      --text-weak: #9ca3af;
      --border-base: #374151;
      --border-light: #1f2937;
      --bg-page: #0f172a;
      --bg-card: #1e293b;
      --bg-btn: #1f2937;
      --bg-footer: #111827;
      --shadow-sm: 0 1px 3px rgba(0,0,0.25);
      --shadow-lg: 0 6px 16px rgba(0,0,0.45);
      --key-bg: #374151;
      --key-text: #f9fafb;
      --key-shadow: 0 1px 2px rgba(0,0,0.35);
    }
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: system-ui, -apple-system, sans-serif;
  transition: var(--transition);
}
body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--bg-page);
  color:var(--text-main);
  padding: clamp(0.75rem, 3vw, 1.25rem);
  position: relative;
}
/* 顶部导航 */
.top-header-bar{
  position: fixed;
  top: 0.875rem;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 clamp(1rem, 4vw, 1.75rem);
  z-index: 999;
}
.header-btn-back {
  padding: 0.4375rem 0.625rem;
  border: 1px solid var(--nav-btn-border);
  border-radius: var(--radius-lg);
  font-size: 0.75rem;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 0.25rem;
  white-space: nowrap;
  background: var(--nav-btn-bg);
  color: var(--nav-btn-text);
  flex-shrink: 0;
  min-width: fit-content;
  height: var(--nav-line-height);
}
.header-btn-back:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
.header-btn-theme {
  width: var(--theme-btn-width);
  height: var(--theme-btn-width);
  padding: 0;
  border: 1px solid var(--nav-btn-border);
  border-radius: 50%;
  font-size: 1rem;
  cursor: pointer;
  display: grid;
  place-items: center;
  background: var(--nav-btn-bg);
  color: var(--nav-btn-text);
  flex-shrink: 0;
}
.header-btn-theme:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
.box{
  width:100%;
  max-width:var(--content-max-width);
  background:var(--bg-card);
  padding: clamp(1.5rem, 5vw, 2rem);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
  margin-top: var(--card-label-offset);
}
h2{
  text-align:center;
  margin-bottom: var(--space-xs);
  font-weight:600;
  font-size: clamp(1.375rem, 4vw, 1.5rem);
}
.sub-title{
  text-align:center;
  font-size: clamp(0.8125rem, 2vw, 0.875rem);
  color:var(--text-secondary);
  margin-bottom: var(--space-xl);
}
/* 上传区域 */
.upload-single{
  border:2px dashed var(--border-base);
  border-radius:var(--radius-md);
  padding: clamp(1.25rem, 4vw, 1.5rem);
  text-align:center;
  cursor:pointer;
  margin-bottom: var(--space-md);
}
.upload-single.active{
  border-color:var(--primary);
  background:var(--primary-light);
}
.upload-icon{
  font-size: clamp(1.75rem, 6vw, 2rem);
  margin-bottom: var(--space-xs);
  color:var(--text-secondary);
}
input[type="file"]{
  display:none;
}
.row-two{
  display:flex;
  flex-wrap:wrap;
  gap:0.75rem;
  margin-bottom:var(--space-lg);
}
.col-half{
  flex:1;
  min-width:120px;
}
.input-item{
  width:100%;
  margin-bottom: var(--space-lg);
}
label{
  display:block;
  margin-bottom: var(--space-xs);
  font-size: clamp(0.875rem, 2vw, 0.9375rem);
  opacity:0.85;
}
input[type="color"],
select{
  width:100%;
  padding: 0.8125rem;
  border:1px solid var(--border-base);
  border-radius:var(--radius-md);
  font-size: clamp(0.875rem, 2vw, 0.9375rem);
  color:inherit;
  background: transparent;
}
html[data-theme="dark"] {
  select {
    background: #273449;
  }
  select option {
    background: #1e293b;
  }
}
.preview-box{
  text-align:center;
  margin-bottom: var(--space-lg);
  min-height:100px;
}
.preview-box canvas{
  max-width:100%;
  max-height: clamp(16.25rem, 40vh, 260px);
  border-radius:var(--radius-md);
  object-fit: contain;
  background:#fff;
}
html[data-theme="dark"] .preview-box canvas{
  background:#222;
}
.btn{
  width:100%;
  padding: clamp(0.8125rem, 2vw, 0.875rem);
  border:none;
  border-radius:var(--radius-md);
  font-size: clamp(0.9375rem, 2vw, 1rem);
  cursor:pointer;
}
.btn-main{
  background:var(--primary);
  color:#fff;
  margin-bottom: var(--space-sm);
}
.btn-orange{
  background:var(--warn);
  color:#fff;
  margin-bottom: var(--space-xl);
}
.tip{
  text-align:left;
  font-size: clamp(0.75rem, 2vw, 0.875rem);
  opacity:0.65;
  line-height:1.6;
  color:var(--text-secondary);
  margin-top: var(--space-xl);
}
/* 原版复制按钮样式，无修改 */
.copy-btn{
  position: absolute;
  top:12px;
  right:12px;
  padding:6px 10px;
  border-radius:var(--radius-sm);
  border:1px solid var(--primary);
  background:transparent;
  color:var(--primary);
  cursor:pointer;
  font-size:13px;
}
.copy-btn:hover{
  background:var(--primary);
  color:#fff;
}
/* 原版复制悬浮提示，特效完全不变 */
.copy-toast{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  padding:8px 18px;
  border-radius:var(--radius-full);
  background:rgba(16,185,129,0.85);
  color:#fff;
  font-size:14px;
  opacity:0;
  pointer-events:none;
  z-index:9999;
}
.copy-toast.show{
  opacity:1;
}
/* 平板横屏 */
@media screen and (min-width: 768px) {
  :root {
    --content-max-width: 620px;
  }
  .box {
    padding: 2.25rem;
  }
  .preview-box canvas {
    max-height: 30vh;
  }
}
/* 手机竖屏 */
@media screen and (max-width:767px) and (orientation:portrait){
  .top-header-bar{
    padding: 0 var(--space-md);
    top:0.75rem;
  }
  .header-btn-back{
    padding:0.375rem 0.5rem;
    font-size:0.6875rem;
    height: 2.125rem;
  }
  .header-btn-theme{
    width: 2.125rem;
    height: 2.125rem;
  }
  .box{
    padding: 1.5rem 1.25rem;
  }
  .row-two{
    flex-direction:column;
  }
  .copy-btn{
    padding:4px 8px;
    font-size:12px;
  }
}
</style>
</head>
<body>
<div class="top-header-bar">
  <button class="header-btn-back" id="backBtn">← 返回</button>
  <button class="header-btn-theme" id="themeToggle" aria-label="切换明暗模式">🌙</button>
</div>

<div class="box">
  <h2>图片拼接</h2>
  <div class="sub-title">支持两张图片水平或垂直拼接</div>

  <div class="upload-single" id="uploadA">
    <div class="upload-icon">🖼️</div>
    <div>图片 A（点击/拖拽上传）</div>
    <input type="file" id="fileA" accept="image/jpg,image/jpeg,image/png,image/gif,image/webp">
  </div>
  <div class="upload-single" id="uploadB">
    <div class="upload-icon">🖼️</div>
    <div>图片 B（点击/拖拽上传）</div>
    <input type="file" id="fileB" accept="image/jpg,image/jpeg,image/png,image/gif,image/webp">
  </div>

  <div class="row-two">
    <div class="col-half input-item">
      <label>拼接方向</label>
      <select id="dirSel">
        <option value="horizontal">水平</option>
        <option value="vertical">垂直</option>
      </select>
    </div>
    <div class="col-half input-item">
      <label>对齐方式</label>
      <select id="alignSel">
        <option value="top">靠前</option>
        <option value="center">居中</option>
        <option value="bottom">靠后</option>
      </select>
    </div>
  </div>

  <div class="row-two">
    <div class="col-half input-item">
      <label>背景色</label>
      <input type="color" id="bgColor" value="#ffffff">
    </div>
    <div class="col-half input-item">
      <label>输出格式</label>
      <select id="formatSel">
        <option value="image/png">PNG</option>
        <option value="image/jpeg">JPEG</option>
        <option value="image/webp">WebP</option>
      </select>
    </div>
  </div>

  <div class="preview-box">
    <canvas id="previewCanvas"></canvas>
  </div>

  <button class="btn btn-main" id="mergeBtn">生成拼接图</button>
  <button class="btn btn-orange" id="downloadBtn" style="display:none;">下载图片</button>

  <div class="tip">
    使用说明：本地离线拼接两张图片，不上传服务器；水平左右排列、垂直上下排列，靠前/居中/靠后对齐，可自定义空白背景色，支持三种图片格式导出。
  </div>
</div>
<!-- 原版复制提示弹窗 -->
<div class="copy-toast" id="copyToast">复制成功</div>

<script>
const htmlRoot = document.documentElement;
const themeToggle = document.getElementById("themeToggle");
const STORAGE_KEY = "site_theme_mode";

// 返回DOM
const backBtn = document.getElementById("backBtn");
backBtn.onclick = () => history.back();

// 原版复制提示函数，无改动
function showToast(){
  copyToast.classList.add("show");
  setTimeout(()=>copyToast.classList.remove("show"),1200);
}

// 主题切换
function initTheme() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved === "dark") {
    htmlRoot.setAttribute("data-theme", "dark");
    themeToggle.innerHTML = "☀️";
  } else {
    htmlRoot.removeAttribute("data-theme");
    themeToggle.innerHTML = "🌙";
  }
}
themeToggle.onclick = () => {
  const dark = htmlRoot.hasAttribute("data-theme");
  if (dark) {
    htmlRoot.removeAttribute("data-theme");
    localStorage.setItem(STORAGE_KEY, "light");
    themeToggle.textContent = "🌙";
  } else {
    htmlRoot.setAttribute("data-theme", "dark");
    localStorage.setItem(STORAGE_KEY, "dark");
    themeToggle.textContent = "☀️";
  }
};

// DOM
const uploadA = document.getElementById("uploadA");
const uploadB = document.getElementById("uploadB");
const fileA = document.getElementById("fileA");
const fileB = document.getElementById("fileB");
const dirSel = document.getElementById("dirSel");
const alignSel = document.getElementById("alignSel");
const bgColor = document.getElementById("bgColor");
const formatSel = document.getElementById("formatSel");
const previewCanvas = document.getElementById("previewCanvas");
const ctx = previewCanvas.getContext("2d");
const mergeBtn = document.getElementById("mergeBtn");
const downloadBtn = document.getElementById("downloadBtn");

let imgA = null, imgB = null;
let fileObjA = null, fileObjB = null;
let finalBlob = null;

// 拖拽绑定通用
function bindDrop(box, input, cb) {
  box.addEventListener("dragover", e=>{e.preventDefault(); box.classList.add("active");});
  box.addEventListener("dragleave", ()=>box.classList.remove("active"));
  box.addEventListener("drop", e=>{
    e.preventDefault();
    box.classList.remove("active");
    const f = e.dataTransfer.files[0];
    if(f) cb(f);
  });
  box.onclick = ()=>input.click();
  input.onchange = ()=>{
    if(input.files[0]) cb(input.files[0]);
  };
}

// 加载图片（修复异步赋值失效问题）
function loadFile(file, target) {
  const reader = new FileReader();
  reader.onload = e=>{
    const im = new Image();
    im.onload = ()=>{
      target.img = im;
      target.file = file;
    };
    im.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
// 封装对象避免变量赋值失效
const storeA = { img: null, file: null };
const storeB = { img: null, file: null };
bindDrop(uploadA, fileA, f=>loadFile(f, storeA));
bindDrop(uploadB, fileB, f=>loadFile(f, storeB));

// 拼接生成（修复宽高变量错误、增加加载完成校验）
mergeBtn.onclick = async ()=>{
  imgA = storeA.img;
  imgB = storeB.img;
  if(!imgA || !imgB) return alert("请等待两张图片加载完成再生成");
  const dir = dirSel.value;
  const align = alignSel.value;
  const bg = bgColor.value;
  const mime = formatSel.value;
  const gap = 0;

  let cw, ch;
  let ax = 0, ay = 0, bx = 0, by = 0;
  const wA = imgA.width, hA = imgA.height;
  const wB = imgB.width, hB = imgB.height;

  if(dir === "horizontal"){
    cw = wA + wB + gap;
    ch = Math.max(hA, hB);
    // 水平对齐Y
    if(align === "top"){ ay = 0; by = 0; }
    else if(align === "center"){
      ay = (ch - hA)/2;
      by = (ch - hB)/2;
    }else{
      ay = ch - hA;
      by = ch - hB;
    }
    bx = wA + gap;
  }else{
    ch = hA + hB + gap;
    cw = Math.max(wA, wB);
    // 垂直对齐X
    if(align === "top"){ ax = 0; bx = 0; }
    else if(align === "center"){
      ax = (cw - wA)/2;
      bx = (cw - wB)/2;
    }else{
      ax = cw - wA;
      bx = cw - wB;
    }
    by = hA + gap;
  }
  // 绘制画布
  previewCanvas.width = cw;
  previewCanvas.height = ch;
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,cw,ch);
  ctx.drawImage(imgA, ax, ay);
  ctx.drawImage(imgB, bx, by);
  // 导出Blob
  finalBlob = await new Promise(res=>{
    previewCanvas.toBlob(b=>res(b), mime, 0.92);
  });
  downloadBtn.style.display = "block";
};

// 下载
downloadBtn.onclick = ()=>{
  if(!finalBlob) return;
  const url = URL.createObjectURL(finalBlob);
  const ext = formatSel.value.split("/")[1];
  const a = document.createElement("a");
  a.download = "拼接图." + ext;
  a.href = url;
  a.click();
  URL.revokeObjectURL(url);
};

initTheme();
</script>
</body>
</html>
