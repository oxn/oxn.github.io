<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>JSON格式化工具</title>
    <style>
        :root {
            --primary: #10b981;
            --primary-light: #dcfce7;
            --header-bg: transparent;
            --warn: #f97316;
            --danger: #ef4444;
            --nav-btn-bg: #ffffff;
            --nav-btn-border: #e5e7eb;
            --nav-btn-text: #222222;
            --text-main: #222222;
            --text-secondary: #555555;
            --text-weak: #888888;
            --border-base: #e5e7eb;
            --border-light: #f3f4f6;
            --bg-page: #ffffff;
            --bg-card: #ffffff;
            --bg-btn: #ffffff;
            --bg-footer: #f0fdf4;
            --shadow-sm: 0 1px 3px rgba(0,0,0.06);
            --shadow-lg: 0 6px 16px rgba(0,0,0.1);
            --radius-xs: 4px;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-full: 999px;
            --space-xs: 6px;
            --space-sm: 10px;
            --space-md: 14px;
            --space-lg: 16px;
            --space-xl: 28px;
            --transition: all 0.22s ease;
            --key-bg: #e5e7eb;
            --key-text: #222;
            --key-radius: 6px;
            --key-shadow: 0 1px 2px rgba(0,0,0.15);
            --body-font-size: 16px;
            --desktop-font-ratio: 0.85;
            --title-line-height: 1.2;
            --sub-title-line-height: 1.25;
            --content-max-width: 1200px;
            --card-gap: 16px;
            --card-min-width: 300px;
            --header-safe-gap: 16px;
            --nav-line-height: 38px;
            --theme-btn-width: 36px;
        }
        html[data-theme="dark"] {
            --primary: #10b981;
            --primary-light: rgba(16, 185, 129, 0.15);
            --header-bg: transparent;
            --nav-btn-bg: #1f2937;
            --nav-btn-border: #374151;
            --nav-btn-text: #f3f4f6;
            --warn: #f97316;
            --text-main: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-weak: #94a3b8;
            --border-base: #334155;
            --border-light: #334155;
            --bg-page: #0f172a;
            --bg-card: #1e293b;
            --bg-btn: #1e293b;
            --bg-footer: #111827;
            --shadow-sm: 0 1px 3px rgba(0,0,0.2);
            --shadow-lg: 0 6px 16px rgba(0,0.35);
            --key-bg: #334155;
            --key-text: #f1f5f9;
        }
        html {
            font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", "PingFang SC", sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        body {
            min-height: 100%;
            background: var(--bg-page);
            display: flex;
            flex-direction: column;
            line-height: 1.5;
            font-size: calc(var(--body-font-size));
            overflow-x: hidden;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: var(--transition);
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        button, select {
            font-family: inherit;
            font-size: inherit;
            border: none;
            background: transparent;
            cursor: pointer;
        }
        .container {
            max-width: var(--content-max-width);
            width: calc(100% - 48px);
            margin: 0 auto;
        }
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 99;
            background: var(--header-bg);
            border-bottom: none;
        }
        .header-inner {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 0;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--nav-btn-text);
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            padding: 7px 10px;
            border-radius: var(--radius-lg);
            background: var(--nav-btn-bg);
            border: 1px solid var(--nav-btn-border);
            height: var(--nav-line-height);
            flex-shrink: 0;
        }
        .back-btn:hover {
            border-color: var(--primary);
            background: var(--primary-light);
            color: var(--primary);
        }
        .page-title {
            display: none;
        }
        .theme-switch-wrap {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
        }
        .header-btn-circle {
            width: var(--theme-btn-width);
            height: var(--theme-btn-width);
            padding: 0;
            border: 1px solid var(--nav-btn-border);
            border-radius: 50%;
            font-size: calc(16px * var(--desktop-font-ratio));
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--nav-btn-bg);
            color: var(--nav-btn-text);
            flex-shrink: 0;
        }
        .header-btn-circle:hover {
            border-color: var(--primary);
            background: var(--primary-light);
            color: var(--primary);
        }
        .header-spacer {
            width: 100%;
            height: 60px;
            flex-shrink: 0;
        }
        main.container {
            margin-top: 12px;
            flex: 1;
            padding-bottom: 60px;
        }
        .page-head {
            text-align: center;
            margin: 20px 0 30px;
        }
        .page-head h1 {
            font-size: calc(30px * var(--desktop-font-ratio));
            margin-bottom: 12px;
            color: var(--text-main);
        }
        .page-head .blue-tip {
            color: #3b82f6;
            font-size: calc(18px * var(--desktop-font-ratio));
            margin-bottom: 10px;
        }
        .page-head .desc-text {
            color: var(--text-weak);
            font-size: calc(15px * var(--desktop-font-ratio));
        }
        .card-box {
            background: var(--bg-card);
            border: 1px solid var(--border-base);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 24px;
        }
        /* 顶部操作栏 左右分布 */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 20px;
        }
        .left-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .right-setting {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        /* 双栏布局 */
        .two-col-wrap {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 16px;
        }
        .col-block {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .col-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .col-title {
            font-weight: 600;
            color: var(--text-main);
        }
        .col-btn-group {
            display: flex;
            gap: 8px;
        }
        textarea, input[type="text"], select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-base);
            border-radius: var(--radius-sm);
            background: var(--bg-btn);
            color: var(--text-main);
            font-size: 15px;
            resize: vertical;
            outline: none;
            transition: var(--transition);
            font-family: Consolas, monospace;
        }
        textarea {
            min-height: 420px;
        }
        textarea:focus, input[type="text"]:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(16,185,129,0.15);
        }
        .info-row {
            display:flex;
            gap:16px;
            margin-top:12px;
            flex-wrap:wrap;
            font-size:14px;
            color:var(--text-secondary);
        }
        .info-item{
            padding:4px 10px;
            background:var(--key-bg);
            border-radius:var(--key-radius);
            color:var(--key-text);
        }
        .op-btn {
            height: 44px;
            padding: 0 18px;
            border: 1px solid var(--border-base);
            border-radius: var(--radius-sm);
            background: var(--bg-btn);
            color: var(--text-main);
            font-size: 15px;
            white-space: nowrap;
        }
        .op-btn.primary-purple {
            border-color: #8b5cf6;
            background: rgba(139, 92, 246, 0.12);
            color: #8b5cf6;
        }
        .op-btn.primary-green {
            border-color: var(--primary);
            background: var(--primary-light);
            color: var(--primary);
        }
        .op-btn.warn {
            color: #ef4444;
            border-color: #fecdd3;
        }
        .op-btn:hover {
            border-color: var(--primary);
            background: var(--primary-light);
            color: var(--primary);
        }
        .op-btn.warn:hover {
            border-color: #ef4444;
            background: #fef2f2;
            color: #ef4444;
        }
        .err-tip {
            color: #ef4444;
            margin: 8px 0;
            font-size: 14px;
            padding: 6px 10px;
            background: rgba(239,68,68,0.08);
            border-radius: var(--radius-sm);
        }
        /* 复制弹窗 */
        .toast-copy {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 32px;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 16px;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
            z-index: 99999;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            min-height: 72px;
        }
        .toast-copy.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }
        .toast-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #22c55e;
            color: #fff;
            display: grid;
            place-items: center;
            font-size: 22px;
            font-weight: bold;
            flex-shrink: 0;
        }
        .toast-text {
            font-size: 28px;
            color: #16a34a;
            font-weight: 500;
            white-space: nowrap;
        }
        html[data-theme="dark"] .toast-copy {
            background: rgba(34, 197, 94, 0.12);
            border-color: rgba(34, 197, 94, 0.3);
        }
        html[data-theme="dark"] .toast-text {
            color: #4ade80;
        }
        /* 移动端适配 */
        @media (max-width: 768px) {
            .two-col-wrap {
                grid-template-columns: 1fr;
            }
            .top-bar {
                flex-direction: column;
                align-items: flex-start;
            }
            textarea {
                min-height: 280px;
            }
        }
        @media (max-width: 640px) {
            body {
                font-size: var(--body-font-size);
            }
            .back-btn {
                font-size: 12px;
            }
            .header-btn-circle {
                font-size: 16px;
            }
            .page-head h1 {
                font-size: 28px;
            }
            .page-head .blue-tip {
                font-size: 18px;
            }
            .page-head .desc-text {
                font-size: 15px;
            }
            .op-btn {
                font-size: 15px;
            }
            .toast-icon {
                font-size: 16px;
            }
            .toast-text {
                font-size: 20px;
            }
        }
        @media screen and (max-width:767px) and (orientation:portrait){
            .header-btn-circle{
                width:34px;
                height:34px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
<header id="headerDom">
    <div class="container header-inner">
        <a href="index.html" class="back-btn">← 返回首页</a>
        <div class="theme-switch-wrap">
            <button id="themeToggle" class="header-btn-circle">🌙</button>
        </div>
    </div>
</header>
<div class="header-spacer" id="headerSpacer"></div>

<main class="container">
    <div class="page-head">
        <h1>JSON格式化工具</h1>
        <div class="blue-tip">格式化、压缩和验证JSON数据</div>
    </div>

    <div class="card-box">
        <!-- 顶部操作栏 匹配截图布局 -->
        <div class="top-bar">
            <div class="left-buttons">
                <button class="op-btn primary-purple" id="formatBtn">格式化</button>
                <button class="op-btn primary-green" id="minifyBtn">压缩</button>
                <button class="op-btn" id="demoBtn">示例</button>
                <button class="op-btn warn" id="clearAll">清空</button>
            </div>
            <div class="right-setting">
                <label>缩进：</label>
                <select id="indentSelect">
                    <option value="2">2 空格</option>
                    <option value="4" selected>4 空格</option>
                    <option value="\t">Tab</option>
                </select>
                <label style="display:flex;align-items:center;gap:6px;margin:0">
                    <input type="checkbox" id="sortKey">排序键名
                </label>
            </div>
        </div>

        <div class="err-tip" id="errorTip"></div>

        <!-- 左右双栏输入输出 -->
        <div class="two-col-wrap">
            <!-- 左侧输入 -->
            <div class="col-block">
                <div class="col-head">
                    <span class="col-title">输入JSON</span>
                    <div class="col-btn-group">
                        <button class="op-btn" id="pasteBtn">粘贴</button>
                        <button class="op-btn warn" id="clearInputBtn">清空</button>
                    </div>
                </div>
                <textarea id="rawJson" placeholder='在此输入 JSON，例如：
{
  "name": "John",
  "age": 30
}'></textarea>
            </div>
            <!-- 右侧输出 -->
            <div class="col-block">
                <div class="col-head">
                    <span class="col-title">输出结果</span>
                    <div class="col-btn-group">
                        <button class="op-btn" id="copyResult">复制</button>
                    </div>
                </div>
                <textarea id="resultJson" readonly placeholder="格式化后的 JSON 将显示在这里..."></textarea>
                <!-- 统计信息 -->
                <div class="info-row">
                    <span class="info-item">字符：<span id="charCount">0</span></span>
                    <span class="info-item">行数：<span id="lineCount">0</span></span>
                    <span class="info-item">大小：<span id="byteCount">0 B</span></span>
                </div>
            </div>
        </div>
    </div>
</main>

<div class="toast-copy" id="copyToast">
    <div class="toast-icon">✓</div>
    <span class="toast-text">复制成功</span>
</div>

<script>
    // 明暗主题统一逻辑（保留原有不变）
    const htmlRoot = document.documentElement;
    const themeBtn = document.getElementById("themeToggle");
    const mediaDark = window.matchMedia('(prefers-color-scheme: dark)');
    const STORAGE_KEY = "site_theme_mode";
    function applyTheme(mode) {
        if (mode === "dark") {
            htmlRoot.setAttribute("data-theme", "dark");
            themeBtn.innerHTML = "☀️";
        } else {
            htmlRoot.removeAttribute("data-theme");
            themeBtn.innerHTML = "🌙";
        }
    }
    function initTheme() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) applyTheme(saved);
        else applyTheme(mediaDark.matches ? "dark" : "light");
    }
    function toggleTheme() {
        const current = htmlRoot.hasAttribute("data-theme") ? "dark" : "light";
        const next = current === "dark" ? "light" : "dark";
        localStorage.setItem(STORAGE_KEY, next);
        applyTheme(next);
    }
    mediaDark.addEventListener("change", e => {
        if (!localStorage.getItem(STORAGE_KEY)) applyTheme(e.matches ? "dark" : "light");
    });
    initTheme();
    themeBtn.onclick = toggleTheme;

    // 头部自适应高度
    const headerDom = document.getElementById('headerDom');
    const headerSpacer = document.getElementById('headerSpacer');
    function syncHeaderHeight() {
        headerSpacer.style.height = headerDom.offsetHeight + "px";
    }
    window.addEventListener('resize', syncHeaderHeight);
    syncHeaderHeight();

    // 复制弹窗
    const copyToast = document.getElementById('copyToast');
    function showToast() {
        copyToast.classList.remove('show');
        setTimeout(() => copyToast.classList.add('show'), 10);
        setTimeout(() => copyToast.classList.remove('show'), 1800);
    }
    function copyStr(text) {
        const temp = document.createElement('textarea');
        temp.style.position = 'fixed';
        temp.style.left = '-9999px';
        temp.style.top = '-9999px';
        temp.value = text;
        document.body.appendChild(temp);
        temp.select();
        document.execCommand('copy');
        document.body.removeChild(temp);
    }

    // DOM元素
    const rawJson = document.getElementById('rawJson');
    const resultJson = document.getElementById('resultJson');
    const errorTip = document.getElementById('errorTip');
    const formatBtn = document.getElementById('formatBtn');
    const minifyBtn = document.getElementById('minifyBtn');
    const demoBtn = document.getElementById('demoBtn');
    const clearAll = document.getElementById('clearAll');
    const copyResult = document.getElementById('copyResult');
    const pasteBtn = document.getElementById('pasteBtn');
    const clearInputBtn = document.getElementById('clearInputBtn');
    const indentSelect = document.getElementById('indentSelect');
    const sortKey = document.getElementById('sortKey');
    const charCount = document.getElementById('charCount');
    const lineCount = document.getElementById('lineCount');
    const byteCount = document.getElementById('byteCount');

    // 示例JSON
    const demoJson = `{
  "username": "张三",
  "age": 26,
  "isVip": true,
  "balance": 12580.66,
  "hobby": ["看书", "爬山", "编程"],
  "address": {
    "province": "辽宁",
    "city": "沈阳",
    "detail": "浑南XX小区12号楼"
  },
  "orderList": [
    {
      "orderId": 10001,
      "goodsName": "键盘",
      "price": 129
    },
    {
      "orderId": 10002,
      "goodsName": "显示器",
      "price": 899
    }
  ]
}`;

    // 获取当前缩进值
    function getIndent() {
        const val = indentSelect.value;
        return val === "\t" ? "\t" : Number(val);
    }

    // 更新统计信息
    function updateStats(text) {
        const chars = text.length;
        const lines = text.split('\n').length;
        const bytes = new Blob([text]).size;
        charCount.textContent = chars;
        lineCount.textContent = lines;
        byteCount.textContent = bytes + " B";
    }

    // 递归排序对象键
    function sortObject(obj) {
        if (Array.isArray(obj)) return obj.map(item => sortObject(item));
        if (obj && typeof obj === "object") {
            const sorted = {};
            Object.keys(obj).sort().forEach(k => sorted[k] = sortObject(obj[k]));
            return sorted;
        }
        return obj;
    }

    // 通用处理逻辑
    function handleOperate(isMinify) {
        errorTip.textContent = "";
        const text = rawJson.value.trim();
        if (!text) {
            resultJson.value = "";
            updateStats("");
            return;
        }
        try {
            let data = JSON.parse(text);
            if (sortKey.checked) data = sortObject(data);
            let out;
            const indent = getIndent();
            if (isMinify) out = JSON.stringify(data);
            else out = JSON.stringify(data, null, indent);
            resultJson.value = out;
            updateStats(out);
        } catch (e) {
            errorTip.textContent = "JSON语法错误：" + e.message;
            resultJson.value = "";
            updateStats("");
        }
    }

    // 格式化按钮
    formatBtn.onclick = () => handleOperate(false);
    // 压缩按钮
    minifyBtn.onclick = () => handleOperate(true);
    // 示例按钮
    demoBtn.onclick = () => {
        rawJson.value = demoJson;
        resultJson.value = "";
        errorTip.textContent = "";
        updateStats("");
    };
    // 全局清空
    clearAll.onclick = () => {
        rawJson.value = "";
        resultJson.value = "";
        errorTip.textContent = "";
        updateStats("");
    };
    // 清空输入框
    clearInputBtn.onclick = () => {
        rawJson.value = "";
    };
    // 粘贴按钮
    pasteBtn.onclick = async () => {
        try {
            const clipText = await navigator.clipboard.readText();
            rawJson.value = clipText;
        } catch (err) {
            showToast("浏览器粘贴权限受限，请手动粘贴");
        }
    };
    // 复制输出结果
    copyResult.onclick = () => {
        const val = resultJson.value.trim();
        if (!val) return;
        copyStr(val);
        showToast();
    };
</script>
</body>
</html>
