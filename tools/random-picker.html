<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>随机抽取器</title>
<style>
    /* 全局主题变量 与主站完全统一 */
    :root {
      --primary: #10b981;
      --primary-light: #dcfce7;
      --header-bg: #f0fdf4;
      --warn: #f97316;
      --nav-btn-bg: #ffffff;
      --nav-btn-border: #e5e7eb;
      --nav-btn-text: #222222;
      --text-main: #222222;
      --text-secondary: #555555;
      --text-weak: #888888;
      --border-base: #e5e7eb;
      --border-light: #f3f4f6;
      --bg-page: #ffffff;
      --bg-card: #ffffff;
      --bg-btn: #ffffff;
      --bg-footer: #f0fdf4;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow-lg: 0 6px 16px rgba(0,0,0.1);
      --radius-xs: 4px;
      --radius-sm: 6px;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 999px;
      --space-xs: 6px;
      --space-sm: 10px;
      --space-md: 14px;
      --space-lg: 16px;
      --space-xl: 28px;
      --transition: all 0.22s ease;
      --key-bg: #e5e7eb;
      --key-text: #222;
      --key-radius: 6px;
      --key-shadow: 0 1px 2px rgba(0,0,0,0.15);
      --body-font-size: 16px;
      --body-line-height: 1.6;
      --title-line-height: 1.2;
      --sub-title-line-height: 1.25;
      --content-max-width: 1200px;
      --card-gap: 16px;
      --card-min-width: 300px;
      --header-safe-gap: 16px;
      --card-label-offset: 36px;
      --nav-line-height: 38px;
      --theme-btn-width: 36px;
    }
    html[data-theme="dark"] {
      --primary: #34d399;
      --primary-light: rgba(52, 211, 153, 0.18);
      --header-bg: #111827;
      --nav-btn-bg: #1f2937;
      --nav-btn-border: #374151;
      --nav-btn-text: #f3f4f6;
      --warn: #fdba74;
      --text-main: #f9fafb;
      --text-secondary: #d1d5db;
      --text-weak: #9ca3af;
      --border-base: #374151;
      --border-light: #1f2937;
      --bg-page: #0f172a;
      --bg-card: #1e293b;
      --bg-btn: #1f2937;
      --bg-footer: #111827;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.25);
      --shadow-lg: 0 6px 16px rgba(0,0,0,0.45);
      --key-bg: #374151;
      --key-text: #f9fafb;
      --key-shadow: 0 1px 2px rgba(0,0,0,0.35);
    }
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: system-ui, -apple-system, sans-serif;
  transition: var(--transition);
}
body{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--bg-page);
  color:var(--text-main);
  padding:20px;
  position: relative;
}
/* 顶部按钮容器 贴合主站头部布局 */
.top-header-bar{
  position: fixed;
  top: 14px;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 calc(var(--space-lg));
  z-index: 999;
}
/* 返回按钮：沿用主站胶囊文字样式不变 */
.header-btn-back {
  padding: 7px 10px;
  border: 1px solid var(--nav-btn-border);
  border-radius: var(--radius-lg);
  font-size: 12px;
  line-height: 1;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
  background: var(--nav-btn-bg);
  color: var(--nav-btn-text);
  flex-shrink: 0;
  min-width: fit-content;
  height: var(--nav-line-height);
}
.header-btn-back:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
/* 明暗切换圆形图标按钮：仅图标、正圆 */
.header-btn-theme {
  width: 40px;
  height: 40px;
  padding: 0;
  border: 1px solid var(--nav-btn-border);
  border-radius: 50%;
  font-size: 16px;
  cursor: pointer;
  display: grid;
  place-items: center;
  background: var(--nav-btn-bg);
  color: var(--nav-btn-text);
  flex-shrink: 0;
}
.header-btn-theme:hover {
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
.box{
  width:100%;
  max-width:540px;
  background:var(--bg-card);
  padding:32px;
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow-lg);
  margin-top: 70px;
}
h2{
  text-align:center;
  margin-bottom:28px;
  font-weight:600;
  font-size:24px;
}
.row-two{
  display:flex;
  gap:12px;
  margin-bottom:22px;
  width:100%;
}
.col-half{
  flex:1;
}
.input-item{
  width:100%;
  margin-bottom:16px;
}
label{
  display:block;
  margin-bottom:8px;
  font-size:15px;
  opacity:0.85;
}
input,textarea{
  width:100%;
  padding:13px 16px;
  border:1px solid var(--border-base);
  border-radius:var(--radius-md);
  font-size:16px;
  background:transparent;
  color:inherit;
}
select{
  width:100%;
  padding:13px 16px;
  border:1px solid var(--border-base);
  border-radius:var(--radius-md);
  font-size:16px;
  color:inherit;
}
html[data-theme="dark"] select{
  background: #273449;
}
textarea{
  resize: vertical;
  min-height: 120px;
}
.check-item{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:22px;
}
.check-item input{
  width:auto;
}
/* 多行按钮容器 */
.btn-row{
  display:flex;
  gap:10px;
  margin-bottom:12px;
}
.btn-wrap{
  margin:24px 0;
}
.btn{
  flex:1;
  padding:14px 20px;
  border:none;
  border-radius:var(--radius-md);
  cursor:pointer;
  font-size:16px;
  font-weight:500;
}
.btn-primary{ background:var(--primary); color:#fff; }
.btn-secondary{ background:var(--nav-btn-bg); color:var(--text-main); border:1px solid var(--border-base); }
.btn-secondary:hover{
  border-color: var(--primary);
  background: var(--primary-light);
  color: var(--primary);
}
.btn-warning{ background:var(--warn); color:#fff; }
.result-box{
  text-align:left;
  padding:20px;
  border-radius:var(--radius-md);
  background:var(--primary-light);
  margin-bottom:20px;
  word-break: break-all;
}
.result-value{
  font-size:18px;
  font-weight:600;
  color:var(--primary);
  line-height: 1.8;
  white-space: pre-line;
}
.result-ctrl{
  display:flex;
  gap:10px;
  margin-top:16px;
}
.tip{
  text-align:left;
  font-size:14px;
  opacity:0.65;
  line-height:1.6;
  color:var(--text-secondary);
}
/* ========== 仅手机竖屏才启用新布局：宽度≤767px + 竖屏 ========== */
@media screen and (max-width:767px) and (orientation:portrait){
  body{
    padding:15px;
  }
  .top-header-bar{
    padding: 0 var(--space-md);
    top:12px;
  }
  .header-btn-back{
    padding:6px 8px;
    font-size:11px;
    height: 34px;
  }
  .header-btn-theme{
    width: 34px;
    height: 34px;
    font-size:14px;
  }
  .box{
    padding:24px 20px;
    margin-top: 60px;
  }
  h2{
    font-size:22px;
    margin-bottom:24px;
  }
  .row-two{
    flex-direction:column;
    gap:10px;
    margin-bottom:20px;
  }
  .btn-row{
    flex-direction:column;
    gap:8px;
  }
  .result-ctrl{
    flex-direction:column;
  }
  label{
    font-size:14px;
    margin-bottom:6px;
  }
  input,select,textarea{
    padding:12px 14px;
    font-size:16px;
  }
  .result-value{
    font-size:16px;
  }
  .tip{
    font-size:13px;
  }
}
</style>
</head>
<body>
<!-- 顶部按钮栏（固定保留返回+明暗切换） -->
<div class="top-header-bar">
  <button class="header-btn-back" id="backHome">← 返回首页</button>
  <button class="header-btn-theme" id="themeToggle" aria-label="切换明暗模式">🌙</button>
</div>

<div class="box">
  <h2>随机抽取器</h2>

  <div class="input-item">
    <label>待抽取列表（每行一条）</label>
    <textarea id="listText" placeholder="张三
李四
王五
赵六"></textarea>
  </div>

  <div class="btn-row">
    <button class="btn btn-secondary" id="fillDemo">填充示例名单</button>
    <button class="btn btn-warning" id="clearInput">清空列表</button>
  </div>

  <div class="row-two">
    <div class="input-item col-half">
      <label>抽取数量</label>
      <input id="pickCount" type="number" value="1" min="1">
    </div>
  </div>

  <div class="check-item">
    <input type="checkbox" id="noRepeat" checked>
    <label for="noRepeat">不重复抽取</label>
  </div>

  <div class="btn-wrap">
    <button class="btn btn-primary" id="pickBtn">开始抽取</button>
  </div>

  <div class="result-box" id="resultBox" style="display:none;">
    <div class="result-value" id="pickOutput"></div>
    <div class="result-ctrl">
      <button class="btn btn-secondary" id="copyResult">复制结果</button>
      <button class="btn btn-warning" id="hideResult">清空结果</button>
    </div>
  </div>

  <div class="tip">
    使用说明：每行输入一个待抽取项目，支持一键填充示例、清空文本；设置抽取数量，勾选不重复可避免重复结果；抽取完成支持复制结果文本。适用于抽奖、点名、抽签、分组。
  </div>
</div>

<script>
const htmlRoot = document.documentElement;
const themeToggle = document.getElementById("themeToggle");
const STORAGE_KEY = "site_theme_mode";

// 初始化主题（固定复用）
function initTheme() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved === "dark") {
    htmlRoot.setAttribute("data-theme", "dark");
    themeToggle.innerHTML = "☀️";
  } else {
    htmlRoot.removeAttribute("data-theme");
    themeToggle.innerHTML = "🌙";
  }
}
// 切换主题（固定复用）
themeToggle.onclick = () => {
  const isDark = htmlRoot.hasAttribute("data-theme");
  if (isDark) {
    htmlRoot.removeAttribute("data-theme");
    localStorage.setItem(STORAGE_KEY, "light");
    themeToggle.innerHTML = "🌙";
  } else {
    htmlRoot.setAttribute("data-theme", "dark");
    localStorage.setItem(STORAGE_KEY, "dark");
    themeToggle.innerHTML = "☀️";
  }
};
// 返回首页（固定复用）
document.getElementById("backHome").onclick = () => {
  window.location.href = "./index.html";
};

// 【修复兼容复制函数】双层降级方案，解决http/本地文件/微信复制失效
async function copyUniversal(text) {
  // 方案1：现代Clipboard API（HTTPS/localhost可用）
  if (navigator.clipboard && window.isSecureContext) {
    try {
      await navigator.clipboard.writeText(text);
      return { ok: true, msg: "复制成功" };
    } catch (err) {
      console.log("Clipboard API失败，降级", err);
    }
  }
  // 方案2：降级临时textarea复制（兼容http、file、微信浏览器）
  const tempTextarea = document.createElement("textarea");
  tempTextarea.value = text;
  tempTextarea.style.position = "fixed";
  tempTextarea.style.left = "-9999px";
  tempTextarea.style.top = "-9999px";
  document.body.appendChild(tempTextarea);
  tempTextarea.focus();
  tempTextarea.select();
  const success = document.execCommand("copy");
  document.body.removeChild(tempTextarea);
  if (success) {
    return { ok: true, msg: "复制成功" };
  }
  // 方案3：兜底手动复制弹窗
  return { ok: false, msg: "自动复制失败，请手动复制下方文本", text: text };
}

// DOM元素
const listText = document.getElementById('listText');
const pickCount = document.getElementById('pickCount');
const noRepeat = document.getElementById('noRepeat');
const pickBtn = document.getElementById('pickBtn');
const resultBox = document.getElementById('resultBox');
const pickOutput = document.getElementById('pickOutput');
const fillDemo = document.getElementById('fillDemo');
const clearInput = document.getElementById('clearInput');
const copyResult = document.getElementById('copyResult');
const hideResult = document.getElementById('hideResult');

// 填充示例名单
fillDemo.onclick = () => {
  listText.value = "小明\n小红\n小李\n小张\n小王\n小陈\n小周\n小吴\n小郑\n小钱";
};
// 清空输入框
clearInput.onclick = () => {
  listText.value = "";
};
// 清空结果
hideResult.onclick = () => {
  resultBox.style.display = 'none';
  pickOutput.innerText = "";
};
// 复制抽取结果（修复版）
copyResult.onclick = async () => {
  const text = pickOutput.innerText.trim();
  if (!text) {
    alert("暂无可复制的抽取结果");
    return;
  }
  const res = await copyUniversal(text);
  if (res.ok) {
    alert(res.msg);
  } else {
    prompt(res.msg, res.text);
  }
};

// 随机抽取逻辑
pickBtn.onclick = function(){
  const rawText = listText.value;
  const count = parseInt(pickCount.value);
  const norepeat = noRepeat.checked;

  // 清洗列表，去除空行
  let list = rawText.split('\n').map(item => item.trim()).filter(item => item !== "");
  if(list.length === 0){
    alert("请输入待抽取列表！每行一条，或点击填充示例");
    resultBox.style.display = 'none';
    return;
  }
  if(isNaN(count) || count <= 0){
    alert("抽取数量必须大于0");
    resultBox.style.display = 'none';
    return;
  }

  let result = [];
  if(norepeat){
    if(count > list.length){
      alert("不重复模式下，抽取数量不能超过总条目数：" + list.length);
      resultBox.style.display = 'none';
      return;
    }
    // 洗牌算法
    const arr = [...list];
    for(let i = arr.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    result = arr.slice(0, count);
  }else{
    for(let i = 0; i < count; i++){
      const rnd = Math.floor(Math.random() * list.length);
      result.push(list[rnd]);
    }
  }

  // 带序号换行展示
  let showText = "";
  result.forEach((item, idx) => {
    showText += `${idx+1}. ${item}\n`;
  });
  pickOutput.innerText = showText.trim();
  resultBox.style.display = 'block';
};

initTheme();
</script>
</body>
</html>
