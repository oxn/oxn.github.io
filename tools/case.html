<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>字符串大小写命名转换工具</title>
    <style>
        :root {
            --primary: #3b82f6;
            --primary-light: #dbeafe;
            --success: #22c55e;
            --success-light: #dcfce7;
            --header-bg: transparent;
            --warn: #f97316;
            --nav-btn-bg: #ffffff;
            --nav-btn-border: #e5e7eb;
            --nav-btn-text: #222222;
            --text-main: #222222;
            --text-secondary: #555555;
            --text-weak: #888888;
            --border-base: #e5e7eb;
            --border-light: #f3f4f6;
            --bg-page: #ffffff;
            --bg-card: #ffffff;
            --bg-btn: #ffffff;
            --bg-footer: #f0fdf4;
            --shadow-sm: 0 1px 3px rgba(0,0,0.06);
            --shadow-lg: 0 6px 16px rgba(0,0.1);
            --radius-xs: 4px;
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-full: 999px;
            --space-xs: 6px;
            --space-sm: 10px;
            --space-md: 14px;
            --space-lg: 16px;
            --space-xl: 28px;
            --transition: all 0.22s ease;
            --key-bg: #e5e7eb;
            --key-text: #222;
            --key-radius: 6px;
            --key-shadow: 0 1px 2px rgba(0,0.15);
            --body-font-size: 16px;
            --desktop-font-ratio: 0.85;
            --title-line-height: 1.2;
            --sub-title-line-height: 1.25;
            --content-max-width: 1200px;
            --card-gap: 16px;
            --card-min-width: 300px;
            --header-safe-gap: 16px;
            --nav-line-height: 38px;
            --theme-btn-width: 36px;
            --single-card-max-width: 600px;
        }
        html[data-theme="dark"] {
            --primary: #3b82f6;
            --primary-light: rgba(59, 130, 246, 0.15);
            --success: #22c55e;
            --success-light: rgba(34, 197, 94, 0.15);
            --header-bg: transparent;
            --nav-btn-bg: #1f2937;
            --nav-btn-border: #374151;
            --nav-btn-text: #f3f4f6;
            --warn: #f97316;
            --text-main: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-weak: #94a3b8;
            --border-base: #334155;
            --border-light: #334155;
            --bg-page: #0f172a;
            --bg-card: #1e293b;
            --bg-btn: #1e293b;
            --bg-footer: #111827;
            --shadow-sm: 0 1px 3px rgba(0,0,0.2);
            --shadow-lg: 0 6px 16px rgba(0,0.35);
            --key-bg: #334155;
            --key-text: #f1f5f9;
        }
        html {
            font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", "PingFang SC", sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        body {
            min-height: 100%;
            background: var(--bg-page);
            display: flex;
            flex-direction: column;
            line-height: 1.5;
            font-size: calc(var(--body-font-size));
            overflow-x: hidden;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: var(--transition);
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        button {
            font-family: inherit;
            font-size: inherit;
            border: none;
            cursor: pointer;
        }
        .container {
            max-width: var(--content-max-width);
            width: calc(100% - 48px);
            margin: 0 auto;
        }
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 99;
            background: var(--header-bg);
            border-bottom: none;
        }
        .header-inner {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 14px 0;
        }
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--nav-btn-text);
            font-size: 12px;
            font-weight: 500;
            padding: 7px 10px;
            border-radius: var(--radius-lg);
            background: var(--nav-btn-bg);
            border: 1px solid var(--nav-btn-border);
            height: var(--nav-line-height);
            flex-shrink: 0;
            cursor: pointer;
        }
        .back-btn:hover {
            border-color: var(--primary);
            background: var(--primary-light);
            color: var(--primary);
        }
        .theme-switch-wrap {
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
        }
        .header-btn-circle {
            width: var(--theme-btn-width);
            height: var(--theme-btn-width);
            padding: 0;
            border: 1px solid var(--nav-btn-border);
            border-radius: 50%;
            font-size: calc(16px * var(--desktop-font-ratio));
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--nav-btn-bg);
            color: var(--nav-btn-text);
            flex-shrink: 0;
        }
        .header-btn-circle:hover {
            border-color: var(--primary);
            background: var(--primary-light);
            color: var(--primary);
        }
        .header-spacer {
            width: 100%;
            height: 60px;
            flex-shrink: 0;
        }
        main.container {
            margin-top: 12px;
            flex: 1;
            padding-bottom: 60px;
        }
        .page-head {
            text-align: center;
            margin: 20px 0 30px;
        }
        .page-head h1 {
            font-size: calc(36px * var(--desktop-font-ratio));
            margin-bottom: 12px;
            color: var(--text-main);
        }
        .page-head .blue-tip {
            color: #3b82f6;
            font-size: calc(18px * var(--desktop-font-ratio));
            margin-bottom: 10px;
        }
        .page-head .desc-text {
            color: var(--text-weak);
            font-size: calc(15px * var(--desktop-font-ratio));
        }
        /* 顶部输入栏区域 统一600px居中 */
        .top-input-wrap {
            display: flex;
            gap: 12px;
            align-items: center;
            border: 1px solid var(--border-base);
            border-radius: var(--radius-lg);
            padding: 16px;
            background: var(--bg-card);
            margin: 0 auto 20px auto;
            max-width: var(--single-card-max-width);
        }
        #topInput {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border-base);
            border-radius: var(--radius-sm);
            background: var(--bg-btn);
            color: var(--text-main);
            font-size: 15px;
            font-family: Consolas, monospace;
            outline: none;
        }
        #topInput:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(59,130,246,0.15);
        }
        .btn-blue {
            height: 44px;
            padding: 0 22px;
            background: var(--primary);
            color: white;
            border-radius: var(--radius-sm);
            font-weight: 500;
        }
        .btn-blue:hover {
            background: #2563eb;
        }
        .btn-gray {
            height: 44px;
            padding: 0 22px;
            border: 1px solid var(--border-base);
            background: var(--bg-btn);
            color: var(--text-main);
            border-radius: var(--radius-sm);
        }
        .btn-gray:hover {
            background: var(--border-light);
        }
        /* 结果卡片容器 600px居中 */
        .result-card {
            border: 1px solid var(--border-base);
            border-radius: var(--radius-lg);
            padding: 20px;
            background: var(--bg-card);
            margin: 0 auto 40px auto;
            max-width: var(--single-card-max-width);
        }
        .origin-tip-bar {
            width: 100%;
            padding: 8px 12px;
            background: #fffbeb;
            border-radius: var(--radius-sm);
            text-align: center;
            color: #b45309;
            margin-bottom: 24px;
        }
        html[data-theme="dark"] .origin-tip-bar {
            background: rgba(251, 191, 36, 0.15);
            color: #fbbf24;
        }
        .format-item {
            margin-bottom: 20px;
        }
        .format-label {
            font-size: 17px;
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 8px;
        }
        .format-input-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .format-val-input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border-base);
            border-radius: var(--radius-sm);
            background: var(--bg-btn);
            color: var(--text-main);
            font-family: Consolas;
            outline: none;
        }
        .copy-green {
            padding: 8px 16px;
            background: var(--success);
            color: white;
            border-radius: var(--radius-sm);
        }
        .copy-green:hover {
            background: #16a34a;
        }
        /* 底部说明卡片 宽度统一600px居中 */
        .info-card-section {
            max-width: var(--single-card-max-width);
            margin: 0 auto 40px auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 18px;
        }
        .info-card {
            background: var(--bg-card);
            border: 1px solid var(--border-base);
            border-radius: var(--radius-lg);
            padding: 18px 20px;
            box-shadow: var(--shadow-sm);
        }
        .info-card h3 {
            font-size: calc(20px * var(--desktop-font-ratio));
            font-weight: bold;
            color: var(--text-main);
            margin-bottom: 12px;
            line-height: 1.3;
        }
        .info-card p {
            font-size: calc(15px * var(--desktop-font-ratio));
            line-height: 1.8;
            color: var(--text-secondary);
        }
        /* 统一复制弹窗（全站标准） */
        .toast-copy {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 32px;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 16px;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.15);
            z-index: 999999;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            min-height: 72px;
        }
        .toast-copy.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            pointer-events: auto;
        }
        .toast-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #22c55e;
            color: #fff;
            display: grid;
            place-items: center;
            font-size: 22px;
            font-weight: bold;
            flex-shrink: 0;
        }
        .toast-text {
            font-size: 16px;
            color: #16a34a;
            font-weight: 500;
            white-space: nowrap;
        }
        html[data-theme="dark"] .toast-copy {
            background: rgba(34,197,94,0.12);
            border-color: rgba(34,197,94,0.3);
        }
        html[data-theme="dark"] .toast-text {
            color: #4ade80;
        }
        @media (max-width: 640px) {
            .top-input-wrap {
                flex-wrap: wrap;
            }
            #topInput {
                width: 100%;
            }
            .format-input-row {
                flex-wrap: wrap;
            }
            .format-val-input {
                width: 100%;
            }
            body {
                font-size: var(--body-font-size);
            }
            .back-btn {
                font-size: 12px;
            }
            .header-btn-circle {
                font-size: 16px;
            }
            .page-head h1 {
                font-size: 28px;
            }
            .toast-text {
                font-size: 16px;
            }
        }
        @media screen and (max-width:767px) and (orientation:portrait){
            .header-btn-circle{
                width:34px;
                height:34px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
<header id="headerDom">
    <div class="container header-inner">
        <!-- 修改：移除a跳转链接，改为div按钮，文字统一← 返回 -->
        <div class="back-btn" id="backHome">← 返回</div>
        <div class="theme-switch-wrap">
            <button id="themeToggle" class="header-btn-circle">🌙</button>
        </div>
    </div>
</header>
<div class="header-spacer" id="headerSpacer"></div>

<main class="container">
    <div class="page-head">
        <h1>字符串命名格式转换工具</h1>
        <div class="blue-tip">一键转换驼峰/空格/横杠/下划线命名，前后端字段专用</div>
        <div class="desc-text">自动识别原始格式，本地安全处理文本</div>
    </div>

    <!-- 顶部输入栏 600px居中 -->
    <div class="top-input-wrap">
        <input id="topInput" placeholder="输入需要转换的标识符，例如 ToolsJoinYou / tools_join_you">
        <button class="btn-blue" id="convertBtn">转换</button>
        <button class="btn-gray" id="exampleBtn">举个例子</button>
    </div>

    <!-- 结果卡片 600px居中 -->
    <div class="result-card" id="resultWrap">
        <div class="origin-tip-bar" id="originTip">原始格式：未知</div>

        <div class="format-item">
            <div class="format-label">驼峰式</div>
            <div class="format-input-row">
                <input class="format-val-input" id="camelVal" readonly>
                <button class="copy-green" data-target="camelVal">复制</button>
            </div>
        </div>

        <div class="format-item">
            <div class="format-label">空格分隔</div>
            <div class="format-input-row">
                <input class="format-val-input" id="spaceVal" readonly>
                <button class="copy-green" data-target="spaceVal">复制</button>
            </div>
        </div>

        <div class="format-item">
            <div class="format-label">连字符分隔</div>
            <div class="format-input-row">
                <input class="format-val-input" id="kebabVal" readonly>
                <button class="copy-green" data-target="kebabVal">复制</button>
            </div>
        </div>

        <div class="format-item">
            <div class="format-label">下划线分隔</div>
            <div class="format-input-row">
                <input class="format-val-input" id="snakeVal" readonly>
                <button class="copy-green" data-target="snakeVal">复制</button>
            </div>
        </div>
    </div>

    <!-- 底部说明卡片 单栏600px居中，与上方宽度统一 -->
    <div class="info-card-section">
        <div class="info-card">
            <h3>工具用途</h3>
            <p>前后端接口字段、数据库字段、CSS类名、变量名快速统一格式，批量命名转换。</p>
        </div>
        <div class="info-card">
            <h3>格式说明</h3>
            <p>驼峰JS变量、下划线数据库、横杠CSS/URL、空格文案标题，四种格式同步输出。</p>
        </div>
        <div class="info-card">
            <h3>数据安全</h3>
            <p>所有文本仅浏览器本地运算，不上传服务器，敏感字段、密钥可放心转换。</p>
        </div>
    </main>

<!-- 复制成功弹窗 -->
<div class="toast-copy" id="copyToast">
    <div class="toast-icon">✓</div>
    <span class="toast-text">复制成功</span>
</div>

<script>
    // ====================== 全局统一明暗主题逻辑（复用cytools通用代码） ======================
    const htmlRoot = document.documentElement;
    const themeBtn = document.getElementById("themeToggle");
    const mediaDark = window.matchMedia('(prefers-color-scheme: dark)');
    const STORAGE_KEY = "site_theme_mode";
    function applyTheme(mode) {
        if (mode === "dark") {
            htmlRoot.setAttribute("data-theme", "dark");
            themeBtn.innerHTML = "☀️";
        } else {
            htmlRoot.removeAttribute("data-theme");
            themeBtn.innerHTML = "🌙";
        }
    }
    function initTheme() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) applyTheme(saved);
        else applyTheme(mediaDark.matches ? "dark" : "light");
    }
    function toggleTheme() {
        const current = htmlRoot.hasAttribute("data-theme") ? "dark" : "light";
        const next = current === "dark" ? "light" : "dark";
        localStorage.setItem(STORAGE_KEY, next);
        applyTheme(next);
    }
    mediaDark.addEventListener("change", e => {
        if (!localStorage.getItem(STORAGE_KEY)) applyTheme(e.matches ? "dark" : "light");
    });
    initTheme();
    themeBtn.onclick = toggleTheme;

    // 头部高度自适应
    const headerDom = document.getElementById('headerDom');
    const headerSpacer = document.getElementById('headerSpacer');
    function syncHeaderHeight() {
        headerSpacer.style.height = headerDom.offsetHeight + "px";
    }
    window.addEventListener('resize', syncHeaderHeight);
    syncHeaderHeight();

    // ====================== 统一复制弹窗+全兼容复制函数（全站标准） ======================
    const copyToast = document.getElementById('copyToast');
    let toastTimer = null;
    // 双层requestAnimationFrame稳定弹窗动画
    function showCopyToast() {
        clearTimeout(toastTimer);
        copyToast.classList.remove('show');
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                copyToast.classList.add('show');
            });
        });
        toastTimer = setTimeout(() => copyToast.classList.remove('show'), 1800);
    }
    // 异步Promise封装复制函数，优先Clipboard，本地file兜底
    function copyTextToClipboard(text) {
        return new Promise((resolve) => {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(() => resolve(true)).catch(() => fallbackCopy(text, resolve));
            } else {
                fallbackCopy(text, resolve);
            }
        });
    }
    function fallbackCopy(text, resolve) {
        const tempTextarea = document.createElement('textarea');
        tempTextarea.style.position = 'fixed';
        tempTextarea.style.left = '-9999px';
        tempTextarea.value = text;
        document.body.appendChild(tempTextarea);
        tempTextarea.select();
        document.execCommand('copy');
        document.body.removeChild(tempTextarea);
        resolve(true);
    }

    // ====================== DOM 元素绑定 ======================
    const topInput = document.getElementById('topInput');
    const convertBtn = document.getElementById('convertBtn');
    const exampleBtn = document.getElementById('exampleBtn');
    const originTip = document.getElementById('originTip');
    const camelVal = document.getElementById('camelVal');
    const spaceVal = document.getElementById('spaceVal');
    const kebabVal = document.getElementById('kebabVal');
    const snakeVal = document.getElementById('snakeVal');
    const backHome = document.getElementById('backHome');

    // 返回按钮浏览器原生后退逻辑
    backHome.onclick = () => {
        history.back();
    };

    // 单词拆分核心函数
    function getWordList(str) {
        if (!str.trim()) return [];
        let splitStr = str.replace(/([A-Z])/g, ' $1').trim();
        return splitStr.split(/[\s_\-]+/).filter(w => w.length > 0);
    }
    // 识别原始格式
    function detectOrigin(str) {
        if (!str.trim()) return "未知";
        if (/^[a-z][a-zA-Z0-9]*[A-Z]/.test(str)) return "驼峰式";
        if (/^[A-Z][a-zA-Z0-9]*[A-Z]/.test(str)) return "大驼峰(Pascal)";
        if (str.includes('_')) return "下划线分隔";
        if (str.includes('-')) return "连字符分隔";
        if (str.includes(' ')) return "空格分隔";
        return "未知";
    }
    // 四种转换方法
    function toCamel(words) {
        return words.map((w,i)=>i===0 ? w.toLowerCase() : w[0].toUpperCase()+w.slice(1).toLowerCase()).join('');
    }
    function toSpace(words) {
        return words.map(w=>w.toLowerCase()).join(' ');
    }
    function toKebab(words) {
        return words.map(w=>w.toLowerCase()).join('-');
    }
    function toSnake(words) {
        return words.map(w=>w.toLowerCase()).join('_');
    }

    // 转换按钮
    convertBtn.onclick = () => {
        const text = topInput.value.trim();
        originTip.textContent = "原始格式：" + detectOrigin(text);
        if (!text) {
            camelVal.value = "";
            spaceVal.value = "";
            kebabVal.value = "";
            snakeVal.value = "";
            return;
        }
        const words = getWordList(text);
        camelVal.value = toCamel(words);
        spaceVal.value = toSpace(words);
        kebabVal.value = toKebab(words);
        snakeVal.value = toSnake(words);
    }
    // 举例子按钮
    exampleBtn.onclick = () => {
        topInput.value = "ToolsJoinYou";
        convertBtn.click();
    }
    // 复制按钮绑定（异步调用统一复制函数）
    document.querySelectorAll('.copy-green').forEach(btn=>{
        btn.onclick = async ()=>{
            const targetId = btn.dataset.target;
            const inputEl = document.getElementById(targetId);
            await copyTextToClipboard(inputEl.value);
            showCopyToast();
        }
    })
    // 回车触发转换
    topInput.onkeydown = (e) => {
        if(e.key === 'Enter') convertBtn.click();
    }
</script>
</body>
</html>
