<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>cytools-html</title>
  <style>
/* ====================== 全局CSS变量配置区 ====================== */
:root {
  --primary: #3b82f6;
  --primary-light: rgba(59, 130, 246, 0.08);
  --nav-blur: 24px;
  --warn: #f59e0b;

  /* 悬浮浮动动画参数 */
  --glass-blur: 14px;
  --float-up: -4px;
  --float-down: 0px;
  --float-shadow-up: 0 14px 40px rgba(0, 0, 0, 0.12);
  --float-shadow-down: 0 2px 6px rgba(0, 0, 0, 0.05);

  /* 按钮圆角、阴影 */
  --btn-radius: 10px;
  --btn-active-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);

  /* 顶部导航小按钮尺寸 */
  --nav-btn-height: 28px;
  --nav-btn-font-size: 12px;

  /* 文字层级颜色 */
  --text-main: #1f2937;
  --text-secondary: #606266;
  --text-weak: #909399;
  --border-light-fill: rgba(242, 243, 245, 0.85);
  --bg-page: transparent;
  --shadow-float: var(--float-shadow-up);
  --tag-shadow: none;
  --tag-hover-shadow: var(--float-shadow-up);
  --tag-active-border: #3b82f6;
  --tag-active-text: #1f2937;

  /* 统一圆角规格体系 */
  --radius-xs: 4px;
  --radius-sm: 6px;
  --radius-lg: 14px;
  --radius-full: 999px;

  /* 间距统一规范 */
  --space-xs: 6px;
  --space-sm: 6px;
  --space-md: 14px;
  --space-lg: 18px;
  --space-xl: 12px;

  /* 全局过渡动画统一时长 */
  --transition: all 0.22s ease;
  --key-radius: 4px;

  /* 文字排版基础 */
  --body-font-size: 16px;
  --body-line-height: 1.7;
  --title-line-height: 1.3;
  --sub-title-line-height: 1.1;

  /* 页面布局限制 */
  --content-max-width: 1100px;
  --card-gap: 12px;
  --card-min-width: 300px;
  --theme-btn-width: 32px;
}

/* ====================== 暗色模式变量覆盖区 ====================== */
.dark {
  --primary: #60a5fa;
  --primary-light: rgba(96, 165, 250, 0.12);
  --btn-active-shadow: 0 2px 12px rgba(0, 0, 0, 0.16);

  --text-main: #e5e7eb;
  --text-secondary: #a0aec0;
  --text-weak: #718096;
  --border-light-fill: rgba(44, 55, 80, 0.85);
  --tag-active-border: #60a5fa;
  --tag-active-text: #ffffff;
}

/* ====================== 公共复用类（本次新增核心） ====================== */
/* 全局玻璃面板统一样式 */
.glass {
  background: rgba(255, 255, 255, 0.11);
  backdrop-filter: blur(var(--glass-blur)) saturate(140%);
  -webkit-backdrop-filter: blur(var(--glass-blur)) saturate(140%);
  border-top: 1px solid rgba(255, 255, 255, 0.22);
  border-left: 1px solid rgba(255, 255, 255, 0.14);
  border-right: 1px solid rgba(0, 0, 0, 0.04);
  border-bottom: 1px solid rgba(0, 0, 0, 0.06);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.18);
}
.dark .glass {
  background: rgba(22, 28, 42, 0.16);
  border-top: 1px solid rgba(255, 255, 255, 0.12);
  border-left: 1px solid rgba(255, 255, 255, 0.06);
  border-right: 1px solid rgba(0, 0, 0, 0.15);
  border-bottom: 1px solid rgba(0, 0, 0, 0.18);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.28), inset 0 1px 0 rgba(255, 255, 255, 0.08);
}

.header-btn-circle.glass,
.fav-star-fixed.glass {
  border-width: 1px;
  border-style: solid;
}
.dark .header-btn-circle.glass,
.dark .fav-star-fixed.glass {
  border-top: 1px solid rgba(255, 255, 255, 0.12);
  border-left: 1px solid rgba(255, 255, 255, 0.06);
  border-right: 1px solid rgba(0, 0, 0, 0.15);
  border-bottom: 1px solid rgba(0, 0, 0, 0.18);
}
.header-btn-circle.hover-float:hover,
.fav-star-fixed.hover-float:hover {
  border-width: 1px !important;
}

/* 统一悬浮上浮+按压动画 */
.hover-float {
  transform-origin: center;
  transition: var(--transition);
    /* 你原有所有样式不动，只追加下面两行 */
    cursor: pointer;
  user-select: none; /* 顺带禁止双击选文字，体验更好 */
}

.hover-float:hover {
  transform: translateY(var(--float-up));
  border-top-color: rgba(255, 255, 255, 0.32);
  box-shadow: var(--float-shadow-up);
  cursor: pointer;
}
.hover-float:active {
  transform: translateY(var(--float-down));
  box-shadow: var(--btn-active-shadow);
}
.dark .hover-float:hover {
  border-top-color: rgba(255, 255, 255, 0.16);
}

/* 禁止选中文字 */
.no-select {
  user-select: none;
  pointer-events: none;
}

/* ====================== 全局基础重置样式 ====================== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  transition: var(--transition);
  /* 新增：所有元素继承全局字体 */
  font-family: inherit;
}
html {
  font-size: var(--body-font-size);
  /* 新增全局字体栈 + 渲染优化 */
  font-family: "Microsoft YaHei", "微软雅黑", system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: subpixel-antialiased;
  -moz-osx-font-smoothing: auto;
}
html, body {
  min-height: 100vh;
  background: var(--bg-page);
  color: var(--text-main);
}
body {
  width: 100%;
  padding: 0;
  background-image: var(--bg-gradient-base);
  background-attachment: fixed;
  background-size: 100vw 100vh;
  background-position: center;
  background-repeat: no-repeat;
  transition: background-image 0.4s ease;
}
a {
  text-decoration: none;
  color: inherit;
}
button {
  font-family: inherit;
  font-size: inherit;
  border: none;
  background: transparent;
  cursor: pointer;
}
.container {
  max-width: var(--content-max-width);
  width: calc(100% - 40px);
  margin: 0 auto;
}

/* ====================== 顶部Header ====================== */
header {
  position: fixed;
  top: 14px;
  left: 50%;
  transform: translateX(-50%);
  width: min(100% - 32px, var(--content-max-width));
  z-index: 99;
  border-radius: var(--radius-lg);
}
.header-inner {
  position: relative;
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 10px 16px;
  padding: 14px 16px;
  padding-right: calc(var(--theme-btn-width) + 24px);
  width: 100%;
}
.logo-wrap {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-shrink: 0;
}
.logo-icon {
  width: 42px;
  height: 42px;
  border-radius: var(--radius-sm);
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  flex-shrink: 0;
  color: var(--text-main);
}
.logo-text h1 {
  font-size: clamp(20px, 2.5vw, 28px);
  font-weight: 600;
  line-height: var(--title-line-height);
  white-space: nowrap;
}
.logo-text p {
  font-size: clamp(11px, 1.2vw, 14px);
  margin-top: 3px;
  line-height: 1.1;
  color: var(--text-weak);
  white-space: nowrap;
}
.nav-link-group {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  flex-wrap: wrap;
  gap: 4px;
  min-width: 220px;
}
.header-btn {
  padding: 4px 8px;
  border-radius: 6px;
  font-size: var(--nav-btn-font-size);
  font-weight: 600;
  line-height: 1;
  display: flex;
  align-items: center;
  gap: 3px;
  white-space: nowrap;
  flex-shrink: 0;
  min-width: fit-content;
  height: var(--nav-btn-height);
}
.theme-switch-wrap {
  position: absolute;
  top: 50%;
  right: 16px;
  transform: translateY(-50%);
}
.header-btn-circle {
  width: var(--theme-btn-width);
  height: var(--theme-btn-width);
  padding: 0;
  border-radius: 50%;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: var(--text-main);
}

/* 移动端竖屏头部适配 */
@media screen and (max-width: 767px) and (orientation: portrait) {
  header {
    width: calc(100% - 24px);
    top: 12px;
  }
  .header-btn-circle {
    width: 32px;
    height: 32px;
    font-size: 13px;
  }
}

/* ====================== 主内容区 ====================== */
main.container {
  flex: 1;
  padding-top: 2px;
}
.search-wrap {
  padding: 0 0 8px 0;
  display: flex;
  gap: var(--space-sm);
  align-items: center;
}
.search-box {
  flex: 1;
  display: flex;
  align-items: center;
  padding: 0 16px;
  height: 40px;
  border-radius: var(--radius-lg);
  gap: 10px;
  min-width: 0;
  position: relative;
}
.search-box:focus-within {
  border-left-color: rgba(59, 130, 246, 0.22);
  box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.28), var(--float-shadow-up) !important;
}
.search-icon {
  font-size: 17px;
  color: var(--text-weak);
  flex-shrink: 0;
}
#searchInput {
  flex: 1;
  height: 100%;
  border: none;
  outline: none;
  font-size: 14px;
  line-height: 1;
  background: transparent !important;
  color: var(--text-main);
  min-width: 0;
  padding-right: 55px;
  box-shadow: none !important;
}
#searchInput::placeholder {
  color: var(--text-weak);
}
#searchInput:-webkit-autofill,
#searchInput:-webkit-autofill:hover,
#searchInput:-webkit-autofill:focus {
  box-shadow: 0 0 0 1000px transparent inset !important;
  -webkit-text-fill-color: var(--text-main) !important;
  transition: background-color 9999s ease 0s;
}
#searchInput::selection,
#searchInput::-webkit-selection {
  background: transparent !important;
  color: var(--primary) !important;
}
.search-key-hint {
  position: absolute;
  right: 10px;
  display: flex;
  gap: 6px;
  z-index: 2;
}
.key-tag {
  font-size: 12px;
  line-height: 1;
  padding: 0 5px;
  height: 14px;
  display: inline-flex;
  align-items: center;
  color: var(--text-main);
  border-radius: var(--key-radius);
  font-weight: 500;
  white-space: nowrap;
}
.sort-btn {
  height: 40px;
  padding: 0 16px;
  border-radius: var(--btn-radius);
  font-size: 14px;
  font-weight: 600;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  white-space: nowrap;
  color: var(--text-main);
  flex-shrink: 0;
}

/* ====================== 分类标签栏 ====================== */
.category-wrap {
  padding-bottom: 8px;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.category-visible-row {
  display: flex;
  align-items: center;
  gap: 8px;
  overflow: visible;
  position: relative;
}
.tag-flow-box {
  display: flex;
  gap: 8px;
  flex: 1;
  min-width: 0;
  padding-block: 4px;
  overflow: visible;
}
.category-tag, .more-toggle-btn {
  flex-shrink: 0;
  padding: 6px 8px;
  border-radius: var(--btn-radius);
  font-size: 14px;
  line-height: 1;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  color: var(--text-main);
}
.category-tag.active {
  border-top: 1px solid rgba(255, 255, 255, 0.06) !important;
  border-left-color: rgba(59, 130, 246, 0.22);
  color: var(--tag-active-text);
  background: var(--primary-light);
  font-weight: 700;
}
.dark .category-tag.active {
  border-top: 1px solid rgba(255, 255, 255, 0.03) !important;
}
.more-toggle-btn {
  width: 84px;
  justify-content: center;
  visibility: visible !important;
  opacity: 1 !important;
}
.overflow-panel {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  row-gap: 6px;
  margin-top: 0;
  height: 0;
  overflow: hidden;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.18s ease, visibility 0.18s ease;
  pointer-events: none;
}
.overflow-panel.open {
  height: auto;
  margin-top: 8px;
  opacity: 1;
  visibility: visible;
  pointer-events: auto;
  overflow: visible;
}
.empty-tip {
  text-align: center;
  padding: 80px 0;
  font-size: var(--body-font-size);
  color: var(--text-weak);
}

/* ====================== 工具卡片网格 ====================== */
.tool-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(var(--card-min-width), 1fr));
  gap: var(--card-gap);
}
@media (min-width: 1200px) {
  .tool-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }
}
@media (max-width: 860px) {
  .tool-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}
@media (max-width: 640px) {
  .tool-grid {
    grid-template-columns: 1fr;
  }
  .search-wrap {
    flex-wrap: wrap;
  }
  .search-box, .sort-btn {
    width: 100%;
  }
}
.tool-card {
  display: flex;
  flex-direction: column;
  border-radius: var(--radius-lg);
  padding: var(--space-lg);
  position: relative;
  min-width: 0;
  cursor: pointer;
}
.tool-card:hover {
  border-top-color: rgba(255, 255, 255, 0.32);
  box-shadow: 0 14px 40px rgba(0, 0, 0, 0.12), inset 0 1px 0 rgba(255, 255, 255, 0.24);
}
.dark .tool-card:hover {
  border-top-color: rgba(255, 255, 255, 0.16);
  box-shadow: 0 14px 40px rgba(0, 0, 0, 0.36), inset 0 1px 0 rgba(255, 255, 255, 0.12);
}

.tool-card:hover .card-icon {
  background: transparent;
  color: var(--text-main);
}
.tool-card::after {
  content: "⮕";
  position: absolute;
  right: var(--space-lg);
  bottom: var(--space-lg);
  font-size: 18px;
  color: var(--text-weak);
  opacity: 0;
  transition: opacity 0.18s ease;
  pointer-events: none;
  font-weight: normal;
}
.tool-card:hover::after {
  opacity: 1;
}
.card-label {
  position: absolute;
  top: -12px;
  right: -12px;
  height: 19px;
  padding: 0 7px;
  border-radius: var(--radius-xs);
  color: #fff;
  font-size: 11px;
  line-height: 1;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  z-index: 4;
  opacity: 0.7;
}
.label-featured {
  background: #0ddb9d;
}
.label-top {
  background: var(--primary);
}
.label-recommend {
  background: #ef4444;
}
.card-header {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 8px;
  min-width: 0;
  padding-left: 0;
}
.card-icon {
  width: 44px;
  height: 44px;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  background: transparent;
  color: var(--text-main);
  flex-shrink: 0;
  position: relative;
  border: 1px solid rgba(180, 190, 200, 0.65);
}
.dark .card-icon {
  border-color: rgba(110, 120, 135, 0.65);
}
.card-title-wrap {
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-width: 0;
}
.card-title {
  font-size: 16px;
  font-weight: 600;
  line-height: var(--sub-title-line-height);
  word-break: break-word;
}
.card-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 2px;
  font-size: 13px;
  line-height: 1.3;
  color: var(--text-weak);
  min-width: 0;
}
.card-desc {
  font-size: 14px;
  line-height: 1.4; /* 文字行高同步改成1.4，拉开文字间距 */
  color: var(--text-secondary);
  /* 最小高度、最大高度统一使用1.4，尺寸完全匹配 */
  min-height: calc(14px * 1.4 * 2);
  max-height: calc(14px * 1.4 * 2);
  /* 多行省略全套 */
  overflow: hidden;
  text-overflow: ellipsis;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  display: box;
  line-clamp: 2;
  box-orient: vertical;
  word-break: break-word;
  margin-bottom: 4px;
}
.card-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: auto;
  gap: var(--space-sm);
  min-width: 0;
}
.card-tags {
  display: flex;
  gap: 6px;
  flex-wrap: nowrap; /* 禁止自动换行，强制单行 */
  min-width: 0;
  flex-shrink: 1;
  max-width: calc(100% - 40px);
  /* 单行省略核心三属性 */
  overflow: hidden;
  text-overflow: ellipsis;
}
/* 标签本身禁止压缩 */
.card-tag {
  padding: 4px 6px;
  border-radius: var(--radius-xs);
  font-size: 12px;
  line-height: 1;
  background: var(--border-light-fill);
  color: var(--text-secondary);
  white-space: nowrap; /* 单个标签文字不换行 */
  opacity: 0.6;
  flex-shrink: 0; /* 标签固定宽度，不缩小 */
}
.fav-star-fixed {
  position: absolute;
  top: var(--space-lg);
  right: var(--space-lg);
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: var(--text-weak);
  transform: translateY(0);
  will-change: transform;
  z-index: 3;
  opacity: 0;
  visibility: hidden;
}
.fav-star-fixed.fav {
  border-top: 1px solid rgba(255, 255, 255, 0.06) !important;
  border-left-color: rgba(245, 158, 11, 0.22);
  opacity: 1;
  visibility: visible;
}
.dark .fav-star-fixed.fav {
  border-top: 1px solid rgba(255, 255, 255, 0.03) !important;
}
.tool-card:hover .fav-star-fixed {
  opacity: 1;
  visibility: visible;
}
.fav-star-fixed svg {
  width: 16px;
  height: 16px;
}

/* ====================== 页脚Footer ====================== */
footer {
  width: min(100% - 32px, var(--content-max-width));
  margin: var(--space-xl) auto 18px;
  padding: 20px 16px;
  text-align: center;
  border-radius: var(--radius-lg);
  font-size: 13px;
  line-height: 1.1;
  color: var(--text-weak);
}
footer .container {
  margin: 6px auto;
}

/* ====================== 全局文字选中 ====================== */
::selection {
  background: transparent;
  color: var(--primary);
}
::-moz-selection {
  background: transparent;
  color: var(--primary);
}
  </style>
</head>

    // 随机径向椭圆光斑，黄色区域随机屏幕任意位置
    function randomBgGradient() {
      const themeMode = localStorage.getItem(STORAGE_KEY);
      const isDark = themeMode === "dark";

      // 光斑圆心坐标 5%~95% 全屏随机
      const x = (5 + Math.random() * 90).toFixed(2);
      const y = (5 + Math.random() * 90).toFixed(2);
      // 椭圆宽高随机，形成大小不一的椭圆扩散光斑
      const sizeX = (200 + Math.random() * 80).toFixed(2);
      const sizeY = (100 + Math.random() * 30).toFixed(2);

      let randomGrad;
      if (isDark) {
        // 深色径向渐变
        randomGrad = `radial-gradient(ellipse ${sizeX}% ${sizeY}% at ${x}% ${y}%, #111827 0%, #0f1318 45%, #0a0e12 100%)`;
      } else {
        // 浅色黄色椭圆向外扩散光斑
        randomGrad = `radial-gradient(ellipse ${sizeX}% ${sizeY}% at ${x}% ${y}%, #e9e9cc 0%, #b8e4ee 45%, #e6f2fb 100%)`;
      }
      document.documentElement.style.setProperty("--bg-gradient-base", randomGrad);
    }

    function setMainTopOffset() {
      const headerH = headerDom.getBoundingClientRect().height + 24;
      mainDom.style.marginTop = headerH + "px";
    }

    function applyTheme(mode) {
  if (mode === "dark") {
    bodyDom.classList.add("dark");
    themeBtn.innerHTML = "☀️";
  } else {
    bodyDom.classList.remove("dark");
    themeBtn.innerHTML = "🌙";
  }
  randomBgGradient();
  setMainTopOffset();
}

    function initTheme() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    applyTheme(saved);
  } else {
    applyTheme(mediaDark.matches ? "dark" : "light");
  }
  setMainTopOffset();
}

    function toggleTheme() {
      const isDark = bodyDom.classList.contains("dark");
      const next = isDark ? "light" : "dark";
      localStorage.setItem(STORAGE_KEY, next);
      applyTheme(next);
    }

    mediaDark.addEventListener("change", e => {
      if (!localStorage.getItem(STORAGE_KEY)) {
        applyTheme(e.matches ? "dark" : "light");
      }
    });

    function saveFavAndRefreshCount() {

    function getAutoCategoryList() {
  const map = new Map();
  toolList.forEach(i => {
    const key = i.cat;
    if (!map.has(key)) {
      const info = getCatInfo(key);
      map.set(key, {
        cat: key,
        name: info.name,
        icon: info.icon
      });
    }
  });
  return Array.from(map.values());
}

function buildFullCategoryConfig() {
  const base = [
    { cat: "all", icon: getCatInfo("all").icon, name: getCatInfo("all").name },
    { cat: "star", icon: getCatInfo("star").icon, name: getCatInfo("star").name }
  ];
  return [...base, ...CACHE_CATEGORY_LIST];
}

    function getCatCount(key) {
      if (key === "all") return toolList.length;
      if (key === "star") return favList.length;
      return toolList.filter(i => i.cat === key).length;
    }

    function refreshAllCategoryUI() {
  const cats = buildFullCategoryConfig();
  visibleTagBox.innerHTML = "";
  overflowPanel.innerHTML = "";
  let visibleCatList = [];
  let overflowCatList = [];
  const boxWidth = visibleTagBox.clientWidth || 600;

  // 仅首次初始化计算标签宽度，永久缓存，resize不再重测
  if (!tagWidthCache) {
    const tempWrap = document.createElement("div");
    tempWrap.style.cssText = "position:absolute;visibility:hidden;display:flex;gap:8px;white-space:nowrap;";
    document.body.appendChild(tempWrap);
    tagWidthCache = [];
    cats.forEach(catItem => {
      const div = document.createElement("div");
      div.className = "category-tag";
      div.innerHTML = `${catItem.icon} ${catItem.name}(0)`;
      tempWrap.appendChild(div);
      const width = div.offsetWidth + 8;
      tagWidthCache.push({ item: catItem, width });
      tempWrap.removeChild(div);
    });
    document.body.removeChild(tempWrap);
  }

  // 分割可见/折叠
  let totalW = 0;
  for (const tw of tagWidthCache) {
    if (totalW + tw.width <= boxWidth) {
      visibleCatList.push(tw.item);
      totalW += tw.width;
    } else {
      overflowCatList.push(tw.item);
    }
  }

  // 渲染可见标签
  visibleCatList.forEach(catItem => {
    const count = getCatCount(catItem.cat);
    const tagDom = document.createElement("div");
    tagDom.className = `category-tag glass hover-float ${currentCat === catItem.cat ? "active" : ""}`;
    tagDom.innerHTML = `${catItem.icon} ${catItem.name}(${count})`;
    tagDom.dataset.cat = catItem.cat;
    tagDom.onclick = () => setActiveCat(catItem.cat);
    visibleTagBox.appendChild(tagDom);
  });

  // 渲染折叠面板标签
  overflowCatList.forEach(catItem => {
    const count = getCatCount(catItem.cat);
    const tagDom = document.createElement("div");
    tagDom.className = `category-tag glass hover-float ${currentCat === catItem.cat ? "active" : ""}`;
    tagDom.innerHTML = `${catItem.icon} ${catItem.name}(${count})`;
    tagDom.dataset.cat = catItem.cat;
    tagDom.onclick = () => setActiveCat(catItem.cat);
    overflowPanel.appendChild(tagDom);
  });

  moreToggle.style.display = overflowCatList.length > 0 ? "flex" : "none";
}


function setActiveCat(cat) {
  currentCat = cat;
  filterCache.clear();
  refreshAllCategoryUI();
  filterTools();
  window.scrollTo(0, 0);
  saveViewState();
}

moreToggle.onclick = () => {
  panelOpen = !panelOpen;
  overflowPanel.classList.toggle("open", panelOpen);
  moreToggle.innerHTML = panelOpen ? "▲ 收起" : "▼ 更多";
  window.scrollTo(0, 0);
  saveViewState();
};

function filterTools() {
  const kw = searchInput.value.toLowerCase().trim();
  const cacheKey = `${currentCat}|${kw}|${sortMode}`;
  // 命中缓存直接渲染，不重复循环过滤
  if(filterCache.has(cacheKey)){
    renderTools(filterCache.get(cacheKey));
    return;
  }
  let arr = [...toolList];
  if (currentCat === "star") arr = arr.filter(i => favList.includes(i.id));
  else if (currentCat !== "all") arr = arr.filter(i => i.cat === currentCat);
  if (kw) arr = arr.filter(i =>
    i.title.toLowerCase().includes(kw) ||
    i.desc.toLowerCase().includes(kw) ||
    i.cat.toLowerCase().includes(kw) ||
    i.tags.join("").toLowerCase().includes(kw)
  );
  arr.sort((a, b) => {
    const ta = a.top ? 1 : 0;
    const tb = b.top ? 1 : 0;
    if (tb - ta !== 0) return tb - ta;
    const da = new Date(a.date).getTime();
    const db = new Date(b.date).getTime();
    return sortMode === "date-desc" ? db - da : da - db;
  });
  filterCache.set(cacheKey, arr);
  renderTools(arr);
}

    function renderTools(list) {
  cardContainer.innerHTML = "";
  // 优先展示ID重复致命错误
  if (duplicateIdTip) {
    cardContainer.innerHTML = `<div class="empty-tip" style="color:#ef4444;white-space:pre-line;">${duplicateIdTip}</div>`;
    return;
  }
  if (!list.length) {
    cardContainer.innerHTML = currentCat === "star"
      ? `<div class="empty-tip">暂无收藏工具，点击卡片右上角星星添加收藏</div>`
      : `<div class="empty-tip">未找到匹配工具，尝试更换关键词或分类</div>`;
    return;
  }
  const starFill = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" fill="#fbbf24"/></svg>`;
  const starEmpty = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" stroke="#9ca3af" stroke-width="1.5"/></svg>`;
  const frag = document.createDocumentFragment();
  list.forEach(item => {
    const fav = favList.includes(item.id);
    const star = fav ? starFill : starEmpty;
    const topTag = item.top ? `<span class="card-label label-top">置顶</span>` : (item.featured ? `<span class="card-label label-featured">外链</span>` : "");
    const tagHtml = item.tags.map(t => `<span class="card-tag">${t}</span>`).join("");
    const targetAttr = item.target === "_blank" ? 'target="_blank" rel="noopener noreferrer"' : '';
    const html = `
<a href="${item.url}" ${targetAttr} class="tool-card glass hover-float" data-id="${item.id}">
  <button class="fav-star-fixed glass hover-float ${fav ? "fav" : ""}" onclick="event.stopPropagation();event.preventDefault();toggleFav('${item.id}');">${star}</button>
  <div class="card-header">
    <div class="card-icon">${item.icon}${topTag}</div>
    <div class="card-title-wrap">
      <h3 class="card-title">${item.title}</h3>
      <div class="card-meta">
        <div>分类：${getCatInfo(item.cat).name}</div>
        <div>更新日期：${item.date}</div>
      </div>
    </div>
  </div>
  <p class="card-desc">${item.desc}</p>
  <div class="card-bottom">
    <div class="card-tags">${tagHtml}</div>
  </div>
</a>`;
    const temp = document.createElement("div");
    temp.innerHTML = html;
    frag.appendChild(temp.firstElementChild);
  });
  cardContainer.appendChild(frag);
}

    function debounce(fn, delay = 100) {
      let timer = null;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), delay);
      };
    }

    const handleResize = debounce(() => {
  setMainTopOffset();
  tagWidthCache = null;
  refreshAllCategoryUI();
  saveViewState();
});

    window.addEventListener("resize", handleResize);

    window.addEventListener("DOMContentLoaded", () => {
  initTheme();
  setMainTopOffset();
  refreshAllCategoryUI();
  filterTools();
  const hasHistory = restoreViewState();
  // 有历史记录则重新筛选一次，保证卡片匹配分类
  if (hasHistory) {
    filterTools();
    requestAnimationFrame(() => {
      if (history.state?.scrollY) window.scrollTo({ top: history.state.scrollY, left: 0, behavior: "instant" });
    });
  }
});

    const debouncedFilter = debounce(() => {
  filterTools();
  saveViewState();
}, 150);
searchInput.addEventListener("input", debouncedFilter);

sortBtn.onclick = () => {
  sortMode = sortMode === "date-desc" ? "date-asc" : "date-desc";
  sortBtn.innerText = sortMode === "date-desc" ? "时间排序 ⬇️" : "时间排序 ⬆️";
  filterCache.clear();
  filterTools();
  window.scrollTo(0, 0);
  saveViewState();
};

    document.addEventListener("keydown", e => {
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "k") {
    e.preventDefault();
    searchInput.focus();
    searchInput.select(); // 新增全选文字，一键输入覆盖
  }
});

    themeBtn.onclick = toggleTheme;
    // 监听浏览器前进/后退按钮，恢复视图
    window.addEventListener("popstate", () => {
  filterCache.clear();
  htmlRoot.style.setProperty("--transition", "none");
  // 1.恢复历史变量、刷新标签高亮
  const hasRestore = restoreViewState();
  // 2.强制重新筛选渲染卡片（关键！）
  if (hasRestore) filterTools();
  // 双层帧等待布局稳定再滚动
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      const state = history.state;
      if (state && typeof state.scrollY === "number") {
        window.scrollTo({ top: state.scrollY, left: 0, behavior: "instant" });
      }
      htmlRoot.style.setProperty("--transition", "all 0.22s ease");
    });
  });
});

window.addEventListener("scroll", debounce(saveViewState, 80));
  </script>
</body>
