<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>CSS 渐变色生成器</title>
<style>
    :root {
        --primary: #10b981;
        --primary-light: #dcfce7;
        --warn: #f97316;
        --danger: #ef4444;
        --nav-btn-bg: #ffffff;
        --nav-btn-border: #e5e7eb;
        --nav-btn-text: #222222;
        --text-main: #222222;
        --text-secondary: #555555;
        --text-weak: #888888;
        --border-base: #e5e7eb;
        --border-light: #f3f4f6;
        --bg-page: #ffffff;
        --bg-card: #ffffff;
        --bg-btn: #ffffff;
        --shadow-sm: 0 1px 3px rgba(0,0,0.06);
        --shadow-lg: 0 6px 16px rgba(0,0.1);
        --radius-sm: 6px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --radius-full: 999px;
        --space-xs: 6px;
        --space-sm: 10px;
        --space-md: 14px;
        --space-lg: 16px;
        --transition: all 0.3s ease;
        --body-font-size: 16px;
        --desktop-font-ratio: 0.85;
        --content-max-width: 1200px;
        --nav-line-height: 38px;
        --theme-btn-width: 36px;
    }
    html[data-theme="dark"] {
        --primary: #10b981;
        --primary-light: rgba(16, 185, 129, 0.15);
        --nav-btn-bg: #1f2937;
        --nav-btn-border: #374151;
        --nav-btn-text: #f3f4f6;
        --warn: #f97316;
        --text-main: #f1f5f9;
        --text-secondary: #cbd5e1;
        --text-weak: #94a3b8;
        --border-base: #334155;
        --border-light: #334155;
        --bg-page: #0f172a;
        --bg-card: #1e293b;
        --bg-btn: #1e293b;
        --shadow-sm: 0 1px 3px rgba(0,0,0.2);
        --shadow-lg: 0 6px 16px rgba(0,0.35);
    }
    html {
        font-family: system-ui, "Microsoft YaHei", sans-serif;
        -webkit-font-smoothing: antialiased;
    }
    body {
        min-height: 100vh;
        background: var(--bg-page);
        display: flex;
        flex-direction: column;
        line-height: 1.5;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
    }
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        transition: var(--transition);
    }
    a {
        text-decoration: none;
        color: inherit;
    }
    button {
        font-family: inherit;
        font-size: inherit;
        border: none;
        background: transparent;
        cursor: pointer;
        border-radius: var(--radius-sm);
    }
    .container {
        max-width: var(--content-max-width);
        width: calc(100% - 48px);
        margin: 0 auto;
    }
    header {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 99;
    }
    .header-inner {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 0;
    }
    .back-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--nav-btn-text);
        font-size: 12px;
        font-weight: 500;
        padding: 7px 10px;
        border: 1px solid var(--nav-btn-border);
        border-radius: var(--radius-lg);
        background: var(--nav-btn-bg);
        height: var(--nav-line-height);
    }
    .back-btn:hover {
        border-color: var(--primary);
        background: var(--primary-light);
        color: var(--primary);
    }
    .theme-switch-wrap {
        position: absolute;
        right: 0;
        top: 50%;
        transform: translateY(-50%);
    }
    .header-btn-circle {
        width: var(--theme-btn-width);
        height: var(--theme-btn-width);
        border: 1px solid var(--nav-btn-border);
        border-radius: 50%;
        display: grid;
        place-items: center;
        background: var(--nav-btn-bg);
        color: var(--nav-btn-text);
    }
    .header-btn-circle:hover {
        border-color: var(--primary);
        background: var(--primary-light);
        color: var(--primary);
    }
    .header-spacer {
        width: 100%;
        height: 60px;
    }
    main.container {
        margin-top: 12px;
        padding-bottom: 60px;
    }
    .page-head {
        text-align: center;
        margin: 20px 0 30px;
    }
    .page-head h1 {
        font-size: calc(30px * var(--desktop-font-ratio));
        margin-bottom: 12px;
        color: var(--text-main);
    }
    .desc-text {
        color: var(--text-weak);
        font-size: calc(15px * var(--desktop-font-ratio));
    }
    .card-box {
        background: var(--bg-card);
        border: 1px solid var(--border-base);
        border-radius: var(--radius-lg);
        padding: 24px;
        box-shadow: var(--shadow-sm);
    }
    .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
    }
    @media(max-width:768px){
        .row {grid-template-columns: 1fr;}
    }
    .input-block {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }
    .input-label {
        display: block;
        color: var(--text-main);
        font-weight: 500;
    }
    /* 隐藏原生颜色输入框 */
    input[type="color"] {
        position: absolute;
        width: 0;
        height: 0;
        opacity: 0;
        pointer-events: none;
    }
    /* 可视化颜色色块按钮 */
    .color-block {
        width: 100%;
        height: 56px;
        border: 2px solid var(--border-base);
        border-radius: var(--radius-sm);
        cursor: pointer;
    }
    select {
        width: 100%;
        padding: 10px;
        border: 1px solid var(--border-base);
        border-radius: var(--radius-sm);
        background: var(--bg-btn);
        color: var(--text-main);
        outline: none;
    }
    textarea {
        width: 100%;
        padding: 12px 16px;
        border: 1px solid var(--border-base);
        border-radius: var(--radius-sm);
        background: var(--bg-btn);
        color: var(--text-main);
        font-family: Consolas, monospace;
        outline: none;
        min-height: 120px;
        resize: vertical;
    }
    .preview-box {
        width: 100%;
        height: 220px;
        border-radius: var(--radius-md);
        margin-bottom: 20px;
        border: 1px solid var(--border-base);
    }
    .btn-row {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin: 20px 0;
    }
    .op-btn {
        height: 44px;
        padding: 0 18px;
        border: 1px solid var(--border-base);
        border-radius: var(--radius-sm);
        background: var(--bg-btn);
        color: var(--text-main);
        white-space: nowrap;
    }
    .op-btn.primary {
        border-color: var(--primary);
        background: var(--primary-light);
        color: var(--primary);
    }
    .op-btn.warn {
        color: #ef4444;
        border-color: #fecdd3;
    }
    .op-btn:hover {
        border-color: var(--primary);
        background: var(--primary-light);
        color: var(--primary);
    }
    /* 复制提示弹窗 */
    .toast-copy {
        position: fixed;
        top: 80px;
        left: 50%;
        transform: translateX(-50%) translateY(-20px);
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 16px 32px;
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        border-radius: 16px;
        box-shadow: 0 4px 12px rgba(16, 185, 129, 0.15);
        z-index: 999999;
        opacity: 0;
        pointer-events: none;
        transition: all 0.3s ease;
        min-height: 72px;
    }
    .toast-copy.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }
    .toast-icon {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #22c55e;
        color: #fff;
        display: grid;
        place-items: center;
        font-size: 22px;
        font-weight: bold;
    }
    .toast-text {
        font-size: 28px;
        color: #16a34a;
        font-weight: 500;
    }
    html[data-theme="dark"] .toast-copy {
        background: rgba(34, 197, 94, 0.12);
        border-color: rgba(34, 197, 94, 0.3);
    }
    html[data-theme="dark"] .toast-text {
        color: #4ade80;
    }
    @media (max-width:640px) {
        .page-head h1 {font-size:28px;}
        .toast-text {font-size: 20px;}
    }
</style>
</head>
<body>
<header id="headerDom">
    <div class="container header-inner">
        <a href="index.html" class="back-btn">← 返回首页</a>
        <div class="theme-switch-wrap">
            <button id="themeToggle" class="header-btn-circle">🌙</button>
        </div>
    </div>
</header>
<div class="header-spacer" id="headerSpacer"></div>

<main class="container">
    <div class="page-head">
        <h1>CSS 渐变色生成器</h1>
        <div class="desc-text">生成线性渐变，实时预览，一键复制CSS代码</div>
    </div>
    <div class="card-box">
        <!-- 预览区域 -->
        <div class="preview-box" id="preview"></div>
        <!-- 颜色+方向 -->
        <div class="row">
            <div class="input-block">
                <label class="input-label">起始颜色</label>
                <!-- 可视化色块按钮 -->
                <div class="color-block" id="startBlock"></div>
                <!-- 隐藏原生拾色器 -->
                <input type="color" id="startColor" value="#3b82f6">
            </div>
            <div class="input-block">
                <label class="input-label">结束颜色</label>
                <!-- 可视化色块按钮 -->
                <div class="color-block" id="endBlock"></div>
                <!-- 隐藏原生拾色器 -->
                <input type="color" id="endColor" value="#ec4899">
            </div>
        </div>
        <div class="input-block" style="margin-bottom:20px">
            <label class="input-label">渐变方向</label>
            <select id="direction">
                <option value="to right">从左到右</option>
                <option value="to bottom">从上到下</option>
                <option value="45deg">45°</option>
                <option value="135deg">135°</option>
                <option value="to left">从右到左</option>
                <option value="to top">从下到上</option>
            </select>
        </div>
        <!-- CSS输出 -->
        <div class="input-block">
            <label class="input-label">CSS 代码</label>
            <textarea id="codeOutput" readonly></textarea>
        </div>
        <div class="btn-row">
            <button class="op-btn primary" id="copyBtn">复制CSS代码</button>
            <button class="op-btn" id="randomBtn">随机渐变</button>
        </div>
    </div>
</main>

<div class="toast-copy" id="copyToast">
    <div class="toast-icon">✓</div>
    <span class="toast-text">复制成功</span>
</div>

<script>
// 复制提示
const copyToast = document.getElementById('copyToast');
let toastTimer = null;
function showToast() {
    if(toastTimer) clearTimeout(toastTimer);
    copyToast.classList.add('show');
    toastTimer = setTimeout(()=>copyToast.classList.remove('show'), 3000);
}
async function copyStr(text){
    try {
        await navigator.clipboard.writeText(text);
        showToast();
    } catch {
        const t=document.createElement('textarea');
        t.style.position='fixed';
        t.style.left='-9999px';
        t.value=text;
        document.body.appendChild(t);
        t.select();
        document.execCommand('copy');
        document.body.removeChild(t);
        showToast();
    }
}

// 明暗主题
const htmlRoot=document.documentElement;
const themeBtn=document.getElementById("themeToggle");
const mediaDark=window.matchMedia('(prefers-color-scheme: dark)');
const STORAGE_KEY="site_theme_mode";
function applyTheme(mode){
    if(mode==='dark'){htmlRoot.setAttribute('data-theme','dark');themeBtn.innerText='☀️';}
    else {htmlRoot.removeAttribute('data-theme');themeBtn.innerText='🌙';}
}
function initTheme(){
    const save=localStorage.getItem(STORAGE_KEY);
    if(save) applyTheme(save);
    else applyTheme(mediaDark.matches?'dark':'light');
}
function toggleTheme(){
    const now=htmlRoot.hasAttribute('data-theme')?'dark':'light';
    const next=now==='dark'?'light':'dark';
    localStorage.setItem(STORAGE_KEY,next);
    applyTheme(next);
}
mediaDark.addEventListener('change',()=>{if(!localStorage.getItem(STORAGE_KEY)) applyTheme(mediaDark.matches?'dark':'light');});
initTheme();
themeBtn.onclick=toggleTheme;

// 头部自适应
const headerDom=document.getElementById('headerDom');
const headerSpacer=document.getElementById('headerSpacer');
function syncHeader(){headerSpacer.style.height=headerDom.offsetHeight+'px';}
window.addEventListener('resize',syncHeader);
syncHeader();

// 返回按钮
document.querySelector('.back-btn').onclick=e=>{
    e.preventDefault();
    if(history.length<=1) return;
};

// DOM元素绑定
const preview = document.getElementById('preview');
const startColor = document.getElementById('startColor');
const endColor = document.getElementById('endColor');
const startBlock = document.getElementById('startBlock');
const endBlock = document.getElementById('endBlock');
const direction = document.getElementById('direction');
const codeOutput = document.getElementById('codeOutput');
const copyBtn = document.getElementById('copyBtn');
const randomBtn = document.getElementById('randomBtn');

// 同步色块背景颜色
function syncColorBlocks(){
    startBlock.style.background = startColor.value;
    endBlock.style.background = endColor.value;
}

// 核心更新函数：实时刷新预览 + 生成CSS代码
function updateGradient(){
    syncColorBlocks();
    const startVal = startColor.value;
    const endVal = endColor.value;
    const dirVal = direction.value;
    const gradientStr = `linear-gradient(${dirVal}, ${startVal}, ${endVal})`;
    preview.style.background = gradientStr;
    const cssCode = `background: ${gradientStr};`;
    codeOutput.value = cssCode;
}

// 随机十六进制颜色
function randomHex(){
    const r = Math.floor(Math.random()*256).toString(16).padStart(2,'0');
    const g = Math.floor(Math.random()*256).toString(16).padStart(2,'0');
    const b = Math.floor(Math.random()*256).toString(16).padStart(2,'0');
    return `#${r}${g}${b}`;
}

// 点击色块唤起拾色器
startBlock.onclick = ()=> startColor.click();
endBlock.onclick = ()=> endColor.click();

// 实时监听拾色器拖动
startColor.addEventListener('input', updateGradient);
endColor.addEventListener('input', updateGradient);
direction.addEventListener('change', updateGradient);

// 复制按钮
copyBtn.onclick = async ()=>{
    await copyStr(codeOutput.value);
};

// 随机渐变按钮
randomBtn.onclick = ()=>{
    startColor.value = randomHex();
    endColor.value = randomHex();
    updateGradient();
};

// 页面加载初始化渲染
updateGradient();
</script>
</body>
</html>
